body:
  text: 十二月辛丑上命軍機大臣等傳諭經略大學士傅恆曰現在調遣滿兵原因其驍勇精鋭逺過緑旗可速收克捷之效川省馬匹初雖遲誤及經略大學士傅恆指示調度又傳諭該督尹繼善前往料理尚書舒赫德亦復星馳查辦昨據髙越所奏購買本省及陜省馬騾年內可資應付則努三所帶留駐昭化之兵目下諒可全數進發即後起滿兵亦可陸續出口但不知此諭到日滿兵已到幾何各路官兵已到幾何總期早一日抵營可望早一日奏捷朕心實為懸切經略大學士其作速奏聞是日上又命傳諭曰前據髙越奏稱川省軍需年內至明年五月尚須撥銀八百七十萬兩經軍機大臣酌議本年十月以後已撥銀四百萬兩臘底春初均可抵川現在又將湖南湖北江西省留備等銀凑足二百萬兩協濟如有不足應俟來春另行籌辦金川小醜初不意糜費如許物力兩年之間所用幾及二千萬從前西北兩路沙磧迢遙艱於饋運是以所費不資今自成都至軍營程途幾何用兵時日幾何而糧餉之糜費較彼更甚其中必有經理不善之處但辦理至此勢難中止今通盤籌畫各省協撥數已浩繁不得已而動至留備揆此大局設再有遷延斷難為繼豈有因此而額外加徵重纍小民之理惟望滿兵速到大功速成不出朕前諭四月初旬之期則雖多費帑項亦尚不至虛擲一切機宜連日密諭中備細詳悉並將軍機大臣等原議抄發經略大學士傅恆閲看令其留意再頃接嶽鍾琪奏報現在黨壩用炮攻擊賊碉情形看來此處兵勢稍振經略大學士前有由黨壩進取之意計抵卡撒後定即赴黨壩周覽形勢熟籌勝算自當由此一路進兵為是卡撒亦屬緊要傅爾丹年近衰老一切堵禦攻勦尚須酌派强幹大員協同辦理庶免疏虞著一併傳諭經略大學士妥酌調遣壬寅上命軍機大臣等傳諭經略大學士傅恆曰經略大學士傅恆奏稱初九日途經天赦山路甚險阻上下四十餘里雪後凍滑有馬十數匹墜入山澗官兵馬匹俱未能到臣不忍獨自乘騎步行七十餘里並未勉强蜀道之險峻如此經略大學士跋履艱難不辭勞瘁固屬忠勇奮發然未免過甚矣天下事自有中道過猶不及在臣子雖自矢匪躬然不可使為君父者聞之馳心厪念至有所不忍古人稱或勞心或勞力士卒義當勞力今聞跟役兵丁追隨弗及伊等均有人心見經略大學士勤勞若是疇不感動奮勉誠力有不逮耳經略大學士調度機宜辦理章奏事無大小皆須縈神裁酌所謂勞心者合營將士不能及其萬一乃勞力之處又與士卒無異以一身之精神每日如此何以能堪朕聞之實增懸切不能欣喜也朕命達爾黨阿等隨行原為經略大學士一往直前恐至太過令其隨事勸阻今經略大學士竟日步行如此勞瘁達爾黨阿等何以不力為勸止行路尚爾交鋒之際更復何如朕輾轉於心不能暫釋有㫖傳諭達爾黨阿等嗣後經略大學士當聽其勸阻以慰朕懷至黨壩軍聲稍振經略大學士此時想已到彼相度形勢自必乘機進取但現在滿兵至者不過三數百人尚不宜輕用其鋒當待陸續到齊厚集其勢便可一舉成功計亦不出三月未為過遲連日所寄諭㫖俱已詳悉惟望如期告捷露布奏凱耳頃據傅爾丹等摺奏請補軍營將辨遺缺煩冗不止數千言各將辨均係應行題補之人軍前籌辦攻𠞰事宜至關緊要何暇紛紜奏牘為此支蔓之詞著傳諭經略大學士軍前遇有將辨缺出即於現在人員內揀選委署即同實授俟凱旋後再行補題既足鼓勵衆心亦可少省精力將此曉諭兵辨知之是日上諭內閣曰經略大學士傅恆及尚書達爾黨阿所奏自成都前赴軍營二摺著宣示中外經略大學士傅恆忠勇奮發宣力勤勞其殫心為國之丹忱足以感孚衆志是以近日軍旅之事舒赫德尹繼善那蘇圖鄂容安等率能實力籌辦用速軍行朕甚嘉焉凡為臣子者內而亮工熙績外而敷政寧人各宜自矢靖共恪思匪懈豈必倡而後效始知黽勉况軍旅之事國家所不常有朕惟願與諸臣共享升平之福不樂覩盡瘁於倥偬之際也但經略大學士傅恆如此忠誠勞勩在隨行將辨士卒目擊者固當激勵興起而內外大小臣工聞風者亦必中懷敬服設尚不知奮勉不知效法於趨事赴公之際仍懷觀望朕亦惟信賞必罰耳著通行傳諭知之是日上又諭內閣曰此次大兵征𠞰金川經過陜省地方一切安臺馬匹事宜總督尹繼善俱能星速料理調度得宜於軍行甚為有益朕深為嘉悅著將伊從前革職留任之案加恩開復癸卯上諭內閣曰訥親自辦理金川軍務以來行事乖張心懷畏縮視士卒死傷漠不動念惟安逸是圖娛樂是耽而於道路之險阻兵民之疲憊從未據實入告朕因軍旅重大不容久誤特命大學士傅恆前往經略調遣滿漢官兵飛芻挽粟籌畫多方設令訥親張廣泗早行奏聞朕必加以裁酌不至多此一番勞費矣今朕於此事頗為追悔但辦理已成無中止之勢即此而論訥親張廣泗誤國之罪可勝誅耶訥親張廣泗二人乃軍前之勞人憊卒所共切齒張廣泗雖經伏法而士衆尚未親覩訥親若在成都審明待報未免往返稽遲著舒赫德將訥親帶往軍前㑹同經略大學士傅恆一面訊明一面即將伊祖遏必隆之刀於營門正法令軍前將辨士卒共見之此㫖著侍衛鄂實賫往交經略大學士傅恆尚書舒赫德遵照辦理是日上命軍機大臣等傳諭經略大學士傅恆曰經略大學士傅恆奏稱此番必期成功若不能殄滅醜類臣實無顏以見衆人朕覽之深不以為然輾轉思之竟至徹夜不寐經略大學士沿途勤瘁諸事精詳秉心之堅定大概可見此乃出於由衷非徒為大言者經略大學士此行為國事乎抑為一身乎如為國事則當思於事有濟使徒執一已之見而不計及國體是所謂知其一不知其二者也金川之事朕若知征途險阻如此川省疲憊如此早於今秋降㫖以萬人交嶽鍾琪料理更不必調派滿兵特遣重臣費如許物力矣奈無一人具奏朕實不知彼地情形今辦理至此籌畫周矣人事殫矣若夫成功則有天焉或上蒼不遽絶其種類俾偷生窟穴原屬化外於國家何關䡖重而强以人力抗天心其將能乎經略大學士非不明察事機深悉理勢現在酌撥帑項千萬有竒至動及各省留備銀兩已屬拮据即使國家府藏充裕而罄小民之脂膏捐士卒之軀命以供一人之必欲成功即天下之人其謂經略大學士何則是朕必欲經略大學士之成功而不惜小民之脂膏不惜士卒之軀命矣天下其謂朕何况經略大學士此番忠誠勇往勤勞盡瘁不惟士卒人人感發凡內外大小臣工孰不歆動孰不欽服即萬一不能擒醜虜得巢穴而有所斬獲亦得謂之成功何不可見衆人之有倘必存過甚之見直是専為一已轉無以見衆人即朕亦無以對衆人矣揆之事理嶽鍾琪得土兵千人尚能稍振聲勢以經略大學士之壯猷滿兵之驍徑何堅不摧果能克取賊巢擒獲渠首固為全勝否亦必殱其逆黨躪其要地奪其堅碉彼必恟懼乞命乘此機㑹因而撫納亦足以振軍威而全國體在蠻夷絶徼控制之方只宜如此君臣之間自有情義股肱心膂一體相關經略大學士平日在朕前休戚與共為何如者以朕此時之懸切知經略大學士夙夜勤拳思所以體朕心而慰逺念著詳悉傳諭知之甲辰上命軍機大臣等傳諭經略大學士傅恆曰經略大學士傅恆此次忠勇奮發滿兵驍果精鋭以此進取賊不足平將來若得勒歪刮耳崖傾其巢穴三兩日內經略大學士即當凱旋迅速回朝一切善後事宜悉交䇿楞㑹同嶽鍾琪辦理䇿楞已授為四川總督善後之事地方官尤為親切䇿楞陛辭時曽奏稱賊平之後安插番衆分布防禦綏靖封疆事務甚繁非經年不能就緒伊欲先將番境經理完竣然後回省辦理地方政務必俟諸凡妥協方請陛見觀伊此語已得其要領足可仔肩經略大學士即留彼經畫亦非旬日所能周備中朝機務重大竚待贊襄既有䇿楞可托朕心無煩懸注也至經略大學士初赴軍營之時山行竟至徒步示與士卒同甘苦若古良將亦常有之至克捷還朝則當肩輿就道非特經略大學士一人宜爾即達爾黨阿舒赫德達青阿等均應乘轎乘馬各隨其便以昭體統若復下同士卒肩摩履錯則在一已轉為過於邀名而於國家等威亦無分别何以令士卒知所敬畏其善體此意毋矯枉過正也至於率領兵衆行走不能迅速所有凱旋之兵酌派將辨約束按程還都經略大學士同達爾黨阿舒赫德等酌帶隨行官役即速前來以慰馳念再哈攀龍所奏三摺據稱俱已具禀經略大學士其攻𠞰情形係已過之事經略大學士到彼自必相機調度其所陳兵將必須相習使之上下同心所見頗是經略大學士定已採擇妥酌辦理其土目邪正乃所深知想抵營自有斟酌又丁士傑所奏苖兵不可派調藥箭不可弛禁似亦有見現在滇兵尚當停調何况黔省苖兵著將原摺抄發聽經略大學士裁酌是日經略大學士傅恆奏言本月初十日臣住宿燒湯地方烏爾登前來接見臣詢問近日軍營情形據稱金川現在乏糧尚不至於斷絶賊聞大兵將至於卡撒黨壩等處各添人防守此時尚未可以進取臣復問烏爾登既已來此馬奈止副將永柱一人是否足資防守據稱永柱熟悉番情嫻於軍旅攻克申達皆得其力馬奈一路永柱儘可彈壓臣因地方緊要仍令烏爾登速回馬奈俟臣至軍營與傅爾丹詳悉㑹商如或永柱可任無煩大員則另派侍衛一員逰擊一員前往協同防禦將烏爾登調至卡撒軍營將來滿兵到時令其管領自屬有益十二日臣在龍肋住宿接閲傅爾丹摺內投誠番民審渣甲朗結等供詞并安插賞賚之處就臣愚見此等番民若果係强壯之人准其投誠猶可去賊之脅從如不過老弱窮餓之徒盡為收納是轉為賊人減省口糧於我軍毫無裨益况此等從逆之人本應誅戮不過因其既係投誠復行正法恐益堅賊衆負固之心是以姑許以不死耳若復加賞賚使之豐衣足食是賊人平時則敢於抗拒力窮又可投誠以圖賞恤殊乏創懲之道且其誠僞全無足慿置之番地亦為非䇿臣意惟有解送成都令地方官收管稽查俟事平另行辦理至於大兵圍困力屈勢窮然後乞降則非投誠者可比自應即行正法至提標中軍逰擊李中楷現在管理提督全省之事而火藥亦伊専辦其所製火藥臣閲看甚覺精良已嚴諭一色妥辦不得稍有參差但火藥於軍營關係綦重向來不無盜賣之弊臣欽遵諭㫖嚴行稽查令髙越李中楷加意檢察臣至軍營更當於各處嚴查以杜賊人偷買之徑以清向來積弊奏入諭曰諸凡留心實堪嘉悅佇待捷音之至耳是日兆惠班第奏言現在預備軍糈應以卡撒黨壩兩路為凖卡撒昔嶺等處大營緊要存貯無幾而附近之崇德美諾占固各臺站積米頗多星即行令該司道等並捲夫役鳩集番民悉力轉運并催趲各州縣官商勒限抵營臣班第前赴草坡沿途親自督催今計卡撒昔嶺木岡色爾力左右山梁等處軍營除日支外現存餘米萬石有零每日到卡撒官商臺運均有四百三百石不等足供舊兵暨陸續到營新兵一兩月之糧又據司道等㑹詳於內地各州縣共派辦米一十二萬石分運卡撒黨壩各六萬石內以二萬二千石飭各屬長運至黨壩一萬六千石飭各屬長運至卡撒王鏜范清注二員分任兩路長運數萬石到營以現在所運合之內地增派之數即大兵續到亦足供給臣等行令司道通飭承辦官除臺站正運按日遞送足額外其州縣帶運商民包運之米均酌道里逺近難易勒定限期每月到營若干依次交清分别功過使無推委遷延方足以收實效惟番地春寒較甚雨雪泥濘夫役未免視為畏途然如此豐裕儲備可冀不致貽誤至甲索現有餘積即添兵萬餘猶足供一兩月之用又離黨壩漸近尚堪渡河接濟正地馬奈兵數均屬無多且現有存貯之糧即旅夫稍有增加兵食亦可敷用南路內地發運之米酌定續添數目并於松潘子龍附近處所採買炒麵牛羊以資配搭總期多為儲備寧盈無缺臣等通盤確算卡撒黨壩馬奈正地甲索五路需用兵糧存營及沿途已運出口者幾至十萬再加近派西路軍米十餘萬石南路軍米二三萬石已足供新舊兵數月支食擬於卡撒籌備五萬人之糧黨壩籌備三萬餘人之糧甲索籌備一萬餘人之糧馬奈正地兩處共籌備一萬餘人之糧俱已分頭趲辦務期預有存積不敢稍有玩忽奏入報聞乙巳上命軍機大臣等傳諭經略大學士傅恆曰金川用兵定不可過四月初旬之期朕已屢經傳諭今晨恭請皇太后聖母萬安䝉詢及此事朕以經略大學士傅恆所奏如不成功無顔以見衆人之語陳奏奉皇太后懿㫖經略大學士傅恆此見實為太過經略大學士此行原為國家效力非為一已成名如為成名起見豈有國家費如許帑項用如許生命専以供一已成名之理况退縮貽誤者朝廷既治其罪而經略大學士傅恆忠勇奮發任事如此何不可見衆人之有且人事既盡成功與否則當聽命於天若天意不欲殄滅醜類人力何能强違經略大學士傅恆之出力期於國事有濟也必謂不能成功即不可見衆人誠思果如所見於國事為有益乎否乎自宜遵奉朝廷前㫖為是朕思皇太后諭㫖聖明洞悉事理益覺經略大學士傅恆所見之偏於建功立業也然以朕觀皇太后之意亦非止為經略大學士傅恆而發乃為朕躬因金川用兵宵旰焦勞仰厪慈念也可將此傳諭經略大學士傅恆令其敬體懿訓以慰朕懷至進兵取道自應直趨黨壩彼處與勒歪較近兩酋現住於此安知非天意留以待經略大學士之成功耶勒歪既得刮耳崖自可傳檄而定卡撒雖屬緊要但堅碉林立險峻逾常始之可進之路皆為誤國者所僨事以致賊知防範凡可進之路今皆賊兵精鋭所萃大兵不可久頓應分滿兵二三千人交傅爾丹或酌派烏爾登等協助在賊酋知我大兵已趨黨壩必撤卡撒之衆盡鋭抵禦彼時我兵乘卡撒空虛以攻其無備是亦出竒制勝之䇿若因嶽鍾琪先在黨壩聲威稍振經略統兵前至似與之爭功又或因卡撒進兵較難不當舍難就易此種見解俱不必存經略大學士統攝全軍衆人之功皆其功衆人見知於經略大學士即可見知於朕嶽鍾琪亦必樂於經略大學士麾下奮勉效力即傅爾丹一舉成功亦皆稟承經略共䇿殊勳何分彼此用兵之道斷無舍易就難之理原應攻瑕搗虛以正合以竒勝鬭智而不鬭力若必為所難為乃一夫之勇大將當不出此令朕若早知川省物力疲敝地方險阻實不肯為此舉而此番料理己未免有類孤注如四月初旬已能攻困勒歪全勝袛在呼吸自無虧一簣而棄前功之理否或連陳克捷大挫賊鋒亦可收局倘仍不過在卡撒黨壩之間遷延觀釁則勞費無已勢將難繼此朕四月初旬之諭所謂諄諄也舒赫德職司國計並宜深悉一切留心其軍前糧務關係緊要現有奸棍私買餘米射利一案經兆惠等參奏經略大學士自不必分心及此惟知㑹兆惠等令其實心查察嚴飭官商毋致滋弊可耳戊申上命軍機大臣等傳諭經略大學士傅恆曰據髙越奏稱蜀中挽運軍糈全資民力輪流更替即村落鄉民亦多徵發不已近添新糧募夫尤衆一出陶關山路險峻雪深氷滑艱苦視內地倍甚成都米價昂貴民食艱難請將常平倉穀碾米平糶現在竭力辦理據實陳奏觀此則川省物力虛耗大概可見髙越雖稱據實直陳恐困憊情形尚有未盡形之奏牘者前此傳諭以四月初旬為期蓋深有見於此也但事機所在呼吸殊形數千里外豈能遙度昨據經略大學士傅恆奏稱將來若下班師之詔請先降㫖詢問容臣覆奏到日然後撤兵自朕思之識時務者為俊傑今我兵攻𠞰應以十分計之總以三月二十以後四月初十以前為凖若此限內已圍困勒歪刮耳崖是成功已及八分即稍逾期至四月杪五月初亦應得傾其巢穴尚屬不為遲滯若於此際撤兵豈不可惜縱使莎羅奔郎卡未遽就擒亦不過釡底遊魂如班滚今日耳何足介意亦不必窮搜矣而得勒歪即可謂之犁庭殱醜足以告成功如三月二十以後四月初十以前尚不過一二分費力攻取卡撒黨壩間僅得其半而繼此之後險巇更甚著力更難則日復一日盻望徒殷制勝莫必糜費將無底止京兵亦難久駐若待詢問奏報往返又須經月轉益勞耗此等機宜間不容髮既不能遙定惟在經略大學士虛衷燭理審機度勢設前此固執之見幾微未忘於國家大計正恐未能周悉經略大學士此行為國家任事豈為一已成名耶舒赫德䇿楞等俱宜深悉此意總之軍務固為緊要內地尤切撫綏垂成之功不可棄難成之功不可圖於應機決䇿之際衡量輕重是在親履行間者悉心體㑹經略大學士向之所見未免為一已功名朕所指示乃國家正理諸臣其共體之三月二十間即應遵此㫖將大概情形可望不可望之處奏明是日上又命傳諭舒赫德尹繼善䇿楞班第曰川省軍興以來一切夫馬糧餉供億浩繁內地民情疲困殊甚現在添調滿漢官兵陸續抵川料理尤為緊要昨據髙越所奏辦理糧運馬匹諸事雖足供支無誤而拮据之狀已可概見不知目下該省實在情形若何著傳諭舒赫德等一一留心體察據實奏聞有應行辦理之處即一面辦理其現在大兵經行地方沿途供應是否不至周章旬日以來未據舒赫德等將此詳悉具奏朕心深為懸注再川省馬匹現據高越奏有八千餘匹且有八旗山西湖北之馬將次到齊足備乘騎之用滿漢官兵按起前進現今如何行走明年二月初旬是否可以全抵軍營其在途次者作速催令前行總之早一日則有一日之益可令舒赫德等速為查辦并不時入奏以舒西顧之念己酉上命軍機大臣等傳諭經略大學士傅恆曰前因傅爾丹等奏稱咱粑拉鳥鎗於軍營甚屬有用是以京城派往兵丁二千令帶往一千桿船厰黑龍江派往兵丁三千亦令帶往一千桿現今造辦處又成造二千桿倘軍營尚屬需用自應送往若就帶往之鳥鎗可以敷用即可無須再送路途遙逺又係重物由驛站馳送亦屬艱難可傳諭經略大學士將前項鳥鎗軍營應須添補與否酌定作速具奏是日上又命軍機大臣等傳諭湖廣雲貴河南四川各督撫曰經略大學士傅恆奏稱川省辦理糧運甚關緊要自成都出口一路共設糧臺三十三處經理各官悉係部中揀發試用之員未經歷練難以勝任請於湖南湖北雲南貴州四省內令該督撫量揀道府同知咨送川省委用朕思經略大學士現抵軍營督師進𠞰不日即可奏凱運送軍糧刻難遲緩若行令各該督撫遴選派往恐稽時日今朕於就近省分派出道府同知三十七員令往軍前専辦糧務各督撫接到此㫖限於三日內即飭各員馳驛星速起程不得稍有遲誤此內知府同知三十三員到川後令每人専心管一臺並將三十三臺分作四段所派道員四員各管一段令其往來稽察總理督率將來辦理妥協事竣咨回該省即以軍功議叙其庸劣者立即參劾如此責有専屬庶糧運不至貽誤於軍務甚為有益可傳諭總督新柱張允隨巡撫彭樹葵開泰圖爾炳阿愛必達鄂容安等令其即照所派名單迅速遣往毋得稍遲並傳諭䇿楞班第知之平定金川方略卷二十
