body:
  text: 正月癸亥上諭內閣曰陜省為入川要路其武功以西棧道綿亘較川省尤長大兵經過地方一切供億雖絲毫不擾閭閻而夫馬支應未免有資民力前曾降㫖將川省己巳年地丁錢糧再行緩徴其陜省入棧毗連川境之州縣應與川省一體加恩著該督撫查明各該州縣本年應徴地丁錢糧全行緩徴以紓民力該督撫其悉心辦理務俾窮黎均沾實惠以副朕軫恤民勞之意是日上命軍機大臣等傳諭經略大學士傅恆曰朕今日辰刻恭請皇太后聖母萬安仰䝉慈諭金川之事朝廷此時即應降㫖罷兵諸王大臣想不敢奏請但理勢自當如此朕以所調各路兵丁踴躍前去若中道撤回不得一申其敵愾之氣未免有拂衆心且於從前辦理之體恐涉輕率俟其到齊得一二勝陳即令班師具奏又䝉慈諭似此是朝廷尚有專意成功之念豈不與經略大學士傅恆同出一見耶大軍早罷一日則兵丁得早免一日勞苦人情孰不戀妻子而顧室家何必待臨陳得勝方令凱旋此一二陳中能保兵丁一無傷損乎大兵所過百姓驚惶夫馬供億悉資其力早罷一日亦早得安息一日朝廷若執意待至四月是百姓又多受一二月之災矣皇太后懿訓至聖至明朕實無辭以對仰惟聖母此㫖確切理勢並非偏於姑息朕本心亦實以為當然經略大學士傅恆若謂皇太后此㫖因朕宵旰焦勞而發尚為近之如以朕意在罷兵皇太后因有此㫖則失之逺矣自十二月十四日以後屢次所降諭㫖經略大學士接到後自必翻然大悟詳悉熟計一一遵循以贊襄機務為念不當專為金川一隅久留番境也甲子上諭內閣曰金川用兵一事朕本意欲以禁遏凶暴綏輯羣番並非利其人民土地而從前訥親張廣泗措置乖方屢經貽誤是以特命經略大學士傅恆前往視師熟察形勢相度攻勦經略大學士傅恆自奉命以至抵營忠誠勞勩超出等倫其辦事則巨細周詳鋤奸則番蠻懾服整頓營伍則紀律嚴明鼓勵戎行則士氣踴躍且中宵督戰不避風雪擊碉奪卡大著聲威誠克仰副委任朕思蕞爾窮番何足當我王師而機務重大部政殷繁諸大臣皆為此一事馳驅經畫經略大學士傅恆乃中朝第一宣力大臣素深倚毗豈可因荒徼小醜久稽於外朕心實為不忍即使擒獲渠魁掃蕩巢穴亦不足以償勞此㫖到日著即馳驛還朝尚書逹爾黨阿舒赫德各有部務亦未便久曠總督尹繼善統制全秦邊防綦重著一同回任軍營一切事宜交與該省總督䇿楞提督嶽鍾琪等儘現在兵力足以調𣲖即傅爾丹尚有滿兵在彼亦應暫留殫心籌畫妥協辦理以竣軍務臣等謹按聖人之心廓然而大公物來而順應故事無大小皆因乎事勢之當然時行則行時止則止初無意必固我之見是以百慮殊途同歸一致措施無不各當其可而天下咸頌神明也我皇上於金川之事始則因其跳梁負固不得不伸天討以安蠻服原非有利其人民土地之心及乎用兵既久人力既勞則又念根本為重小醜為輕征討已足以伸威而兵革不可以久頓奉慈訓於深宫運神機於獨斷頒詔特召經略班師中外歡騰臣民胥慶昔聖祖仁皇帝三征沙漠不親擒噶爾丹以耀武仁聲遠播義問光昭我皇上睿慮哲謀同符聖祖蓋意念至為深切謀猷至為廣逺其光明正大之心公如天地明如日月誠為千萬世之所共仰也乙丑開泰奏言軍務餉項最關緊要臣接准湖北撫臣彭樹葵移咨知川省急需餉銀而湖北不敷借撥凡屬鄰近省分自應速籌接濟臣與布政使再四商酌於司庫動支封貯銀十萬兩乾隆十三年地丁銀八萬兩各稅銀二萬兩合共二十萬兩委員星即解川以應急需仍俟部撥别省協餉經過就便兌還歸欵奏入上諭該部知之丙寅上命軍機大臣等傳諭東三省領兵之副都統侍衛等曰經略大學士傅恆抵營以後攻碉殺賊屢毁石卡是以賊酋莎羅奔畏死乞降據經略大學士奏稱不肯受降欲俟大兵到齊盡行勦滅朕思金川逆酋不過蕞爾小醜既經大學士數次戰克已知畏威乞降今若不允其請盡皆勦戮朕心有所不忍已降㫖令大學士班師還朝其納降諸務交與傅爾丹策楞等辦理現在軍務既經告竣其東三省兵丁尚未到營者著由原路撤回領兵之副都統侍衛等奉到此㫖沿途嚴加約束不得滋事擾民是日諸王大臣等合詞陳奏曰金川用兵一事從前伏讀諭㫖原有得其地不足守得其人不足臣並慎重籌畫不可輕舉之明諭嗣因該督撫以小醜跳梁理應翦除且可刻期告捷遂一面調兵進勦一面奏聞除逆安邊事屬難已是以得㫖允行及張廣泗藉口兵力單弱頓師日久我皇上特遣訥親前往原因伊受恩深重必能將番地情形據實入告以俟聖裁詎意其到營後一味偷安傲慢罔惜士卒並不直陳彼地山川形勢以致曠日持久糜餉老師罪實難逭仰䝉聖明洞察特遣大學士傅恆前往經略大學士傅恆奉命之後即星夜兼程就道雨雪間關不辭艱瘁抵營之日號令嚴明賞罰公當晨夕區畫軍務接見文武屬員虛𠂻商確衆心悅服並將起釁之良爾吉阿扣等明正典刑以肅軍紀其攻碉之際親身督戰屢有克捷整理緑旗兵丁頓除積玩之習其奮勇效忠實心宣力之處實屬共見共聞至於金川山險碉堅逆番負嵎固守目前未能即克種種實情次第陳奏荷䝉皇上宣示臣等得以備細周知竊念用兵為國家重務進止機宜原難執一而論䝉皇上聖諭命臣等僉同籌畫應否撤兵仰見睿慮髙深虛公詳慎之至意臣等伏思前此用兵原非利其土地人民今既知其實在情形限於地勢似未可耗有用之帑儲竭內地之兵力而施於無用之荒徼皇上聖謨宏逺定計班師正與現在機宜允合在經略大學士傅恆身膺重任力規進取是以有統率精兵直搗刮耳崖之請但以如此忠藎大臣久留徼外與蕞爾逆番相持殊覺輕重失體即攻克刮耳崖勒歪擒獲莎羅奔郎卡亦猶不足償勞况機務重大部事殷繁皇上宵旰焦勞必得心膂大臣贊襄左右臣等愚見應即召還經略大學士傅恆以資燮理實合機要其軍營一切事宜仰祈睿鑒飭交在軍諸臣次第辦理得㫖允行是日經略大學士傅恆奏言金川之事臣到營以後略知梗概謹據實奏聞當紀山發兵進討之始惟馬良柱轉戰直前踰沃日收小金川直抵丹噶其鋒甚鋭宋宗璋逗遛雜谷許應虎失機的交致賊得憑險造碉防守嚴峻張廣泗分兵七路十路在在阻隔毫無進取至上年六七月後訥親至營並未細察情形始則急遽無序下令限三日內必取刮耳崖以致任舉買國良同時戰沒後即委靡退沮晏起偷安將士不得一見不聽人言不恤士卒遂使將懷憤心士無鬬志軍務廢弛已極而張廣泗乘此逞奸僨事訥親全不知兵為其所愚惟恃以碉逼碉以卡逼卡之法通飭各屬遵行希圖與賊相拒巖碉之下俟其自潰無如賊碉層布所得無幾而傷殺已數千人又復畏罪隱匿不敢奏聞臣查攻碉之法賊已熟悉防備甚周我兵雖衆鎗炮所及惟抵堅壁於賊無傷賊不過數人從暗擊明鎗不虛發是我惟攻石而賊實攻人我無障蔽而賊有藏匿且多掘土坑急則深伏其中不見人形而能自下擊上又於碉外開濠人不能越戰碉鋭立髙於中土之塔建造甚巧不逾數日而成其餘隨缺隨補頃刻立就且人心堅固至死不移碉盡碎而不去炮方過而人起客主形殊勞逸勢異攻一碉難於克一城即臣現駐之卡撒親閲左右山梁二道三道梁上有碉三百餘座以半月十日得碉一座計算必待數年始盡且得一碉輒傷數十百人以此計算尤不忍言而訥親張廣泗尚以為得計是敢於欺皇上亦所以自欺也今臣再四熟籌惟有使賊失其所恃而我兵乃得展其所長如卡撒一路乃攻刮耳崖正道嶺髙溝窄臣既身為經略理當力任其難相度形勢須就此一路之中分路橫截同時大舉俟大兵齊集分派左右山梁昔嶺石城等處奮威力戰臣别選鋭師於喇底旁徑及奎角干登等隘裹糧直入踰碉勿攻繞出其前既以圍碉之兵作護糧之兵賊番稀少外雖嚴密內實空虛我兵既遮道前進則守碉各番皆有戀家之念無固守之心均可不攻自潰至黨壩一路嶽鍾琪雖稱該處山坡較寬可以水陸並進又有卡裏等隘可以間道長驅但臣按圖咨訪賊境亦復險隘進取之難幾同卡撒瀘河一道賊人兩岸阻截舟行不能徑逹惟可益以新兵使之努力奮擊直搗勒歪兩路並進而甲索馬奈正地等要路俱令竭力進攻使賊面面受敵不能兼顧雖有堅城險碉漢奸不能為之謀逆酋無以恃其固矣至於調遣兵丁奮勇無前一以當百固仗滿兵為最而穿箐引道則非土兵不可各土兵中小金川最為驍勇良爾吉已正典刑莫為賊諜澤旺與逆酋結恨甚深小朗素奮志立功自屬可用沃日兵少而强雜稄兵衆而懦明正木坪忠順有餘强幹不足瓦寺尚肯用命人亦無多革什咱兵勢頗鋭馬奈一路實資其力正地亦藉以自守巴底巴旺畏賊如虎不堪驅䇿綽斯甲心懷疑二未足憑信現有官兵彈壓不敢動搖總之土兵之性貪利可以忘身臣現在加意鼓舞棄短取長諄切曉諭令知逆酋不滅不休為彼永杜後患庶衆土司各思建功不復畏賊自能效命爭先若緑旗兵丁原非盡不可用向來全無紀律賞罰不行懲勸不當心灰意沮皆成懦怯且數營之兵臨時任意酌發兵不識將將不識兵而兵與兵又不相習臨陳勇怯領兵者不識其人何從分别是以每當緊急前後俱不相顧原屬兵法所忌臣現在申明軍紀振作士氣有功必賞有罪必誅實心訓諫使士識將心將知士習上下誠意相孚庶可變弱為强以收臨期臂指之用將辨賢否尤關緊要臣留心體察軍前大臣中如傅爾丹老成宿將久歷戎行而年近七旬難以親臨戰陳臣令與尚書逹爾黨阿經理營盤一應事務內大臣班第護軍統領薩音圖臣因各營俱有鎮將統領暫留軍營以便隨時委用護軍統領烏爾登現當馬奈一路護軍統領法酬仍在黨壩其各總兵內如莽阿納駐劄左梁尚能堵禦哈攀龍駐劄色爾力防守嚴密人亦勇敢哈尚德人亦明白果敢勇於任事現守右梁看來俱可任使冶大雄曾經出兵人尚老成臣現委以中軍之任副將馬良柱於蠻地素有威名為諸番畏服現駐昔嶺其餘將辨量材委遣務使各盡其用所向有功從前大帥行軍所得地方即發兵防守以致後之守兵漸分而前之精兵漸減即不撥兵防守立行拆燬而賊又於其地立砌石卡以藏身傷人是以守碉毁碉均屬無益今據軍前諸將咸稱賊聞臣至每日於各處添碉猶以為官兵狃於舊習彼得恃其所長不知臣此次决計深入不與爭碉惟時派遣精兵伺間突入斬殺賊衆或用大炮轟擊使之晝夜不寧以疲其力一俟兵到臣悉心布置面面周匝出其不意取道前進務在破其巢穴擒虜賊酋於三四月間定報捷音若賊境果非人力所及必不能平臣亦何敢勉强飾說必謂成功但審度形勢雖人人皆謂其難而臣殫竭駑駘悉心調度實可以掃除賊境以仰副皇上委任之至意總之此事辦理誤於初起之時處置不善逆酋本來從不歸化原可略惕以威使之知警不必果於進取逮馬良柱乘勝攻克沃日小金川直抵丹噶若張廣泗果能豫以接應其時賊人防禦之法尚未周悉亦可殄滅乃一誤再誤以至於今若此時畏難草率了事則逆酋之勢愈張而衆土司益被其毒且以天朝為不足恃即邊境何以兾其永寧是以臣愚以為必一舉成擒則可以威震百蠻永銷氛祲此時現在乞降未見果出誠心若莎羅奔郎卡果親自前來猶可商酌否則惟有滅此朝食斷難中止即目下時有投誠之人本應誅殛然借寬貸以分其勢搖其心又可隨時知彼消息是以未即行誅目前惟有實力攻勦迅速奏功是臣之專責至善後事宜届期再交䇿楞等辦理奏入諭曰朕意既定經略大學士當遵㫖速行還朝輔政也丁卯上諭內閣曰經略大學士傅恆秉心忠亮勇略超羣自奉命以來晨夕勞勩辦理諸務妥協精詳一抵軍營即能申明紀律振作士氣殱除奸慝屢克堅碉賊酋窮蹙乞命經略大學士傅恆志期一舉蕩平不肯允降朕思蠢爾窮番何足汚我斧鑕宜宏解網之仁以示如天之量已允王大臣等所議召經略大學士傅恆班師還朝其納降善後事宜交四川總督䇿楞辦理今日恭請皇太后聖母萬安仰䝉垂詢此事朕以納降班師具奏欽奉慈諭息衆寧邊乃國家太平長䇿皇帝御極十有四年豫從不問外朝政事上年皇帝奏聞因係軍國重務時厪豫懷近見皇帝宵旰焦勞尤為注切今既下詔撤兵實我大清國景運興隆億萬年社稷蒼生之慶大學士傅恆忠勤宣力謀勇兼優成績懋著朝廷宜封以公爵用示奬勵豫心如此皇帝以為何如朕念經略大學士傅恆殫心為國實冠等倫超錫五等之崇班允協酬庸之盛典仰遵慈諭封為忠勇公銘勳冊府光我邦家朕實嘉焉是日上又諭內閣曰金川軍務自經略大學士傅恆調度合宜勳績顯著朕已降㫖晉封公爵召令還朝其在軍大臣及隨營文武官辨等與有成勞宜加奬勵著交傅爾丹䇿楞嶽鍾琪等詳悉分别等次報明經略大學士忠勇公傅恆核定具奏交部從優議叙至軍機大臣等受朕指示承辦軍營事宜晨夕罔懈亦著一體議叙是日上又諭內閣曰金川逆酋窮蹙乞命朕已網開三面允准納降現在振旅班師但念用兵以來已逾二載將辨兵丁有攻碉奮不顧身以致臨陳捐軀者深堪憫惻著傅爾丹䇿楞嶽鍾琪等詳悉確查報明經略大學士忠勇公傅恆核定具奏交部從優議恤是日上又諭內閣曰前因武宏緒貽誤軍行馬匹降旨革職枷號嗣據經略大學士忠勇公傅恆奏川省馬匹實屬短少武宏緒並非有心貽誤且年已就衰請從寬典朕以軍興之際不可不嚴懲示警未經允行今既振旅班師著照經略大學士忠勇公傅恆所請免其枷號至鹿邁祖因漠視軍務搖惑衆心經班第參奏枷號示衆今念川省用兵二載民力疲憊此等情形皆經經略大學士忠勇公傅恆奏明亦著加恩釋放其餘有似此獲罪者俱著大學士查明照此辦理是日上又諭內閣曰川省自用兵以來督撫大臣因供辦軍需於內地吏治民生不能專心經理今既納降班師軍務以漸告竣地方關係緊要所當加意拊循綏輯署撫班第俟總督䇿楞回至成都助理月餘䇿楞酌量班第可以回京時令其來京至藩司為通省承宣大使朕觀紀山才具稍遜髙越四川布政使員缺仍著髙越署理紀山著回京以副都統用己巳上命軍機大臣等傳諭經略大學士忠勇公傅恆曰經略大學士忠勇公傅恆現在遵㫖還朝其參奏訥親各欵著交與舒赫德查追至軍需各案頭緒繁多今大兵既已停罷亦應徹底清釐舒赫德原係奉㫖暫留成都稽查軍需者著遵照前㫖㑹同兆惠班第等殫心綜核俾錢糧均歸實際毋任浮濫舒赫德辦有就緒即先回京庚午經略大學士忠勇公傅恆奏言竊查從前征𠞰金川各將領內參革治罪之員其中有曾經出力而人實可用者皆緣張廣泗以好惡為賞罰每多寃抑臣在軍營訪有參將蔡允郎建業及遊擊陳上才千總馬繼杜景賢等五員皆諳習番情熟悉形勢前此攻克地方俱著有功績後因失去炮位被參治罪而郎建業陳上才杜景賢皆在馬良柱案內今馬良柱已經起用而該員等尚在成都收禁臣思軍前正在需人此等諳練之員與其羈禁圜扉置於無用不如令其荷戈殺賊以贖前愆臣一面行文調至軍營一面奏明伏乞皇上恩准將蔡允郎建業陳上才馬繼杜景賢釋放使之奮勇效力自必感激圖報倘再不加勉臣即行嚴參從重治罪又總兵冶大雄曾經出兵人甚老成現在總理營盤事務甚屬妥協可否仰懇皇上天恩賞給花翎臣未敢擅便奏入得㫖允行是日軍機大臣等奏言前據髙越等具奏川省購買馬騾本地及陜省共可得八千匹後經議撥由京捲站之馬並山西湖廣協濟馬共七千匹合計已有馬一萬五千匹即髙越等所奏八千之數未必一時全行買足或間有倒斃然大概不下一萬二三千匹該省所産料豆稀少餵飼皆用米穀稻草現今米價昂貴一馬約須一人之食費用浩繁且於馬匹食性不宜難期臕壯存留該省補額又不須如此之多今大兵已撤自應請㫖交與尚書舒赫德㑹同該督撫酌量該省應留若干所餘之馬即照捲站之法沿途遞次分留陜西河南直𨽻三省以補營額之缺毋庸另行動項購買庶為兩便應否如此辦理令舒赫德等妥協定議一面奏聞一面查辦得㫖速行是日軍機大臣等又奏言上年差侍衛德山將新造長鈚箭一萬枝解送軍營今大兵已撤應令德山仍行解回京師諭曰此項長鈚箭不必解至京師德山接到此㫖時若與西安相近即交將軍博第與四川相近即交副都統卓鼐以備該處之用辛未上命軍機大臣等傳諭經略大學士忠勇公傅恆曰金川撤兵一事朕兩次召見諸王滿漢文武大臣示以朕前後所降諭㫖及軍營奏到情形令其各出所見具議以聞伊等合詞公奏僉稱揆理度勢撤兵之㫖誠為允協朕復細加體訪中外人情並無異議且有謂市井閭巷之人咸為欣悅者此事朕志先定絶無游移又復詢謀僉同足見理勢當然確不可易經略大學士更不必以未擒莎羅奔郎卡未破刮耳崖勒歪為歉蓋金川用兵不出於冒險則出於因循因循則糜餉老師耗竭元氣固失之不及而冒險則奮不顧身民命國儲輕於一擲又失之太過過猶不及其於國事無益有損均耳今經略大學士將彼地情形據實入告朕酌定罷兵之策俾內地民力得以休息部庫帑項得以撙節養和平之福培萬年之基其功視傾巢殱醜輕重為何如耶至撤兵事宜尚須詳悉經理大學士既遵㫖就道不必留辦可一一交策楞傅爾丹令其酌量次第分布務合機要如馬良柱帶兵暫駐小金川嶽鍾琪駐守打箭爐一應防範均宜隨時辦理期於周密臺站照舊安設軍營事宜照舊間日奏報一次俟有就緒或三四日或五六日一次以漸而減必俟諸大臣俱回至成都朕心始可釋然耳是日經略大學士忠勇公傅恆奏言原任打箭爐同知鮑成龍因承辦甲索糧運挽輸貽誤又安設烏拉漫不經心致多倒斃奉㫖革職即於軍前枷號示衆臣查該員承辦糧務遲誤廢弛實應懲處第臣在營細訪輿論稽核舊事鮑成龍前任打箭爐同知值金酋圍困章谷進抵毛牛相去爐地甚近賊將乘勢內犯劫掠客貨明正土司喇章駐劄在爐首欲遷避商民紛紛驚竄鮑成龍端坐衙署曉諭漢番軍民以所請救兵即至切勿張皇且成龍身任地方義當與爐城俱殉賊若果至當合民兵并力拒守合城恃以少安適革什咱土司遣子赴爐告急鮑成龍大加撫賞激以同仇大義令速歸聚兵五百名約俟賊至從後夾擊絶其歸路該土司慷慨應命賊乃聞風畏懼逡巡思退至今爐城猶頌其功而該土司等亦倚為重逮後鮑成龍與張廣泗辨論軍情運務大相齟齬張廣泗遂欲尋釁參劾經原任藩司倉德多方保護始寢其事暨鮑成龍染患吐血不能親理糧務以致廢弛惟時侍郎班第以總理道陳緯諸事推委狡猾會稿奏參而張廣泗必欲將鮑成龍一併同劾隨奉㫖解赴軍營張廣泗更逼令解員通判祝致綸揭報鮑成龍虧空祝致綸以並無虧空禀覆張廣泗面加辱詈即欲并參及委成都府知府李盛唐等審訊張廣泗更以所審不嚴飭駁再四親自提審用一百斤重枷枷號番境今查陳緯身為總理道員有心誤運自應嚴加懲警鮑成龍所犯情罪不同荷校已逾半載國法既伸而微功足録臣採訪既確謹據實奏明請旨將鮑成龍釋放發臣軍營效力贖罪憫其前功策以後效庶營中員辨聞風咸知聖慈寬大即獲罪之人猶不遺其微績益當共相奮勵踴躍效命矣奏入得旨允行壬申上諭內閣曰副將馬良柱前在總兵任內進勦金川已有克捷因張廣泗忌其成功請兵不給更加參劾經軍機大臣等奉㫖審明復令前赴軍營效力馬良柱素著威名番衆畏憚此番隨征頗為出力經經略大學士忠勇公傅恆奏明馬良柱著補授建昌鎮總兵官賞戴花翎以示奬勵甲戌經略大學士忠勇公傅恆奏言仰䝉諭㫖以蜀道之難前人辦理之誤此時應定於四月初旬班師不可再有游移仰見我皇上聖慮周詳洞悉情勢臣䝉指示自當謹遵辦理惟是現在軍情有必不可草率完事之勢而攻克賊巢又信其必可成功一簣之虧誠為可惜臣在京時諸臣皆言撤兵為便臣以逆酋肆橫已極若不及時翦除恐貽後患是以力請督師實為永靖邊方起見今至軍營凡糧馬之艱難川民之凋敝皆所親見若非實在可以成功而徒强為飾說希圖回護是但知存一已功名之見不特辜負皇上格外之恩而貽誤國家之事臣罪奚辭且功之成與不成不過一兩月間即有明驗豈能勉强支吾但臣細察賊境情形實有可以破竹之勢從前專事攻碉不肯深入訥親張廣泗計慮過多積成怯懦意欲將在外之碉盡行攻克然後進取從來攻城略地豈有逐家逐村在在攻擊之理爭竒扼要惟在搗其中堅奪隘斬關全恃得其要害今觀賊碉並非俱在當道原亦有間可乘進取刮耳崖並不必向伊等建碉之處取道臣前奏昔嶺中峰一路可以直抵刮耳崖實有建瓴之勢若以攻碉之力於碉外空處分道並進賊必出碉迎敵我兵則且戰且前可以直抵其內地平曠處所安營而以餘兵乘賊出碉抵禦之際即占踞其空碉賊將焉往且聞賊之精鋭皆在各卡而巢穴則僅存老弱婦女實屬空虛一舉掃除誠有可必並非希幸之詞若云抵其巢穴恐賊阻截糧運臣令各兵携帶二十日乾糧可以無患况我兵衆多欲奪一路糧運之處亦非所難惟在現調之兵速催來營以資進勦此事臣安排已定胸有成竹惟仰遵聖諭攻其巢穴中堅使賊棄碉內顧則不待攻碉而碉自克此即臣定見决其可行亦非冒險至於班師之期四月初旬正在成功之候自可仰慰聖懷臣現已籌畫定局不敢因奉到諭㫖游移更改伏祈皇上曲宥奏入上命軍機大臣等傳諭曰日來雨雪繽紛春膏滋潤氣候甚佳當由撤兵息民感召天和所致上年經略大學士傅恆抵營之日此間適得瑞雪朕以為平定金川之兆今允降班師金川果平矣但今日接到經略大學士奏摺仍有固執成見與前此所云心悅誠服者又復矛盾人臣恃恩而失之太過與恃恩而失之不及事不同而錯誤則一如因朕於訥親之事曾責其念切思家聞召即還經略大學士或因以為鑒不知訥親之罪在於退縮倨傲朦蔽貽誤耳今經略大學士忠誠如此勤勞如此事事周詳妥協據實陳奏實乃相去霄壤判若黑白衆所共知惟有遵朕諭㫖星速還朝贊襄燮理十分完美吉祥善事孰大於此而顧游移輾轉何為者耶朕既定計撤兵萬無可易謀成獨斷事在不疑並非聽信人言草率完事經略大學士日侍左右朕豈輕信人言者乎至所奏十五日不往黨壩未知留營籌辦何事如為頭人乞降則納降之事宜一以委之總督䇿楞經略大學士遵朕前㫖聞命即行不必留待朕賜詩有云上將有心期利執大君無物不包䝉此兩言中經略大學士忠勇之心事與朕怙冒之深仁實為兼盡垂之史册休有烈光其詳味之是日哈攀龍奏言經略大學士傅恆抵營以來一秉虛公仁愛士卒號令畫一賞罰嚴明辨兵感悅俱懷奮勇報效之心臣等公同㑹商軍機大局雖不専恃攻碉然現在大兵未到凡賊所有碉卡亦宜攻此襲彼不時搗𠞰使賊疲於奔命以沮其氣十二月二十八日經略親赴右梁令古州鎮臣哈尚德派撥漢土官兵襲取右山梁下巴朗平碉正月初一日經略復親赴色爾力軍營令臣同哈尚德親督官兵攻克石卡一座初三日經略又詣右梁令哈尚德復攻巴朗平碉此三次攻戰官兵之數減少於前而奮勇之氣加倍於昔或登其碉頂或拔奪旗杆或焚燒賊卡賊衆為之破膽臣目擊良爾吉等已經伏誅而官兵一加鼓勵聲威即振現在俱各勇敢直前滅賊奏凱自有可必不勝歡忭謹據實陳奏奏入報聞是日班第奏報各路官兵均可於三月初旬全抵軍營諭曰今已降㫖允降班師可即令兵丁按起捲撤毋令復往矣平定金川方略卷二十二
