body:
  text: 藝文平定金川賦有序刑部尚書臣汪由敦皇帝紀元乾隆之十有四年春二月金川莎羅奔郎卡請命元戎率其徒醜匍伏軍門誓奉約束永戴恩德號籲哀禱出於至誠經略大學士忠勇公傅恆承制納降露布驛聞自闕廷達於康衢若臣若民同聲欣欣踴躍抃舞天子曰惟昊天列祖相豫有家詒慶襲祖且率我文母之啓迪以集是勳也爰咨禮臣備舉慶典於時羣公常伯鋪鴻藻申景鑠作為雅頌譜樂府鐃歌丕宣凱樂皇皇洋洋極藝苑之大觀矣臣竊惟聖天子之盛德鴻烈焯爍紘埏臣庶罔弗共覿至於㸐燭先曙仄席遲漏乾健而行自強不息與夫淵衷密運睿謨神捷先機逺燭動中窽㑹臣等日侍清光雖末由仰測高逺而覩記親切有非外廷所能具悉者謹不揆弇陋敘為古賦冀以宣述萬一有梁益下士咨於中樞大夫曰繄者先王經野畫疆曰蠻曰夷有要有荒示羈縻而不絶固荒忽而不常惟彼金川僻界荒裔其地則絙橋索引鬱崛嶄巖不足版圖𨽻也其人則騰踔倐眒咿嗢蠢蚓不足編氓字也有跳而猘如瘈自噬有攘而逋如竄於愈顧乃勞鋭師而事逺攻得無初計之未審所從與大夫曰於豈謂是哉我聖清之廓帝紘而恢皇綱也東爥西耀南熿北煬惠液浸衍旁魄配藜含生之羣縻不游原而泳沫何蕞爾之弗率乃思逞於鄰封太陽矅不能強矇䏂以視明和風扇不能化鵂鶹以好音今夫桃關以西諸番星列牙錯鱗次蜂房蟻蛭其輯脅歸懷藉帡幪而仰維挈也非一日矣弗衛安庇弗翼安暨殖嘉穀者去螟螣擢良材者剪荆棘天戈所麾固將建威銷萌初非利土宇以恢疆張撻伐而校力也時則閫帥失圖老師罷衆就駢戮以伏辜究威柄之所用載咨心膂相維一德載授符節以匡以敕出飛黃於天育賚溫毳於尚方旌旟郅偈驊騮騰驤天子闢閶闔禡靈旗次虎帳手御巵仿古禮之推轂目送其騁步於中逵爾乃歷燕趙馳并晉邁咸泰以直指輾劍閣而徑進斯時也日在浚狼陽來復初風叨蝟毛霜嚴裂膚元宰抒𠂻赤於天禀勵匪躬以忘軀均勞士卒分苦𨽻徒束驏馬以凌絶險涉層冰如履夷塗羌談笑而步百里賈餘勇其有餘然且朝拜章奏夕治軍書嘗申旦以廢寢復昧爽而長驅伊古之名臣良將歷選指數胥遜謝而蔑如也逮蒞和門軍律是申川巖為之動色壁楯為之更新狡諜伺間奔命貌馴數罪狀以揮刀馘妖狐以橫身凡逖聽而環視者莫不䠞竦讋怖􅌓眙而瞵眴嘽嘽王旅如江如潮塞雲棧跐岧嶤方厚集以揚鋒行踦岨而焚巢賊徒既刳腹心而落角距謂將翹足而隕覆也倉皇號呼無間宵晝元宰以聞帝用惻然矜彼䝉瞀湔而宥之重以聖母之慈訓憫其窮而無救也亟詔班師曰武不可究賊方忷懼懵不知其所托命桓桓兵帥夙禀教令走丐更生扶服延請釋我几俎援我窞穽導迓徒御由黨壩而罙踐其境靡約不從弭耳聳聽帥曰俞哉我天子神聖固有以孚豚魚而格梟獍也用達厥悃而布諸元宰乃除道築壇清壘張幕爇薌吹螺梵樂間作番酋率衆成列以待元宰之至稽顙樹頜蛾伏拜膜自陳罪惡僥脫齊斧而出鼎鑊申明誓之旦旦奉六條之成約昔嶺隳金川涸誓不渝慓祇恪載獻其琛南金滿橐瞿曇寶相獅象纓絡元宰宣詔㫖而示大信振皇靈之灼爍番酋欣喜過望悔歸遲而內怍於時雲日開明祥和絪縕巴兒賨叟咸舉手加額曰自有此土所未嘗睹信天人之協應而陽春之彌浹於區宇也大凱既奏式遄其歸擁豹尾之雙戈控紫韁之陸離晉上公之顯爵煒殊錫之葳蕤粲命服之加隆酬偉伐而匪私且獨不見夫錦江玉壘之頌德而無已者乎或忭於衢或歌於市如戀慈母孌彼赤子香花載路企踵徯俟者延亘千里或列姓名銘蓋製衣却弗能止丞相祠堂並列以祀伊忠誠之感有以深入人心且勿謂蚩蚩者愚蓋同聲一辭謂聖天子之知人善任使也天子方迓釐於昊穹歸美於祖德於廟於陵毖祀祗飭王公卿尹咸思熙鴻號以昭桓撥顧先已奉諄誨之謙冲鬱輿情而抑默懿聖母之慈恩普徽稱而增福履滋保以諴民奉璇闈之燕喜於是御紫宸而受賀中外禔福頌明良而賡喜起摛雲章掞鴻筆刻琬琰紀事實典謨矞皇襲六為七告成成均豐碑屹崒歷千萬祀胥誦聖謨之洋洋而流德音之秩秩必若所言棄彼度外則何以闡綏世之長御宏覆幬之逺量且何以發其天良俾革心而內嚮也又何以昭示遐邇使姦猖者知所創而强梁者知德化之不可抗也如論其兵力之雄則羽林佽飛雲輣臨衝輕武利趾踏壁躡空伊涼之健卒滇黔之選鋒索倫烏拉突騎元戎蒞颯卉翕趫捷鴻絧器用之利則黃間赤羽開石貫墉應弦馬踣發必洞胸輕甲繡襠吳綿疉重韌逾兕犀能禦火攻矧夫揚威巨炮輕裝九節赤堇千鈞圓瓜隕瓞雷硠電飛迮裂迸滅杳莫測其神奇亶掃迹於一瞥何堅不摧何阻不抉若是乎其銛利而蕩軼也間小試於巴郎隳卬籠其半折則使中峰飛度破竹振籜設奇謀之得展固將輮藉而轔轢蓋嘗執奏至於再三而聖天子於解網之仁運止戈之略却逸足於中路拗餘怒而回薄良以攻昧而撫順豫善而棄惡閎大造於無外柔異類而綏不若故曰天因人聖人因天勢如轉規謀如湧泉兵法曰全勝不鬬大兵無創天以阻深䀜昧俾兹異種得卵孕煦字於一方夫豈人力所能戕故力雖雄弗究其用器雖利節之以制戰而後服不如不戰而自屈也度蘭津而為他人不如伐其心而豫維新也日凛凛乎佳兵黷武之戒而時行時止知進知退所謂至誠如神無逺弗屆其懷德畏威者視獻俘折馘為更倍是豈管窺蠡測所能仰逮者哉系曰堯曦皛兮舜風暢參巍巍兮廓蕩蕩世曼壽兮延景貺梁益下士乃呀然自失曰蓋自中和樂職宣布之詩既闋未嘗聞斯懿美今飲於醲和飽於醇德大夫復覺以至喧仰歎悅服幸哉獲遘乎斯世平定金川賦留館教習翰林臣莊存與於鑠顯哉惟我大清列聖承乎天序儲嘉祉鴻休祜欽明濬哲重光顯緒二曜並其照臨六合象其覆幬恩厚周浹威武昭融肆皇天全付有家南踰丹穴北界空峒東冒日出西極大䝉莫不陸讋水栗奔走而來同是以方內乂安黃髮眉壽目不見烽燧耳不聞介胄百年於今馨烈彌茂在我聖王之御宇也體天運遵祖法率由世宗之明訓䖍奉聖母之懿則九族雍雍庶民翼翼酬租庸以藏富謹憲令以迪德惠不需時賚無虛日協氣旁流湛恩允塞猶復省方問俗思和求中豈伊不懷明堂法宫豈伊不勞沐雨櫛風慮一夫之弗獲匪逸豫於皇躬爰日清問所及幽隱畢見察蔀屋如堂陛撫蠻徼若畿甸所以兼容并包逺駕長馭懷柔區夏輯綏邊裔靡不策自宸衷授之疆吏俾彼㫋裘之長梯航之族禀我程律守我約束者罔或私逞睚眦相為敵讐干武臣之顏行勞士大夫之誅鋤乃梁州之蠻實曰金川窫窳為心鑿齒為顏憑陵醜類肆其凶頑惟厥種人弗忍荼毒用告無辜於守土之臣皇帝咨爾守臣種人有辭於金川乃命將帥爰征師旅絡繹分赴經營㑹合儲積供偫包厚被隰於是佽飛之士賁育之徒䝉盾負羽仗鏌鋣挾僕姑而集者以萬計遂乃左導卭徠峻坂九折如飛如翰鱗次嵽嵲窮高極逺緣嶺探穴者相與布濩於卭籠之下右自岷陽二川分流若光若滅疾走銜枚抵間投隙鑿險縋幽者相與遮迾於繩橋之側爾其毚伏窟困獸負嵎陰施首鼠師漏多魚戎臣失圖以稽天誅彌年積日告功不時天子閔梁益之屯戍念秦蜀之轉輸肆用威克厥愛討一二臣之不敬厥事者簡軍實而申警之乃維相臣秉丹赤貫金石協睿謀申碩畫爰以仲冬吉日秉鉞徂征於廟告事於社受成王公卿尹大夫多士百吏庶民咸曰休哉其始也簡戎行選徒御畜之既豐練之既豫踴躍歡呀問召爭赴駢闐逼側營營昈昈先賞而抃舞未戒而輯附爾其軍容之為盛也朱甲耀日元戎拂星青雲為戴紅霓為纓象北落以立候法玉井以設屏散若連林之植立動若洪波之涌興總五千之徑旅屹百萬以為營相臣率止以先啓行踰越關隴䝉冒霜雪褒斜劍閣之阻束馬懸車之塞壯夫為之却步勇士為之脅息而乃至忠徹神明大義動顔色履如坦道過如袵席斯固不陳而威名震不戰而敵氣奪者矣矧復淵謀內定和衷庶詢得其稔惡刈諸軍門旌旗采色霅爾以變羣酋驚視股栗而戰元機奧祕形勢沸渭猋騰雲鬱霆擊電㑹乃使輕卒鋭士陟嶄巖攀砢閜登者蟻附守者雨墮劈盤石裂巨防夷堅碉跨連杠奪其襟要據其腹腸凶酋於是俯首帖耳請命於大將之麾幢相臣方懷敵愾務翦除猶拒而未計也天子執神機恢大度撻伐用張德威不怒巍巍蕩蕩澤之以陽春雨露爰承懿㫖詔相臣回師而還爾乃韜上將之權略敷哲后之明恩先俾二戎即其巢處其垣開以不疑之信育以並生之寬惟時諸酋除道辟館男女以頒投其戈甲實其壺簞願奉信約效奔走杜侵略獻魁首唯命是聽而罔敢或干者以復事於相臣相臣總參佐之傑幕府之賢熊羆之列貙虎之班駭靁鼓耀星幡鏗鍧炳煜震厲嚴肅以升於受降之壇於斯之時和風載興洽氣旋至睢旴譎詭集合者數不可殫計二酋則稽顙樹頷匍匐蟻伏以聽罪於軍吏相臣承詔數而宥之始則駭汗戰栗營精攝魄繼乃色喜雀躍流沫雪泣故其馳響應聲懾威赧德不崇朝而橫塞乎萬里之域凡我一二從征之士甲未及卷餱未及餐不折一矢不控一弦殿方逮乎褒谷斾已返乎零山有安其軀和樂且閒天子乃考彝典策勳伐公爵是崇武衛有奭帝曰咨恆來相皇室念我聖祖朔漠既寧逮我世宗青海既平推校聖功克配厥成肆用類祭於郊社獻功於宗廟修上陵之盛事隆文母之顯號於是二三股肱心膂之臣思惟聖主朝夕乾惕命將用師之艱難博恩廣施柔服懷逺之宏大咸進而稱曰虞帝格有苗殷宗克鬼方紀於書頌炳曜輝煌下及漢唐之君勒燕然伐淮夷曽不足稱乎偉業猶自侈乎夸詞矧我天子豐功茂實曠世獨出弗究弗宣將無以昭示奕葉使永永年代服我成烈羣臣恧焉帝曰俞哉於是揚雅頌之聲彰謨訓之大錫恩澤之博廣符瑞之富遂作頌曰靈臺兮崔巍偃伯兮裶裶天戈麾兮赫無外赤羽張兮集王㑹景星垂曜兮日抱戴于胥樂兮麗萬世平定金川賦庶吉士臣朱圭皇上命經略大學士忠勇公傅恆蕩平金川蠻酋既降乃下明詔納欵班師天包地容德威遐播臣謹贊述盛烈作賦以獻其辭曰皇帝德灊威熇乾鑱坤姁陽以文敷陰以武拿疆外之醜金川恃岨毚躍狐跳以敖以驕日趑月趄不即鏖屠皇赫斯怒命相臣恆出師於都是膺是懲是月也辰在斗柄螣蛇相鉤指建星以為旗兮河鼓翩其靈旟羽林窘以纍辟兮跐旬始而掊蚩尤㩣觜觹于西極兮甝首䫜其若囚刷棓槍踣天狼兮咸怛魂泐魄蘁眙而睽睢蓋兵未觀乎原而已咀僄狡而眴蠼狙也乃杖鏌邪而帶干將兮粲翠鷩而貂旄玉鍪象鎧般其瞵㻞兮錫龍阿而佩闕鏤于是皇帝受命于祖既造既禡龍旗婉僤而綷䌨兮鈞天磤鍧而猗那握神符于元堂定天策于扆座挈玉斗之柄執金錘之欛乘輿乃御六蛟而驂八螭兮靈示繽紛而並迓賜瓚鬯以飲餞兮黃金勺而玉斚觀元戎之啓行兮若掣電之翕赫龍乘猋駭虎騎雷掀飇馺神驤躩其騰躍兮羌一日而走千倏􅀈倩浰湯湯若波兮殷轔膠輵曾不可乎猱攀曳青虬赭鳥之􅝦蟉􅞡􅀈兮雖赤驥白義奔超影而不得先馳玉壘峨岷之崆㟅屹􅝝兮若靈奔鬼趭厲而不顛我軍既屯桀石揭輪蠻獠錯愕褫精亡魂外雖掎角中如惔焚爾其卭崍九折弄棟八灘虎臂羊腸馬摶牛顫赤水爓赩以吐丹金繩刻屈而蠡斷鉤蛇赳螑其尾捎兮藰蒞拉颯而射鬼彈灰野青赤其爛光兮雪嶺冬夏而閉霰屹三峽五屼之崎礒兮扶飛蠝而蹶狡㕙故其溪猺洞蛋譎詭獌狿魚刀劚石毒鋼飲牛腰弩偏架足張手摳駢脅束麻絡馬當鑣巢居干欄鼓角吹嘔巨鼻象飲鑿齒飛頭漆骭火跖頳眶碧眸赤穴變化乎素虎九龍倏忽乎蟉虯蠢蠢蠕蠕若犴若虥若貙若貅者自以窟乎絶險而不知王師之劉之也乃敦中壘於巖嵌兮環千營而若墉前赤熛而後天黿兮駢星辰而列行流雄旄以虹爥兮曳彗星之飛芒建金鈴之大㦸兮戈鋋森其若霜蒼頭彪髶腰豪曹而首雕鶡兮顛盛瞋而未將飛鳬電影羽赤白而焠鏃兮厲衝飇而怒翔佽飛之倫超㺦猭而都盧兮頰敵魁而血冦吭皇威燀燀我武洸洸蠢愚苗民命顛于坑爰有邦汋間于我師中詗外漏為賊之媒皇帝有命相鋪厥威摶戮賊諜如簎螺蠯青衣之竹既磔鹽水之蟲不歸手格槃瓠之瘈生拔髦牛之氂莫不觳觫於椹質懲栗乎刳劙是時皇帝臨乎帝車五潢之舍太微三光之廷旭爾天縡霅然星旋若斗杓運于中央殷北極而周八紘迪昧爽之丕顯冏達旦而不寢明登天而瞭矚聰屬地而䏅聆故發聲乎紫宫而濯靈乎西清相臣將臣莫不用命于是軍動雷驤師次昔嶺火龍金汁礧炮轟霆連珠走㦸炎傘掣景獝焦魖爛飛銷鑠磺狀掀輪拔軸殷其膠捩兮半騞砉而擘開駢五山之岝􅣉兮乍􅱕􅱓而相豗武擔鑱天而訇坼兮石筍捎雲而軋摧丐磕硠􅐀兮若蠻丁厲而崔巍隤煽爍燎奭兮若積薪燒而兵蘭灰烈缺䃱磹吐鞭交緋豐隆霹靂鬱律嵬䃶駭若天剷神揃而亡其嵯峨也蠻酋震驚豎其降旗懾我之旅赤纛白麾克奔于師以厥伻來鵙舌鷇音覼縷侏離潘靧垢面湔磢肝脾陳其犛牛豪羊瑟瑟碧璣錦疉朱罽翠羽文犀焜耀摛爥麗靡威蕤桓桓我軍拗怒未息方將罙阻抵巘馘大憝而獮搜慝匪拊其背乃扼其嗌韔鳳喙之膠弓手虎爪之玉鏚髾欃孛而觀鯨鯢繕招搖而怒賁育若天鳥之覆巢乃獝狨而將哲鹿奔兔投如狖如玃懼厥罪之不逭終刲刉而疈磔天兵鱗其鋪敦兮欲乞生而不得於是皇帝拓帡包之度霈煦嫗之仁撻逆輯順刷陳濯新奉皇太后命詢于百憲若于兆人既庭既羾亦莫不馴乃命相臣降其螴蜳以解袀而息民也天熙其生臣厲厥伐欲拔枿椿而斸株橛蠻乃怵惕不敢回遹奉我梟師厭於其􅒸獻黑羊之白􅎺刺赭馬之青血犎牛之湩瀏若川兮珠澤之酒縻胃而滑桄榔百載食馬千匹崩角膜拜跽而戰栗彼酋既欵天詔乃蒞除崇壇以隱天張赤帟而爛霱控蔥嶺而西毳髠刮辰溪而南雕鎩莎羅奔狼卡頸徽肉袒首歸乎七萃經略爰歷升乎罽幕而收其草䕓金髤之甲晶光耀暾狻猊之胄凌兢敓月鮫􅀈璘其方騰鸊鵜淬其欲剟鶻尾之箭善􅀈燕角之弧將彈罔不鱗簇羽攢充魚箙而裂鞘􅮰於是雕題漆齒之戎駢胸交趾之羌冠以熊皮虎尾耳垂金鉤玉璫鏐環約臂鐵釧繫骯十尾結髾刻身像龍犀帶雕鏤象額銀裝赤幘戴獺氍毹麖章青頓白眊灕乎屈虹班紕􅀢毲爛乎錦江曳蘭干之絺紵披梧桐之華英斑蘭摛繡灼爍乎芙蓉爾其精夫渠魁扶服顚稽珍奇靈傀恍敞逺徠則有菌鸖短狗龍角神龜梟羊􅀈􅀈翡翠毼雞金馬荒忽其騰耀碧雞彯彯而扇翬扶拔驫䮅而飍矞師子髬髵以之而文翰絶雲以振彩鶼鶼比翼而交㩣兹白尊耳䶂犬星施羧羊五角奇鹿兩頭飲獻白鵠之血羽用孔鳥之髟從目黑齒鼓鐘若牛罄西南之瑰􅀈若相招而畢投乃羅淫浦之萬鳬進朱提以千流奉迦維之寶相獻摩竭之金軀若舍身於龍象亘世世而不渝相臣布皇帝命納粟而却紫鏐賚以天錫聿開珠蝥蠻乃炙義濡德作廟於厥虛踏歌抃蹈以慶天子而祝公侯也既遏負固奚振我旅竄叨餮於魑魅卧虎賁之干櫓皇帝命恆汝劼孔茂錫汝桓圭豫毗豫輔神旗豹尾赮赫婀娜前後所賜既廣既厚凡厥勳士亦無不與於是鐃歌吹凱樂作歌曰皇靈熛兮天中環星野兮既同西月􅒸兮東明􅀈八索兮在綱蠻之狡兮既僵皇仁沛兮不兵煬四海兮賔將彤弓既櫜飲至有釂協於椌楬告於郊廟謁陵寢而耿烈光奉慈宫而上尊號搢挺笏於明堂勒隆碣於太學龍彲賁乎天文日月離乎華昭岣嶁之碑無所誇其青赤兮陽虛之石曽不得㘩夫景曜增職方之版圖辨王㑹之見俯咺神武而不殺儷包荒于覆幬南熿丹水之朱殷北爥燭龍之蜩蟉西熇若木之灼光東焜十日之爍耀下峥嶸而豐融上嵺郭而金歊蓋皇德被于無垠奚啻偈賨僰而息荒徼也哉乃作頌曰於鑠皇師彪光熉兮漫乎天還渟若淵兮驂龍騑離嘽焞焞兮猋騰翏厲靈無崖兮幪如幬帡張夤紘兮啿啿羣生侯不靜兮湛我皇德淡裔裔兮既濯而濡民之塈兮格于寢廟曜精饗兮惟皇之純慶無疆兮平定金川方略卷三十二
