body:
  text: 十一月癸酉東三省官兵初隊自京師啓行上幸豐澤園賜將辨兵丁等筵宴並頒賞棉甲奬武金銀牌有差後遣兵皆如之臣等謹按傳曰遣將帥及戍役同歌同時欲其同心也又曰出而用兵則均服同食一衆心也皇上親御瀛臺遍賜將士使被堅執鋭之徒皆得瞻覲天顏而仰承寵錫其恩均一而溥被蓋所以憫其勞極其情者至矣宜其鼓舞歡欣感激之忱不能自己也是日經略大學士傅恆奏言地方所設驛站凡內廷奉傳上諭及各處進奏報匣皆關軍務自應隨到隨即飛送管站人員按刻稽查不得遲延擦損乃各處驛站日漸廢弛往往接到報匣視為不急之務僅令站夫一人交遞下站便為了事臣於途間曽親見遞送報匣祗一人一騎前行詢其何以僅止一人據云尚係雇覓而來其輕視要務如此臣查此等飛送事件最有關係即遞交公文亦應更得一人伴送若賫投報匣尤宜加謹須用三人否則二人斷不可少恐長途跋涉或因他故貽誤所關非細臣已嚴飭各站嗣後賫送務用二三人不得僅用一人及雇工人等若再䝉皇上敕部令其一體同行嚴飭各省俱加整頓於軍務似為有益奏入上諭內閣曰前因自京至金川安設臺站遞送文報稽遲是以特命軍機大臣等定議分派章京筆帖式前往坐臺查察今覽經略大學士所奏各驛遞送報匣祗用一人殊屬輕忽軍機要務非尋常事件可比若祗用一人或偶爾墜馬或偶遇疾病必至貽誤關係匪輕著交兵部嚴飭坐臺之章京筆帖式等嗣後馳送軍營事件務派二三人飛遞不可耽延時刻倘仍蹈前轍必將伊等從重治罪是日經略大學士傅恆又奏言臣至西安見巡撫陳宏謀詢及陜甘二省所派漢兵據云大半已陸續起程惟督撫標兵一千名現在雇覓䭾載馬騾尚未齊備臣觀該省馬匹實不充足今若現雇騾馬千數百匹資送此等兵丁則將來滿洲大兵一到愈難辦理因令陳宏謀等稍緩調撥伊等咸謂已經奉㫖不敢不遵臣伏思陜省兵丁巳調至一萬四千自可敷用此項兵丁不過千名既係緑旗又係督撫標兵夲非鋭卒但使滿兵到齊自收實用與其竭力以辦不甚緊要之標兵不如留餘力以應滿兵為有益臣係經略兵之應調應緩原可商酌因語陳宏謀不必拘泥前奏但須儘力料理滿兵前進毋致貽誤并嚴飭將軍博第等加意辦理臣至軍營若見兵數太多尚須酌量裁減此項標兵一千名似可停其調撥惟副將伸布既經派委軍前現在需人仍令前往聼候委用奏入諭曰將來陜省緑旗兵丁雖或不用而武辨如馬得勝等亦應仍調至軍前委用此見又與朕意相合甚可嘉慰也隨命軍機大臣等傳諭陳宏謀博第將陜西所調督撫標兵一千名停其調遣又傳諭經略大學士傅恆曰經略大學士所奏陜省督撫標兵應停調遣誠為允當前調緑旗兵丁為數夲屬過多朕於夲月十二日曽降㫖傳諭經略大學士到陜之時親自閲看如不過尋常充數之兵不若竟行停止此㫖想經略大學士今始奉到今據所奏與朕意適合此項標兵已傳諭博第等停其調撥矣至湖廣所調之兵前據新柱奏稱兵力尋常亦經降㫖令其勿遽起程聼候酌量經略大學士抵川仍遵前㫖相度情形所調各省緑旗兵丁應否需用或停或調一面辦理一面奏聞是日經略大學士傅恆又奏言臣此次仰荷聖主隆恩統兵勦賊惟思往返毫不騷擾地方方為盡善所帶官兵囑尚書達爾黨阿侍衛達青阿等派員前後嚴加約束沿途兵丁尚無生事之處至臣經過地方察看情形陜省今嵗有被災之區地方稍覺荒凉撫臣陳宏謀布政使武柱雖竭蹶辦理但承辦之州縣官員較直𨽻山西稍為不及又聞從前經過陜省之兵因地方供應稍遲即有閧閙者俟臣前抵軍營嚴加戒飭將來大隊兵丁經過人數益衆供應愈難臣已面交將軍巡撫令其加意辦理行抵寶雞縣又復諄囑勿致貽誤但人數既衆供應究難免於稍遲而船厰黑龍江兵丁非京兵可比素性蠢野惟利是圖伏乞皇上交軍機大臣等嚴飭領兵大臣轉飭侍衛章京於起程前二三日傳集兵丁明白曉諭前途若有生事妄行者或經地方官報出或經臣察出定行奏聞從重治罪庶知斂戢再臣在西安見將軍博第問及西安滿兵如何料理起程據稱滿兵二千除伊等現有之馬各二匹外又動支存貯馬價銀各十五兩或馬或騾聼兵丁自行置買并給與鑼鍋帳房刻日進發辦理尚屬妥協臣星馳前進此項兵丁雖不能先到隨後亦可即至矣惟成都副都統卓鼐所辦滿兵將現在軍營兵一百名誤行扣算以致僅發九百名臣已行令遵照原議再挑驍勇兵一百名料理妥協俟臣抵成都帶往軍營奏入上命軍機大臣等傳諭曰朕覽經略大學士所奏事件甚為精詳周到大學士每日行二百四五十里而諸事又如此周詳妥協實屬勞瘁聞十七日自武功起行途間訊問張廣泗耽延甚久又行二百餘里薄暮始至宿處朕心深為不忍此皆大學士誠慤之意所致不然何能耐此勞苦實屬可嘉從前所調東三省兵丁每五百名作為一隊起程誠恐伊等不識內地禮法或致生事每隊已派侍衛及護軍參領各一員管束護送亦曽傳諭大學士想尚未到耳今大學士意料所及又深合朕意也至卓鼐辦理錯謬已傳㫖申飭并令照大學士所請補選勇壯兵丁一百名隨大學士前往軍營矣臣等謹按軍行首重紀律必號令嚴明所過秋毫無犯而後士氣一而兵志齊經略大學士傅恆有見於此是以形諸章奏乃聖明早已深思逺計不俟經略奏至先命廷臣慎選賢員護送沿途約束申明紀律無使生事滋擾睿謨廣運無微弗燭此臣等日侍內廷親承綸綍實所目擊而心服者也甲戌上命軍機大臣等傳諭經略大學士傅恆曰現今陜省調遣官兵計已起程赴川而滿洲大兵正在陸續整隊前進供億浩繁應特遣大臣前往經理朕夲欲令䇿楞赴陜雖已諭令星速來京亦尚須旬月而料理應接滿兵不容稍緩著尹繼善輕騎減從馳驛前往西安暫管總督事務㑹同博第陳宏謀等辦理一應資送大兵稽查臺站諸務俟䇿楞至後朕令前往更換尹繼善來京又諭內閣曰陜甘總督事務現令協辦大學士戶部尚書尹繼善前往暫行辦理署甘肅巡撫瑚寶著專辦甘肅巡撫任內案件并經理甘省調撥赴川官兵起程一應事宜令其加意迅速妥協預備不必兼辦總督事務又命軍機大臣等傳諭經略大學士傅恆曰陜省督撫標兵已據經略大學士奏明停其調遣陜甘所調各營兵一萬三千餘人前㫖雖令經略大學士酌量應否需用以定行止但昨據經略摺奏情形陜兵當已陸續就道黔省兵丁據愛必達所奏亦當起程此二省兵丁似未便更行撤回應仍令前赴軍營以偹各路攻勦及護糧守卡之用其湖廣兵丁曽諭令預備聼候尚未戒途滇省路程較逺想未料理齊備不若將此二處所調之兵竟行停止以省糜費經略大學士可就近酌定一面辦理一面奏聞至京城及東三省滿兵并陜黔緑旗兵丁春初諒當先後雲集經略抵川後卡撒黨壩馬奈等緊要之處定必躬親巡歷周覽情形詳悉布置如何進勦如何堵禦通盤籌畫以圖萬全可先將調度機宜約陳梗槩附便奏聞以慰馳念是日署甘肅巡撫瑚寶奏言陜甘二省續調漢兵一萬五千名其安臺營馬及征兵馬匹需用料豆頗多今嵗陜省收成歉薄而棧道州縣倉貯豆石有限今滿漢大兵雲集經過雖經陜撫臣陳宏謀籌畫辦理猶恐採買維艱且慮市價昂貴况採買亦須動用運腳因查甘肅之兩當徽縣一帶地方悉與棧道相接慶陽平凉二府屬亦與西安相近不若將甘省倉貯豆石就近撥運以期足用現已札商陜撫臣飭令司道通盤核算需用若干俟巡撫臣札覆到日即飛飭所屬照數撥運以濟急需統俟大兵過竣之日仍令照依撥用數目買補還倉似為便捷奏入上諭內閣曰瑚寶所奏於經理大兵軍需甚有裨益其通融協濟不分彼此足見實心任事殊屬可嘉著照所請速行仍諭該部知之是日軍機大臣等奏言據署甘肅巡撫瑚寶奏稱陜甘二省續調漢兵一萬五千名已經酌派足數刻期於文到半月內起程定限明歲三月內全抵軍營臣等查從前原因陜甘距川不逺是以酌派兵數為多今滿兵約計二月已可全抵軍營而陜甘之兵轉須三月方到殊覺遲緩且軍營從前所調陜甘之兵不甚得力已奉諭㫖俟經略大學士經過之時親自閲看如不能出色竟行停止經略大學士於未經奉到之先已裁去督撫二標兵一千名其餘陜甘各兵因見經略摺內所奏情形似已陸續進發是以復奉諭㫖未便更行撤回令經略將湖廣及滇省兵丁酌量停止今據瑚寶所奏陜兵抵營遲緩則是現在未必俱能起程其已經啓行者仍聼前進如未經起行者應令經略大學士傅恆詳加酌定如可不用即行文停止倘若需用則行令該撫等作速嚴催就道迅抵軍營毋得遲誤至瑚寶所奏各路官兵俱由棧道行走未免擁擠應將陜提延河二鎮及甘撫標并河西各鎮營官兵俱由階文一路挨次起程直達松潘以免壅滯應照所奏辦理上從之乙亥四川按察使署布政使宋厚奏言從前派撥各州縣運米至陶關地方交卸自陶關以外安設臺站遞送卡撒軍營謂之正運後因站夫多有逃亡正運漸次艱難經軍機大臣等酌行招商包運之法無如美諾至卡撒計程雖止五站有餘而山徑難行商人承運槩至美諾而止囤積不前亦不能接濟軍食復令各州縣照商運之例給價挽輸而所派州縣運赴卡撒者又屬無幾加以沿途延緩未有督催奬勵之方是以卡撒軍糧並無餘積臣設法勸諭各商令其直運卡撒並飭各州縣優恤運夫選差查押多方鼓舞始皆踴躍趨事自九月中旬以來卡撒軍米方可足備供支而近日則已積有一月之糧此時天氣晴暖沿途糧運接踵而進若再得一月晴和則卡撒之積貯日見充盈斷無缺乏之虞矣一切挽運章程惟期可以節省腳價兼恤民力者亦即稍為酌改舊法其附近軍營及糧運總滙要區必須預撥餉銀解交存貯免致臨事周章俱經臣酌量變通詳請督撫察核准行新任布政使高越已抵成都已將臣辦理情形詳悉告知猶恐初涖川境地利情形未能深悉如有需臣參酌之處臣自當不分彼此盡心相助以濟軍需奏入俞㫖報聞丙子上諭內閣曰帶領船厰兵丁之協領等既皆賞給花翎其盛京黑龍江之城守尉總管協領等領兵到京時亦著照例賞給丁丑經略大學士傅恆奏言臣在寶雞縣接奉諭㫖以陜甘之兵不甚得力令臣由陜經過之時酌量可否停止并楚兵亦應一并酌量臣查此次調兵共三萬五千使果皆精鋭自可一以當百所向無前誠如聖諭兵在精不在多也臣前在西安見督撫標兵一千名尚未起程即商令停調業經奏聞兹據陳宏謀之言雖云兵丁料理起身已一萬四千名但尚未可指為確據臣今即行文令其查明實在起身者若干未經起身者若干其未報起身者即行停調不必料理將起行實數飛即報臣若果已全起程則將湖北之四千名即速行文停調連前所停陜省標兵一千名共減去五千名計兵三萬已為敷用至臣自陛辭後一路天氣融和按站前進毫無勞苦屢荷聖慈垂注感激難名惟期仰藉聖謨師到成功以上副聖心期望於萬一奏入諭曰諸事精詳實堪嘉悅然而甚勞精神矣是日嶽鍾琪奏言黨壩一路招募新兵於九月內攻克跟雜一帶焚燒葛布基等處甚為奮勇但跟雜一帶地方遼濶原係黨壩至勒歪之大路兼近瀘河相距惡爾溪不逺於水路進攻甚有關係今既攻克防守不可不嚴是以派撥漢土官兵一千名駐劄固守以致官兵不敷調遣臣再四籌畫訪得雜谷土司尚有精健土兵自護夲境臣傳齊土司蒼旺等宣諭聖主恩威令其調遣此項土兵二千名赴營效力蒼旺等感激聖恩即經預備調齊俟其一到軍營臣即選撥新舊漢土官兵督率前進目前黨壩天氣晴明跟雜康八達一帶地勢低窪尚無積雪得此生兵鼓鋭縱未能犁庭掃穴亦自可多克堅碉擒勦醜類以圖仰副聖心於萬一奏入報聞是日傅爾丹班第嶽鍾琪㑹奏言臣傅爾丹臣班第於十月二十三日自美諾起程同臣嶽鍾琪前赴黨壩軍營即至康八達革什戎岡陡物黨噶及新克跟雜等處逐一履勘地方遼逺山澗重疊若欲節節攻堅收效尺寸不惟曠日持久且恐士卒多傷殊非勝算兵法原須奇正兼行虛實並用豈應相距巖碉經年坐困是以嶽鍾琪有欲以萬衆水陸並進直搗腹心之請也臣傅爾丹等勘得康八達坡下河身廣濶亦無波濤之險遍詢土番僉稱從此徑達勒歪不過四五十里一葦可抵賊巢又可為甲索黨壩兩路䇿應但賊番兩岸是否不能阻截尚須預為籌畫因查甲索與勒歪止隔一河最為逼近若黨壩甲索兩路聨絡河道方能無阻前督臣張廣泗未能審察情形派遣官兵由甲索五路分攻毫無克獲臣嶽鍾琪催令合并即經張廣泗撤回卡撒止留兵千餘防守以致黨壩兵勢益孤今臣嶽鍾琪議以兵一萬由甲索進奪馬牙岡乃當兩溝直抵河邊㑹合黨壩之兵齊進我兵由水路登岸出其不意突攻勒歪賊必還兵自救不勝驚擾而我陸路之兵復尾追掩殺可冀全勝逆酋除甲索一途亦别無後路可逸臣等意見相同似應如數給兵以當一面至卡撒一路臣嶽鍾琪酌擬留兵八千堵禦俟奪踞勒歪後以得勝之兵合堵禦之兵前擊刮耳崖不難破滅其意亦為省兵節餉起見未嘗不是但臣傅爾丹等通盤籌算以為勒歪刮耳崖兩處賊巢夲為唇齒之依我兵須為犄角之用不如兩路夾攻可期速捷然現在我兵分守左右山梁計抵賊巢尚有山梁兩道阻隔其阿利山巴郎各寨並昔嶺石城喇底等處賊皆死守今嵗限於兵單往往欲攻昔嶺則調卡撒之兵欲攻卡撒又調昔嶺之兵攻左不能攻右擊東不能擊西紛紛抽撥賊皆先覺得為預備所以師勞而功未奏若果添兵三萬來營分遣精鋭同時並發將昔嶺喇底二道三道左右山梁各碉并力攻取再派勇健奇兵相機直取奎角木岡等處從上直壓刮耳崖如此四面合圍賊夲無多糧食火藥漸亦罄盡自無不破之理若馬奈一路止可令其虛張聲勢並防範戎布寨之章谷一帶道路足壯聲援正地夲革什咱舊境該酋自能保守再留兵千名彈壓儘可無虞此臣等通籌全局仰仗天威一舉殲滅似有成竹可恃者也至嶽鍾琪所製火器噴筒已有成效應令就近多辦並於成都現製棉牌試用舟楫一項嶽鍾琪已試造大船柁櫓齊備制度堅穩現在陸續製造應用唯是出師日久士卒所帶單帳房因雨水過多盡皆破爛山嶺霜雪交加難以露處約每十人須給帳房一頂仰懇聖恩敕令布政使製造帳房二千頂分派各營可以足用奏入上命以所奏交經略大學士傅恆聼其酌量所需帳房亦命經略就近檄行布政使調取分派各營應用是日傅爾丹等又奏言原任固原提督假起賢年近六十氣血衰耗前因巡卡被傷一時未能即愈兼患癱瘓難以臨陳應令回籍調理大通協副將高雄屢次督兵攻戰未見立功年已七十有三龍鍾衰邁候補副將劉忠年已六十有餘精力衰頽難供差遣綏寧營參將蕭振起衰老殊甚俱應勒令休致其所遺各缺臣等公同揀選在營有功之員請㫖補授以勵戎行奏入報聞是日傅爾丹等又奏言臣等查得黨壩軍營有四川松潘鎮標把總馬漢臣實心報效奮不顧身每遇戰攻先登克敵於乾隆十三年六月閏七月九月內屢次攻破賊卡能於衆營內挺身前進衆營隨之敗敵臣嶽鍾琪親驗該辨身帶石傷七次負痛立功合無仰懇聖恩准將該辨逾格以守備即用俾各營共相勸勉又延綏鎮屬都司張宏範才技可觀歷練軍伍從前出師西藏巴爾庫爾屢著勤勞今派征金川攻取革什戎岡陡物黨噶等處奮勇爭先殺賊奪卡甚為出力堪以請補神道嶺遊擊守備永明年壯技優曽出師巴爾庫爾著有勞績今派征金川實心出力奮勇克碉胸帶石傷不避危險堪以請補靖堡都司千總趙明才技俱優出師巴爾庫爾曽著勞績今出師金川努力殺賊兩脅俱帶石傷膽勇過人堪以請補延綏鎮標中營守備守備楊崑明白老成出師瞻對授有都司功劄今征金川帶傷奮勇屢立戰功堪以請補四川撫標遊擊千總李蓮年力壯健曽出師西寧西藏巴爾庫爾著有勞績今征金川屢次殺賊項帶鎗傷頗屬勇敢堪以請補寧夏鎮標右營守備都司王珩歷練軍務派攻木耳金岡陡物黨噶康八達等處連次帶傷殺賊奪卡屢有功績堪以請補靖逺營遊擊守備王秀人材弓馬俱屬可觀前曽出師西藏瞻對著有勞績今出征金川屢拔賊卡胸帶石傷實心出力堪以請補黔彭營都司千總席雄才技可觀前曽出師巴爾庫爾哈密郭羅克瞻對等處今派征金川克碉奪卡斬殺賊番頗屬勇往堪以請補漳臘營守備以上各員倘䝉聖恩俯准則該員等益加奮勉報效而臣等亦得收臂指之效矣奏入上命該部議旋經議覆准行臣等謹按行軍之道賞罰不可偏廢濫賞固足以啓僥幸之端然或過於刻核而微功不録則無以鼓勵三軍而作之氣金川之役將士荷戈擐甲以從王事者實繁有徒前此惟班第嘗薦典史謝應龍之功其餘則槩乎未有聞也至若張廣泗居心忮刻始則忌馬良柱之成功繼則阻嶽鍾琪之濟師其於將佐率皆偏袒私人未嘗拔一士奬一勞以勵衆我皇上屢頒諭㫖詳加訓示以為衆人中豈無一二鼓勇先登之士即可加之奬拔以激勵衆心於是傅爾丹等薦舉及於數人三軍之士始知有賞功之典焉蓋是時經略雖未涖止而當聖主指示之後軍中氣象已覺一新矣是日傅爾丹等奏請頒發藥丸并於成都等處就近召募良醫數人療治士卒患病者得㫖允行戊寅上命軍機大臣等傳諭經略大學士傅恆曰經略大學士跋涉長途衝寒前進日間既鞍馬勞頓入夜又須將朕商度機務一一詳悉辦理陳奏朕雖屢經降㫖令其節勞而既有傳諭諸事勢不得不於住宿之地查辦目下已至軍營諸事並集悉煩經畫仔肩更重調度更繁精神更宜愛養日間無事馳驅可以料理諸務至夜則宜稍為憩息斷不可復加勞瘁以致朕懸注現今軍需旁午朕刻在殷懷大學士啓處不遑朕亦切為厪念而萬幾在御宵旰時勤若更因經略大學士之夙夜殫心縈神逺注不益重朕西顧之慮耶即如今日接到大安驛所發奏摺係二十二日丑正拜發若非徹夜不寐何以能爾抵營後倘仍似此勞瘁實非朕惓惓馳諭之意經略大學士其善體朕心加意保重可傳諭知之是日上諭內閣曰雍正七年調發東三省兵丁往北路軍營荷䝉皇考特恩體恤伊等家口凡食錢糧之人家中遇有吉凶之事俱賞給銀兩未食錢糧之人每戶給銀贍養妻子遇有吉凶之事亦有賞銀撤兵後始行停止此次調往金川之東三省兵丁雖奏凱伊邇但伊等既已為國宣勞自應加恩體恤著照雍正七年之例給與恩賞銀兩交與將軍阿蘭泰永興富森於未經旋凱之前俱照此辦理前次派往之船厰兵丁等可傳諭經略大學士通行曉諭其盛京索倫兵丁到京時著軍機大臣等曉諭是日上乂諭內閣曰訥親從前奉命經略金川軍務退縮偷安乖張貽誤已經降㫖革職因伊聞召令回京之㫖托言有靣奏情形故降㫖令其將何事必須面陳一一據實明白繕摺交與富成轉奏不得僅以引罪泛辭塞責伊接到前後所降諭㫖稍有人心回思十三年來受恩如此深重今於軍旅要務貽誤至此自必中懷愧悔慙赧無地或恐懼失措不能置對尚不至於天良盡泯乃朕閲伊回奏之摺嘵嘵萬言皆不過掇拾歷來軍營奏報情形非必須回京面奏之事且稱兵氣之所以挫賊志之所以逞皆因去年張廣泗並未深悉賊情進退失宜所致而又稱張廣泗並無推諉尚可資其䇿力懇請令與嶽鍾琪分路進勦措辭矛盾乖張至此極矣不思伊身為經略張廣泗既進退失宜挫損兵氣自應即行參處乃稱臣既不諳軍旅而又奉㫖以戎行責成張廣泗夫訥親既為經略不任戎行則所經略者何事豈不大成笑柄耶其餘朕所指出安坐帳中自示怯懦師徒奔潰身先回營種種情節皆自承認而猶思留金川效力俟軍務告竣始往北路軍營且妄思覲朕一面窺其隱𠂻因朕不即治其罪暫停發往北路降㫖詢問是以轉生希冀之念猶欲遷延時日覬望格外之恩是不復知人間有羞恥事矣君臣之際相臨以分相接以情人孰無過茍其事在可恕情猶未絶或量與薄譴棄瑕録用亦所常有至於關係軍國重務賞罰不容稍假朕亦斷不肯為姑息之主今訥親所犯如此更何晚蓋之可圖何桑榆之可收即伊亦何顔再與朕相見耶至伊所陳金川善後一摺尤為可嗤伊在軍前毫無寸進以退縮失誤軍機獲罪罷斥賊尚未平何暇計及善後其與古人所謂何不食肉糜者又奚異乎即其所謂善後事宜亦托拾朕前此諭及之事此不過偶爾談論將來或應否如此尚在未定軍機大臣等皆共知之而乃自以為獻善後之計吁其可怪矣訥親受朕殊遇位至大學士如此辜恩負國罪狀難逭內省略無動念此奏更出朕意想之外伊既自出於頑鈍無恥朕亦不得復以待大臣之禮待之著富成即將伊拿問於所在地方拘禁俟經略大學士傅恆遵㫖審訊各欵覆奏到日另遣大臣前往㑹同經略嚴審定擬此㫖并訥親原摺俱發出俾衆共知之平定金川方略卷十七
