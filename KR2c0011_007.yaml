body:
  text: 五月戊戌四川布政使倉德奏言督臣張廣泗添調之陜甘雲貴官兵餘丁一萬三千名內涼州河州官兵由茂州赴營陜西固原延綏官兵自棧道入川由灌縣出口雲貴官兵由成都省城前赴軍營添調新兵即應加增糧運臣商之撫臣先後雇覔背夫一萬二千餘名皆分起委員押交總理糧務道分站安設並隨軍挽運又於成重潼順敘嘉龍瀘資眉卭綿永等十三府廳州屬倉穀內添辦軍米十二萬石勒限運赴西南兩路又添調丞倅州縣佐雜二十餘員出口聽候差委及分管隨軍辦理一切糧務現在大兵不日會集夫糧亦皆充足奏入報聞己亥貴州提督丁士傑奏言前派黔兵一千名赴川協勦今據領兵將備報稱已於三月初一初三等日自成都出口約三月二十以前可以齊抵軍營官兵沿途安靜且人人踴躍奮往一路安吉並無疾病等事滇省官兵二千名亦已到川約三月二十前後可抵軍營奏入報聞甲辰班第奏言從前臺站分設夫役糧員不善撫綏多致畏難逃竄以虧額之夫運定限之米自屬竭蹶是以每日到營之米僅足逐日支持偶為雨雪所阻便費周章臣深悉其故督令糧務官員應補者補應添者添善為安頓毋許官吏絲毫扣尅留難俾源源輸挽除最逺之甲索一路外其餘各營現據糧務官員揭報約足餘半月或二十餘日之糧可資豫備臣仍不時督催寧使多餘毋致不足督臣現議分兵進攻師行糧隨路盡﨑嶇支分派别臣與各員再四講求按道計夫尚須隨軍挽運人役數千已飭藩司多為雇覔現亦陸續到齊不致臨期貽誤奏入報聞班第又奏言嶽鍾琪於四月二十日到營臣細訪軍中應辦事宜據云現在賞罰最宜嚴明無論各路番民性俱嗜利即漢兵亦須懸定賞格方能鼓舞倘有犯令及臨陳退縮者即以軍法從事不容姑息所用漢番兵丁務使各盡其長聞向來攻戰總以番兵當前漢兵隨後遇敵惶惑相率奔潰不知番蠻所用刀桿等器止利短攻漢兵鳥鎗弓矢皆能及逺自應令漢兵居中首當其衝而以番兵分左右翼從旁夾擊乃能取勝再用番兵須釋其疑若用之而復疑之兵法所忌黨壩一路雜谷土兵最多應令挑易精鋭從戰而綽斯甲為金酋後户若賊敗北逃遁須借綽斯甲之力方可擒獲此皆宜豫為撫定者也臣又問現在情形據云黨壩甲索專攻勒歪賊巢統算已有兵萬餘可以足用惟督臣議分兵數路進奪昔嶺以攻刮耳崖賊巢恐分兵勢單不無顧慮臣觀其籌議頗中肯綮於各番情形及金酋事宜亦能稔悉而精力尚屬強健似可兾其成功現據督臣與之詳加商榷所陳謀慮督臣亦皆允從已於四月二十三日自營起身前赴黨壩訖督臣始擬分兵十二路今已歸併十路至進勦日期據督臣云探看山徑積雪尚多必須五月初旬方可會齊各路刻期進取臣亦俟督臣移營前進時同往察看情形并調度糧運奏入報聞班第又以丁憂試用縣丞鄭琰人才可用奏請留營差委上可其奏是日班第張廣泗會奏言臣班第奉命來川調度糧運前在省城正值調兵增餉之時適辦理南路糧務之打箭爐同知鮑成龍赴省即將應行添運數目交該同知遵照辦理及臣班第至軍營時南路總理建昌道陳緯亦奉調至營臣等又將一應調劑事宜俱交該道悉心條議據稱南路臺站安設已妥加運之米力任可以無誤惟木坪一路道險運難不能兼顧應令雅州府知府為副總理歸彼管轄隨據議允準奏明在案詎該道回爐之後音耗全無檄催屢次忽據詳稱據同知鮑成龍詳請應加站若干應添夫若干臣等接閲之下不勝駭異查該道所轄南路每日運米不過二百餘石原屬無多即使果應加站添夫亦應於在省面見時稟明酌辦庶可先事綢繆乃該道該同知從前並無片語議及今直大軍進勦在即忽復作此更張豈能臨期猝辦且各路糧臺俱已查清陸續稟到惟該道所屬甲索一路為途最逺任催罔應明係已有貽誤希圖混詳為藉口歸咎之地隨嚴加批駁飛飭趕運間適臣張廣泗差往甲索之兵丁回稟該處現在缺糧續據署副將王世泰亦具稟到臣等當查甲索舊駐之兵糧已不敷用今又添兵前往何以為計星委川東道齊格馳往相機料理務期接濟外竊思該道等面稟則一味糢糊辦理則百端詐偽以致遲誤軍糈難容掩飾况該道前管木坪甫請歸併雅州管轄隨又將所管邊谷一路詳請歸併木坪種種委卸居心全不可問再上年臣張廣泗以西路草坡運道班攔山等站恐天寒雪凍運夫苦纍商之該道於南路添買烏拉協濟該道已經承領添辦牛騾二千頭交該同知鮑成龍收管又俱全不經心入運未及月餘倒斃殆盡實屬貽誤軍需相應請旨將建昌道陳緯打箭爐同知鮑成龍革職交與巡撫一并嚴審定擬查明倒斃烏拉責令分賠以肅軍紀丙午上諭內閣曰據班第張廣泗奏稱建昌道陳緯打箭爐同知鮑成龍承辦糧運漫不經心所領烏拉牛騾多致倒斃陳緯鮑成龍俱著革職其廢弛糧務之處不必解交巡撫審擬如有應行訊問情節即於軍前嚴訊明確枷號示衆俾承辦糧運之員知所警惕俟凱旋之日照例定擬庚戌張廣泗奏言金川地界綿亘一溝其南北不及三百里東西不及二百里中有大河一道由北而南番人夾岸而居莎羅奔與伊姪郎卡所居勒歪刮耳崖二寨皆在河之東岸四面雪山凡可通之路皆係懸崖峭壁偏橋窄路緊要路口俱建有戰碉石卡層層羅列防禦嚴密上年進兵時因路徑查探未確是以賊酋恃其地險碉堅敢於肆行抗拒今臣身歷軍營已幾一載審度形勢察訪番情已盡得其底裏現在精壯番賊不過四千餘人而我兵已及四萬之衆兵法十圍五攻賊衆我寡則宜聚賊寡我衆則宜分今我以十擊一就其形勢當分十路進攻黨壩一路原派漢土兵九千餘名今加派一千五百餘名委加銜總兵嶽鍾琪統領由黨壩攻取木耳金岡康八達陡物黨噶等寨直搗勒歪又委署松潘總兵哈攀龍統領漢土官兵三千餘名由美臥溝一路攻取撒臥山大松林噶達勒烏等寨亦直搗勒歪又派署重慶總兵任舉統領漢土官兵三千四百餘名直登昔嶺奪賊碉卡踞其要害又派候補參將王愷統領漢土官兵三千餘名由昔嶺之右納喇溝攻取巴爾工色且等寨直趨刮耳崖又派貴州清江協副將唐開中統領漢土官兵三千八百餘名並餘鎮雄營參將劉德成統領漢土官兵二千八百名由昔嶺之左卡撒一路會攻色底碉寨之後唐開中即領兵搶奪右山梁攻取奎角千登色爾力等處直趨刮耳崖劉德成領兵攻取美溝之巴朗木須等處並分兵搶奪左山梁攻取革喇布東等寨亦直搗刮耳崖又派四川逰擊王世爵署遊擊潘文郁帶領漢土官兵一千四百名堵禦納貝山俟色底碉寨攻克之後即領兵前進攻取得利曽達等寨並聲援馬奈一路官兵此進攻金川河東六路之布置也至河西有名碉寨數十處精悍賊番多在其間上年因官兵數少不能分至河西因而賊衆盡趨河東抵禦是以攻取為難今派定署泰寧協副將王世泰大同協副將髙雄統領漢土官兵四千餘名由甲索一路進攻又派金塔副將劉順統領漢土官兵二千五百餘名由乃當一路進攻又派陜西參將永柱統領原駐馬奈之漢土官兵三千餘名由卡卡腳一路進攻使賊河西各寨不能復援河東而勒歪刮耳崖賊巢勢孤力竭自難持久此進攻金川河西四路之布置也自大兵進勦以來已將一載賊番糧盡技窮惟有嬰碉固守今時屆仲夏山雪甫消二麥將熟正當乘時進攻使賊不得刈穫則奪其食即所以絶其命且頒發九節銅炮十位並成都製造大炮三十位俱已到營足資各路分用是師旅既集攻具已備臣與班第就近會商定期五月初八日十路大兵同時齊發協力並攻庶賊四面受敵雖有堅碉亦難再守可期仰仗天威直搗賊巢無難矣奏入諭曰覽奏俱悉惟俟捷音耳臣等謹按張廣泗有言兵合則見多分則見少而及其用之也每主分而不主合始而四路既而七路今當增兵之後又擬分十二路後乃定為十路雖數道並進自古用兵何嘗不藉此奏績然不若張廣泗屢將有用之兵零星分散以自形其弱也方議分兵數路進奪昔嶺以攻刮耳崖嶽鍾琪固早已憂其兵分勢單不無可慮矣又况兵以禦敵將以領兵將之與兵必如臂指之相使頭目之相護而後可期致勝張廣泗乃將各省之兵任意分𨽻不歸本將統轄竟致將不識兵兵不識將何以收羣策乎是日班第等會奏軍前設立賞格上命軍機大臣等速議議曰金川自軍興以來已及一載有餘添兵糜餉現在自應刻奏膚功難容延緩而軍中賞罰原屬第一要務今據班第張廣泗奏稱兵丁有臨陳割獲男番首級一顆或耳記一箇者賞銀五兩如或連割首級及耳記數箇者照數遞加若有生擒賊番一名者賞銀十兩如係寨首及小頭人賞銀二十兩如係大頭人及逆酋素所信任者商酌從優加賞至於賊人所居之碉大而難攻者每克一處賞銀三百兩其次賞銀二百兩又其次賞銀百兩或五十兩領兵員辨有能親冒鎗石身先士卒者計功遇缺升補請以此為鼓勵之資兾成功之速臣等伏思用兵之法全在賞罰分明始足以示勸懲而作士氣但兵丁臨陳或能奮勇爭先或能殺敵致果統領之員皆所目睹應加賞給原可隨時立辦若預定銀數零星購買不惟無此體制亦恐轉以滋弊如臨陳之時前有數人對敵兵丁貪獲賞銀衆皆爭取一人之首級耳記而敵兵之猛鷙凶悍者轉得乘間脫逃豈不貽誤况使士卒惟利是圖勢必轉無鬭志其間或戕殺已降賊害平人或割取已死之耳記冒領賞銀或因利爭競而軍令不肅種種弊端未可枚舉在國家興師伐罪既已動費帑金原不惜此區區賞功銀兩即班第張廣泗亦不過為鼓舞兵丁起見但如前項所指各弊則事屬難行應無庸議至於軍營賞格關係甚重應另行斟酌良法俾兵丁皆知奮往直前立功奏凱庶為有益現今大學士訥親將次抵營應令訥親會同班第等詳加籌酌另行速議奏聞辦理上是之是日上又以軍機大臣議駁班第等賞格一摺傳示訥親令其閲看斟酌並傳諭張廣泗等軍營中果有奮勇爭先出竒制勝者臨期酌量即從優重賞務在合宜中窽實足鼓士氣而勵人心是日張廣泗又奏言各鎮將分領一軍凡屬臨敵攻戰其於主將之指授機宜務須遵聽調度而於駐軍之營壘務須妥慎防範以免疏虞未有罔遵指示擅棄營壘甚至撤營移駐並無賊尾追而軍裝炮位率皆遺棄弗顧但知畏賊而不知畏法如近日鎮將之甚者也查臣於上年六月二十八日派兵進勦原分西南二路其西路統領係宋宗璋派管黨壩卡裏等處官兵進攻勒歪卡裏一路官兵係郎建業帶領臣原令由曽頭溝前進宋宗璋調往卡裏郎建業僅攻克石卡二處久頓未能寸進反致傷損官兵宋宗璋所領黨壩官兵上年七月攻克革什戎岡奪獲作固山梁尚屬奮勉自八九月以後進攻木耳金岡康八達兩處雖亦擊毁碉座究之跬步不能前進該鎮又於瞻對案內扶同欺罔有應訊問之處臣現遵旨令哈攀龍前往黨壩軍營摘印署理並委嶽鍾琪前往接辦統領事務將宋宗璋解赴成都看守候臣委員解送刑部聽候質訊其南路統領係許應虎派管正地馬奈綽斯甲等處官兵夾攻勒歪刮耳崖該鎮初進之時克復正地攻取車寨尚屬勇往逮進攻獨松未克蔡允失事許應虎竟舍獨松而至的交以攻甲木寨仍不能克反被賊圍幾至危殆臣始將許應虎撤回小金川繼因卡撒一路未有大員彈壓又遣許應虎至彼駐守乃畏賊大言恐嚇欲允其撤退營盤之請經臣嚴飭中止臣又將許應虎調回間住現在留營無益應遣回建昌鎮本任辦事至馬良柱於上年四月救全沃日諭降小金川并克復孫克宗地方勞績頗著六月內克取納貝山江卡得利等處及招撫克州九寨并攻取噶固讓噶美耳等寨進據丹噶山梁亦屬奮勇及臣將卡裏撤回之兵令赴丹噶歸伊統轄該鎮駐劄丹噶山雖離刮耳崖不過二十餘里而攻取曽達一碉日久未克逮張興失陷遂意沮氣懦措置乖方致令克州九寨仍被賊占大肆猖獗及臣令發兵退賊然後移營納貝山一帶據險駐劄而馬良柱一得臣檄即置賊不顧率領漢土官兵五千餘衆連夜移營並無賊人尾追而炮位軍裝帳房等項盡行遺棄其怯懦無能較之前此如出兩人且該鎮亦於瞻對案內扶同欺罔應行質訊臣謹遵旨摘取印信委副將任舉署理重慶鎮事務統領官兵進勦將馬良柱同宋宗璋一并解送刑部質訊問擬其遊擊陳上才上年四月內救援沃日及攻克孫克宗進據丹噶山雖有微勞但分駐卡撒左山梁以後毫無寸功且於撤營之時防範疏懈以致失炮傷兵罪實難逭參將郎建業初由卡裏進兵既無寸功後赴曽達駐守失去卡倫七座逮撤營之際不遵號令失炮傷兵其罪更難姑貸臣按照軍法將郎建業鎖拿解赴成都收禁陳上才先經患病赴成都調治咨明提臣武繩謨一并收禁候旨到飭審究擬至署遊擊潘文郁於上年四月赴援沃日奮勇對敵身帶石傷繼又攻克孫克宗及得利噶固等寨皆為前鋒直抵丹噶頗屬勇往惟於曽達撤營急遽失去小炮一位尚屬罪不掩功又署參將事陜西遊擊王世泰派往馬良柱丹噶軍營幫辦統領事宜並無寸效又隨同撤營毫無布置咎亦難辭但該員委赴丹噶未及旬餘情稍可原且熟於金川一帶番情為綽斯甲等土司所素信應姑留以備差委臣現將王世泰潘文郁二員暫留軍營䇿勵以觀後效再查丹噶曽達及卡撒山梁等處撤營失去炮位所有專管之千把辨員亦千例議外委張朝佐王國佐薑于海山隂棠王孟國五員即行按名斥革千把杜景賢杜啓明宋祿三員咨部斥革一并羈候審擬至於卡撒駐守之參將買國良上年七月攻克空卡關邦噶山碉寨并克破卡撒大碉頗屬奮勇至八月以後攻打色底遂為頓阻又副將髙宗瑾上年八月內奪據色底左山梁之後即為頓阻雖俱未能克敵尚屬固守無失髙宗瑾於本年正月內誘擒逆番用事頭人生噶爾結又於三月內協同副將唐開中參將買國良等拿獲賊目生格由是賊番稍知畏懼不敢輕來侵犯現在另為派遣酌援機宜進攻其馬奈駐守之參將永柱初在卡裏既赴馬奈均無克取亦無疏失至本年三四月與遊擊李璠等督率官兵擊退犯營賊番攻克戎布寨賊勢大挫軍威稍振亦現在指示機宜調遣進攻阜和營遊擊羅于朝上年七月奪取甲索碉卡八月初旬又同王世爵攻奪對哇山賊卡八月以後久駐甲索未有進取亦無疏失但羅于朝於瞻對案內通同欺罔罪不可逭請另行參劾以彰法紀奏入上命該部議奏旋經兵部議覆許應虎業經奉旨革職解京審擬宋宗璋馬良柱俱係已經解審之員應行審擬治罪羅于朝歸於瞻對案內另參均毋庸置議郎建業陳上才既經該督按照軍法鎖拿收禁應請旨革職審擬參將永柱照溺職例革職可否留營效力出自聖恩如蒙俞允留營俟事竣之日該督查核功過照例辦理餘俱如張廣泗所奏行得旨俞允張廣泗又奏言行軍之際全賴將領身先士卒其退縮無能者應加懲究謀勇幹濟者應豫奬拔庶足鼓勵戎行查川陜定例自副將以至千總凡有缺出皆由內部照例銓選臣仰懇天恩俯念軍興暫通常格此次軍前遇有副將以下缺出準臣即於此次出師奮勇立功顯著勞績人員內揀選題請補授以事竣之日停止倘軍前不得其人仍照例咨部推補則一變通間將辨有上進之階愈切報效之願於現在征行似有裨益奏入上命該部議奏旋經兵部議覆準行張廣泗又以管理打箭爐稅務吏部郎中博寬緣事降調具呈願於軍營效力據情入告上可其奏令博寬留營酌量委用張廣泗又奏嶽鍾琪未到軍營之前曽具稟到臣有伊曽蒙聖祖仁皇帝賞戴花翎之語臣以大臣罷斥起用必須另蒙恩賜方可頂戴答之不敢壅於上聞謹代陳明奏入諭曰可傳旨令其戴翎是日陳宏謀奏言金川不法皇上特遣大臣帶領官兵分起前進以期迅速勦除臣欽遵諭旨將沿途夫馬預為籌備先儘驛馬合棚應付并調撥營馬就近協濟仍有不敷令地方官雇覔民間騾馬務令寬裕今欽差內大臣班第等於五月初六日過西安省城護軍統領烏爾登等於五月初八日過西安省城經略大學士公訥親等於五月初九日過西安省城護軍統領薩音圖等於五月初十日過西安省城內大臣傅爾丹等於五月十五日過西安省城俱係兼程前進夫馬並無貽誤理合奏明奏入報聞是日陳宏謀又奏言陜省為川甘兩省孔道額設驛站原係按地方之衝僻差務之繁簡以定馬匹工料之多寡如一入陜境之潼關華隂華州渭南臨潼等州縣定為極衝每站設馬八十四匹及一百八匹每馬一匹日給草料銀八分五釐每馬夫一名日給工食銀五分其自鳳翔府屬之寶雞縣入棧道起至漢中府屬之寧羌州黃壩抵四川境計一十六州縣驛亦定為極衝內惟寶雞設馬六十五匹東河設馬七十六匹餘俱每站僅設馬五十匹及五十四匹每馬一匹俱日給草料銀六分五釐每馬夫一名俱日給工食銀三分同一極衝驛站而夫馬工料多寡不同皆因潼關等處乃入陜之門戶為川甘兩省經由之總路寧羌等處則僅係入川之偏路如無軍務則寧羌等驛原可應付無誤乃自瞻對用兵以來寧羌各驛馳騁不遑已屬疲苦近因金川之役調撥官兵協濟軍餉欽命大臣前往差使絡繹文檄交馳各該驛遞俱在棧道之中一線羊腸站逺道險更與道途平坦之衝驛不同今寧羌等驛額馬僅五十餘匹而每起撥用動至一百數十匹現又安設腰站接遞軍營緊急文報驛馬更不敷用陜省逺在邊疆處處緊要無可抽調司驛各員墊項雇買湊應緊差幸無遲誤力實難支額設之馬奔馳不息多致勞傷所定工料又苦不給前據寧羌州等一十四州縣驛紛紛呼籲詳請加增工料馬匹以免貽誤軍需臣批飭驛鹽道孫陳典會同布政使慧中確查議詳兹據該司道等援據雍正八年西路用兵之例詳請加增臣查寧羌等驛夫馬工料久有定制何容輕議加增惟是軍興之際差務殷繁疲苦實甚若不亟為調劑設有貽誤關係非輕伏查雍正八年西路用兵沿邊一帶添設邊塘馬匹所需草料銀兩前督臣查郎阿題明俱照八分五釐支給報銷今寧羌等州縣棧道﨑嶇當此用兵之時差務繁急與從前西路用兵事同一例臣等目擊各驛情形不得不叩懇天恩俯準將漢中府屬之寧羌黃壩大安沔縣黃沙褒城青橋馬道武關留壩松林三岔鳳縣草涼等十四州縣驛照西路用兵添設邊塘事例於額設馬匹之外每站暫添馬二十匹馬夫十名以資應付每馬一匹無論新添舊設均照例每日支給草料銀八分五釐馬夫一名每日支給工食銀五分至鳳翔府屬之寶雞東河二驛馬匹無庸添設其草料亦請每日支銀八分五釐馬夫工食每日支銀五分一應工料請於奉旨允準之日準其開銷所需添設馬價於藩庫銀內照定價每匹八兩給發收領事竣之日變價還項夫馬工料亦仍照舊額支領奏入上命軍機大臣等會部速議議曰川省現在用兵其差務之煩較之陜省勢必更甚而川省沿途各站僅設馬三十匹每匹日支草料銀六分並未請增今陳宏謀援照雍正八年西路用兵添設塘馬之例奏請加增不知西路一帶俱係沿邊歷年原無驛站軍興之際不得不議添設並非原有額設復行增添也惟是金川現在用兵往來差使自必多於平時陜川二省馬匹或有應通融辦理之處臣等未能周知難以懸定今大學士公訥親現奉命赴川經略軍務身歷其境應請敕交大學士訥親將川陜一帶驛站有無應行斟酌變通之處妥酌具奏請旨辦理上從之六月辛酉紀山奏言軍需費用浩繁先後請撥鄰近省分及部庫銀共二百九十萬兩兹據布政使詳稱糧餉賞需及各路挽運腳價等項需費不資現存既屬無幾而附近之陜省又存貯無多不能屢為協濟且前借司庫酌留封貯銀三十九萬餘兩尚未歸還合無再請題撥銀一百萬兩速解來川協濟理合具題奏入上命該部速議旋經部議在江西省撥銀七十萬兩湖北省撥銀三十萬兩共銀一百萬兩交各該撫委員星赴川省交納備用是日上命軍機大臣等傳諭訥親曰據户部議覆紀山所請協撥軍需銀一百萬兩合之從前所撥已將及四百萬兩此時大兵雲集日費不資若奏凱需時餽餉將何所底止當起事之初本圖震攝遐荒為一勞永逸之計雖知其難勢不容己今勞師動衆經歷嵗時而兔穴獸嵎險不可攻力不能致全師取勝究將何道之從金川在蜀僻處懸巖負固陸梁本不足較但既已興師問罪徴調旁省幾遍西南若棄此不圖無以警衆心而威蠻服番衆圜視而起其將何以禦之然自朕反覆思之命將徂征固以止亂班師柔逺是乃常經古人云不以明珠抵鵲惜其所得不償所失也為今之計果已迅奏膚功捷音踵至固不待言倘尚利害相持當籌制勝良圖可以無頓大兵而狡冦帖服不致有損國威斯為上䇿至班滚不過漏網遊魂無足輕重如果探囊可得亦足快心若勢不能中止又將頓師經年更加勞費則俘班滚而懸之藁街不足示武且擒獲班滚特以服李質粹慶復之心明非懸坐疑獄耳試思傷財動衆李質粹之首果足償赤子百萬之脂膏耶不惟李質粹即慶復又豈足以償之耶以事理輕重衡之不如置之不問此朕宸衷密斷為民力物命起見不然多者費矣後之所費數豈踰前而區區是較耶訥親赴川時起程匆促未暇面諭及此可密行傳諭訥親令其統計全蜀情形熟思審處伊身在軍前所見較為親切必能善會朕旨如此番不用兵瞻對而大兵既撤之後萬一餘燼復燃嘯聚生事又不得不復為撲滅以杜後患則又不如目前多費為事半而功倍矣其一一先機籌及詳悉密奏候朕裁酌張廣泗等可不必令知之恐致泄漏以搖惑衆聽其現在進兵形勢若何佇待奏報以紓逺懷大學士佳否近來起居步履如何隨便奏聞以慰朕意臣等謹按興師十萬日費千金行者有荷戈之勞居者有挽輸之役民命物力胥關乎是自古雄才大略四征弗庭固欲使絶域遐荒聲靈共讋然一偏於攻取好勝之私而不能念及於國計民生之重則未免於勞師傷財不戢是懼我皇上聖德廣運舉四海內外措置於掌握之中睿照所及徹始徹終毋固毋我邊圉弗靖固不得不張皇六師以伸天討洎乎行師既久勞費日煩則重念鋒鏑是膺無非朝廷之赤子輸將恐後皆為草野之脂膏惻然以班師柔逺為懷蓋並育兼包量同天地而審機決䇿洞若神明為經略者果能善體聖心熟思審處則膚功之奏有無俟曠日持久者矣癸亥上命四川建昌鎮總兵官莽阿納前往金川軍營聽經略大學士訥親總督張廣泗酌量委用戊辰上諭內閣曰據尚書班第總督張廣泗奏稱汶川縣典史謝應龍於莎羅奔蠢動之初奉委偵探情形查勘餉道其時莎羅奔三路往攻沃日逆焰方張而該典史能以大義開導女土司令其堅守拒賊一面為請援兵逮危急之時手執佩刀相誓協力拒守沃日因以得全及至卡撒失利鎮將欲移營退保該典史復力阻中止且不待檄示接濟卡撒右山梁軍餉該典史以微末之員能知大義兼悉機宜實心任事甚屬可嘉即在大員中亦不易得非尋常勞績可比宜不次超擢以示優奬可加授知州同知職銜遇有相當之缺該撫即行題補使軍中效力人員共知鼓勵是日上又命軍機大臣等以謝應龍超擢諭知訥親令傳該員面加奬諭並通傳各營使效力人員共知鼓勵臣等謹按行軍之際賞罰最宜嚴明典史謝應龍以微末之員一能實心任事皇上即豫超擢並諄諄傳諭經略面加奬勵又傳播各營使效力之員共知奮勉聖主之無功不賞無微不録所以鼓舞人才振作其勇往之氣者至深切矣當時訥親張廣泗漫不經心以致軍前敘功册籍溷淆無可稽考豈非負恩之大者乎是日班第等以前奏軍前文武員辨跟役及土兵在本境者酌給半米半折奉上諭以軍前最重糧餉半米半折日食倘有不敷伊等從何購覔何以轉稱足資食用遵旨覆奏曰軍前文武員辨跟役原有額設定數照例支給口糧但該員辨等隨帶之役與額定之數多有不足如總兵定例跟役二十四名副將十六名其實在隨帶人數並無如許之多向俱照額支領以餘米變價補日用之不足今酌定半米半折既省轉售之煩而食米仍無缺乏至土兵未離本境者原有該地出産炒麵糌粑足資糊口本不專藉官糧且其中殷實土司素有儲積者即令全領折價亦所樂從臣等總在隨時隨地酌看情形加之調劑實無食用匱乏之虞奏入報聞是日班第張廣泗紀山會奏言據布政司詳稱西南兩路添兵進勦雇用內地運夫數以萬計伊等逺役塞外食物昻貴所得腳價口糧僅敷本人度日不能兼贍家口兼之疾病逃亡又須另行募補民間不能永逺幫貼未免畏縮不前而軍糧緊急刻不容緩應請於每夫日給口糧腳價外各先給安家銀二兩三月換班之時再給銀一兩庶糧夫無憂內顧得以踴躍從公臣等伏思我皇上愛民如子不欲絲毫擾纍奉有寬裕給發腳價之諭旨臣等親察情形似應照該布政司所議辦理恭摺陳明奏入上諭該部知之是日張廣泗又奏擒獲之賊日生格生噶爾結與馬奈陳前擒獲之賊番克爾吉勞戎生格等五名均已處以極刑並行梟示以泄衆忿報聞平定金川方略卷七
