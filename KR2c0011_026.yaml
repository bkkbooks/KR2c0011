body:
  text: 三月壬戌軍機大臣等奏言總督䇿楞等以金川平定籌酌善後陳奏事宜十二條臣等謹按欵分晰詳議恭呈睿鑒䇿楞等稱巴底巴旺宜各立土千户一員責令革什咱管轄以助聲勢臣等議得巴底巴旺地方原係土司納旺所轄納旺係金川之壻是以從前張廣泗將伊圏禁爐地今䇿楞等以該處現無土司請將納旺之姪勒兒悟爾結噶杜爾結改給土千户職銜平分其地令革什咱兼管臣等伏思莎羅奔郎卡既已邀恩免罪則納旺尚非不可寛宥之人且伊現無子嗣伊姪又年幼無知遽將巴底巴旺之地分給革什咱管理是無端為革什咱增益部落既不足以服番衆之心且恐勒兒悟爾結等長成之日革什咱占地不還輾轉滋釁似應將納旺從寛釋放予以自新仍令為巴底巴旺土司伊姪成立之後亦可聽其以次承襲仍令該督䇿楞宣布聖恩俾知感激奮勉似屬妥協但䇿楞等身在地方於情形較為親切或所奏别有所見亦未可知應令詳悉酌量再行具奏以便定議䇿楞等又稱革什咱之札什諾爾布應請即予承襲以資彈壓臣等議得土司承襲之例向係該管地方官層次加結文移徃返動經歲年今金川新定革什咱地界與之毗連亟須土司整理札什諾爾布既係應行承襲之人且自用兵以來頗能効力自應照䇿楞等所請先行給與號紙以示奬勵而資彈壓䇿楞等又稱雜谷革什咱沃日小金川四土司宜聨為一氣以防外患臣等議得雜谷等四土司俱與金川接壤向因勢弱人懦屢被金川侵占今既歸還侵地自可息事寧人即或思患預防亦應聽該番等自為籌畫但既據該督等傳集曉諭令伊等頂經發誓則是辦理已經完結可以無庸另議䇿楞等又稱小金川沃日宜結為婚媾協守疆圉以杜金川窺伺臣等議得沃日地方向係土女澤爾吉管理今該督既稱衆土司㑹議將澤爾吉配與小金川澤旺事屬已行應無庸置議䇿楞等又稱沃日印務應請仍令澤爾吉䕶理臣等議得沃日印信原係澤爾吉管理今雖配與澤旺自應仍令執掌以便約束該處番民至將來承襲之事應俟其生有子嗣即照明正土婦功噶之例分襲兩土司印務可也䇿楞等又稱小金川各要害處所被毁碉房宜督催修葺孫克宗占固二處宜駐土兵防範以備不虞臣等議得碉房之設原係各該土司自為防禦其已經殘毁者自應聽其自行修葺至孫克宗占固既係小金川要隘則設兵駐守亦應任該土司自為料理若委員督催分𣲖轉似代該土司防範莎羅奔等未免轉生疑懼此事倘尚未舉行應即行令停止䇿楞等又稱小金川之大小朗素宜分别安挿以杜後患臣等議得小朗素現已奉㫖令䇿楞等詢問辦理無庸置議至大朗素秉性奸頑又無効力之處原非小朗素可比其應如何設法安揷應令該督酌看情形妥協籌辦䇿楞等又稱金川投誠之土舎汪爾吉應行暫為安揷臣等議得該土舍原係郎卡異母弟兄當金川起事之初即不敢同惡相濟來營投誠効力亦屬可嘉今金川事竣不能回巢自應代為籌畫伊現在留養革什咱地方應照該督所奏即交伊母舅土司札什諾爾布帯同駐牧俟有可以安揷之處另行奏請辦理䇿楞等又稱稄磨竹克基黨壩各土司土舍宜加銜奬勵以分雜谷之勢臣等議得稄磨竹克基黨壩土司向皆受制雜谷金川用兵以來伊等從征効力又皆係隨從雜谷土司今遽將勒兒悟等加銜給印在稄磨土司等固為喜出望外而率先効力之雜谷土司既已恩無可加轉將伊向所統轄之地𤓰分鼎峙相形之下彼此俱覺難以相安應令該督等另行籌辦請㫖定奪䇿楞等又稱各土司應請加級以示鼔勵臣等議得金川用兵以來各該土司派調目兵輓輸供應運餉從征甚屬勤勞恭慎大兵奏捷之後業䝉恩㫖令該督等酌加賞賚今既請賞加一級以示格外奬勵事屬可行應請㫖交部辦理䇿楞等又稱漢奸出入番地應行嚴禁臣等議得番夷愚魯無知諸事多由漢奸藉端煽惑原應嚴為防範但勢有難行前經奉㫖傳諭該督等令其設法稽查善為酌辦葢各土司皆有錢榖文移之事必須倩人代理在伊等自為延致則去留各得自由若如該督等所奏附近内地之各土司等延請代筆必由地方官取結詳報備案則地方官所辦公事甚多安能復為土司延請幕賔即令加結詳報不過增一具文故套未見實益至於願充土司字識之軰必非安靜守法之人地方官又安能選擇謹愿馴良者以充此役而此軰倚恃經官選擇之勢或挾制土司益將滋事況揑飾冒充䆒難徧為覺察若云定以年限給以職銜將求充者益衆選擇者愈難伊等於該土司稍有齟齬或至内地告奸既不便據以為實又不便置之不問種種枝節弊難悉數應令該督等遵照前㫖督率所屬實力奉行漸次嚴宻稽查不必多為禁約至内外民番互相貿易亦難一槩禁絶惟在該地方州縣營汛稽查匪徒出入混雜以免滋事可也䇿楞等又稱夷人典買漢地應請贖歸以清疆域臣等議得木坪瓦寺兩土司𦂳接内地漢人田産典賣與夷者甚多一時難以盡數贖回且夷民管業已久遽行追贖轉似妨彼生計於綏輯拊循之道似有未恊但該督所奏亦屬釐定邊界之意應請嗣後嚴禁内地民人不得將所有田地私售番民違者酌治其罪可也得㫖速行丙寅上諭内閣曰軍旅為國家重務前因道員鹿邁祖貽誤夫馬自請罷斥以博里民虚譽經朕降㫖革職治罪俾辦理軍務之員知所儆惕今大兵雖已凱旋而糧糈宜加保䕶成都府知府李盛唐係該督等特委出口總理糧務之大員乃奉委之時即托病不前到臺之後全不留心防範以致軍糧兩次延燒又不督率查察惟思回省調理寧棄官而有所不惜該員當鹿邁祖治罪之後仍敢漠視公事罔知大義此風一開將地方政務舉可任意怠玩一離官守便得優㳺事外其居心實不可問非重加嚴處無以示懲李盛唐着革職拿問從重治罪辛未上諭内閣曰四川總督䇿楞等奏稱軍前餘存米石除賞給各土司外尚存一萬六千餘石已照内地賑借兼施之例今番民承領准其分限二年易以青稞運赴威茂營還倉朕自金川納欵大兵凱旋以來屢經降㫖將從征出力之各該土司等加以優賞並據該督奏明各土司土目俱經分别賞給米三百石五百石不等其存留餘米無庸再為賞給但念連年用兵各該土司等㳟順効力番民轉餉從征遭荒失業情殊可憫著將領借之餘米一萬六千餘石即賞給各該土司聽其自行承領不必分限還倉以廣懷柔奬勵之至意是日䇿楞岳鍾琪㑹奏言臣等於三月十一日已抵陶關駐劄二日辦理瓦寺地方一切事務隨送各處土目臣等逐一面加教誡給賞回巢回營兵丁業俱至省陸續起程沿途並未滋事一切軍裝已委文武大員照依原發印冊逐細查㸃總兵哈攀龍現自沃日一帶從後捲撤臣等可於十六日進省奏入報聞四月己卯䇿楞岳鍾琪㑹奏言治夷之道首在嚴宻邊防臣等於凱旋時沿途留心查察知瓦寺土司出入内地向由汶川縣索橋行走彼處既有縣城又有營汛稽查甚易迨後日久法弛該土司厭此迂途别求捷徑乃於陶關以外漢番界河之間自行建立索橋一座河南雖為夷疆河北本屬内地今則兩岸俱歸番人把守且直走成都計程不過兩日臣等親見此處相離營縣甚逺漫無防範隨傳詢該土司桑朗容忠數其私建索橋之非諭令拆毁仍由汶川舊道出入已據該土司認罪遵依此外尚有番地要隘一二處必須修理撥防者容臣等查明酌辦再行具奏臣等又訪得瓦寺地方素產銀礦内地民人因陶關有此索橋遂私徃開穵與該土司均分其利聚集至三百餘人之多臣等酌議概行查拿並叅處土司不特人衆難以盡罰且軍務甫竣正當安輯番境之時不應啟其疑懼是以嚴諭桑朗容忠嗣後不容再犯並將為首之廖安鳳等四名枷示漢番交界地方餘俱押逐回籍庶内外匪徒共知儆懼不敢再徃夷地滋事奏入俞㫖報聞是日尹繼善奏言軍前回兵一切馬騾俱足應付但馳驟徃來必得更番輪替庻馬力寛舒不至困乏若兵丁跟役概給馬匹則用馬過多恐難休息是以酌量兵丁皆給馬匹跟役則令折價兵役俱各歡欣遄行無誤在臺各員亦皆能竭力承辦不敢偷安現今回兵陸續行走出潼關者已有八起東省之兵俱已過完在途兵丁不過一千有餘約四月半後皆可出陜境矣至陳宏謀咨稱臺馬有餘官兵即五百名一起全行亦可應付臣查此不過欲速之意但臺馬寧可有餘俾得更換休息若大隊同行儘數應付日日奔馳勢必中途疲乏後來之兵反多阻滯自應仍照原奏無論五百名四百名一起者皆分為兩起從容行走庶不致欲速反遲臣因陜甘事務正署疊更案牘叢積已於三月十八日回至省城次第清理奏入俞旨報聞甲申上諭内閣曰金川用兵案内川省大小官員辦差辦糧小有過愆及供億滿兵遲誤者前經降旨令於事後核其功過查辦乃因現在用兵不可不使知儆惕而然今大軍凱旋伊等從前雖未免稽誤而竭蹷辦理業經竣事可加恩從寛免其叅處俾得安心職業己丑上諭内閣曰朕前降旨金川軍務自經略大學士忠勇公傅恒調度得宜勲績懋著所有在軍大臣及隨營文武官弁等與有成勞交部從優議叙此乃指大學士忠勇公傅恒上年十二月二十一日到營以後而言續據總督䇿楞奏軍營從前將弁功過並無文案可稽無庸查辦朕因降旨以既無冊檔則該部無憑置議官弁優叙之處自可不必此則指上年十二月二十一日以前而言也分晰至為明白乃兵部及該督錯㑹朕意僅將從前在軍大臣查辦而不及隨營文武官弁等不思大學士忠勇公傅恒調度之員弁即係從前在軍之員弁當雪夜攻奪碉卡數次鼓勇血戰又如吳士勝等頻入賊境冒險徃來及岳鍾琪遵奉大學士忠勇公傅恒指示直由刮耳崖帶領番酋赴營歸順則亦必有隨營將士俱經奮勉出力伊等前此因主帥乖張貽誤既無由建立功績今幸得以少効微勞乂不獲仰邀議敘終屬向隅且無以鼓勵人心俾將來知所勸勉著傳諭總督䇿楞將上年十二月二十一日以後在營自總兵官以下逐一查明造冊開送聽大學士忠勇公核定具奏一體加以優敘用奬成勞丁酉兆惠䇿楞奏言乾隆十四年三月二十二二十七等日節據湖北湖南江西解到餉銀共六十五萬兩均在臣舒赫徳臣兆惠酌定奏明截留川省銀二百萬兩之外不應收貯川庫但隔省徃返路途遥逺不但餉銀關係𦂳要恐有疎虞即長途跋涉脚價亦多糜費臣等公同商酌川省歴年因額徵錢糧不敷支給歲需他省協濟自二十萬以至三十萬不等似應即將此銀留貯川省以抵按年協濟之項既免逺道疎虞又省徃來糜費似屬兩便奏入上諭該部知之丙午尹繼善奏言凱旋京兵約於四月二十五日即可全出潼關五月十五以前計可全數抵京所過地方俱極安靜其馬騾一項仰頼聖恩准其分起行走又准跟役折價多方體恤馬力得以更番休息不致疲乏兵丁隨到隨行毫無阻滯臣已飛行各屬將臺站捲撤民馬俱令歸農早資耕作營驛馬匹令其領回供備差撡從此兵民安堵地方寧靜莫不歡欣額手感戴天恩至軍需錢糧現在設立總局遴委幹員逐欵細查確實另行造報奏入諭曰軍需查核固應詳妥而軍興之後民氣之凋敝亦宜加意休息也臣等謹按川省用兵以來皇上宵旰勤勞大小機宜無不籌畫指示而所惓惓致意者尤在民生吏治是以凱旋之後特將川省大小官員辦差錯誤之案槩免處分俾得安心職業以盡撫綏休養之道而於尹繼善奏報軍務告竣之摺又諄諄以民氣凋敝加意休息為諭仰見聖主之心殷民瘼舉念必及如此五月丙辰上諭内閣曰前因川省軍興一切供億輓輸有資民力曾經降旨將該省乾隆十三年並本年地丁錢糧概行緩征復令該督䇿楞將辦過夫米各州縣於凱旋之日查明等次具奏候朕加恩今據䇿楞分别查奏其列在一等之茂州等一十四州縣地居衝要差務殷繁承辦夫米最多可加恩蠲免一年錢糧列在二等之溫江等四十三州縣㕔辦米出夫稍次或有派徃出口站夫或當北路孔道差務亦重應酌免一年錢糧十分之七列在三等四等之州縣或糧由舟運人力稍省或辦夫而不辦米或辦米而不辦夫如樂山等二十二州縣應酌免一年錢糧十分之五隆昌等五十三州縣應酌免一年錢糧十分之三至乾隆十三年錢糧既經緩徵其中倘有急公完納之户即照伊等完納分數仍准展限緩徵以示奬勵至本年緩徵者目今軍務雖竣民勞甫息仍令該督相其緩急毋致催督擾民如此則全蜀出力辦公之良民咸得仰邀恩澤元氣漸舒該督等應督率所屬妥恊辦理並出示曉諭俾閭閻均沾實惠以副朕優恤勞民之至意丁卯上諭内閣曰貴州銅仁協副將胡大勇前在軍營倡議制造攩砲棉牌三千面據傅爾丹等請將胡大勇遣赴滇省監造嗣經張允隨等奏稱需費五十餘萬且成造難計時日物料亦無從購買萬難製辦攩牌之有益無益及製造之所費幾何胡大勇必悉知之而後倡此議也若明知此舉之多費錢糧無濟實用而倡議製造則是有意希冀開銷從中侵冒分肥其居心固不可問如不知動項浩繁而以必不可行之事揑飾妄禀則又明係伊籍𨽻雲南因從征艱險巧圖規避得以藉此歸家脱身事外其與臨陣退縮者何異此在職小武弁尚屬不可而況身為副將受國重禄者哉胡大勇著革職交與刑部軍機大臣等㑹同嚴審定擬具奏八月甲午上諭内閣曰上年調赴金川兵丁借支辦理行裝銀兩例應扣還朕念伊等長途跋涉未免拮据業於恩詔内將已至軍營之兵丁全行免扣其已經起程而中途撤囬者亦寛免一半今思未經起程之兵雖未有行旅之勞但既經派調則辦裝安家等用亦不無耗費若將借支之項全數扣抵未免拮据著加恩將未經起程兵丁從前借支銀兩寛免十分之三以示優恤庚子上諭内閣曰上年川省需馬之時地方官雇用民馬已經官給雇價凱旋之後又經陸續發還但其中尚有倒斃者同一應差而無馬領回未免偏枯著加恩除雇價外每匹賞給銀三兩以示體恤小民急公之意十月戊戌上諭内閣曰此次金川之役雜谷土司蒼旺等兄弟三人同心効力甚屬可嘉著加授蒼旺為雜谷閙宣慰司勒兒悟為梭磨安撫司娘爾吉為竹克基長官司各給印信以昭朕懷逺酬庸之意乾隆十五年四月丙申上諭内閣曰總督䇿楞奏報軍糈案内核減南路運糧烏拉應賠銀三萬餘兩並將辦理不善之撫藩及總理臺員等開列名單著落分股追賠朕思從前南路各站供應糧石烏拉已用價採買而脚價之外又添給草乾較之雇運為數轉致浮多自應照例核減但念彼時實因明正土司等處烏拉短少雇覔維艱曾經奏明採買辦運尚非有可雇覔而故為靡費者比況倒斃烏拉本屬該員等經理無方原價自難虧項至於長途徃來輸輓草乾在所必需若照雇運之例一并核減該員等賠補未免竭蹷著將議賠草乾等項銀一萬二千餘兩俱從寛免其賠補十月壬申上諭内閣曰豫省供應赴川及凱旋官兵動支各項銀兩屢經該部指駁自屬照例辦理但念此案關係軍務該撫惟恐供頓貽誤一時尅期措辦遂於定例有逾並非有心冒濫著加恩准其報銷十二月辛巳上諭内閣曰知州謝應龍著賞給伊父封典謝應龍原屬微員前在沃日寨守禦有功故特格外推恩以示鼓勵至卡撒糧務應付紛繁非他處可比伊辦理頗著勞績所有應追核減銀兩若按數追償未免拮据其未完者俱著加恩豁免平定金川方畧卷二十六
