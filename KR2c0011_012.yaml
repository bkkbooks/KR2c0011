body:
  text: 八月丁未上諭内閣曰班第現署四川巡撫軍營糧務𦂳要著侍郎兆惠作速馳驛前往辦理班第所帶欽差大臣關防即著交與兆惠是日上又諭内閣曰朕閱部覆紀山自請議處本内有冒昧陳請進兵之語殊爲失議紀山之革職治罪原因其浮議運價回䕶前非所委屬員又多貽誤軍糧派累侵冒失於覺察自應嚴加處分非爲其首請用兵之故也我朝自定鼎以來綜理政務乾綱獨攬從未有用兵大事臣下得以專主者即如在昔三藩潛蓄逆謀其迹已露舉朝皆以爲尾大難制若一下詔撤回必貽後慮我聖祖仁皇帝不爲衆論所惑决於宸斷其後抗拒朝命遂聲罪致討剪除三孽海宇敉寧咸仰藉廟謨禀承勝算諸臣皆不能叅與近金酋煽動乃邊外小醜不特非三藩大憝可比並不得與凖噶爾相較但恃險負固荼毒羣番不可不加懲創雖緣紀山奏報而用兵則主之自朕若謂此舉非是亦朕之過耳於紀山何與此等軍國重務斷無委咎臣下之理且國家安能保永無兵革之事督撫重臣封疆之内凡有闗係正欲其力能肩任若不知大義誤以紀山爲請用兵而得罪因以爲戒則將畏首畏尾習爲因循了事貽誤不小矣紀山業經革職此次不過注冊本無足重輕但該部措詞非是不可不明示朕意俾共知之是日訥親張廣泗㑹奏言調撤甲索兵二千餘名并續調補額川兵二千名俱已齊集卡撒軍營臣等隨酌定攻取左山梁機宜令叅將楊朝棟領兵攻擊普瞻左膀雙碉并水卡副將高雄領兵攻擊左膀䨇樹石卡並令攻巴朗尾碉副將劉順領兵攻擊普瞻单碉并木卡都司逹世朗領兵攻擊普瞻䨇碉並䨇碉以下舊碉石卡并令木坪土兵壓梁助攻復委新任建昌鎮總兵莽阿納爲左梁總統適原任總兵董芳亦於本月初七日抵營隨委令領兵前往接應又令内大臣班第䕶軍統領薩音圖均往相機督率臣訥親率同内大臣傅爾丹親往監督臣張廣泗亦即繼至於初九日辰刻進發是日將士奮勇戮力遂將普瞻左膀新碉水卡並䨇樹石卡立時攻克復由樹林抄至尾碉俱經攻破奪踞殺死賊番數十割獲首級耳記生擒九名惟单碉䨇碉二處最爲險固難以力撲隨飭用大砲攻擊已將碉墻擊倒殘破時巳日暮因令布置環圍而副將劉順率領官兵争先用命施放火毬焚燒单碉賊人不能拒守棄碉奔竄官兵奪踞单碉其䨇碉内賊衆及碉下石卡之賊亦皆潛遁䨇碉单碉及舊碉石卡俱爲我兵所得左梁已經掃清正擬合圍色底並卡撒䨇碉賊已畏懼潛遁隨撥官兵駐守大獲全勝臣等查色底一碉爲刮耳崖之門户是以賊人守禦嚴密計自上年七月進攻至今已歴一年因將左右山梁掃清賊不能守始得攻取今賊巢之險隘既失勢將漸潰現在籌攻巴朗等寨俟克㨗後再爲相機前進各路數日以來均無報到㨗音惟黨壩一路據岳鍾琪呈報擊死賊番刈穫踐踏賊地麥豆圓根又賊屢次侵犯康八逹陜兵營卡遊擊王三元領兵䇿應多有斬殺合并附陳奏入諭曰汝等一奮勇而即奪碉可知坐守一載不早掃清左右山梁皆有受其咎者耳是日訥親奏言欽奉諭㫖以傅爾丹等在營未發一謀侍衛等亦未見出力臣查傅爾丹在營凡一切防範及派遣攻取伊意見所及必與臣及督臣詳悉商酌緣所統之兵僅堪駐守不能前進且因官兵疎懈軍紀不行甚爲憤懣岳鍾琪惟以添兵爲請經臣嚴行申飭仍稱兵不敷用别無籌䇿内大臣班第先經督兵攻擊石城後又攻撲木卡五座現亦屢請增兵烏爾登前在馬奈奪踞賊人四卡調赴卡撒右梁連克水碉三層碉䨇碉等處及攻二道山梁亦係伊布置已經越溝奪卡焚燒賊碉無如官兵遇賊奔回以致得而復失薩音圖前在甲索未乆調至卡撒攻擊䨇碉二道山梁亦與烏爾登同辦今因圍攻左梁將伊同班第調赴辦理以上昔嶺卡撒所得碉卡若非班第烏爾登等籌畫調度則綠旗將弁必不能如此措置若非侍衛拜唐阿等臨陣督戰退縮者擊以刄背敗回者持械攔阻則兵丁亦不能如此用力進攻惟法酬派往黨壩一應攻勦均由岳鍾琪經理其才力原屬不及至馬奈甲索正地雖不能前進仍有官兵駐劄臣派令侍衛拜唐阿及成都滿兵在彼留駐察看奏入諭曰如此而又謂滿兵不可用尚欲用無用之綠旗多糜糧餉是屬何心是日訥親張廣泗又㑹奏言金酋負固官兵調集數萬十路進攻而尚未能直搗賊巢速爲殄滅者非賊有過人之技實緣地境險隘異常有一夫當關萬夫莫開之勢是以彼雖寡而易爲踞守我雖衆而難於攻取葢不特分布需兵即每克一處必須留兵駐守非藉多兵不能有濟然形勢雖如此其難而進攻又不可暫撤者緣金酋始而侵虐鄰封繼則窺犯爐地諸土司皆讐恨於逆酋故見大兵聲討率皆恭順効命若官兵一退則金川復從而迫脅結好各土司見天朝亦不能制設一旦羣起相附則諸番連結勢益滋蔓難圖且瓦寺雜谷明正各土司又皆與内地切近不容置之度外臣張廣泗領軍年餘臣訥親亦經數月殫心謀畫夙夜圖維謂金川必不可不滅而官兵必不可不增惟目前已值仲秋再於鄰省調兵到來即届冬初勢難進發擬就現在兵力乘此大雪未降之時籌畫攻勦冬時雪大則於山腰稍低之區相機攻擊使賊日有傷損並撓其耕牧令不得休息俟至來春賊衆糧食愈竭人數愈少臣等預於今冬請旨加調精兵三萬於明歲四五月間調齊彼時山雪全消督衆分道並進彼亦必湏分應而官兵既多凡遇堅碉能克則取不能克則圍之而前進庶不致阻我師旅可以直抵賊巢不過三五月之期必可成功此實臣等確有所見必不可已之舉至於逆酋佯請投誠臣等亦將來歸之番民賞賚安揷然祇可藉以漸離黨羽未能遽致潰散即逆酋叔姪亦未肯坐而受縛自必待大兵搗其巢穴乃可漸圖因計擒獲也奏入上命協辦大學士事尚書傅恒傳諭訥親曰覽此次大學士公訥親所奏近日軍情雖小有取勝未足以言大㨗看來訥親辦理經略事務其初至之時根源即已錯誤大抵先存意見是以處置多有未當陳奏多未允協朕前以侍衛等未見出力而岳鍾琪傅爾丹班第等不發一謀不設一䇿降㫖詢問傅爾丹等皆係大臣豈不可自行覆奏而必待訥親代爲陳詞朕明知所由大抵從前西北兩路用兵大臣等習氣惟争進摺奏彼此傾軋轉置軍務爲緩圖其時訥親已辦理軍機親見其事以此爲戒故不欲衆人紛紛陳説此亦不無所見但不欲衆人之争是非是也而不使之出力以集思廣益則不可也又如伊前奏滿兵不可任用而此番臨陣督戰使綠旗不敢退縮者滿兵也尚欲用虛糜糧餉柔懦無能之綠旗此又何説朕前降㫖令訥親凡有進止當因時度勢鄭重籌辦又念伊體素弱令隨時調䕶此欲其加意謹慎耳伊未㑹朕意遂坐守數月竟不知前進迄無成功雖各兵懦怯成習然訥親若能於甫涖軍營之日申明軍紀使之壁壘一新時則將士方憚其聲威新調之兵氣方果鋭乘此驅率雄師直搗巢穴或可早奏膚功顧惟事稽遲終無良䇿但委之師徒怯弱山谷巖峻否則以兵少力单爲辭不知坐籌愈乆兵氣愈加柔靡古名將不擇兵而用顧方略何如耳即如此次攻克左梁猶是頺惰之兵一經訥親親臨督陣何以較前獨加奮勇葢緣奉朕嚴㫖後統兵大臣始加淬厲振作遂已小著功績若早能如此何患大功不成乎現在諸將未能攻克而争以添兵爲請訥親亦持此議據云奪取戰碉即應分兵踞守夫奪無用之碉而分有用之卒甚無謂也既得碉樓即應亟毁一以開通路徑一以永除賊窟一以减省守兵何計不出此而得一碉守一碉據奏碉如林立則千萬之兵亦不足供守碉之用既退復爲賊有是爲賊守碉矣現今兵已四萬又請於來歲添兵三萬意在撤其疲弱易以精鋭猶屬可行若另欲添兵三萬豈有么魔小醜逞其螳臂而用兵至六七萬人之理即云其地甚險隘口甚多攻勦之處不一則從前用十路進兵今止三四路矣如鋭意攻取即一路直前已抵賊窟逆酋授首則羣醜䘮膽逃竄即訥親亦奏稱攻克一碉而其他守碉之賊皆棄碉潛遁則知賊衆亦甚怯懦非實在㐫悍可知由此觀之即歸併一路亦無不可如謂賊人一夫守險千夫莫當則添至數萬而統帥不能指示方畧以鼓勵戎行雖多何益今據訥親等奏報左膀山梁已全行攻克則進勦漸有制勝之機儻及此窮幽鑿險所向克㨗正可望其一舉成功朕前欲於九月内降㫖令訥親等還朝面議進止但目前大勢如可連勝而令伊等來京恐止留岳鍾琪一人控制斷不能攝服軍情且機勢在呼吸之間設功欲垂成一時中止又非勝算若冬月勢必不能竣事自應令訥親偕傅爾丹張廣泗一同來京撤罷軟之兵卒擇精鋭一二萬人暫令岳鍾琪管領俟明歲調集大兵再爲必克之舉著訥親度量於九月二十五日前後摺奏至京爲約將此次摺奏之後攻取戰碉若干或止仍舊或今冬萬不能成功逐一據實陳明速奏候朕再降諭㫖臣等謹按兵無强弱顧主將用之何如耳訥親奉命經略初至之時其威聲實足以慴服三軍惜乎才不足以御衆而復日事茍安迄無成效若徒委咎於力少兵单則何以一日親臨督陣即能摧堅破敵如此至於得一碉守一碉尤爲非計聖諭所謂爲賊守碉即數萬衆亦不足用誠爲洞矚萬里字字切中事情訥親果能恍然覺悟如夢始醒奮其勇敢之氣爲士卒先安知失之東隅者不可收之桑榆耶乃一聞回京之命遂懷退阻之心委靡不振措置乖方較前益甚雖以聖主之提撕教誨反覆周詳亦有末如之何者矣庚戌上諭内閣曰原任總兵任舉奮勇行間死於王事朕已加恩優䘏贈銜祠祀廕襲其子今聞其弟任鳳現任廣東督標守備著該部行文調取來京引見臣等謹按任舉奉命抵營之後於五月内進攻昔嶺中峰得腰卡五處木石城二座大小戰碉七座平碉一百餘間生擒賊五名被殺者不計其數洵屬才力出衆之員惜當訥親初至茫無方略但知刻期督戰罔識進退機宜以致任舉計無所出惟有奮不顧身以一死報國誠爲可惜我皇上既加優䘏廕襲其子并念及其弟特召來京此推恩之極則而亦愛惜人才惟恐有遺之至意也辛亥張允隨奏言欽奉諭㫖調取總兵哈尚徳等前往金川軍營臣查哈尚徳調任古州甫於本月初六日自雲南省城起程赴任當即差弁持檄星往前途遞給叅將高欽因辦理秤戞軍務完竣來省臣立飭該將與臣標遊擊范崇純星即兼程進發並飛差分往鶴麗開化二鎮檄飭魯文徳朱璣刻速起程兹據各該員具報已於閠七月初八十六等日先後陸續起程訖奏入報聞九月壬子上命軍機大臣等傳諭訥親曰朕前曾兩次諭令大學士訥親同傅爾丹張廣泗來京經略事務交岳鍾琪暫管尚未據訥親覆奏朕意冬月乃撤兵之時岳鍾琪不過令其控制防範以備策應但軍務重大欲其勝任無誤恐才力幹略尚有不及如伊一人不能肩兹重任將來究應交何人管理或目下可以乗勝克㨗不必速於來京或尚湏撤兵再舉訥親等三人可以同來著訥親妥酌具奏至前次奏報已得左梁此後乗勝進取及右梁曾否攻克并近來情形如何俱著傳諭訥親速行奏聞再朕覽金川全圖由川省南路至瀘定橋此處有河可逹番境若從此繞至賊巢之後似亦進攻之一徑但是否可以舟行及賊番有無守險難進之處并傳諭訥親查明便摺附奏己未上命協辦大學士傅恒傳諭盛京船厰黑龍江將軍曰金川至今未滅朕意欲派京師滿兵二千名東省兵三千名前往東三省至京遼逺若非預爲備辦恐致臨事周章可傳諭東三省將軍各於該管兵丁内擇其人才壯健者預派一千名候㫖其帶領兵丁之大員盛京著派副都統哲庫納黑龍江著派呼倫貝爾副都統榜圖船厰著交與永興酌量胡蘭城守尉白囉那曾否領兵可用則用否則另選曾經領兵之員至京師時朕另派人帶往一切應行備辦之事即行備辦是日訥親張廣泗㑹奏言卡撒左山梁普瞻之西有阿利一山建立賊碉數座并頭道右山梁西面之喇底山有賊碉數十座必湏克㨗此二處方可圍困巴朗木須等寨臣等派遣副將劉順帶領甘凉肅漢土官兵一千一百名由上路搶攻阿利山大梁碉卡并截殺山梁賊援又派叅將楊朝棟帶領雲南等處漢土官兵八百名由中路搶攻阿利山中梁碉卡又派副將高雄帶領西寧等處官兵一千名由下路搶攻阿利山下梁碉卡并截殺溝内賊援并委總兵莽阿納同原任總兵董芳另派官兵八百名相機接應又派内大臣班第與䕶軍統領薩音圖前往督率臣訥親暨内大臣傅爾丹臣張廣泗均親往督視於八月十二日五更時分官兵冒雨齊進副將劉順之兵奮勇奪踞阿利山大梁并木卡一座即便劄營叅將楊朝棟之兵奪獲右碉一座據賊要隘殺斃賊番十數名斬首三級副將高雄之兵已撲近山梁下賊碉因地徑陡險賊人防禦甚嚴連攻數次未克時因薄暮暫令駐守臣等將官兵駐劄之地相度指定以免疎虞然後回至卡撤軍營詎料高雄並不遵照臣等指示妥慎劄營一更時分賊人暗由箐内穿出從上壓下西寧官兵一千餘名莫能抵禦仍俱奔回普瞻山梁臣等聞報隨於十三日復親至彼處督催總兵莽阿納董芳等領兵進攻阿利山先據要地劄住營壘用大砲擊碉將次坍塌隨遣官兵奮勇直撲殺死賊番十數名攻克阿利山梁下賊碉三座已派官兵踞守并踐踏其田禾尚有阿利山賊碉三座并山脚下小碉一座必須攻取正在布置間適值天雨迄今數日雨雪晝夜連綿以致不能攻撲凡我兵撲碉必須先用鎗砲絶其外援及撲至碉下多用火攻方可奏效一遇隂雨則火繩盡濕一切火具難施而賊在碉内仍可施放鎗砲我兵徒致損傷且其地勢陡峻土性膠粘加以雨雪則凍滑難行是以不能進攻一俟晴明即當攻取此碉并籌攻喇底巴朗再圖前進至於各路官兵惟據岳鍾琪呈報黨壩一路進攻火燒梁踐平土木卡二處殺賊十數人我兵直抵大石卡壕外又殺賊番頗多查馬奈一路在金川河西有卡卡脚一處乃賊之要隘守禦甚嚴臣等訪聞該處有河東一路賊人不甚防範易於襲取隨令參將永柱暗遣竒兵令外委馬如麟帶領進攻連將河東申札申逹包登一帶地方全行攻克奪獲碉寨六十餘處并喇嘛寺二座生擒男婦四十餘人殺死者甚衆踐踏田禾地土約長六十餘里寛三十餘里并獲鎗刀器械等物實爲全勝惟是馬奈官兵不滿三千之數未免单弱因令正地一路漢土官兵一千九百餘名檄委遊擊楊之義等撤赴馬奈歸并協力進攻又令遊擊張廷蔚帶兵數百名前往納貝山與前駐納貝之遊擊潘文郁等率兵七百餘名相機協力進攻奪取江卡得利等山梁賊碉使賊疲於分應庶可與馬奈所遣官兵聲勢聨絡俟有㨗音再當馳報奏入報聞隨命軍機大臣等傳諭訥親曰馬如麟以外委微員乃能率衆先登摧鋒䧟陣數日之間將三處賊境悉行克獲甚屬可嘉應即㧞擢以勸戎行可傳諭訥親等宣㫖將馬如麟授爲千總並令衆兵共知以示鼔勵是日訥親又奏言軍務情形近來雖隂雨連日兼有大雪但未經寒凍天晴即可進勦如遲至十月間未能告竣計自冬徂春半年之間冰雪滿山在營亦不能日事攻戰其時臣回京得以面陳兵略庶使萬里情形仰邀九重洞鑒至諭㫖令岳鍾琪領兵萬人駐劄美諾隨機進勦予以二三年之期伊能保擒滅與否事或可行是亦一䇿臣查卡撒昔嶺黨壩三處係進兵要隘不可退撤美諾距卡撒百有餘里原無退駐美諾之理况今月餘以來我兵陸續已進賊境旦夕正圖進取若就臣等指示方略果能應手九十月間實可望直抵刮耳崖即不然而賊巢門户正須進攻得有進歩必應踞守决非留兵萬餘足敷守禦之用又諭㫖以今歲斷不能成功或應添兵再舉或緩期待釁此時或另有長䇿令臣等畫一定議速奏臣查現在軍情實因兵单力弱既不能分路並攻又不能長驅直入不過爲得寸則寸得尺則尺之計是以今歲成功未敢懸斷若來歲添兵再舉自不難迅掃妖氛無事緩期待釁惟有乘時督戰并力撲攻使我兵有日進之機則賊酋亦必有日蹙之勢又諭㫖以傅爾丹等未見督戰出力之處或因任舉之變訥親不令伊等對敵臣查傅爾丹年老不能歩行班第等率領侍衛分隊進攻督戰之處臣前未經詳悉具奏嗣後應於奏報情形单内陸續奏明但伊等督戰原不與兵丁同隊前往緣兵丁習於怯懦望風而靡即如本月十二日進攻阿利山我兵遇賊奔潰雖有將領均不相顧班第等國家大臣若親行入隊或遇師徒逐北隻身殿後徒取挫辱尤傷體統此臣所以不令前進也奏入上命軍機大臣等傳諭曰據奏近日軍情既不能分路進攻又不能長驅直入不過爲得寸則寸得尺則尺之計皆由於兵单力弱朕思金川之役用衆至四萬餘人不爲少矣何以屢次陳奏皆以兵少爲辭豈有如此彈丸之地四萬衆尚不敷調遣則將增至幾何而後可耶如其羸弱不堪即當詳加簡汰用其精壯更調他兵以資進勦何又姑容罷憊糜餉老師竟不從長籌畫耶其傅爾丹班第等非不可奏事者前已降㫖令其自行奏聞若事事皆須訥親代爲陳奏則將置伊等於何地耶至彼中天時地利夏秋既多霪雨動輙坐守而冬春之際又復冰雪載塗不能日事攻戰雨中不可火攻雪後宜無不可或乘雪後開霽之日就現在兵力奮勇前進亦當詳爲籌酌據實奏聞又聞我兵一遇賊徒即各奔潰將領均所不顧已習爲固然全無紀律而張廣泗所奏又有兵丁家屬紏衆喧閙之事兵丁等身在軍營一聞此信必加惶惑勢難望其歴險攻堅朕詳悉熟籌川兵必不可任不若竟派滿兵前往乘其朝鋭一舉犁巢尚可冀其速㨗已降㫖令東三省將軍揀派滿兵三千名令各副都統率領來京聽候京師八旗揀派滿兵二千名俱於來春陸續進發雖似乎險逺勞費然較之綠旗羸卒委靡不前者必相懸絶一併傳諭訥親知之臣等謹按行軍之道兵多費廣人皆知之然熟籌於緩急難易之間有惜費而費轉增似費而費實省者即如綠旗兵丁現有四萬又從東三省及京師選派滿兵䟦渉數千里以往豈非勞費不知動而成功則一勞永逸因循茍且則勞費不已聖主籌畫於深宫之中深悉帥臣無逺大之識惟思茍延時日僥倖奏功終必無濟是以决䇿不疑厥後雖功成不戰王旅多在征途而簡練精鋭裁汰疲老其間兵力之强弱勇怯之殊形成功之遲速費用之多寡較然可知此以事後衡之而益信廟算之無遺者也是日班第奏言臣於八月十三日前抵卡撒軍營沿途查勘糧運事宜尚能源源輸輓前因班攔雪山積米最多特委忠州知州劉乃大前往管理該州調并各夫越站分運兹已盡數疏通其修建倉厫夫棚平治山梁谿徑俱能經理有條實屬强幹之員至卡撒軍營併調官兵需糧浩繁緣閠七月中連旬隂雨運到稍遲現飭松茂道唐進賢親往督率臺員速爲䟎運而附近之崇徳美諾占固牛厰等處存貯米石二萬有餘足資豫備再查西南兩路各糧員中如署川東道齊格撫馭番夷多催烏拉親身查勘道路程站不避險阻頗著勤勞茂州知州陳克繩經理夫役額外加運調劑得宜近又於松潘採買羊隻搭配軍食可稱竭力辦公灌縣知縣王聲鑾供運從無阻滯又自雇長夫徑運美諾卡撒等營亦能踴躍急公暨忠州知州劉乃大之實心任事俱屬可嘉當即移㑹酌與記功以示鼓勵今臣奉命赴省沿途應行查催之事即行查催奏入諭曰運糧事宜仍與兆惠同辦辛酉上諭内閣曰張廣泗乆駐苗疆熟於軍律因金川用兵特調爲川陜總督令其提師進勦伊初亦勇往任事奏稱兩月之期即可殄滅其時衆已三萬而踰期未能奏績因循觀望遂致副將張興失事屢挫軍鋒乃奏稱兵力单少請增兵冞入誓俾纎芥不留朕允所請調遣萬人以振軍威所望迅掃賊氛寧謐邊徼但地方形勢未能遥度今春特命大學士訥親前往經略計其時大兵雲集奏凱當已有期訥親抵軍即可籌辦善後事理此朕命往本意也乃張廣泗既乆未成功復因訥親至彼諸事推委而訥親在軍數月近因朕㫖督飭雖小有克㨗總未能逺抒勝算是以遲延至今功尚未竣其前後奏到情形非面陳不能洞悉訥親張廣泗俱著來京面議機宜川陜總督印務著傅爾丹暫行䕶理所有進討事宜㑹同岳鍾琪相機調度以副委任訥親既已回京其經略印務即行帶回是日上命軍機大臣等傳諭傅爾丹曰朕近降㫖召還訥親張廣泗川陜總督印務著傅爾丹䕶理伊乆駐軍前進取機宜皆所熟悉地方事務張廣泗向在軍營查辦自有成規原可循照料理其軍中之事今冬雖有雨雪或開霽之時可以前進即當相機籌酌鼓勵將士奮勇直前以期克㨗不得徒爲坐守之計如有應行奏聞者即隨時據實奏聞至陜西地方事務朕前已有㫖令黄廷桂兼理四川事務有班第在彼查辦均可不必分心顧慮惟應專一留意軍務與岳鍾琪和衷共濟副朕委任金川之役辦理日乆未克迅奏膚功總因綠旗兵丁羸弱成習所致朕意欲添調滿兵始有攻取實效并諭傅爾丹令以已意妥酌具奏是日上又命軍機大臣等傳諭班第曰訥親乆駐軍前朕已降㫖令同張廣泗來京傅爾丹暫行䕶理川陜總督印務軍務闗係𦂳要傅爾丹祇能辦理營中事宜其川省官職錢穀刑名諸事皆該署撫專責且傅爾丹自不能如張廣泗之乆經外任熟練地方事務該署撫益當格外留心可傳諭尚書班第務當綏輯兵民整飭吏治寧固邊防以副委寄甲子上命軍機大臣等傳諭班第曰訥親張廣泗調取來京已令傅爾丹䕶理總督印務軍中一切機宜督提二臣自應商同辦理但傅爾丹岳鍾琪皆係棄瑕起用之人今肩此重任恐其各存意見於軍務甚有闗係且總督任内政務本繁傅爾丹一人或有不能兼顧之處尚書班第原係命往軍前辦事之人於川省情形已熟可傳諭令其即赴軍營同辦軍務并留意調劑令軍營大臣等協力同心和衷任事凡已有所見於軍機有益者竭力贊襄不可稍分彼此其巡撫事務亦即帶至軍前辦理惟查審案件聽其酌委司道代理糧運事宜亦可就近與兆惠一同調度内大臣班第等及侍衛人員已降㫖悉聽傅爾丹節制調遣可再行傳諭伊等俾知師克在和衆心齊一則大功易就如班第等小有參差即深負朕特派滿洲大臣前往本意所當共體朕懷相度機宜乘時奮勇如能搗巢獲醜即可協同籌辦善後事宜周詳妥協以圖乆逺寧謐一併傳諭知之平定金川方略卷十二
