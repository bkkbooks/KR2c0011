body:
  text: 十二月辛卯上諭內閣曰經略大學士奏稱布政使髙越抵任甫經八日其貽誤供應馬匹之處情稍可原罪猶可逭前經經略大學士因川省貽誤軍行馬匹具摺參奏朕以髙越係地方大員武宏緒専司驛傳有誤軍機情罪重大是以降㫖將伊等革職枷號示衆今據經略大學士所奏則高越情有可原著賞給道員職銜留於川省委用布政司印務仍令紀山署理至武宏緒身為驛道罪無可逭仍照前㫖行朕用人行政一秉至公即如髙越貽誤軍行則重治其罪今既知其情有可原即寬其罪譴豫以自新輕重權衡絲毫不爽經略大學士居心公正辦事精詳是以參劾於前請寬於後與朕意吻合君臣之間辦理政務果俱能如此則事未有不當而功亦未有不成者朕於滿漢大臣原無岐視但其中有知恩者亦有負恩者如訥親之辜恩負國舛謬乖張朕既置之憲典而忠勇奮發如經略大學士者朕豈可不加之優奬以勵臣工以重國事乎經略大學士傅恆前已有㫖優敘其隨往之達爾黨阿達青阿安冲阿亦甚奮勉著交部一併議敘將此傳諭中外諸臣俾知效法臣等謹按天道無私故風霆雨露無非教也曷嘗以有心預乎其間擇一人而福之擇一人而禍之哉亦就其人之所為而各豫以應得耳我皇上體天之心以為心是以慶賞刑威無一不出於大公無私之則固不止髙越之一時一事而就此一時一事觀之聖諭所頒於因物付物之理深切著明如此所以勉進羣工者至矣是日嶽鍾琪奏言續調雜谷土兵二千名攻𠞰黨壩陸續到營者已有五百餘名臣查塔髙山梁界在康八達木耳金岡兩山之中乃各處總滙之路若此梁一克可斷賊番應援之路並可攻取康八達要隘但塔髙山梁賊番修有木城石城土卡三座周圍險峻防禦亦嚴賊兵甚衆非用竒難以制勝臣於十一月十八日乘天氣尚晴仰遵破堅碉而殺賊衆之聖訓派遣新舊官兵一千二百名明攻木耳金岡誘賊蟻聚救援以便乘機攻奪塔高山梁等處新兵鼓勇與在事官兵奮往直前奪獲土卡平房三處水卡一處斃賊一百餘名所獲刀矛器械甚多臣與法酬董芳鍾秋胡西等親臨督陳見守備馬化鰲千總馬漢臣等俱奮不顧身各帶鎗石等傷賊勢大挫塔髙之賊漸移至木耳金岡為自守之計正可乘虛攻取塔髙不意十八日黃昏時降雪約深二寸至二十日尚未晴霽容俟天氣一晴即便督兵進取奏入諭曰汝調度有方實可嘉悅總俟克成大勳從優議敘壬辰軍機大臣等奏言張廣泗受恩深重歷任封疆皇上因其尚諳軍旅特命以進𠞰金川事宜自應竭力籌辦乃張廣泗自抵軍營以來毫無成算始則分兵十路調度失宜繼又措置乖方以致屬辨張興失機陷沒他如遺棄軍裝炮位失火轟碉焚斃官兵率皆委過於下惟以尅日成功屢行妄奏遷延嵗月糜費不資及聞訥親前往即諸事推委漠不關心且信用賊酋姻黨袒庇黔省劣員身為總統布散流言煽惑衆聽其乖張欺罔目無法紀罪狀非一臣等按律擬議張廣泗失誤軍機漏泄軍情煽惑人心守備不設為賊所掩襲因而失陷城寨毁棄軍器罪皆應斬加以種種負恩有心誤國實刑章所莫逭為覆載所不容應將張廣泗擬斬立决以正典刑以昭大戒得㫖張廣泗著即處斬著得保勒爾森前往監視行刑癸巳廣西巡撫舒輅奏言接准部咨令廣西撥銀五十萬兩解赴川省臣謹分作兩運起解每運起解二十五萬兩第一運委桂林府通判文德試用州判張梓領解於十一月十六日起程第二運委借補荔浦縣知縣王煒臨桂縣典史梁恆謙領解於十一月二十日起程奏入上諭該部知之甲午經略大學士傅恆奏言臣於二十八日卯刻接到傅爾丹班第報匣內摺奏一件係黨壩頭人乞降賊酋形勢窮蹙及郎卡病重差員往驗臣細閲此摺辦理殊未妥協既云乞降而逆酋並未親自到營即郎卡果係病重莎羅奔何以亦不親行且差員往驗既到彼處郎卡如何情景出何語言亦應一一陳奏何以並未述及賊人乞降逆酋未至但據頭人虛詞即差員往驗似屬非體况緑旗兵丁現屬懦怯楊自功等又係微員倘入賊境微露畏葸之形豈不損軍威而傷國體即欲借此知其山川要隘內潰情形亦應令素有膽智之大員前往自非千把微員所能勝任且焉知非逆酋自揣勢窮姑為乞憐之狀僞作郎卡使我兵識認以為將來免脫之地或聞訥親等前往黨壩傅爾丹等又至美諾㑹商將從黨壩直入故令我軍識其道路將來從此取徑可以預為設伏施其詭計種種賊情俱未可測而嶽鍾琪等並未籌及臣至軍營自當將此情節一一告知傅爾丹等以防賊之譎詐聞軍中緑旗將士知臣來川日切盻望而傅爾丹等聞臣將至轉生疑懼之心臣至軍營當詳悉開導使之釋然一無繫慮自可専心辦理軍務至傅爾丹年已六十六嵗精力就衰惟熟於管理滿兵將來應令専辦營盤一切事宜其餘不使分心惟用兵一事亦與隨時商酌臣至黨壩欲語嶽鍾琪云爾受皇上深恩棄瑕録用當一矢丹誠竭力報效不可稍存瞻顧我奉命經略調兵如此之多即仰仗天威勝算翦此么魔亦我本分之事何功之有若爾現在攻取漸有進步即爾之功倘更能鼓勇前進掃穴犁庭則其功益大若爾不盡力我克成功不能掩爾之過若爾能盡力懋建功勳我為經略衆人之功即我之功豈有絲毫區别畛域之見惟在同心協力相與有成可以毫無觀望如此諄切告語並將此宣布軍中將士使傅爾丹嶽鍾琪等疑懼之心盡釋則胸中既無罣礙臨事自不至茫無主持伊等皆老成夙將起於廢棄之餘自切報稱之念臣為開釋其疑與之和衷共濟庶幾功可速成而臣亦得收臂指之效於軍務自有禆益是日經略大學士傅恆又奏言緑營兵丁實少精鋭與其徒多糜費不適於用不如僅取敷用其餘概停調遣臣至西安已告知該督撫等令將各兵實在起程及未經起程實數查覆其未經起程者不必起程今奉諭㫖并閲新柱原摺楚兵情形已可概見臣至軍營與傅爾丹等酌定當即行文全數停止原議調兵三萬五千計前停止陜省督撫標兵一千今又停止楚兵八千尚存二萬六千名現在川省供應甚屬拮据今停調幾及萬人所省實多亦可稍紓物力臣至軍營詳審機宜再與傅爾丹等㑹商如尚可酌減即於陜省雲貴兵內議裁倘勢在必需亦不可再議裁減總俟臣到卡撒酌定奏聞至原派將辨奉㫖仍令前赴軍營以備驅䇿當此需人之際自應遵照辦理臣前在西安停調督撫標兵其原派領兵之副將伸布等仍令前赴軍營亦為需人起見嗣後若有停止調兵之處俱應遵㫖將所派將辨仍令速到軍前隨時委用庶收得人之益以濟軍務奏入上命軍機大臣等傳諭曰經略大學士傅恆所奏料敵情形之處籌審精詳思慮周到實乃超出等倫經略大學士隨朕辦事數年平日深知其明敏練達初不意竟能至此即朕自為籌畫亦恐尚有未周朕心深為嘉悅至所奏各路官兵前據經略大學士奏稱湖北兵四千名已行文停調而現據新柱摺奏楚兵分為五起前三起共兵三千三百五十名俱已起程其湖南兵四千及湖北襄陽等鎮兵一千六百名現候文到起程而經略大學士又稱俟至軍營㑹商停調恐到營後行文此等官兵已經抵川勢難再行遣回留營調遣未為不可或於滇黔路逺營分未經起程兵丁內酌量照數減調其楚省候文起程之兵應調應止速行知㑹方不至於兩岐仍將如何辦理之處明晰速奏川省自軍興以來民力未免疲憊運夫一事楚省已經抵川之兵其由水路至者尚須於重慶雇夫陸路之兵或可即用來夫長運至營其雲貴兵丁如尚須調遣亦應用長夫運送庶可稍紓川省民力至運糧甚關緊要班第應駐成都接應其往來照料則係兆惠専責務期妥協毋致稍有貽誤經略大學士所奏都司沈瑞龍若果托病擅回本營自應從嚴辦理以懲縱弛積習臣等謹按川省連嵗用兵未免有資民力我皇上征討不庭兵由不得已而出乃九重之上一惟軫念兵民時殷懷保是以於陕兵應領馬乾草折則令尹繼善酌量作正報銷而於各省官兵則令改用長夫以紓蜀民之力蓋所以體恤保護之意深矣是日上諭內閣曰從前訥親等將總兵哈攀龍參處甚為屈抑朕聞伊在軍營尚為黽勉出力著將部議降二級之案准其開復是日刑部侍郎兆惠奏言現在添調官兵軍糧亟應籌畫查卡撒營中之左右山梁色爾力等路米石積貯無多僅足供一兩月之糧而滿兵前來迅速尤不可不急為經理幸附近之崇德牛厰存糧八千餘石美諾存糧二萬有餘為空卡雪山阻隔不能速運臣等現在紏集番漢民夫盡數搬取臣兆惠親赴美諾沃日督率臺員捲站疏通班攔龍肋積米一萬有餘急令站夫歸併趲行期無貽誤但兵數既多加以跟役餘丁人數尤衆目今竭力趕運止可供經過大兵支食及卡撒一路新舊兵丁明嵗四月以前之用是以臣等已㑹商分派各州縣碾米三四萬石令就本境募夫長運卡撒限於三月內到齊黨壩甲索兩營現貯之糧均足供現兵至明年四月以前該二路俱議設重兵則黨壩舊運之數既屬不敷而甲索向係用蠻人烏拉多寡尤難預定查松潘一路向係雇用烏拉直運黨壩費亦較省該處儘可採辦青稞炒麵已飛飭該同知等儘力速為採買前運黨壩軍營其甲索一路不足之處或由黨壩渡河濟運或交大商分往包運俟王鏜范清注到營臣等相其緩急難易再為酌定現今各路大兵尚無分派確數某營實須若干某路應運若干均難預定應俟各路大兵分派確數既定另為從長籌議總期兵食無虧民力不致甚苦庶為妥協奏入報聞是日兆惠又奏言臣於十一月初七初九等日親赴卡撒左右山梁色爾力等處周觀營壘及賊人碉卡我兵情形接見領兵提鎮將辨詢以防守攻戰機宜覘其人才識見又復詳加體訪滿洲大臣中惟護軍統領法酬逺駐黨壩未能深悉護軍統領烏爾登為人明白臨陳亦肯向前初在馬奈後調卡撒於指攻之處有利則進無利則退頗能鼓勵將士護軍統領薩音圖前駐甲索無功後赴卡撒亦無見長之處且身為統領而以得離甲索為可幸臨陳不能奮力而又刻於待下似難望其身先士卒而緑營之表率現在提鎮中如原任提督假起賢漢仗雖好到營後從未建功且舊疾復作扶掖須人留營似屬無益總兵哈尚德人尚聰明但未經攻戰不能悉其勇怯總兵冶大雄莽阿納俱係循分供職之員未見格外奮勇惟總兵哈攀龍前攻渴足嶺頗稱勇往繼攻昔嶺雖未能破亦能身冒鎗石巡防謹嚴不辭勞瘁在諸鎮中尚為可用之將其副將以下各員據臣所見頗有人材平庸龍鍾衰病者擬俟經略抵營告知聽經略自行裁汰臣又訪聞各省派兵時將備等多有家丁冒充名糧及多占額兵役使者雖係緑旗相沿積弊然當此用兵之際豈容冒濫虛糜亦擬告知經略聽其酌辦奏入諭曰俱屬公論告之經略大學士以備採擇乙未經略大學士傅恆奏言臣查川省馬匹甚少供應官兵難免貽誤臣與布政使髙越商酌將各州縣未到馬匹極力催趲并令每站設立夫役將上站馬匹接收加意喂養仍送回原站以備下次兵丁乘騎但此事關係緊要州縣驛丞等員恐不足恃臣見副都統卓鼐尚屬曉事且滿洲辦理此等事件實勝漢人已諄囑卓鼐専心協同辦理臣於途次見西安兵丁騎䭾馬騾甚多伊等過成都而西其勢不能多帶必仍留省城喂養莫若購買此項馬匹添補驛站既於軍行有濟而於西安兵丁亦屬有益臣已交卓鼐將現存馬價銀八千兩并酌於藩庫動項購買現今備辦馬匹既屬艱難而四川地方道路窄狹若遵照原奏每隊五百名一處行走住宿不惟不得如許房屋即帳房席棚亦難一時搭蓋臣酌量以五百名分為兩隊每隊二百五十名同行倘住宿之處二百五十名尚不能容則令稍前稍後分派住宿到營所差不過一二日亦不至於甚遲再查從前派往金川之大臣侍衛官員兵丁等乘騎馬匹背負人夫並無定額而自成都起程之大臣侍衛護軍校拜唐阿等所給銀數亦屬過多此次所派官兵甚衆若照例辦理其勢斷不能給臣等商議俱量為酌減并明白曉諭兵丁以兵多費廣之故並勉以立功受賞兵丁等皆深悉地方官料理拮据之况各無怨言至臣應得各項除鑼鍋帳房之外一無所取以服衆心惟是成都地方五方雜處土著甚多而嘓嚕子向為民患滿兵一千六百名派往軍營者已一千一百名僅餘五百名在省而巡撫又在軍營今值用兵之際內地防範不可不嚴臣令布政使髙越並飭提督巡撫標下參遊等官添設堆撥嚴加防守臣即於明日起程前往軍營已諄囑卓鼐高越等俟大兵到日必照現定章程妥協辦理令速起程奏入諭曰一切事務思慮皆至縱極嘉奬亦不能盡朕意也是日經略大學士傅恆又奏言臣於十二月初一日酉刻接到嶽鍾琪等報匣係報明攻殺塔髙山梁等處軍情查近日嶽鍾琪所奏連有攻克軍勢漸振此次據稱五路進兵焚燒木耳金岡賊碉房屋及斬殺康八達木卡賊番又將塔髙山濠內賊番擊死數十人賊人棄濠奔遁退守土城雖不能即行克取亦漸有斬獲而三等侍衛丹泰奮勇攻擊連殪賊番矢盡尚能力戰捐軀效命誠可惋惜臣至軍營當查明即為料理又據嶽鍾琪奏稱目今一俟土兵到齊即便相機進取看來賊勢漸挫亦不能久於負固但黨壩之士氣稍揚則卡撒之聲勢尤不可少懈必宜乘機奮擊使賊酋兩地兼顧彼此不能並支自必易於克捷臣至卡撒當鼓勵軍營及時攻𠞰倘此處地勢實不便進兵臣即往黨壩查勘形勢若其時可以乘機直搗勒歪即從此統率將士前進并飛速行文令大兵不必復往卡撒即於中途分道直趨黨壩以省往返軍糧亦可即行運往現在莎羅奔與郎卡俱在勒歪俾一舉而二賊俱可就擒是亦一䇿至卡撒一路仍令大張聲勢嚴為防禦俟後起兵到再為分撥夾攻自可速殄羣醜縛取渠魁然此時亦未便懸擬統俟臣到營審度實在情形妥協辦理奏入俞㫖報聞是日上命軍機大臣等傳諭經略大學士傅恆曰適據陳宏謀奏報陕省得雪因思經略大學士傅恆途次經行天氣悉皆和暖而既過之後則地方又得瑞雪足徵忠勤為國之大臣自能感召天和觀此必當仰䝉休祐迅速奏功朕心極為欣慰著傳諭知之是日上諭內閣曰經略大學士傅恆途次承辦諸事懋著勤勞帶往各員如達爾黨阿等前已交部議敘其隨行辦事之順天府丞胡寶瑔吏部郎中德舒俱能黽勉效力著交部一併議敘丙申上諭內閣曰據嶽鍾琪奏稱十一月二十一日焚燒塔髙山梁并木耳金岡之碉樓正在鼓勇殺賊有三等侍衛丹泰奮不顧身直前撲鬭用箭斃賊三名矢盡猶且力戰致被鎗傷陳亡朕聞甚為憫惻官兵奮勇攻賊俱屬平安惟丹泰身殁實為可憫其應如何加恩贈恤之處著該部查例具奏丁酉上命軍機大臣等傳諭經略大學士傅恆曰據瑚寶奏陜提延河二鎮及甘撫標河西各標營兵共一萬二千二百名久已陸續起程於二月十五以前可以齊抵軍營如此則攻𠞰可資矣其興漢鎮兵一千八百名瑚寶既稱應否停止聽經略大學士酌奪想此項官兵應停應調之處經略大學士已經酌定應速奏聞是日上諭內閣曰前據嶽鍾琪奏報三等侍衛丹泰進攻塔髙山梁等處奮勇捐軀朕已降㫖交部定議加恩今思丹泰因力戰身歿甚屬可憫伊長子現在護軍行走著授為藍翎侍衛在打牲處行走所遺護軍之缺即將伊次子補授遇便傳諭經略大學士傅恆曉諭軍營官兵知之是日上又命軍機大臣等傳諭舒赫德尹繼善䇿楞曰據愛必達等奏稱黔兵二千名分為四起起程計明嵗正月內均可齊抵軍營昨據瑚寶所奏陜兵一萬四千餘名亦於明嵗二月十五日以前可到但此皆由各該處起程按日計算其既入川境之後雖經高越奏稱馬匹業已購覔足用而途次是否悉能如期抵營則尚未可豫定倘遲至二月以後始到則緩不及事矣滿兵現已全數啓行本擬二月初五以前俱可抵營今觀努三所領第一起京兵即因馬匹遲誤留住昭化數日則川省辦理情形其艱難已可概見今經略大學士多方經畫並令副都統卓鼐協同辦理尹繼善亦由陜赴川協辦䇿楞已星馳抵任而馬匹又經調撥接濟將來自不致如前拮据惟是滿兵九千一可當百須令迅速赴營及鋒而用早到一日有一日之益况五百人分為二起較前更易措辦自當得進則進不必拘定三日一起之期其由成都抵營郫灌等邑係經由總路羊腸紆折人必單行馬難並駕若各路兵丁不期而㑹恐難免於擁擠自宜豫為經理毋令緑旗各兵壅塞道途轉礙滿兵前進之路著尚書舒赫德總督尹繼善䇿楞等詳悉籌辦總期於事有濟如何得便即權宜辦理伊三人仍彼此互相知㑹惟以善為設法趲行俾得魚貫而前毋過二月初旬之期全數抵營則滿兵得展其趫捷之能奮勇先登膚功可以速奏其各善體朕意勉之是日經略大學士傅恆奏言本月初六日行至汶川縣映秀灣地方接到軍機大臣議覆瑚寶所奏料理官兵起程一摺內稱陜兵未經啓行者令臣詳加酌定如可不用即行文停止倘尚需用則行文該撫等作速嚴催就道迅抵軍營臣伏思此次原派滿漢官兵三萬五千名現已停調陜省督撫標兵一千名又擬停調湖廣兵丁八千名共已停調九千名雖添滿兵一千計止二萬七千名查傅爾丹等奏請添兵為數甚多臣在京定議時只調三萬五千名較之原請之數已為酌減現又停調九千名若再行停調將來攻𠞰堵禦一切派遣不敷復行徵調愈覺曠日持久轉多周折此番務在一舉成功盡殲羣醜早一日奏捷即省一日縻費今既議停楚兵則陜兵似未可遽議停調臣於途次見陕西雲南受傷遣發回營之兵敝衣垢面臨陳數次已不得力正可裁汰以省糜費臣至軍營與傅爾丹等㑹商若新兵不為過多即俱行留用如尚可酌減寧將舊有之兵汰除留用生兵更加精鋭自必所向克捷功可速成臣已行文瑚寶令催官兵即日起程毋得遲緩奏入諭曰催其速至軍營可耳是日髙越奏言現駐軍營官兵夫役每月需米二萬一千餘石今添派滿漢官兵加以運夫人等約計添米二萬餘石通計每月約需米四萬有竒自本年十二月至明年五月半載之間統計需米二十五萬石現在中書范清注認運米七萬五千石郎中王鏜亦派運米七萬五千石核計所派兩商領運并從前運送未竣之米如全數到營可得二十餘萬臣又飛飭松潘打箭爐兩處同知辦運炒麵猶慮兵行迅速軍中日有增兵而於明春二三月間糧米或不及接續且凱旋善後亦須預籌糧米臣接奉署撫臣班第侍郎兆惠劄商又派委各府州料理正運帶運米共十四萬石分頭挽運以期無誤至一切需費計至明年五月約需銀八百七十餘萬兩署司宋厚移交銀六十二萬餘兩又浙江協餉銀二十萬兩俱已支發各項司庫並無存貯現在設法供應官兵出口不致貽誤至口外收發糧餉稽查臺站雖専委道員分司總理猶恐站夫未能處處足數已飭成都府雇夫一千二百名委員押送出口交各臺站添設足敷差遣之用奏入報聞是日髙越以川省正印各員調委辦理軍務者多必須揀發人員差委調遣使正印官得回本任料理地方事務奏請揀發同知以下十員迅速來川以備委用上即命該部㨂選發往庚子上諭內閣曰乾清門三等侍衛德山鄂實差遣處甚多而伊等行走亦甚出力著加恩俱授為二等侍衛是日上命軍機大臣等傳諭經略大學士傅恆曰前據侍郎兆惠奏稱護軍統領薩音圗陳前並不努力待下苛刻又膽怯不敢乘騎朕猶以為未然今詢及鄂實亦云陳前不甚勇往且以絃子解悶薩音圖由侍衛授為護軍統領且朕加恩豫以報效之路令其前往金川理當感戴朕恩奮勇力戰乃並不效力惟安樂是圖深負朕恩可傳諭經略大學士傅恆將薩音圖革去護軍統領令在軍營披甲效力贖罪臣等謹按賞罰者王者馭世之大柄也而於行軍為尢重伏見皇上一日之間處分三事於德山鄂實之稍效微勞則從而升奬之於薩音圖之苟且偷安則從而罷斥之至於臺站各員稽遲文報業經尚書舒赫德嚴參皇上猶念其初經辦理情尚可原祗從察議寬嚴輕重之間銖黍不爽如此所以昭示勸懲陶鑄人材者至矣是日舒赫德參奏驛站遲誤文報各員上命軍機大臣等傳諭曰覽所奏稽查臺務具見精詳但該員等均係初經辦理情尚可原姑免嚴處已降㫖從寬交部察議矣至稽查臺務交司員三寶辦理舒赫德星馳前往照料川陜馬匹俾滿兵得以速抵軍營所辦緩急合宜甚屬妥協此番因經略大學士傅恆忠勤勞勩凡奉差大臣俱能振作奮勉實力任事朕心實為嘉悅可傳諭舒赫德知之是日上又命軍機大臣等傳諭經略大學士傳恆曰十九日計大學士應抵軍營是日早間天氣微隂朕心默念若得瑞雪即可為來春克捷之兆亭午果見密霰繽紛吉事有祥深為嘉悅可傳諭經略大學士傅恆同此歡慶臣等謹按天人感應之理捷於影響我皇上敬天勤民宵旰無斁而於金川之役矜卒徒之勞瘁念民力之輸將無事不本寬仁無時不加體恤是以默祈捷兆不逾晷而瑞雪呈祥聖主之感召天和旋至立效如此是日鄂容安奏言官兵起程於豫省趲緊一程抵川即早一日臣查豫省程途渡河後鐵門迤西直抵潼關皆髙嶺深谷徑路逼仄止可按站前進至河北一帶道途寬坦車馬易行從前淇門驛至孟津縣行走三日馬匹有餘且兩站適中之地已安設腰站不過百五六十里即可更換并為兩日儘可應付如原定淇門驛起身行百四十里至獲嘉縣住宿今可再行五十里住修武縣修武縣起身行百二十里至覃懷驛更換車馬再行六十里至孟縣若時届申刻以前竟可渡河至孟津縣住宿計兩日行程每日仍不過二百里上下而較前已為趲緊臣現在開寫程途交淇門首站各官每起通知按照行走庶使軍行迅速奏入俞㫖報聞是日舒赫德奏言驛站添設筆帖式領催實於軍務有益但現今所派筆帖式每員兼管兩站又加腰站二站即係四站相隔百有餘里臣雖由兵部行文各員令筆帖式領催分駐站首站尾以便來往督察今一路查看筆帖式領催雖經分駐然中間所有正腰各站尚係無人來往馳遞事件仍屬知縣驛丞等經手而伊等又未能自行查辦不過委之書吏驛卒風雨暮夜恐致貽誤仰請敕下該部再派筆帖式領催每一正站駐筆帖式一員腰站住領催一名遇有緊急事件即令伊等親行遞送是添派之人既屬無多而一人不過馳送二三十里其事易辦當於軍務有益奏入上命該部速行平定金川方略卷十九
