  text: 欽定四庫全書平定金川方略卷二
  hash: sha256:c0ffde46bd0054be500dddf888555c56189020a2492df8a7e36e15a215f9e30b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0011_WYG_002-1a, image: WYG0356/WYG0356-0030a.png}
body:
  text: 四月癸亥慶復奏言據爐城文武稟報金川勾連綽斯甲謀攻霍耳章谷汪結帶領土兵往革什咱救援又據明正屬之孔隅頭目甲藏激勸土民驅逐賊番擒獲倉旺等解赴爐城收訊臣前奏明預備臣標兵二千興漢兵一千已徴調赴川以資分布至固原營兵素稱驕悍正宜用之對敵以觀其長臣已檄令預備一千名待用又川西糧運最難撫臣籌辦至今尚無成局臣不時飛催統俟一抵成都即會同撫臣查辦奏入上命軍機大臣等速議議曰賊酋勾結侵擾勢尚未已進勦機宜自應加意籌酌慶復前奏徴調之標鎮各兵業經調赴川省是於前𣲖西南二路兵五千一百有餘外鄰省之兵復調至三千兵數已足所奏固原營兵素習驕悍恐臨敵不能爭先用命况近有聚衆不法之案甫經懲治遽行調遣難免在途滋事可以不必𣲖往又據奏川西糧運艱難至今尚無成局前據紀山摺奏於成都等處速行趲運以濟軍需經臣等議令於附近軍營地方倉糧有較成都更便者先行挪撥應用俟成都運至補還應令慶復會同紀山妥商速辦奏聞可也上從之乙丑紀山奏言金酋據險負嵎臣細察地理情形必須分兵夾攻川西一路由保縣之雜谷閙出松岡黨壩以擊該酋勒歪巢穴此係腹心之地最關緊要應𣲖總兵一員帶官兵二千雜稄土兵三千徑進攻搗又由雜谷閙轉色蘭逹沃日以收撫小金川夷民俾為我用應𣲖副將一員帶官兵二千名土兵二千名以擊該酋之後左川南一路由打箭爐之沙普隆革什咱進兵夾攻應𣲖總兵一員帶官兵二千名裏塘等處土兵二千五百名由蓋古交等寨過江亦直取勒歪巢穴又由章谷之兩河口進兵即至娘盡收撫巴底巴旺夷民以為我用應𣲖副將一員帶官兵二千名土兵二千五百名以擊該酋之前左木坪土司逼近小金川及逆酋各寨又與雅州府屬之天全州蘆山縣甚近實係扼要之區木坪一帶應駐官兵一千名以為西南兩路聲援綽斯甲北達松屬各番該酋現在黨惡誠恐金酋被攻情急向西逃竄亦應𣲖撥官兵二千名堵截隘口以分金綽二酋之勢如此布置既定或俟大兵齊集或俟一有可乘之隙量我兵力相機進勦務使該酋四面受敵首尾難顧易於成擒此預籌進勦之大局也計西南兩路共應𣲖官兵一萬一千名土兵一萬名川省調過標鎮協營官兵共八千名現又續調一千名已到五千有餘但川省幅􅊷遼濶汛廣兵單臣儘數抽撥尚不敷官兵二千名若得陕省官兵相助更為得濟現已札商慶復酌量調撥至該酋侵擾原在川南川西兩路臣既奉命總統應居中調度方於軍務有益雅州府四面環夷為形勝要地尚屬適中且去木坪土司較近堪以駐劄俟川東官兵催調到省臣即將巡撫印信交布政司李如蘭護理移駐雅州酌量前進惟新任提臣武繩謨四月初間可以到省臣撫印既令布政司護理提臣印信似應緩交以便調遣提臣應辦事務暫用中軍參將印信似屬兩便奏入上命軍機大臣等速議議曰用兵首在審度地勢方能動合機宜今紀山細察該地情形應分路夾攻將川西川南分為兩路各𣲖總兵副將大貟帶領漢土官兵或直搗巢穴或分擊前後更駐兵木坪以為兩路聲援於綽斯甲撥兵堵截隘口以分金綽二酋之勢其於地理形勢與夫分合聨絡之處似為合宜至所奏或俟大兵齊集或俟有隙可乘即行進勦臣等伏思兵貴神速機不可失敵氣既懾我力方鋭則一發制勝所向成功但必知己知彼計出萬全始能利有攸往此時慶復已經到川應令商酌妥辦至川西川南兩路應𣲖總兵二員現有松潘總兵宋宗璋奏請出口而新調建昌總兵許應虎又奉旨聽該督撫委用應即𣲖赴兩路任事又據奏統領應居中調度請移駐雅州督師進勦查本年二月內臣等因紀山奏𣲖馬良柱為統領恐其未必勝任是以議令紀山親行今慶復已據奏於三月十五日起程計此時已到成都則一應軍務既有總統大臣紀山應在省調度糧餉可以無庸前往提督印信仍交新任武繩謨可也上從之又命軍機大臣等傳諭慶復曰據紀山奏稱雅州為形勝要地今慶復張廣泗抵川會商進勦事宜或同駐雅州便於籌畫調度或慶復在雅駐劄張廣泗更行前進别據要害以便調度統領大員隨宜進勦孰為妥便俱聽慶復張廣泗酌量如伊等俱駐雅州或令提督武繩謨總統前進就近策應亦可但武繩謨初任提督甫到川省未見其即能練悉軍情其官兵進勦既用宋宗璋許應虎為統領或令武繩謨專辦提督事務不必前往亦聽慶復張廣泗相度機宜悉心商酌總以聲援聨絡計出萬全迅奏膚功為要是日紀山又摺奏籌畫糧餉事宜上命軍機大臣速議議曰據紀山奏稱漢土官兵口糧分别酌給一條營汛逺近不同官兵口糧鹽菜自應分别酌給向例內地祗給口糧出口方支鹽菜今紀山定議川南由打箭爐出口者於清溪卭州二處起支口糧抵爐出口之日起支鹽菜川西以雜谷閙為界於灌縣保縣起支口糧以抵雜谷出口之日起支鹽菜其有由黃勝關出口者即於黃勝關起支口糧鹽菜就便於松潘廳存貯軍需銀米動支皆係紀山酌核道路逺近分别口內口外援照從前出師各案辦理均應如所奏行所調土兵自離巢之日起支口糧抵營之日支給鹽菜以及行裝銀三兩之外加賞二兩果能奮勇克敵循例酌賞亦應照所奏辦理紀山又奏稱籌辦糧餉宜通盤核算一條軍營糧餉最關緊要自應通盤籌畫俾挽運有資轉輸不匱前經紀山奏請於附近成都州縣備辦軍糧臣等議令於附近軍營州縣較成都更為便捷之處先為撥運俟成都解到補還今紀山議南路請於打箭爐現存軍米一萬石內動支西路請於溫江等處動支常平倉穀碾米五千石並將保茂二處軍糈案內存剩青稞二千石辦成炒麵挽運均應如所奏行至軍需銀兩據稱庫存不敷支用官兵起程一切行裝馱載借支以及鹽菜賞需等費均難刻緩應請敕交戶部於附近四川省分酌撥銀四十萬兩速解川省備用紀山又奏稱酌設臺站以速挽運一條從前瞻對案內運送糧餉烏拉與蠻夫並用至口外與內地不同必須設立臺站以資源源接濟今據稱川南一路請照瞻對例支銷川西請照雍正九年郫灌等處辦運番獵橋軍米之例支給至雜谷閙以往與內地不同各兵出口令褁帶二十日口糧外以後接濟非設立臺站不可查由雜谷閙西至黨壩約程十二站應於黨壩安設糧務一處中安十一臺又自雜谷閙南至沃日約程七站應於沃日安設糧務一處中安六臺其運夫腳價每名每臺議給銀八分本色米麵一升挽運米麵折耗照松爐二路成例報銷自係按照情形分别定議應如所議辦理紀山又奏請分設糧務人員以專責成一條糧務關係緊要必須專員辦理以司收放其運送防護支給各事宜亦必須預定成規庶各有專責稽查嚴密今據奏此次用兵打箭爐一路係建昌道總理雜谷閙一路係松茂道總理打箭爐以外應以爐同知為正辦以照磨為協辦將來再於兩河口適中之地安設正協糧務其雜谷閙一路事屬創始且為分道總口必須專員辦理應請以茂州知州為正辦再委佐雜二員協辦沃日黨壩二處俱安設正協糧務各一員至黨壩一路計十一臺十二站應請酌設管臺文官三員沃日一路計六臺七站其地比黨壩更為險峻亦應酌設管臺文官三員督催糧米稽查文報松茂道既總理西路糧務駐劄茂州窵逺未便應移駐舊保縣居中調度又打箭爐雜谷閙章谷沃日黨壩為糧運總處防護宜嚴應每處設護糧外委一名兵丁十名其沿途護解兵丁悉聽總理於征兵內酌𣲖護送是收放既有專司運送防護亦皆籌及應悉照所奏行至所稱此次進兵係在兩河口沙普隆二處並無夷塘請照瞻對案內裏塘安設蠻塘之例添設塘馬以速軍務應準其添設其軍前一切賞號以及漢土官兵貼防堵禦所支口糧鹽菜等項銀兩照例支給據實報銷以上各條皆係軍營要務均須預為經理今紀山既已先行查辦應令不時加意稽察務期妥協可也上從之是日四川松潘鎮總兵宋宗璋具摺陳奏於三月初七日自茂州起程出口前赴雜谷閙料理軍務諭曰更宜以前次所行為戒一切據實妥辦奮勇成功若此次果出力報效則不但可蓋前愆而日後亦自受恩無盡也勉之乙酉慶復奏言臣於四月初五日已抵成都查紀山原奏川西川南分兩路進勦似屬合宜惟西路止調兵四千而黨壩一路逼近賊寨巢穴險固防守嚴密勢須重兵方可攻取僅𣲖官兵千名未免單弱至土兵調發數亦尚少現在就近續調俟張廣泗到川即將一切情形詳加商酌四路齊發以期速為勦滅奏入諭曰兵貴神速不可久延時日必當以班滚之役為戒速奏膚功殱滅真正渠魁朕所欣幸耳是日慶復紀山會奏言臣等商酌將來進兵之路必由革什咱為便但革什咱各寨被賊侵占既多兵雖強悍勢實孤危屢請官兵協攻經裏塘土司汪結帶土兵前往該土司丹津羅爾布誓死滅賊盡數出兵願為前鋒臣等現檄遊擊陳禮等帶兵一千三百名前往駐劄革什咱官寨以壯其勢至噶逹一路走沙普隆則通綽斯甲走板厰溝則通毛牛亦係要地已檄遊擊王世爵帶原領安臺兵一千名駐防噶逹以為聲援並與駐防大蓋山之遊擊保懷智三處聨絡俟土兵調齊西南會勦期定暫令駐革什咱之官兵前進一有進取則駐大蓋之官兵一千亦可夾攻今又據明正土司請撥口糧銀二千七百兩帶往紏約德爾格多番會兵勦賊恢復四寨亦經臣等預飭駐噶逹之官兵俟土兵一到即分路督攻此川南之情形也至川西𣲖調之兵尚未齊集松潘總兵宋宗璋現駐雜谷閙調度而沃日土司地方為金川瓦寺雜稄交界乃進兵之要路屢被賊番攻圍該鎮等先令都司馬光祖帶兵二百名又令守備徐克讓帶兵三百名往沃聲援抵禦究屬不敷今已令遊擊潘文郁帶川北兵五百名副將馬良柱帶重慶兵六百名又令遊擊髙得祿帶永寧兵四百名共一千五百名前後進發仍督瓦寺土兵開路前行救援沃日相機招撫小金川臣等酌看地勢川西賊巢所在原檄分攻之兵數尚少仍檄松鎮預備兵八百名及駐防雅州木坪之兵二百名並飛催未到之川東兵俱赴雜谷閙臣慶復檄調之興漢督標兵三千名本月二十後可到一俟各路官兵到齊即令宋宗璋帶往黨壩督率雜稄土兵直壓金川賊境所有現在查辦情形合行繕摺陳明奏入報聞是日慶復以奉到諭旨召取回京辦理閣務具摺陳謝諭曰不必急於回京當與張廣泗和𠂻共濟以成此事五月壬辰原任川陕總督張廣泗奏言臣於四月十三日自黔兼程赴川節次細閲廷寄前後辦理番蠻各案大抵前此辦理之時多由勦撫未有定見祗圖茍且完結功罪亦多未明上下不能一心以致軍威未振番蠻無所畏懾臣俟到川之後詳察情形將現在官兵是否足用駐劄地方是否合宜統領分領各官是否忠勇可任再探賊酋所勾結之黨與出沒之路徑種種確情熟籌經理萬不敢因循養寇更不敢輕率邀功務期謀定而動慎重勇往並行不悖諒此小寇不難殱滅至諭旨以臣在黔有素知臨陳勇敢出竒制勝之將辨令臣酌量帶往臣查從前用兵苖疆奮勇當先者不乏其人而出竒制勝之才實不易得黔省既無智略出衆之人僅帶一二尋常將辨前往恐在川員辨誤視為臣所親信之人或啓將士窺測之私轉於軍務無益惟黔省兵丁穿林度箐是其所長番地亦多崇山密箐或有可用之處臣已於各標營挑選二三千名俟有應用之時即奏明調用并揀選黔省賢能將辨統領庶為合宜奏入報聞甲午四川提督武繩謨奏言金酋莎羅奔侵擾小金川巴旺及革什咱屬之正地明正司屬之本滚納頂等處又占據章谷攻取孔隅直至牛厰一帶欲圖進爐遊擊羅于朝帶兵抵禦金酋設伏衝散土兵致官兵被傷該酋又勾通綽斯甲分兵攻打雜谷串通霍耳結隆沖土司現今圍困沃日悖逆已極罪在必誅再查各土司惟革什咱與金酋素有讐隙而綽斯甲聨姻金酋瓦寺亦有親誼今所𣲖調之土兵素性狡詐誠恐臨敵觀望不前向背叵測似應多𣲖漢兵始為有益至莎羅奔乃受印土司輒敢自稱為王大肆猖獗速宜勦滅臣受恩深重兹值頑番蠢動正臣效力之時伏乞皇上準臣酌帶官兵五百餘名請商督臣指授方略前赴軍營相機堵勦共掃蠻氛以寧邉境奏入上嘉其據實直陳仍命軍機大臣等傳諭慶復張廣泗曰四川提督武繩謨陳奏軍營情形請多𣲖漢兵擒勦首惡一摺與從前紀山所奏大略相似而武繩謨奏該酋欲圖進爐紀山則謂恐其侵爐遣兵防範至自稱為王之語紀山摺內並未奏及夫蠻衆鴟張侵軼內地或與官兵抵拒偶有傷害正如搏虎捕蛇反被毒噬尚屬有因至於私立名號煽脅黨與恣行不法其蓄心尤為可惡武繩謨初蒞川省據稱得自訪聞可傳諭慶復張廣泗詢問是否確實如果有此事紀山身任封疆豈不聞知何以不行陳奏是否不欲張大其辭著慶復張廣泗一併問明至武繩謨所稱土兵向背叵測應多𣲖漢兵始能擒勦之語似亦有見以蠻攻蠻雖屬制禦土司之道而情形各有不同觀前此羅于朝所帶土兵四百名中途遇伏不戰四散即土兵不可倚信之明驗可傳諭慶復張廣泗令悉此意以便斟酌𣲖調再從前曽降旨慶復張廣泗或同駐雅州令武繩謨總統前進或用宋宗璋許應虎為統領武繩謨專辦提督事務不必前往俱聽慶復張廣泗商酌調度今據武繩謨奏稱酌帶官兵請商督臣相機勦堵其應否令其前赴軍營仍著慶復張廣泗遵照前旨相度機宜隨時調度併傳諭紀山武繩謨知之乙已慶復紀山會奏言前因金酋進逼沃日之熱籠寨官兵被圍𣲖委威茂協副將馬良柱領兵一千五百名於四月初一日進發救援兹據呈報四月十二日至巴納地方上山數里天降大雪深四尺餘山下賊番數百被我兵放鎗擊退隨踞髙劄營十三日賊番千餘劫營因有備賊不能近鎗炮斃賊二百餘人十四日拔營前進行十餘里乃金酋設立頭道要卡有三千餘衆把守抵禦官兵鎗炮齊發擊死四十餘人又進奪二道卡擊死七十餘人逼至三道石卡賊番千餘把守更嚴官兵奮勇陳斬賊番五十餘人生擒數人連破小卡二十三處被圍之兵從中并力出鬭番衆四散熱籠圍解從前熱籠被圍之時有沃雜交界之蓽蓬雪山為進兵沃日運糧之道亦有賊番千餘設卡防守糧運不通今當解圍之後臣等飛𣲖遊擊陳上才領兵翻過蓽蓬山前抵熱籠守卡賊番亦俱退散又臣等前遣千總張祺等招撫小金川以孤賊勢兹據馬良柱呈報四月二十二日帶領漢土官兵二千三百名自熱籠起程行至色思橋有小金川番兵三百餘人攔路投誠馬良柱行至木耳井看得有營盤十餘座即令燒拆於是日抵逹歪劄營沿途據小金川頭人獻出金川逼降沃日番寨六處男婦四十八人又獻鎗箭火藥等件二十三日抵沃日官寨有前駐沃防護之都司馬光祖等帶領土司䇿爾吉率領番目人等出迎此川西近日情形也至川南一路前經裏塘土司汪結赴革什咱會商進攻已飭遊擊陳禮等領兵移駐而綽斯甲橫亘其中進兵多阻昨據汪結稟覆綽斯甲聽從化誨已撤章谷之兵又遣心腹頭人雍中邦來營求免前罪情願領兵出力報效又餘科霍耳白利孔撒麻書德爾格各土司俱遵調先後各發土兵前來此川南之情形也臣等查金酋肆橫川西惟挾小金川巴旺巴底孫克宗等處之兵為助而川南又勾連綽斯甲以資聲勢今小金川等既皆投順而綽斯甲又能悔過自效金酋自此勢孤無援矣奏入上命軍機大臣等傳諭慶復張廣泗紀山曰據大學士慶復等奏稱金川賊番圍攻各寨沃日土司求救隨調威茂協馬良柱統兵救援熱籠圍解賊衆四散及抵沃日官寨前駐沃防護之都司馬光祖率領番目出迎摺內頭緒殊未明晰馬良柱以一副將領兵深入似屬奮勇但金酋兵勢方盛不無冒險是否另有官兵䇿應所報擊死賊番名數憑何查驗其自熱籠至沃日何以但有營盤而蠻兵幾許如何逃散俱未敘明又前摺內稱馬光祖帶兵駐沃防護今奏稱馬良柱兵到伊等方帶領土司出迎是否俱經被困官兵有無傷損再前摺內稱宋宗璋駐兵雜谷閙其馬良柱進兵以後宋宗璋現駐何處作何調度又據另摺奏稱許應虎已經到川作何委用俱應一一詳晰奏聞再小金川向與金酋有隙其投順似係實心至綽斯甲等同惡相濟罪無可寬今見官兵勢盛乃稱情願領兵出力報效此等反覆情形狡黠故智何足憑信前此瞻對四朗之案袁士弼一意招撫以致逆黨效尤豈可復蹈前轍朕思苗蠻雖屬化外而叛服靡常端由辦理不善如但謂得其人不足臣得其地不足守比之禽獸虺蛇亦何妨聽其涵衍卵育並生宇宙之間而此等蜂屯蟻聚之衆果可度外置之乎即如瞻對金川之事亦豈好大喜功實因伊等聲勢日張不得不勞師動衆然前此進兵既不能遽得要領臨事又惟草率了局官兵甫撤旋復煽動損威傷重勞費實多若但來則應之去則弗追試思十至而十應何如以十應之勞用之於一舉毁穴焚巢芟除蕩滌之為愈也稽之前事如漢之馬援諸葛亮蠻中至今凛其遺烈即前明韓雍王守仁輩亦非不震以兵威羣蠻膽落坐收一勞永逸之利近日滇黔古州等境悉成樂土具有明效川省諸番亦當加意經畫况我朝天威無逺弗屆即蒙古四十八旗自古所不臣何嘗不在五服要荒之外而奉令守藩輸誠內嚮寧輯至今可見含齒戴髮之倫斷無不可化誨惟在德足綏懷威足臨制得柔逺之道耳可傳諭慶復張廣泗等悉心區畫因此番用兵將全蜀情形通盤計度如何可令蠻衆帖服永為不侵不叛之臣使叢篁密箐息警消烽共安至治熟籌長䇿詳悉奏聞如果有不能辦理或不必辦理情節亦應將實在情形據實陳奏臣等謹按王者守在四夷其義亦惟羈縻勿絶而已若其干犯王章狡焉思逞則又不得不詰我戎兵用彰撻伐金川始猶不過侵擾鄰封其後脅誘漸衆兵勢漸強至敢逺離巢穴窺伺內地豈容坐視猖獗為虺弗摧惟是兵貴拙速不尚巧遲當馬良柱收復沃日之際若能乘機進取以數千徑旅鼓行而前誠有迅雷不及掩耳之勢聖諭所云一舉而毁穴焚巢芟除蕩滌固屬必至之效乃帥臣暗汶失謀於先繼又重以猜忌坐失可乘之機逮我皇上赫然震怒威讋醜夷悔罪請命則誠如聖諭含齒戴髮之倫斷無不可化誨者矣丁未慶復紀山會奏言軍行糧運實關緊要臣紀山前奏糧運各條已經軍機處議覆遵照辦理但川西一路事屬創始挽運尤難臣紀山於未接廷議以前已𣲖撥新都重慶等處倉穀碾米二萬石起運因黨壩沃日二路中隔雪山背夫多有龜坼及雪氣傷目者現在雪尚未消若不增加臺站蠻夫皆褁足不前查雜谷閙至黨壩原擬安設十二站今應增六站共十八站自雜谷閙至沃日原擬安設七站今應增三站共十站仍添管臺官二員以專責成又查沃日一路前因金酋圍困熱籠糧路阻塞官兵另擇汶川縣之草坡地方出口經由瓦寺地界糧運亦即於此路尾隨今熱籠圍解運道已通但計算止雜谷閙一路轉運恐糧石不敷支給且防將來雨水阻滯臣等以為既有瓦寺可通沃日應仍由草坡分運前進方敷接濟至川南打箭爐一路軍糧原存爐倉一萬石除給過官兵口糧外又酌撥雅州府倉米五千石挽運爐城自爐地至泰寧安設十站自泰寧至革什咱之吉地甚屬荒涼難安短站今在泰寧用烏拉長運至沙普隆由沙普隆用烏拉長運至吉地共安設糧務三處但明正所屬番民雖照二夫頂一烏拉之例雇運而該土司屢被金川侵擾除𣲖撥征丁及防守隘口外不敷挽運現照瞻對成例添置烏拉二千頭幫運事竣變價還項再查前議川西總理糧務道唐進賢駐劄舊保縣居中調度原止就黨壩沃日兩路而言今又增添瓦寺一路耳目難周應將松茂道移駐雜谷閙其瓦寺一路委保寧府知府周岐駐劄跟逹橋為副總理奏入上命軍機大臣等速議旋經議覆準行是日上諭內閣曰征勦金川前已動撥銀四十萬兩協濟川省但軍營糧餉務須充裕著戶部於附近四川省分再撥解銀二十萬兩以備支用庚戌張廣泗奏言金酋地險賊衆數倍瞻對大兵進勦勢須分路攻擊夫兵合則見多分則見少現在漢土官兵雖有二萬餘名然土兵半未到齊且其性見利不相讓見害不相救惟視官兵之強弱以為進退故土兵不足恃而官兵宜努力自強也况將來深入賊境沿途既須防護而堅碉林立尤非兵單所能從事臣與慶復紀山武繩謨現議添兵另摺陳明奏入報聞是日慶復紀山會奏言臣紀山前奏欲駐雅州以便調發緣彼時金酋方擾川南又攻川西沃日西南逺隔是以欲居適中之地今川南餘賊無多沃日圍困已解此時進勦大勢宜在川西臣等自應出駐灌縣就近商辦沃日雜谷兩路進取機宜官兵齊集之後即飭松潘鎮宋宗璋赴黨壩督攻賊巢其時臣張廣泗應前往雜谷閙調遣臣慶復應移駐汶川商辦且瓦寺土司素與金酋親密用兵以來漸有暗通形迹尤須就近彈壓駕馭似此同駐分駐似為合宜再西南俱分兩路進兵川西以宋宗璋為統領由黨壩直壓賊境而馬良柱分領一路官兵由沃日協攻川南以許應虎為統領出兩河口進勦仍再𣲖參將蔡允分領一路官兵出革什咱進攻提督武繩謨有調發兵馬錢糧之責無庸前往再查賊番強悍欲據其腹心要地全在重兵壓攻方易克捷稍延時日秋深雪降糧運不前甚難為力現調陜兵三千續調松鎮八百俱發往黨壩臣非不知兵多糜餉但日久則糜餉更多謹審察賊勢量度兵力於原奏𣲖調之外更請就近於川省各營添調二千名以資勦洗川省汛廣兵單增調之後需兵貼防請於鄰近之貴州上遊協營內酌調二千名以資防守京兵似可無須請用奏入上命軍機大臣等速議議曰據奏現在進剿大勢既在川西更不以雅州府為適中之地慶復等自應同駐灌縣俟官兵齊集後張廣泗前往雜谷閙慶復移駐汶川庶可商酌妥辦至所奏瓦寺土司潛通賊信尤關緊要應令其留意彈壓駕馭毋致稍泄軍機慶復等又稱西南兩處各分兩路進兵聲援似為聨絡提督武繩謨既有兵馬錢糧之責無庸前赴軍營均應照所奏辦理慶復等又請添調川省兵丁並調黔兵為貼防之用查前據摺報漢土兵已有一萬九千名又續𣲖陜兵三千計共兵二萬二千名已不為少今又欲增添意在重兵壓攻易於速捷而另摺復云土兵不甚得力則添𣲖自不容己應照所請於川省各營內添調二千以資勦洗其川兵添調之後本省汛廣兵單亦應於黔省上遊協營內調兵二千來川防守但兵數既增功應速奏不可曠日持久老師糜餉復蹈瞻對前轍也上從之甲寅上諭內閣曰直𨽻正定鎮總兵員缺著四川重慶鎮總兵邱䇿普調補松茂協副將馬良柱前在瞻對軍營曽著勞績今又隨征金川頗能奮勇出力著補授重慶鎮總兵松茂協副將員缺甚屬緊要著該督於所屬副將內揀選一員調補所遺員缺著浙江太平營參將吳一清補授六月戊辰紀山奏言𣲖調各路漢土官兵陸續借支行裝馱載及兩路運糧腳價等費并瞻對案內恤賞漢土官兵各項銀兩支用無存現據西南兩路總理糧務松建二道各請添撥銀十萬兩司庫不惟無可動撥即現在出口官兵支借行裝馱載及賞號諸費亦復無從應付奉撥江西湖北二省銀四十萬兩尚未到川即解到之日僅足歸還借項而現今新舊軍需分頭蝟集支用甚繁川省地處邉陲更宜有備無患合請再於鄰近省分酌撥銀六十萬兩速解來川協濟奏入上命該部速議經部議以進勦金川前經在於江西湖北二省撥銀四十萬兩本年五月十八日奉上諭於附近四川省分再撥銀二十萬兩經臣部議於江西撥銀二十萬兩共六十萬兩江西之二十萬兩紀山雖尚未接到部咨但軍需銀兩理應充裕應如所奏再撥銀六十萬兩協濟行文廣東巡撫在於該省春撥留備銀內照數動支文到作速委員解赴川省交納上從之壬申貴州巡撫孫紹武提督丁士傑會奏言臣等接準川陜督臣張廣泗咨調黔兵二千名以為貼防協勦之用臣等隨選得精兵二千剋期五月二十一日起程赴川黔西協副將髙宗瑾才猷卓越熟諳機務令其總統官兵平越營遊擊袁良臣籍𨽻四川地理情形俱所熟悉又威寧鎮標遊擊韓樞凱里營都司劉竒偉撫標守備趙自超提標守備杜先貴陽守備林昭俱係久歷戎行即令領兵星速進發至將辨借支之項請照川省成例借支扣還謹會摺奏明奏入報聞丙子慶復張廣泗會奏言據副將馬良柱稟稱前帶官兵抵沃日招撫小金川兹於四月二十一日據小金川土司澤旺土舍良爾吉投遞漢文情願歸順並請官兵急到美諾會商進攻金川之䇿隨先𣲖沃日土兵飭令幹辨帶往察其誠偽據稱兵到占固及美諾澤旺良爾吉俱開城迎接因挑𣲖各營官兵八百名飭委都司馬光祖帶領前往旋據馬光祖稟報澤旺等開關迎接並將搶占沃日三寨退還臣等查大小金川地界毗連險要相共金酋肆橫先在挾占小金川小金川今既就撫則賊之外援已絶官兵駐劄其地即用其土兵為前驅由美諾可以直搗金川之刮耳崕巢穴黨壩一路可以直搗勒歪巢穴分進合攻賊酋左右不能兼顧是西路進兵已屬得勢五月十九日又據泰寧協副將張興稟報帶領漢土官兵一千名自牛厰至孔隅該處番民百餘焚香跪迎口稱大兵到來得見天日并稱毛牛地方現有賊兵數百防守官兵揚威前進賊兵拆墻奔逃連夜飭令搭橋渡兵乘機前進攻奪魯密章谷再為稟報又土司汪結稟稱五月初八等日分遣土兵令革什咱兵為領路攻奪河西竹江寨河東寧桑逹桑等寨其守寨係巴旺番人俱望風迎獻軍械又革什咱所失馬桑一帶俱已恢復並稱乘勢往攻魯密章谷寨此又南路可以進攻情形也兹前調陜兵已前後發往雜谷閙添調之川兵二千業經分發西南兩路臣慶復臣張廣泗於十九二十一等日先後赴灌縣會商分布臣張廣泗於二十四日起程赴雜谷閙面示總兵宋宗璋機宜即令前赴黨壩進攻賊寨臣慶復隨即前赴汶川南路統領許應虎將次可抵爐城各路現在訂期會勦以速軍務奏入報聞是日上諭內閣曰據慶復張廣泗摺奏征勦金川現已悉心籌畫分路進兵搗其巢穴附近諸酋輸誠納欵則諸事業有頭緒嗣後征勦事宜張廣泗一人即可辦理現在大學士髙斌出差在外內閣辦事需人著慶復回京辦理閣務上又命軍機大臣等傳諭慶復張廣泗曰據慶復張廣泗奏小金川土司澤旺率衆投誠並退還搶占沃日三寨金酋外援隔絶官兵駐劄其地可以直搗金川巢穴又收復毛牛及馬桑地方西南兩路俱可進攻慶復張廣泗現已分路令統領宋宗璋許應虎等訂期會勦此番官兵調集布置得宜計可指期剋捷至小金川望風迎附乃迫於大兵勢盛而然但既已來歸自當乘機安撫可遽信為革心向化耶從來辦理土蠻總未能得經久長䇿即如瞻對之役調兵二萬四千糜餉幾至百萬僅得焚其如郎一碉乃甫經竣事而金川又復見告將來即使計日翦除而徴兵籌餉勞費業已相等若蕩定之餘仍以屬之土目縱令震懾餘威目前俯首恭順而蓄鋭養力日後仍必鴟張國家動衆傷財適為伊等重事權而增氣勢旋起旋滅何有已時在國家全盛之時視之不啻蚊蚊蜂蠆而糜脂膏於荒箐鈍兵革於蠻煙曷若熟籌長䇿之為得也蓋番性叵測如康熙雍正年間郭羅克番衆征勦帖服久之仍復滋事乃其明驗然謂必不可制則青海蒙古附近土番西藏即係番類一經妥辦至今安輯朕觀金川情形雖不可遽照苗疆之例改土設流或分置衛辨統轄汛兵或亦𣲖大員彈壓田賦獄訟聽金酋自行經理簡節疏目馴擾羈縻期於綏靖地方約束蠻衆不致如土司之專有其人易於蠢動可以永除後患朕意如此是否於該省情形相合著慶復張廣泗悉心從長商酌詳悉具奏如於該處不甚相宜或如何始為盡善别有經畫之處著一一密行奏聞是日慶復張廣泗會覆上諭以武繩謨摺內有金川稱王之語紀山何以未經奏及今查金川並未私立名號惟拿獲賊番審訊時或有自稱其主為王者武繩謨據以入告不為無因而紀山則因不過愚番供詞是以不敢輕瀆天聽奏入報聞是日慶復張廣泗又會奏軍營馳報事件口外請由塘馬口內請由驛遞以期迅速上可其奏平定金川方略卷二
