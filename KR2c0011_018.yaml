body:
  text: 十一月己卯上諭内閣曰川陜總督統轄四川西安甘肅幅􅊷甚為遼濶在尋常無事之時尚虞鞭長不及現今金川軍務未竣地方公事及籌辦軍需一切調度總督駐劄西安難於遥制即將来平定亦經理需人從前曽經分設總督就近綜理尚書尹繼善今現奉差在陜著即授為陜西總督䇿楞著授為四川總督管巡撫事户部尚書員缺着舒赫徳調補兵部尚書員缺著瑚寳補授瑚寳未到以前兵部事務著舒赫徳兼管甘肅巡撫員缺著鄂昌補授其分設總督事宜交該部查例定議具奏是日上命軍機大臣等傳諭尹繼善曰大軍由陜至川道路甚逺該省本年又有被災州縣物力不能充裕陳宏謀本係漢人籌辦此等事件力有不足且該省總督連年未有専員是以前諭將軍博第等協同辦理今觀陳宏謀所奏情形頗屬拮据現在特派尚書尹繼善馳赴西安暫理督務其馬騾臺站等事俱著尹繼善實力妥協料理倘有貽誤尹繼善不能辭其咎至西安同州鳳翔乾州耀州等二十州縣秋禾被旱成災所有加賑事宜雖該撫等現已酌辦尹繼善亦應稽查督率務令小民均沾實恵勿因専意辦理軍行事務於地方民事轉致不能周詳臣等謹按是月之杪經略兼程赴營金川尚未底定維時調餉徵兵軍書旁午皇上經營籌畫披覽章奏訓諭臣工既極宵旰之勞而於陜省偏災惓惓注念猶復申諭督臣盡心查賑務令小民均沾實恵聖主之痌瘝民瘼舉念不忘如此是日上命軍機大臣等傳諭經略大學士傳恒曰此番金川軍興供億實為浩繁視從前西北兩路軍營費用較多數倍彼時勞師逺出十有餘年所費不過六千萬今用兵僅二載耳即以来歳春間奏凱言之亦非千萬不可如運米脚價北路經途數千里増加至十八兩今自成都至軍前祇數百里而價亦如之固屬從前所定章程未為詳妥但由斯以觀經費實亦難乎為繼矣在金川小醜朕本非利其土地人民亦非喜開邉釁苐以逆酋跳梁不逞置之不問無以懾服諸番寧謐疆宇前此訥親等措置乖方以致老師糜餉若不改絃更張則人事尚為未盡今滿漢官兵精鋭畢集兵力足矣經略大學士傅恒體國公勤忠勇奮發將略優矣徵芻輓粟士馬飽騰物力充矣以此摧鋒前進自䝉上天孚佑可一舉而迅奏膚功誠為國家大慶然此就人事言之耳倘萬分之一有出意料之外或逆酋自恃天驕如尉陀之處南粤未遽掃穴犂庭一過春期經略大學士乃朕股肱左右之臣豈可久勞於外且入夏雨多進取非便而京兵不服水土又豈能暴露蠻荒以待秋晴攻𠞰況以帑蔵之脂膏供不貲之糜費尤為非計我君臣如此辦理人事已盡亦海内所共知朕意此時且應極力進𠞰倘至明年三四月間尚不能剋期奏績不若明下詔㫖息事寕人専意休養亦未始非兩階干羽之遺意著將此㫖密諭經略大學士知之是日上又諭内閣曰前據經略大學士傅恒奏稱直𨽻山西供應大兵車馬甚屬妥協朕原有㫖俟大兵陸續抵川經略大學士具奏到日將沿途該撫等分别優劣交部酌議賞罰今據汪札爾奏稱直𨽻臺站有道員陶正中在彼稽查而山西境内惟腰站有馬數匹尚未設定軍臺亦無呈騐馬匹道員葛爾福聞在平定州及過彼處並未謀面大站馬匹疲瘦不堪平陽府乃係衝衢既無馬匹亦未見該守令等現在正值軍興臺站傳遞奏報事件不容稍稽時刻是以特交軍機大臣等議將部院司員筆帖式揀派坐臺並飭該地方大員分站往来督察至大站馬匹供應官兵騎換以便遄行無滯均屬𦂳要直𨽻總督那蘇圖經理得宜急公可嘉即以陶正中而論伊前在山西藩司任内因辦差平常降為道員彼時即阿里衮為巡撫也今乃親身查辦無誤陶正中非劣於山西而優於直𨽻良由那蘇圖董率有方屬員均能奉公奮勉而阿里衮當經略大學士經過時知其必當入告故為加意應付及出境後輒一切懈弛屬員相率效尤遂致曠官離次其陜撫陳宏謀原係漢人於經理此等事件本非所優是以前令將軍博第等協同照料且該省道路既長而州縣中年偶不登者有之既聞其措辦拮据特遣協辦大學士尹繼善前往暫管督務所有軍需馬騾及臺站事宜自當加意籌畫矣此番軍行迅速乃史册所未有實因國家當全盛之時威徳逺届徵調所至踴躍從行且物力充裕從容措置悉合機宜然大臣宣力封疆當知輕重緩急軍旅之事較錢穀刑名簿書期㑹孰重即不能擐甲荷戈馳驅敵愾而於此等處克殫心力共矢勤勞亦與從事戎行者無異那蘇圖實心經理諸務妥協著即交部議叙阿里衮雖供億大站官兵尚無貽誤而怠玩於後功過僅足相抵著嚴行申飭仍令明白囘奏並令親率屬員帶領馬匹前往逐站整飭葛爾福係専派承辦之員如此漫不經心不可不加懲儆著交部查察議處陳宏謀雖亦有過但念漢人本不必責以急公免其置議並曉諭中外知之是日經略大學士傅恒奏言臣查沿途驛站遞送事件情形緩急並無一定惟任驛卒遞送甚未妥協如京城本月十四日發来報匣臣於二十日卯刻即在扶風地方接到而今日接到事件亦係十四日由京發来者相距已經三日雖行走時刻或稍有不同然亦不應懸殊至此況十五日發来之報匣亦於今日接到則知遲速並無一定顯係地方驛站毫不經心一任驛卒隨意遞送若不亟行嚴查恐𦂳要事件貽誤非輕請勅下兵部作何設法稽查不使遲延時刻交與地方官遵照辦理奏入上命軍機大臣等速議議曰設立臺站原為馳送軍機事件俱關𦂳要難容稍誤時刻今經略大學士傅恒所奏京師同日發往之報匣收到遲速竟至三日之久總縁川陜二省距京遼逺至今驛務尚未齊備所致應速行總督尹繼善並各該撫等令選派賢能大吏帶領馬匹㑹同坐臺章京筆帖式作速備辦其章京筆帖式如尚有未經到汛者速行催趲前去嗣後一切馳送軍機事件俱設立排單如自京發往者將月日時刻報匣若干封套若干逐一註明排單之上沿途驛站人等查看排單於何時接到何時發往逐站填註明白遞行馳送由軍前遞京事件亦照此設立排單填寫如某處於所記數目時刻錯誤又擦損者其下站即於排單内註明一面馳送一面挨查仍報明軍機處及兵部倘有漫不經心隠匿不行申報者或被經略大學士查出或被督撫糾叅將章京筆帖式等交部嚴加議處上從之十二月辛巳上命軍機大臣等傳諭尹繼善等曰據直𨽻總督那蘇圖奏稱東三省兵丁陸續抵京自應速為料理前進現將各站車馬飛飭預備齊全伺候計算毎起五百名行走即四日一起或三日一起亦儘能應付無誤那蘇圗辦理此事甚屬可嘉但不知河南陜西二省亦能如此料理齊全令兵丁陸續前進不至擁擠否可即傳諭尹繼善鄂容安陳宏謀令其即速照直𨽻預備應付無誤一面辦理一面奏聞其自神宣驛至川出口一帶俱係川省所屬並諭令班第作速預備毋致遲滯壬午上諭内閣曰訥親辦理金川軍務乖張退縮老師糜餉經諸王滿漢文武大臣等叅奏朕諭令侍衞富成將伊於奉到諭㫖處拿問拘禁其舉動言語並令富成逐一據實陳奏今據富成奏稱訥親云番蠻之事如此難辦後来切不可輕舉妄動但此言我如何敢上紙筆入奏訥親此語實為巧詐之尤伊受朕殊恩一十三年推心置腹何事不可陳奏如果賊徑十分險峻伊曽身同士卒盡力進攻屢冒鋒刃猶不能克再調勁兵更番前往仍不能冞入其阻而供億浩繁徒糜帑項則當以實在情形奏聞請㫖罷兵況金川之事自因其與澤旺搆釁涉及邉圉不得不發兵致討朕實非利其土地人民輕啓兵端前後所降諭㫖皆訥親同辦之事迨伊與張廣泗久無成功朕又屢次傳諭令其詳悉斟酌倘有不能殄滅之故即可明言其所以然直請班師毋得含糊兩可且於伊奏摺内批示云豈有軍機重務身為經略而持此兩議令朕遥度之理如能保明年破賊増兵費餉朕所不惜若終不能成功不妨明云臣力已竭早圖歸計以全始終訥親以親信重臣膺閫外重寄經朕如此諄切指示亦當遵㫖據實覆奏朕豈有不加以裁酌允其所請之理且伊果肯侃侃直陳則此局早已可竣何用糜費如許物力是今嵗之稽遲皆訥親之貽誤咎更何辭又或慮奏到時為軍機大臣及辦事司員所知亦宜親筆宻緘直達朕覽何得謂之不敢上紙筆入告此等𦂳要情節不敢入告豈如伊歴来奏摺摭拾浮言自相矛盾者轉謂敷陳之道當如是耶夫面從而退有後言乃人臣所當切戒訥親所稱後来不可輕舉妄動之語軍機大臣等能窺見其隠衷乎伊之意自知身名決裂且無子嗣計無所出輙思以不必用兵之言博天下讀書迂愚無識者之稱譽而以窮兵黷武之名歸之於朕此其心懷狡詐實出意想之外朕誠不料十三年来加以隆恩渥澤而訥親之忍心害理竟至於此或上天以此示朕俾知用人之難耶訥親又云皇上只想我膽大我如何當得起訥親退縮偷安不敢衝鋒奪險實乃毫無膽量朕方責其過於畏葸過於膽小何嘗慮其膽大昔伊祖額宜都冒險登陴流矢貫脛著於女牆之上猶能負傷血戰不以為苦為國家建立大功今其孫委靡至此實朕所不能解又訥親聞雲梯兵過輒云此皆我罪若我今年辦理得妥何致聖心煩躁又令如許滿洲受此苦累此言尤為可駭滿洲官兵有勇知方一聞調遣無不鼓舞忭躍志切同仇皆衆人所共見朕方深為嘉悦而訥親乃以為受此苦累伊從軍營中来為此浮言揺惑軍心俾衆人聞之不知賊境如何險阻如何艱難此惟經略大學士傅恒忠勇奮發金石同堅不為所惑耳兵丁一聞此言勇往之氣有不略為消沮者耶明係伊自不能成功而轉忌他人之成功故為此語巧於離間衆心而不顧國家之大事此其罪可勝言耶訥親一案俟朕另遣大臣前往審訊著將此㫖曉諭中外知之甲申上諭内閣曰據經略大學士傅恒奏稱本月二十四日入四川境至神宣驛即無馬匹更換次日由水路至昭化縣見第五起雲梯兵尚留該縣詢稱因無馬阻滯又問該縣稱備馬四百匹俱為上起雲梯兵騎去未囬署撫班第尚在軍營布政使髙越等僅具一稟内稱俱照傳牌行令州縣按數預備其實第一站即無馬匹應付又不多派大員而疲玩之州縣惟以蔵匿不出為事朕覽大學士所奏不勝駭異現在赴川官兵分起前進均於議定之日飛速行知各該督撫司道伊等自應早為預備俾官兵遄行無阻况雲梯兵三百名分六起進發而經略大學士隨從員弁亦僅一二百人乃甫入川境即已如此將来京兵及東三省之兵陸續到齊必致益加壅滯班第身任巡撫自當預為調度嚴督屬員迅行妥辦今乃怠玩遲誤咎無可逭但念其尚在軍營從寛交部察議髙越前在東省辦事尚屬有才是以由道員超擢藩司自宜感奮實力料理何得漫不經心貽誤至此著革職交與經略大學士傅恒署撫班第令其自備資斧差遣効力贖罪紀山雖經革職但在川已久該省情形頗為熟諳著即署理布政司印務竭力辦公以贖前愆武宏緒係専辦驛傳之員乃毫無整飭照料以致有誤軍行甚屬溺職著革職一併交與經略大學士等令其自備資斧差遣効力至班第紀山等皆非長才不能優裕肆應現今川陕官員廢弛已極當此軍興旁午之時尤關𦂳要急宜整頓必得幹練大臣前往督率方能妥協䇿楞赴任尚須時日著陕甘總督尹繼善就近馳赴川省由陕至川往来查察督辦俟䇿楞抵任後尹繼善囘駐西安務期供億完備軍旅遄行俾膚功得以早奏其餘怠玩蔵匿之地方官俟軍務竣日另行核其功過辦理是日瑚寳奏言京兵三百名一起改為五百名一起逐臺増添馬匹約需八千有餘陕省辦理未免艱難因思西寧一鎮處在極邉且值防冬之際該鎮兵丁既未便派撥則馬匹正可調用以濟急需隨檄令西寧鎮臣張世偉刻即派調連鞍營馬二千匹尅期於十二月初間全抵臺站以備増添之用仍令該鎮即行領價買補以實操防此項撥濟馬匹俟撤臺之日仍可分發各鎮營抵補兵丁倒馬即於嵗領倒馬銀兩項下扣銀一萬六千兩以還西寧鎮所領馬價庶庫項毫無多費而營馬臺馬均可有資但馬匹雖經借撥而需數尚多伏思晉省之蒲解二府州為畜牧騾馬最多之區且與陕省祗隔一河如陕省雇覓不敷應即飛咨晉省飭令蒲解二府州在於近陕各屬代雇民間馬騾以濟軍行亦可無誤現在札商陜撫臣陳宏謀聽其酌核辦理奏入上命交總督尹繼善酌辦乙酉上諭内閣曰經略大學士傅恒自奉命以来公忠體國殫竭悃忱紀律嚴明軍行甚速途次衝風冒雪晨夕驅馳兼辦一切諮詢機務刻晷鮮暇常至徹夜無眠今日披覽来奏甫入川境馬匹遲誤減從星發竟至步行茍非一秉丹誠心堅金石安能若是將来迅奏膚功自當優議酬庸之典而目前之勞瘁實屬超倫朕於臣工有善必彰即如那蘇圖所辦軍行供億預備妥協乃軍旅中之一節尚加議叙況經略大學士如此忠勤豈可不加優奬在經略大學士冲挹為懷此次及將来大捷議叙自必力辭而在朕賞罰權衡大公至正之道固不得以意為輕重也經畧大學士著交部從優議叙是日上又諭内閣曰髙越武宏緒遲誤軍行昨已降㫖革職今覽經略大學士傅恒所奏四川境内並無伺候馬匹不得已只帶十數人於陕省疲乏驛馬内揀選乗騎馳赴成都趕辦供應後来兵丁馬匹途次馬乏竟至步行髙越等以方面大員承辦軍旅要務大站之馬或一時不能接濟何至並經略大學士所需馬數十匹亦全至貽誤現在大兵陸續抵川軍務甚關𦂳要直𨽻山陕等省均應付齊備而川省怠玩廢弛至於此極殊出意想之外其漠視公務貽誤軍機情罪重大革職差委不足蔽辜髙越武宏緒著於成都枷號示衆俟舒赫徳到時帶至軍前㑹同經略大學士嚴審定擬具奏丙戌軍機大臣等奏言現今川省馬匹缺少大兵按站前進不無擁擠阻滯亟應籌畫接濟況沿途驛站亦需馬匹而將来大兵凱旋馬匹又在所必用臣等商酌京城八旗馬匹不下二萬未經起程之兵尚有二千名若將八旗馬匹内撥出三千匹分為四起按起騎至良鄉即留該處將良鄉之馬騎至下站亦留於該處照此逐站倒換直至成都如此辦理不須一月川境可添馬三千匹於軍行大有裨益如䝉俞允則明日起程之兵即如此辦理再查大兵現在由豫入陕抵川晉省祗備臺站馬匹並不供應大兵則臺驛馬匹應屬有餘請即行文晉撫將該省馬匹酌撥二千選派幹練武弁分起由便道解赴陕省供應兵行其陕西與四川隣近所有預備之馬令該督撫委員就便解赴川境由川陕交界之神宣驛一路沿途接應至湖北兵四千名業經停調則有此預備之馬騾已可不用應行文該督撫令其酌撥二千匹頭即交與現在奉㫖派出領兵將弁分起由便道解赴川省於成都一帶沿途迎接官兵事竣之後或應留用或仍發囘本省交與尹繼善䇿楞酌量辦理上從之丁亥軍機大臣等奏言八旗官馬派撥三千匹前往軍營其缺馬應行補額臣等遵㫖酌議請於現在上堵塔布孫諾爾騸馬厰内挑選身大口小者三千匹作為官馬若但聽馬厰䝉古等挑選恐未能如式應派馬厰侍衞一員該部司官一員㑹同該處總管挑選務期合式馬匹入口時按站喂養到京後分給八旗拴養以補足原撥之數上從之是日西安將軍博第奏言軍興以来動用驛馬最多往往易致疲瘦僱覓馬騾不能臕壯雜用營馬亦不能耐久現在官兵俱係兼程進發若不安設腰站稍息馬力恐有貽誤關係匪輕臣與撫臣陳宏謀酌議於西安兵丁所餘馬匹内通融派撥一千四百匹於七站之内各設腰站庶馬力充裕兵到遄行可免貽誤奏入俞㫖報聞戊子上諭内閣曰金川用兵以来張廣泗貽誤於前訥親貽誤於後兩人之罪狀雖一而其處心積慮各有不同至於自逞其私罔恤國事則實皆小人之尤矣朕昨御瀛臺親鞫張廣泗凡伊狡詐欺飾𦂳要情節俱經一一供認而其茹刑巧辯毫無畏苦之狀左右大臣皆以為目所未見即此一節與市井無頼何異又今日接到富成所奏訥親明白囘奏一摺其乖張舛謬之處經朕所指出者悉無可置辯惟思求見朕面不知伊尚有何顔見朕且求赴軍營効力伊曽為大學士將欲效士卒奔走猶得覬驍騎校耶其頑鈍無恥實甚觀此則張廣泗乃剛愎之小人訥親乃隂柔之小人自當僨事一至於此矣而張廣泗初抵軍營以為金川賊酋亦如黔苖之易制屢次妄為大言可以刻日奏功既而久無成效時復失機則又委過屬弁藉口兵單及聞訥親前往伊復持兩端懐怨望訥親能辦此事固可依附而邀次等之功事不成則咎在訥親伊乃一切推諉使陷於敗仍可復據其任是以於訥親之種種乖方並無一語入告其後見訥親之必敗乃向屬員訕笑誹議備極險忮情態葢恐此時據實奏聞猶或致譴責不若含混詭隨坐視其決裂之為得計也此其心輾轉數變狡獪叵測經朕詳悉推勘洞見肺肝始得實情吐露訥親且在其術中而不覺矣至訥親身膺重寄退縮無能早為張廣泗所窺任舉敗後遂至一籌莫展且恐固原兵丁生事曲加重賞轉囑張廣泗彈壓而於張廣泗之挟詐誤公又不據實陳奏意欲留以為缷過之地伊兩人互相推諉其過惡之剛柔異而其心則皆不可問也夫訥親張廣泗在大臣中皆練達政事之員使其不遇此等重務均可擁髙爵而歴亨衢優㳺終老何至敗露若此可見人臣居心惟當一秉至誠使能公忠體國自邀休佑如其懷私自為雖以訥親平日之小心謹宻張廣泗平日之熟嫻軍旅而方寸一壞天奪其魄雖欲幸免而不能豈不大可畏哉訥親張廣泗固不幸而遇此事而朕因此而益見知人之難則金川之事未嘗非上天昭示之深仁也朕臨御十三年思與大小臣工共臻惇大之治而水懦易玩亦朕所深戒豈肯曲法縱容為姑息之主耶伊等當此軍國重務而深負朕恩實非意料所及今特明正其罪以彰國憲乃朕賞罰無私大公至正之道張廣泗現交軍機大臣㑹同該部按律定擬訥親著尚書舒赫徳馳驛前往帶赴軍營㑹同經略大學士傅恒尚書達爾黨阿嚴審定擬具奏是日瑚寳奏言䕶理川陕督臣傅爾丹以興漢西寜河州各營缺額兵一千名令臣按額揀選派委幹練將弁帶赴軍營聽候委用臣隨知㑹提鎮如數挑選其馬步兵丁務須漢仗雄壯技藝熟練不得以老弱充數領兵官弁亦必慎加選擇勇幹之員所有一切官兵應需銀兩馬匹悉照今春加調官兵之例備辦齊全星速起程其西寜河州兩處官兵令由階文一路直達松潘興漢官兵由棧道就近赴川抵營至官兵沿途行走已飭令嚴加約束務使秋毫無犯奏入報聞是日瑚寳又奏言前因陕撫臣陳宏謀札商陕省需用馬匹甚多令臣代為籌畫臣隨酌擬派撥西寜鎮標營馬二千匹刻期前赴協濟今接陳宏謀札稱陕省多方僱覓騾馬已有一萬三四千匹頭將来即有疲乏不敷商之將軍尚可通融借用其西寕派調營馬二千匹可以停其調遣臣查陕省馬騾既可敷用則西寧馬匹自應停其調遣以省勞費已飛飭鎮臣張世偉遵照停止奏入報聞是日上命軍機大臣等傳諭尹繼善曰據瑚寳奏稱陕省安設臺站派撥營驛兵丁所需馬匹草料請於管站官員處支領在各兵季餉内扣除但該省今嵗收成歉薄即酌中定價亦多至一倍若在季餉内扣除不無虧缺請自各兵到臺之日起至撤臺之日止將應領馬乾草料按日扣還其不敷銀兩應請作正報銷又稱囘馬兵丁口食一項原應令其自備但本年食物昻貴各兵所關糧餉有限若令自備口食則家口在營未免拮据懇將督撫兩標固原興漢等鎮營囬馬兵丁毎名毎日酌給口糧銀四分俾免内顧朕思陕省現今草料價昻兵丁季餉不敷扣還難免拮据而囘馬兵丁逺赴臺站令其以所關糧餉自備口食則家口必致艱窘瑚寳所奏似屬實情著將此摺録交尹繼善酌量如果屬可行一面傳㫖辦理一面奏聞又瑚寳所奏停調西寧營馬一摺亦著交尹繼善聽其酌量平定金川方略卷十八
