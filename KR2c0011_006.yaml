body:
  text: 三月丁亥上命軍機大臣等傳諭班第曰據班第奏稱先由成都起程往川西一路查看糧臺前至軍營再由軍營前往川南一帶勘視糧路朕思辦理糧餉固屬緊要自應及時籌辦但軍營辨兵多半更易現在正值軍興恐張廣泗一人有不能兼顧之慮班第若至軍營且不必查勘糧路在彼留駐多時既可察看情形又可與張廣泗協商一切軍務佐其不逮其糧餉一事即於軍營指示調度一面辦理至金川逆酋進勦前據張廣泗奏稱各路兵到一舉攻克夏秋之間可以告捷此處應令班第留心察看果如張廣泗所奏夏秋之間可以告捷則已萬一揆度形勢夏秋之間又不能竣事遷延至於明嵗則應另為籌畫為先事圖維之計朕思金川小醜本非難以殄滅祗緣緑營兵辨素多怯弱川兵又於隨征瞻對漸染委靡習氣以致不能振興若改用旗兵前往或者可以剋期致勝應令班第與張廣泗詳酌張廣泗本係旗人即管轄旗兵亦無不可但此時且不必露此意恐衆志益懈也庚寅雲貴總督張允隨貴州巡撫孫紹武提督丁士傑會奏言上年五月間準川陜督臣張廣泗咨調黔省官兵二千名協勦臣等因官兵入川之時正當夏月一交冬令天寒必須製備皮衣隨會商每馬兵一名借給銀四兩步兵一名借給銀二兩計黔兵二千二十一名即於藩庫借支銀四千四百八十兩並借給領兵將備製備冬衣銀六百九十兩共銀五千一百七十兩於十月十五日委官解赴川省去訖旋準張廣泗咨稱黔省兵丁皮襖皮褲在所必需己酌定每兵借支銀三兩就近於成都借給銀六千三十六兩希即照數委員解還當即轉飭前次委員將領解銀四千四百八十兩即徑交川省藩庫兑收其應找銀一千五百五十六兩俟有便員即行補解伏思黔兵逺赴蜀塞其家口在黔全賴月餉養贍若遽行按季坐扣未免匱乏堪虞臣等仰體皇上軫恤戎行至意公同酌議將前項借支銀六千三十六兩並領兵將辨借支銀六百九十兩統俟凱旋之日在於各官兵俸餉內分季扣還奏入報聞是日張允隨等又奏言正月十五日接準川陜督臣張廣泗來咨加調黔兵一千名赴川協勦臣等當經會商於各標協營酌量地方情形兵數多寡派撥足額選委平逺協都司吕文魁黃平協都司沈瑞龍分為二撥管解前進吕文魁人材壯健任事勇往而沈瑞龍於塞外地理情形亦頗熟悉俱屬軍前可用之才至於新疆協營均資重兵彈壓未便議調惟清江協副將唐開中係張廣泗指派統領官兵大員所有該協親標兵丁不得不酌調九十五名餘派撫標一百名提標三百名安籠鎮標一百名遵義協標一百五十名都勻協標一百名大定協標五十名平逺協標五十名黃平營五十名丹江營五名以足一千之數仍按每兵百名準帶餘丁三十名以備背負軍裝貼防壁壘之用已於正月二十至二月初一等日陸續起程俱交副將唐開中統領前進奏入報聞壬寅紀山奏言前準督臣張廣泗委員在省製造五六百斤重大鐵炮二十位又添造六十位共八十位正因所購鐵斤不能應手恐致貽誤適因督臣前札令臣在雲南雇覔鑄銅巧匠五名俟九節銅炮到川照式鑄造今炮匠恰值到川臣即動錢局銅斤仿照督臣飭造鐵炮大小試造一位銅斤重於鐵斤故試造之炮體重七百四十斤長七尺三寸食藥一斤八兩食鐵子重三斤四兩隨即運送軍營去訖兹于二月十四日工部員外郎石禮嘉等將奉旨頒發九節大銅炮十位運齊到省是日即準督臣咨令將大銅炮五位運至軍營二位運送打箭爐二位運送雜谷閙留一位在省即令滇匠仿照試造至所需鐵炮八十位既有九節大銅炮十位止須四十位臣當即遴委幹員分頭護送並令滇匠仿照九節大銅炮式先行鑄造至鐵炮尚應解十四位刻下現在趕造俟造成試放之後隨得隨運恭摺陳明奏入報聞甲辰陜西延綏總兵何祥書以派撥兵丁往川少撥馬兵騎馬三百五十匹具摺請旨議處上命該部嚴察議奏乙巳張廣泗奏言臣欽奉上諭令臣於各省司道鎮將內有深知其可任者聽臣一面調赴軍前委用臣自揣素乏知人之明何敢以非臣所屬遽行移調惟原任貴州按察使宋厚其人才識明通老成歷練於苖疆軍務經辦最久西鳯協副將任舉奉旨發往軍前其人忠誠勇敢現在川省鎮將內無出其右者此外臣現調陜甘雲貴之兵需員統領業經指名派調陜西金塔協副將劉順大通協副將髙雄潼關協副將鐵景祐貴州清江協副將唐開中雲南鎮雄營參將龍有印並候補參將王愷數員或向曽共事或得之採訪尚屬諳練戎行者統俟該員等到後容臣再加察看至川省各官積習一切粉飾欺誑成風巡撫為一省樞紐有轉移風氣之權愛必達存心醇正堪任川撫否或以愛必達調任黔省而以孫紹武調任川撫似乎均得其人奏入上命軍機大臣等傳諭曰據張廣泗奏川省積習官無大小事無巨細一切粉飾欺誑成風要在大吏實心整飭懇以愛必達用之川省固可轉移風氣或以黔撫孫紹武調任川省而以愛必達代伊黔撫之任看來紀山未必能勝巡撫之任但愛必達朕甫用為浙江巡撫未便遽為更張且川省軍務紛紜目下正值辦理糧餉驟易生手亦恐於事無益紀山著暫留川撫之任令其與張廣泗同心實力共襄厥事是日上諭內閣曰原任貴州按察使宋厚不必來京著速赴金川軍營以原銜聽總督張廣泗酌量委用遇有缺出奏請補授是日張廣泗又奏言臣準廷議以副將胡大勇請將雲南淨瓶銅炮四五十位解赴軍營之處交臣酌量臣查滇省淨瓶銅炮原係摧堅之具但此間攻擊碉樓須在千斤內外始克有濟是以臣於上年十一月內奏請貯京之九節銅炮業蒙頒發十位解送軍營又募匠照式鑄造又有成都現造之大劈山炮已敷攻碉之用所有前項淨瓶炮位祗須令現調之雲南官兵隨帶數位以壯軍威無庸多帶以滋糜費解炮既少副將胡大勇亦無庸赴營可也奏入報聞戊申上諭內閣曰據調任四川按察使鄭逺奏稱年近七旬精力漸衰川省邊郵要區懇請來京請訓鄭逺年力將邁看來難以逺赴川省著準其來京陛見酌量改調近地四川按察使員缺著宋厚補授是日陜西巡撫陳宏謀奏言三月初三日準川撫紀山咨稱遵照廷議請即在於陜省酌留封貯銀內動撥六十萬兩委員速解來川備用臣於二月十九日接準兵部咨會已據撥解户部餉銀一百萬兩分作二起解送四川協濟川撫紀山尚未接到部文是以移咨陜省就近借撥但部撥京餉此時尚未抵陜恐川中緊急需用自應先就陜省協撥行據布政使慧中詳稱陜省原貯酌留銀四十萬兩因奉調官兵出征金川動撥供支現止存銀三十四萬兩此內尚有各府州縣墊給軍需應行支領還欵必須酌留備用今於陜省酌留封貯銀兩內動支二十萬兩委同州府通判趙銓按察使經歷章時慎即於三月初五日星速起程解赴四川撫臣紀山衙門訖至部撥頭起京餉諒亦不日可到臣俟一到陜境即時護送前進不致遲誤奏入上諭該部知之四月甲子上諭內閣曰金川軍務歷時許久尚未就緒總督張廣泗歷練軍情尚書班第專司籌餉現在竭力辦理各省官兵亦已調集但此番狡冦負固猖獗非尋常小醜可比應特遣重臣前往提挈綱維相機商度乘時策勵則軍聲振而士心一及鋒而用可期迅奏膚功大學士公訥親浙江查審事竣原令就便查看山東賑務今思軍機尤為緊要訥親著即速來京給與經略大臣印信馳驛前往經略金川軍務是日上又諭內閣曰大學士訥親命往金川經略軍務往返需時內閣滿洲大學士人少著尚書傅恆協辦大學士事務是日上又命軍機大臣等傳諭張廣泗曰金川逆酋不法朕命張廣泗統師進勦深入蠻荒一切經營控制可謂殫竭心力伊在黔時上下一心苖民安輯乃自到川以來王師久駐尚未奏凱揆厥所由皆緣瞻對用兵之後川省將辨兵丁習於欺朦怯懦以致士氣不振不能速奏膚功張廣泗急於告捷竭力董率在營將士因其督責過嚴未免人懷怨望此種情形皆屬軍營所有之事朕思金川大肆猖獗固非尋常小醜可比且各省大兵雲集控馭調度祗資一人獨任恐精力亦有不逮是以命大學士公訥親前往經略統領禁軍及各營將士以壯聲援俾軍令肅而士氣奮委靡退縮之習不敢復萌於中而張廣泗又得專意征勦省一分籌度之心即加一分進取之力庶幾事克有濟目下徵兵已至刻期進討如訥親到時尚在征勦金川正可資其威略殱滅醜類可傳諭張廣泗諸凡同心協力務期早得渠魁速殄羣醜俾番蠻懾服咸知向化一勞永逸以紓朕西顧之憂臣等謹按金川小醜戕虐同類我皇上胞與為懷惟恐一民一物不得其所土司雖屬羈縻亦不忍坐視其困凡兹聲罪致討原非利其土地人民因張廣泗向在苖疆熟嫻軍旅著有成績是以委心任用乃出師征勦已幾半載膚功未奏聖心軫念奬勵多方又恐其獨任為難特命大學士訥親前往經略謂張廣泗得省一分籌度之心即加一分進取之力委任之專體恤之切如此其至至訥親位髙祿厚平日受恩優渥中外無與比倫膺斯重寄自宜仰體憂勤之念兾紓宵旰之勞聖諭所謂資其威略殱滅醜類是必先聲實足奪人決䇿果堪制敵士氣則委靡悉振大帥則駕馭有方將使靖掃蠻氛朝廷永無西顧之慮庶乎克稱任使者即可不負恩遇也戊辰上諭內閣曰從前派往瞻對軍前之大臣侍衛執事人兵丁等並未效力今因金川用兵命大學士訥親為經略總理軍營一切事務仍派內大臣班第及從前所派侍衛執事人兵丁等馳驛前赴軍營聽公訥親指示效力贖罪並派護軍統領賽音圖烏爾登法酬御前三等侍衛鍾秋乾清門三等侍衛胡西前往亦聽訥親指示以教訓約束緑旗官兵前次所派人員內如有患病事故不能前去者著軍機大臣等另行選派此所派人員仍照前例分作三次令其陸續起程癸酉張允隨奏言正月十七日接準川陜督臣張廣泗咨調雲南官兵二千名當即檄令鎮雄營參將龍有印統領官兵並派開化鎮標中軍遊擊劉德成昭通鎮標右營遊擊楊朝棟分領進發兹聞報參將龍有印於二月二十七日在四川永定縣病故臣查分領官兵之遊擊劉德成諳練營伍曉暢軍情年力富強有志向上堪膺總統之任隨即飛檄劉德成署理鎮雄營參將總統滇兵星馳前赴川省軍營聽候調遣奏入報聞尋經張廣泗復以龍有印病故疏報上悼惜之乙亥張廣泗奏言軍前各路官兵駐守情形臣已於二月初七日恭摺奏報月餘以來防禦周密賊俱未敢前來侵犯惟據馬奈駐營之領兵參將永柱遊擊楊之義李璠等報稱三月初五日定更後賊兵來撲我軍之左水卡並河東申達溝之日角碉寨漢土官兵奮勇對敵殺死賊番七名擒獲二名業將河東賊番擊退惟河西約有賊五六百人修理石卡二十餘處攻擊未退三月十四日賊從卡卡腳蜂擁而來我兵用大炮衝擊二更後賊始退去四更時復來撲營我兵奮勇抵拒擊死賊番現存賊尸二十七個生擒二名十七日黃昏又有賊十數人撲卡千總寧法武領兵將賊擊退追至半山被鎗子中傷陳亡又據稟報二十二日三更賊來連撲水卡二次俱被我兵奮勇打傷賊人血迹甚多二十三日辰刻約有二三百賊陸續遁回現在乘機攻勦臣又遣發官兵八百名前往助援並添發川省新造大鐵炮以資攻擊日內諒能退賊無虞也又據駐營卡撒領兵之髙宗瑾唐開中與參將買國良聯銜稟報有賊番大頭人生格素稱狡黠曽經愚弄張興被陷三月十六日帶領賊番來營口稱投誠該副將等密諭守備馬國材設計擒獲其跟隨之衆欲行搶奪被我兵鎗炮齊發擊死十餘人賊始奔潰該副將等將賊目生格押赴軍營已經嚴加收禁至臣加調陜甘雲貴四省官兵現在貴州陜西固原河州西寧寧夏之兵已抵軍營其延綏甘涼肅并雲南官兵亦據報陸續出口約於四月初十內可以齊抵臣駐營之小金川再為分路遣發各應進攻之地計在四月底舉兵正當賊地刈穫之際我兵鼓勇齊發四面力攻賊勢倉皇料難兼顧庶可搗其巢穴也是日又奏稱本年正月二十一日髙宗瑾擒獲生噶爾結鎗炮擊死頭目一名彼時臣尚未悉已死頭人係何名目是以未經聲明嗣將生噶爾結及續獲之生格均加訊問始知其名阿撒拉亦係莎羅奔所親信之人就擒之生噶爾結現在嚴行收禁至孫克宗土兵現已全行遣回並無仍留軍營者馬良柱倉皇移師遺失軍裝炮位自應遵旨糾參以肅軍紀宋宗璋員缺俟哈攀龍到營即遵旨令其署理許應虎始將效力軍營之旨祕而不宣既為南路統領有過無功當遣回本任至嶽鍾琪為人色厲而內荏言大而才踈然遇事頗有見解昔於進藏及平定青海立功附近番夷聞其聲名頗為畏服即金川莎羅奔亦係伊招納始行給與土司印信若任以金川之事實屬人地相宜臣謹會同班第遵旨調赴軍營俟其到時擬令前赴黨壩統領官兵兼管綽斯甲一路黨壩現有漢土兵八千餘名應再添給二千以足一萬之數綽斯甲河西一路現有漢土兵三千餘名亦應再添給三千以壯聲勢至金酋現能出戰之番人實止四千以內糧食惟勒歪足供一二年食用刮耳崖不過四五月之糧屬下番民止以元根充飢甚多怨望看來斷難久持將來嶽鍾琪至彼逆酋計窘勢窮之時自必往投乞命便可就計成擒奏入上命軍機大臣等傳諭曰據張廣泗奏報現在軍務情形各營駐劄逼近賊卡屢被侵犯雖間有殺傷而賊番並未大創看此情形是彼據險扼要轉得乘我之隙以逸待勞以寡擾衆而我軍應接不暇不能制敵而反為敵所制矣即如賊兵連次侵犯下水卡該處原駐重兵何以又調助援官兵八百名之多且大兵業已將次調齊而賊衆全無畏懼該督不能選鋭進攻奪取要害僅以堅壁為自全之計遣兵為䇿應之方其平日之調度機宜何在師日老氣日怯何時可圖進取殊可厪念至擒獲之生噶爾結生格二名又稱現在嚴加收禁此等就擒番目審訊明確應即在軍前正法以泄衆忿且可震懾番情若果係渠魁應俟凱旋獻俘之犯則當解送成都內地監禁尚可不致疏虞今即在軍營拘禁倘逆酋知其尚未伏誅妄思索奪豈不又生事端可傳諭張廣泗作速辦理又據奏稱嶽鍾琪至彼逆酋勢窘計窮自必往投乞命便可就計成擒莎羅奔狂狡負固罪大惡極如果窘急投誠自不待嶽鍾琪方能設伏掩獲但從前張廣泗早有不準投誠之語此時即欲誘之使來彼必不信嶽鍾琪素為番人所服新至番地或可設計擒弋此固因王得羊亦一機會可否如此辦理著張廣泗酌量相機調度但不可為所愚弄致令兔脫一并傳諭知之臣等謹按張廣泗於張興失陷之後畏葸恇怯自正月以至四月各路僅皆固守並未攻擊張廣泗亦不催令進勦惟靜俟所調各省官兵聖諭所云該督不能選鋭進攻僅以堅壁為自全之計遣兵為䇿應之方平日之調度機宜何在實屬切中情形有如燭照此經略之命所以不容己也訥親若果能展謀猷有以懾服張廣泗之心而左右提挈之出其平日制勝之才振其目前委靡之氣則功成固有可必矣是日上諭內閣曰嶽鍾琪前在西陲用兵以失機致罹重辟久繫囹圄經朕加恩放還鄉里今當金川用兵之際因思伊久官西蜀素為番衆所服若任以金川之事自屬人地相宜曽傳旨班第張廣泗酌量如果可用將伊調至軍前以總兵銜委用今班第張廣泗已遵旨調赴軍前嶽鍾琪著加恩賞給提督銜以統領聽候調遣豫以自新之路俾得奮勉圖功以收桑榆之效如果即能迅奏膚功更當從優奬敘是日上又諭內閣曰許應虎來京陛見時朕觀其人有勇敢之氣向在苖疆著有勞績似屬諳練軍情是以加恩賞給路費準其携帶伊子馳驛前赴金川軍營效用伊自當感激圖報竭力奮勉乃據張廣泗奏稱該鎮扺川竟將奉旨赴營效用一節隱祕不宣意欲竟赴建昌鎮任及臣奉到諭旨飭令為南路統領該鎮急遽冒昧毫無調度以致蔡允等失去炮位又攻寨不能克取縱放已降番目回巢致令圍困營盤經臣親赴救援賊始解圍又令同髙宗瑾據守卡撒而該鎮畏賊如虎稟懇依賊所言撤營讓地經臣嚴檄始定臣恐搖惑軍心撤回隨營駐劄且年已衰邁無可任用應令回任辦事許應虎深負簡用之恩仍令回任何以警軍前之不用命者張廣泗所奏非是許應虎著拏送來京軍機大臣等會同該部嚴審定擬具奏是日張廣泗又奏言軍行糧隨挽輸最關緊要山徑﨑嶇之地馱載難行必須人夫背運至有力之家未肯親身應役則須雇倩鄉里傭工代行幫貼之費在所不免即從前雲貴等省苖疆用兵莫不皆然惟川省官員推諉性成而民間尤昧大義率以派雇為苦地方官又並不明白勸諭輒令里民折抽夫價解至省城交成都府代辦聞已收銀數萬兩臣來營之際又據司道等稟稱通省各官公捐養亷一萬五千九百餘兩以助雇夫之用臣查此次軍需業蒙皇上節次動撥帑金前後三百餘萬豈藉此萬餘金之養廉足補涓滴且恐明啓地方官以諉卸辦夫之端隨轉行禁止去訖伏思各屬既有幫價解交成都府代辦則夫役價值自必增添而未見糧夫稍有從容之象臣昨面詢撫臣紀山亦祗含糊回答不能實道其故請俟欽差尚書班第查閲糧站回川之便敕令就近確查前項里民幫貼價銀實在收過若干係作何公用並應否收納之處請旨訓示遵行庶私弊可杜而運夫亦不致缺乏奏入諭曰此事即交班第亦不能查出今命訥親為經略即交伊查辦必能水落石出也是日尚書班第張廣泗紀山會奏言臣班第奉命來川調度糧運謹將現在情形悉心會議條例敷陳如兵丁官役宜酌量支折以省軍費也軍糧現蒙恩準每人日給全米一升塞外米價昻貴若照例折支兵夫未肯舍多領少則需米浩繁用夫既衆輸挽愈難今核算運米抵營每石需銀十二三兩至十五六兩不等應請酌中定值就各路軍營道路之逺近分别八兩九兩折給俟將來進抵賊巢俱以每石十兩折支凡各路文武官辨跟役及土兵在本境而未離巢者概行半米半折計可省口糧六七千分其官兵及餘丁炮夫並土兵離巢者原應日給全米倘有情願折支者亦聽折領至各臺站之運夫口糧原領折色者計算出口程站逺近酌量增減折支如此則較之向例所定折價雖不無少增而合之全給米石所需運費又實屬節省况折色可多則運數可減既省官運亦抒民力又內地運夫口糧宜酌量加給也現在內地運糧自雅至爐十三大站山程陡峻每夫背米五斗給腳價銀一兩三錢二分五釐其餘州縣道路平坦者給腳價銀五錢概無食米價值本無短少但各州縣距口逺近不等有自十餘站至二十餘站者運夫既難褁糧自隨勢必沿途買食無復餘資以養家口臣等仰體皇仁請於給價之外每站日增給口糧一升由沿途州縣存倉榖內碾米支給存倉價銀每升不過六釐而窮黎得省雇價以贍家口矣又口外最險糧站宜量為加賞也定例負重之日每夫給銀八分口糧一升回空之日止給口糧不給夫價但由陶關出口即有天赦納凹鄧生班攔及空卡丹噶等山由保縣出口即有蓽蓬商角及直固陡柔谷噶美卧夢筆等山俱層峯險峻春夏積雪徒手猶虞困躓運夫往往畏避不前每致糧多壅滯是以承辦糧員於各夫負重之日照例支給外至於回空則無分本日次日抵家均給口糧一升再於天赦納凹班攔三站每夫負重之日增給賞銀二分鄧生一站增給賞銀一分各夫始樂從事是皆於遵例辦理之中不得已為權宜之計仰懇聖恩即準照此辦理又臺員宜間設丞倅州縣以司稽察也川省從前用兵糧運惟設總理糧務道一員其餘臺員悉用佐雜今次既分西南兩路運糧蠻夫不敷應用又添調內地人夫未免漢蠻參雜僅用佐雜微員不堪彈壓應於兩路臺站每三臺中撤去佐雜另選幹練勤慎之丞倅州縣等官一員為正糧務責令總理稽察三臺似覺整肅再查南路總理道員因添兵加運人夫衆多應照西路之例設立副總理知府一員即委雅州府知府就近專理以上四條皆關糧運緊要謹一面飭辦一面奏聞奏入上命軍機大臣等會同該部速議旋經議覆準行是日又命傳諭張廣泗等曰據奏軍前跟役及土兵在本境者酌令半米半折軍行最重糧米今議半米半折倘米有不敷伊等縱有折價從何購買且蜀道艱險商人運販腳價勢必較官辦更為昻貴何以折色轉足以資食用可傳諭詢問張廣泗等詳悉確查具奏是日班第張廣泗紀山又會奏言臣等遵旨閲四川副都統卓鼐奏摺內稱雜谷等土司所轄蠻民家口數萬山多地少所産之榖僅敷半年食用每嵗於九月收穫之後約計五六萬口皆入內地傭工現因金川用兵禁止入內恐至青黃不接之時乏食滋事不若雇令運糧又稱安臺運米官定腳價每米一石每百里給銀一錢計算每夫負米三斗日行四十里僅得銀二分二三釐實不敷用查卓鼐所言運價乃係內地情形並非口外現辦之事內地路途平坦食物不貴是以所定運價每石每站給銀一錢若口外則每夫運米五斗日給腳價銀八分口糧米一升與內地不同至於雜谷等處蠻民於收穫後入內地傭工者名為下壩相沿已久上年因用兵金川是以禁止下壩早已給與口糧腳價調撥運送軍糧並無乏食滋事之慮奏入報聞是日上以大學士公訥親經略金川軍營令主事何曰熙隨往戊寅上命傅爾丹為內大臣兼鑲黃旗護軍統領馳驛前往金川軍營效力是日上諭內閣曰內大臣傅爾丹年老著伊孫哈寧阿隨往照例馳驛是日上又諭內閣曰任舉所奏之革職千總富德把總朝宗志俱著賞給原銜給與驛馬隨大學士公訥親前往軍營效力如著有勞績再行請旨臣等謹按富德朝宗志已革千把微員耳乃任舉一為推薦皇上即命馳驛前往效力尚許以著有勞績再行請旨聖主之於人才留意鼓舞真無微不至也五月丙戌湖廣總督塞楞額奏言四月初七日準川陜督臣張廣泗咨調參將管長安營遊擊事劉策名赴營差委臣即於是日飛檄該將迅速起程由貴州取道徑赴軍營聽候差遣訖奏入報聞戊子紀山奏言臣於二月二十八日自省起程前赴軍營與督臣張廣泗面商事宜沿途督促挽運稽察臺站於三月十二日抵小金川美諾軍營二十二日在軍營起程回川由孫克宗得奈章谷之兩河口毛牛一帶督催糧運於二十九日到打箭爐查看各路情形尚屬源源挽運但查爐口為南路糧運總滙一由泰寧子龍運甲索軍營道路遙逺恐將來添兵必得加運一由章谷分運馬奈軍營雖據該糧務三月摺報現在運到米糧千有餘石亦須多運方為有備臣俱面諭建昌道陳緯加緊趕運以裕兵食一由章谷協運孫克宗軍營必由兩河口過渡此路依灘傍澗水易泛漲五六月間大雨時行深慮阻隔亦經臣面諭陳緯將來發水之時應否歸併川西挽運務期豫籌妥協至爐地米石皆賴雅郡發運從前自雅運爐每米一石官給腳價銀二兩因該地於瞻對案內運米至今民力未免疲敝已準部咨覆每石增銀六錢五分運夫現俱踴躍從事其各府州縣派撥運雅之米臣又飛飭水陸並進接續抵雅以資轉運尚有分運木坪一路軍糧雖現在竭力挽運究不敷原派之數經臣飭派添夫一千名已據報到站趕運此南路糧運之情形也至川西草坡一路因奔拉雪山險隘異常兼有瘴氣運夫多有逃亡病故者又添調新兵及隨軍挽運之丁巳兩次飭司添雇夫八千八百名又由保縣出雜谷閙轉運黨壩一路雖據該糧務三月摺報現有軍糧三千餘石但該路軍糈原有續派松潘鎮每月協運米麵二千石松潘近處極邊倉貯不宜空虛臣檄飭松茂道唐進賢轉飭保縣多方設法加倍運黨如可不需松糧即行停其協運以重邊儲又從前於曽頭溝一路運糧直達美諾軍營尚嫌太近賊巢今改由商角山一路甚為妥便此西路糧運之情形也以上兩路約計每日共運米六百餘石尚無貽誤再各臺站俱在衆土司界內蠻民亦俱出力幫運而沃日土司納爾吉并伊姑策爾吉尤為出力臣經過其地目睹田地大半荒蕪碉寨多被金川殘毁因加安慰開諭捐賞銀五百兩並綢縀銀牌等物以固結其心又打箭爐明正土司自瞻對之役供應烏拉挽運軍糧上年復被金酋侵擾此次用兵以來應差應役又經一載該土婦喇章率伊子德昌黽勉出力始終不懈實係土司中之難得者臣過爐之日亦多方慰勞賞賚以示優恤其餘經由之處各土司俱屬恭順奏入報聞壬辰上命軍機大臣等傳諭大學士公訥親曰大兵征勦金川各土司盡心出力丁壯事軍旅老弱轉餱糧共切同仇始終不懈沃日明正兩土司既殫竭勤勞其餘衆土司亦多屬恭順甚為可嘉著傳諭大學士公訥親令其將效力戎行供應烏拉挽運軍糧之各土司查明經由地方功績等次先行傳旨嘉奬並向來輸納貢賦或應免其稅糧或應優以賞賚其如何加恩之處逐一詳議即速奏聞是日張廣泗奏言本年二三月內官兵駐守情形業經奏報兹半月以來各路營壘謹嚴賊無侵犯惟馬奈附近之戎布寨自去年九月因番目恩錯復叛至今官兵未能攻克賊復於馬奈山梁之北安砌石卡以為戎布聲援今據該處領兵參將永柱報稱四月初五日二更後遍山皆賊永柱派兵直赴賊卡攻擊守備楊錦把總靳天爵外委鐵中竒三員奮勇爭先領兵七人先搗賊卡手刃賊番十二人鐵中竒又生擒一人各官兵隨後齊到奪獲賊卡二十三處生擒賊番四名奪獲刀鎗長矛火藥鉛彈等物共殺死賊番一百餘名帶傷者不計其數有把總楊生吉力戰殺賊四名鎗傷陳亡又據報稱本月初七日三更官兵攻賊擊死賊番男女二十餘人又奪石卡三處五更時賊嘯聚百餘人前來奪卡官兵用鎗擊退追趕奪得賊卡四座初八日天明把總胡洪道等復得半山嘴炮臺一座擊死賊番七名又據稟報初九日夜賊番三百餘人由卡卡腳小路潛來撲卡被雜谷土兵攻退參將永柱乘勝於初十日發兵七路設伏是夜四更賊從北山來遊擊楊之義等四路伏發迎敵至五鼓時戎布寨內賊番出寨應賊被守備金容等三路伏兵截殺賊向江邊奔逃守備王良弼堵殺九名投江者十數人七路官兵乘虛合攻殺死賊番甚衆連奪賊卡二十八處及大木城一座石戰墻一道遂克取戎布寨一所內計大小戰碉五十餘座官兵俱無損傷實獲全勝臣查馬奈官兵連次攻擊雖亦小小取勝但戎布一寨業經圍攻半載軍心多屬委靡今忽得連勝攻克不惟賊番稍知畏懼而將士怯懦者皆為振起即新到官兵聞之亦倍增鼓舞勇鋭之志是此捷尚足激勵戎行也至新調官兵一萬名延綏甘涼肅州并雲南官兵於四月初八十二等日俱已先後抵營臣現在指路分派約於本月盡間可以齊抵賊隘哈攀龍已於本月初五日抵營嶽鍾琪約本月二十日亦可抵營番境今春降雪甚大昔嶺美卧等處尚有積雪二三尺四五尺不等必至五月初旬方能融化維時傳檄定期督催將士同日鼓勇而前仰仗皇上天威諒賊必不能支也奏入諭曰此亦小小攻克耳佇待捷音以慰西顧臣等謹按戎布本一小寨張廣泗付托非人遷延嵗月逮後士卒久在行間積憤思奮遂能以數百之衆退敵成功張廣泗不自咎從前之怠緩疏忽而轉謂此捷實足鼓勵戎行大言誇詡其粉飾掩著之罪深矣是日班第奏言臣欽奉諭旨令張廣泗將馬良柱糾參同宋宗璋一併解京許應虎著回原任臣仰體聖意原以宋宗璋馬良柱前於瞻對案內扶同欺隱應加重譴本無可辭然就征勦金川以來三鎮功罪實有不同馬良柱始帶兵千餘馳援沃日救熱籠寨解沃日之圍降小金川之衆乘勝克復孫克宗實有破竹之勢番中頗著威名嗣因張興敗後馬良柱駐劄丹噶餉道被阻適接督臣移營之諭倉皇失措乘夜棄營致失軍裝炮位罪固莫逭然猶未足掩功宋宗璋統兵黨壩雖無攻克亦無失事至許應虎初駐獨松失機失炮擅移的交又受賊愚致被圍困及改調卡撒又與髙宗瑾商同棄營且其精力較之馬良柱衰老實甚督臣張廣泗原擬將許應虎嚴參治罪馬良柱留營戴罪圖功及奉到諭旨臣因詢問督臣據云惟有遵旨辦理而已臣伏思我皇上深居九重之上逺隔行間萬里祗憑章奏以察情形各將臨敵勇怯豈能備細稔知今馬良柱宋宗璋固有應得之罪均令解京而許應虎屢次失機轉得優遊回任恐各路兵辨不識瞻對案內應審緣由或滋疑議於現在軍紀兵心似覺未協至髙宗瑾人原庸懦前與許應虎同謀棄營幸衆兵不從始止督臣本欲拏解大營參究因一時乏人暫緩適因擒獲賊番生噶爾結逮臣回營又擒獲賊人生格是以姑留效力實非可用之將臣見聞既確不敢緘默謹據實密陳至所獲賊番生噶爾結臣與張廣泗公同訊問據稱係微末之人不能深悉賊內情形不比通使生格看來人亦甚屬不堪所云係莎羅奔用事頭人者乃將備虛誇故習耳奏入上甚嘉之是日班第奏言參將永柱近日攻克之戎布寨初進兵時業經降服嗣因許應虎等撫馭乏術苦纍番民以致頭人恩錯復行附賊其時永柱統領漢土官兵四千餘衆圍攻數月並未克取適有賊番數百侵犯卡倫不思力戰屢請援兵又止令土兵當先堵禦以致被賊衝散占踞碉卡相持月餘惟欲俟各路官兵進攻兾賊自退及張廣泗再三督促而各兵亦人人思戰始一出營與賊對敵以我數百之衆奮勇直前賊遂披靡四散奪獲所失卡倫並乘勝攻取戎布寨看此情形則金酋並非徑敵舊兵不盡懦弱已可概見惟在將領之賞罰分明臨機調度去嵗屢次失事揆厥所由亦無非各將領遷延觀望所致耳臣思永柱前雖不能無過今既小有攻克尚可俟事竣敘功若苐據所報粉飾之詞即蒙皇上優加奬賞恐各將辨不知因鼓勵起見致啓效尤僥幸之心於軍紀兵情頗有關係故敢據實直陳奏入報聞乙未上命四川提督武繩謨來京陛見其員缺以嶽鍾琪補授平定金川方略卷六
