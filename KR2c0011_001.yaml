body:
  text: 欽惟國家重熙累洽久道化成列聖相承功徳隆盛薄海内外罔不率俾我皇上以神聖嗣服勤求治理宵旰孜孜盛徳大業日起有功謨烈紹乎祖宗膏澤覃乎黎庶聲教所被凡雕題鑿齒之倫窮髮不毛之域靡不奔走順則同我太平藐兹金川為西南夷雜種僻處蜀徼陶關之外與木坪沃日雜谷諸土司接壤本朝順治九年歸附頒演化禪師印信俾領其衆莎羅奔者初以土舎從岳鍾琪征羊峝有功雍正元年授為安撫使以分金川土司之勢雍正八年頒給印信號紙不徴賦稅其地崇山複嶺春夏積雪與中國道路不通據險設碉恃以自固其人獉狉角逐若犬豕麋鹿然非可以仁義格而禮法繩也野性不馴互相仇殺雖奉正朔亦曰覊縻莎羅奔性尤桀驁自稱大金川而以金川土司為小金川陵轢種類戕害骨肉饕餮無厭鄰封莫不切齒至是恣横日甚且將近我邊徼維時梁益守臣請加懲創用彰國威上猶以蠻夷自相攻擊其性固然不足重煩師旅惟勑慎固封守無使侵軼既而狼貪蹈藉罔有悛心始不得已命將興師聲罪致討然聖度廣逺包荒無外猶兾其聞風震慴歸我王化以兼幬並覆非必草薙而禽獮之也乃一二臣之不協厥心或畏難茍安或坐視成敗賞罰不明進退失律糜餉老師績用弗集皇上赫然震怒既底厥罰乃振獨斷之乾綱運九重之勝算乾隆十三年十一月癸丑特簡大學士傅恒前往經略並選滇黔秦楚勁卒加以都城天策神策之軍期門羽林之士及盛京船厰黒龍江滿洲索倫兵等貔虎﨣桓後先進發芻糧山峙士馬雲屯經略篤誠自矢忠勇奮發不憚艱瘁懸車束馬式遄其行至師之日即整營壘簡軍實明號令軍容煥然改觀賊徒驚駭謂神兵自天而降紀律森嚴逈非前帥比固已褫厥魄而奪之氣矣其小金川土舎良爾吉從征日久陽效先驅隂懐二志軍中消息時多洩漏賊因得以主待客聲援抵禦我師往往失利賊益負固不服雖時揚言納欵實嘗試主帥以緩我師益深壘自守我皇上神明遐矚先已密諭加誅而張廣泗始終回䕶在營諸將模稜兩端相視莫敢發經略至營獨排衆議召良爾吉至帳下數其罪而誅之羣番股栗膝行莫能仰視莎羅奔自知罪惡貫盈且失所恃理無倖生乃窮蹙投誠分遣頭目哀籲軍門者日凡數至經略以奉命視師惟知討賊方刻日誓衆期於掃穴犁庭歸報竣事賊益惶怖無措乃藉提臣岳鍾琪舊恩搖尾乞憐兾轉逹經略之聴焉經略受任馳驅公忠體國凡山川情形輓輸難易無不備悉入告我皇上好生為心仁同覆載既稔窮㓂之不足較復念西陲連嵗用兵邉民急宜綏輯雖垂成之功勢同破竹然兵戈有旬日之稽遲即民間有旬日之勞困屢勑經略當因其乞降即予肆赦毋多殺以極兵威十四年二月癸未經略承命受降先是提臣岳鍾琪既允莎羅奔為請納欵由黨壩啓行經賊巢穴莎羅奔随赴大營率土舎郎卡並其徒衆數千百軰頂佛持經焚香頓顙誓願遵奉示約永效狗馬之報言出誠悃感極涕零向之懐詐反覆者一變而革靣革心無幾㣲纎芥之譎詭故知聖徳所昭無逺弗届中孚之吉可格豚魚今古同符理無或爽是役也自推轂以至班師時未七旬㨗音由軍營逹於都門僅八晝夜大兵調集抵川者甫及其半而膚功迅奏征夫免荷戈之勞居人無輸輓之役耕者忭於野行者歌於途豈獨金川之人以幸保首領感頌聖明凡我士民其孰不呼舞笑語歡聲雷動端惟我皇上聖徳廣大天包海涵上承聖母皇太后懿訓慈詳愷惻茂育羣生有以致此三月丙辰經略振旅還京上命所司詳察典禮擇日祭告天地宗廟社稷恭上聖母皇太后徽號錫爵酬庸頒詔肆赦行慶施惠無有不恱告成太學御製碑文刻石垂逺於是大學士臣張廷玉臣來保等合詞陳奏曰金川告㨗邉徼永寕臣等幸際昌期躬逢盛事快覩元臣之奏凱仰惟聖主之運籌自陳師命將之初暨振旅還軍之日决機定策胥由五夜焦勞禁暴遏劉咸賴九重經畫指萬里山川於掌上奠百年疆宇於目中揆幾度越羣謀制勝悉符天意奉慈幃之懿訓休養生靈沛黼座之温綸綏懐異類用示止戈之武洪施解網之仁吉事有祥功成不戰舞干羽而敷文徳何以尚之櫜弓矢而序有周蔑以加矣昔聖祖仁皇帝親統六師平定朔漠曾允臣工之請編輯方略之書盛烈鴻猷昭垂萬古我皇上以聖繼聖神武逺揚允宜恭紀縹緗用以廣傳海宇式彰綸綍昭一人宵旰之精勤嫓美典謨為萬世子孫之法守奏入諭曰朕惟金川之役原非好大喜功今兹奏凱班師仰荷天祖黙佑貽慶無疆而元輔之抒忠奮勇將士之敵愾騰懽有以震懾蠻方廓清荒徼朕非自詡其功欲以鋪張誇耀第軍旅為國家大事其端委曲折非紀載詳明無由稽考且聖母皇太后懿訓之慈祥愷惻朕於此事始終經畫之宵旰焦勞不可不垂示後嗣子孫俾共喻保大定功之艱止戈為武之義著照所請行諸臣承命啓館纂修平定金川方略謹按前後用兵始末自乾隆十一年十一月訖於乾隆十四年四月舉凡聖訓之所指授章奏之所敷陳關於軍機窽要者編年繫日據事實書惟是臣等學植膚陋才識疎庸懼不足以鋪揚盛烈於萬一云爾乾隆十一年十一月丁巳原任大學士川陕總督慶復以金川土司莎羅奔肆横不法入奏略曰莎羅奔秉性兇悍結怨鄰封屢與革什咱土司争地近更自殘骨肉欺壓小金川臣於上年即聞誘縛小金川土司之語飭弁嚴查直至臣在口外已破瞻對方遣土目具禀稱伊與小金川本係叔姪因小金川無禮故加教訓非敢發兵争地今已遣人送回臣細察情形實為强横但念自在土司境内侵擾並非干犯内地若輕議討勦似非得計况伊與四面鄰封盡為仇敵即怙終不悛而以番攻番自可無勞兵力非若瞻對滋擾邉境必須急為翦除也奏入諭曰瞻對甫完功佳兵不祥卿所見極是然既有此事不可不留心也又諭曰如卿所見紀山能辦此乎乾隆十二年正月癸丑慶復奏言臣前陳奏金川莎羅奔肆横不法欽奉諭㫖詢臣紀山能否辦理臣查紀山前駐藏時於一切番情頗能留意抵任以來亦復力為經理臣兩次到川與之商辦諸務見其實心整頓不敢稍懈竊以為紀山辦此似能克副皇上綏靖邉陲至意奏入報聞二月癸酉原任四川廵撫紀山奏言金川土司莎羅奔於乾隆二年侵佔革什咱土司蓋古交等處四寨上年又誘致小金川土司澤旺奪取印信經臣與督臣慶復㑹飭查究始將澤旺放回歸還印信近又據打箭爐同知鮑成龍等禀報該酋修路造船𣲖兵把守甲索地方揚言欲攻革什咱臣現在飛飭各該管員弁確查實情一面繙譯夷語告示曉諭化誨並飭附近各土司宻加防範以杜窺伺惟是莎羅奔屢於蠻中造釁漸不可長臣與慶復商酌該酋如果負固不服只須以蠻攻蠻無庸用兵征勦奏入上命軍機大臣等傳諭慶復紀山曰據紀山奏稱莎羅奔侵佔革什咱土司地方誘奪澤旺印信並把守甲索欲攻革什咱苖蠻易動難馴自其天性如僅小小攻殺事出偶然既非侵擾疆圉於進藏道路塘汛無梗彼穴中之鬭竟可任其自行消釋不必遽興問罪之師如其仇殺日深勢漸張大則當宣諭訓誨令其息憤寧人各安生業蓋苗蠻頑梗無知得其人不足臣得其地不足守蜂屯蟻聚無足深較倘果有拒抗侵軼不得不宣布皇威用示懲創亦當相度機宜慎之於始切弗輕為舉動但不可因遵朕㫖即或有關國體不得不示以天威者亦一味因循惟在慶復紀山等詳察事勢令輕重合宜耳即如瞻對一事初亦非敢有侵犯而一經辦理不免命將出師並由京城𣲖員前進皆由事前不能先有成算以至於此足見控馭逺夷全在機宜合要邉吏喜於生事營弁不知逺謀往往過為張皇因小釀大不知千鈞之弩不為鼷鼠發機惟修繕守禦厚蓄聲威俾知畏憚奉法弭耳輸誠庶幾恩撫威懐各得其道也臣等謹按金川小醜陸梁自外王化守臣方有意翦除我皇上已深計逺慮謂苗蠻頑梗無足深較但當處置得宜使之畏威懐徳迨莎羅奔搆釁不已漸犯内地始加懲創以示國威洎乎窮蹙歸誠則仍受降不殺是我皇上不得已而用兵之苦心固天下臣民之所共曉而燭照幾先如運諸掌自始事以及乎訖事俱不出此諭㫖之中則聖主攘外安内柔逺能邇之神謨誠非臣下所能窺測萬一也丁亥紀山奏言莎羅奔於本年正月二十九日及二月初三日擅帶蠻兵攻圍革什咱之正地并刼殺明正土司所屬之魯宻章谷查該處去打箭爐路止四日該酋敢於攻圍殊屬不法爐地存城兵丁單弱恐該酋萬一猖獗不得不預為防範臣現在檄飭泰寧協副將張興酌帶官兵前赴爐地彈壓又查本年復設口外臺站原𣲖兵一千名定於二月内出口今亦飭暫留爐地協防以壯聲援再查威茂一協為川西門戸令該副將何啓賢酌帶本協官兵在雜谷閙等處防其衝突適䕫州協副將馬良柱因公在省亦飭令暫赴威茂彈壓倘該酋敢於犯及内地臣即咨㑹督臣調發官兵進勦奏入上命軍機大臣等速議議曰據紀山所奏莎羅奔攻圍魯宻章谷距爐宻邇已𣲖副將張興赴爐並留臺站兵丁協防又令副將何啓賢防範雜谷閙等處副將馬良柱前赴威茂彈壓即此辦理已屬周宻如該酋怙惡不悛敢有抗拒侵軼是逆天悖理自取滅亡即當用兵勦滅以彰國威惟是總統大員必宜慎重總督慶復既距川遙逺副將馬良柱恐難勝此重任倘必應用兵征勦應令廵撫紀山親往駐劄總統相度機宜一面辦理一面奏聞可也上從之三月戊戌慶復奏言接准撫臣紀山咨稱莎羅奔攻擊魯宻章谷等處地近爐城業經量添官兵防範又聞金酋有攻擊木坪之信亦已撥兵守禦臣思金酋兵勢雖盛離巢已逺豈敢遽越西爐而攻木坪總縁明正木坪兩土司年幼皆係土婦任事番性易擾是以傳播紛紛臣業將爐城防兵已多勿更驚擾飛諭各該地方並嚴諭該將等止許守險養威勿得邀功生事伏查金川人同鬼怪賤甚牛羊自頒授印信以來仍同化外與小金川土司澤旺本屬叔姪乃以女妻澤旺掌印管地全在土婦又嫁一女與巴旺土司其鈐制之法亦如小金川該土司不過空名而已該酋得此兩路隂收其民更欲争奪鄰封此番既攻革什咱又侵明正司此兩處土司豈容任其佔踞誠如聖諭有不得不示以國威者臣愚以為金川四面環山羊腸鳥道用兵之際餽運維艱止可令鎮將帶兵各據要害仍用以蠻攻蠻之法使小金川革什咱巴旺各伸報仇之心舉戈相向又令川西雜谷梭磨等侵擾其後我兵既無深入之憂可行可止操之在我似為得策是日又據紀山奏言據泰寧副將張興禀報金酋攻奪魯宻章谷番民望風畏避坐汛把總李進廷不能抵敵退保吕里該酋竟敢直渡河口招撫附近爐地毛牛一帶蠻民勢甚猖獗臣隨檄調建鎮標兵八百名並黎峩兩營兵四百名委逰擊保懐智都司茍興等帶領前徃瀘定橋清溪縣地方分駐彈壓又據川西文武禀報金酋分出一路蠻兵在川西雜谷之黨壩下營廹脅蠻民投順臣隨檄暫駐威茂協副將馬良柱帶兵四百名在雜谷閙彈壓以為雜谷梭磨等土司聲援伏思莎羅奔如此肆行侵擾其罪實屬難逭臣非不知瞻對甫平兵力自應休息但若不加懲創恐各土司或有效尤將來辦理更費周章與其日久滋蔓難圖不若此時聲罪致討為較易也奏入上俱命軍機大臣等速議議曰金酋既攻魯宻章谷又有分兵攻木坪之信逺離巢穴逼近内地其侵軼之意顯然且小金川巴旺兩土司皆妻以伊女隂收其民更欲争奪鄰封跳梁不法實與班滚無異從前班滚負固抗拒雖經征勦不過焚其巢穴不足以震慴諸番之心是以金酋敢於效尤漸加肆横此次必當痛加懲創大震國威始足以永奠番蠻前臣等議覆紀山摺内因慶復駐劄西安離川甚逺且其時賊酋恣擾尚在番地是以議令紀山前往總統今金酋勢既猖獗非僅以蠻攻蠻之策可以了事應令大學士慶復親身前往川省駐劄要地酌看情形若金酋竟敢越爐地而攻木坪或當分佈攻巢或當要截其後令慶復相度機宜妥協辦理當以瞻對為鑒毋致曠日持久倘該處綠旗官兵不免因循舊習應須請用在京官兵亦即行請㫖𣲖往可也上從之辛丑上諭内閣曰大學士慶復在外多年綸扉重地應召取回京辦理閣務昨嵗四川瞻對之役甫經告竣今又有金川番蠻肆横不法已命慶復相機征勦今思彼地番衆恃强生事屢屢不能安輯必須經理得宜始可永逺寧帖貴州總督張廣泗於此等苖蠻情形素所熟悉貴州地方張廣泗料理以來現在妥協苗種向化可以無虞川陕總督員缺著張廣泗補授不必來京即由貴州取道速赴川省大學士慶復俟伊到川之後將彼地事機情形詳悉告知或可回京或仍應留川一同辦理自行酌定不必急於赴闕也雲貴二省原係總督一人管轄著仍復舊制即以張允隨為雲貴總督圖爾炳阿著授為雲南廵撫孫紹武著授為貴州廵撫初瞻對之役張廣泗陳請親赴軍營相機籌畫上以將次就功未允所請至是始改授川陕總督壬寅上命軍機大臣等傳諭張廣泗曰四川為臨邉要地外接百蠻山深箐宻兼之諸番野性難馴恃强凌弱攘奪仇殺叛服不常數年以來屢多不靖上年瞻對復敢跳梁今又有金川肆横不法朕因張廣泗熟悉苗蠻情形已降㫖調任川陕總督矣前據慶復等奏報莎羅奔將伊一女妻小金川又嫁一女與已旺以為鈐制之方近攻革什咱之正地寨又攻明正司所屬之魯宻章谷番民望風畏避坐汛把總李進廷退保吕里看此情形則賊酋恃其巢穴險阻侵蝕諸番張大其勢并敢擾我汛地猖獗已甚張廣泗到川之日㑹同慶復將彼地情形詳加察度其進剿機宜作何佈置一切糧餉作何接濟善為辦理再瞻對甫經平定即有金川之事揆厥所由總因渠魁班滚未經授首無以示威使之聞風懾服即據報班滚焚燒自縊之處情節可疑焉知不詭計脫潛往金川勾通致釁張廣泗到彼正可詳細訪察伊於此案並未經辦自必無所瞻顧也至川省番蠻種類繁多歴來多生事端即如郭羅克於康熙年間横肆刼奪旋經安輯迨乾隆七年又復滋事其他如曲曲鳥夷等亦復自相攻殺後經發兵彈壓始得寧帖又如巴塘裡塘近因將汪結補授宣撫司其屬下遂有煩言蓋番性易動難馴尋仇報怨是其常事但伊等皆受朝廷封號給與號紙乃不遵約束互相戕賊即在土司地方蠢動不得不為防範已費經營若敢逼近内地擾我邉陲則聲罪致討更屬勞師動衆總因平日駕馭無方未有成算不能使之懾服畏威以致蠻氛未靖張廣泗熟悉苗情善於撫馭大扺番蠻與苖性相近今蒞川省即以治苗之法治蠻自能讋服其心消弭其釁務須一一通盤計算為永逺寧謐之圖可將從前川地所有辦過郭羅克曲曲鳥夷瞻對等及現在金川案件抄錄交張廣泗閱看俾豫知彼地前後原委以便熟籌經理副朕綏靖邉疆之意己酉紀山奏言前莎羅奔侵擾鄰番漸近邉境經臣節次奏明今該酋又勾結綽斯甲結隆冲二土酋攻圍霍耳章谷等寨又於吕里埋伏蠻兵遊擊羅于朝令千總潘洪向朝選土百戸得賴等帶領漢土兵六百名前往偵探堵禦行至中途猝遇蠻兵土兵不戰四散我兵奮勇扺敵帶傷外委二員陣亡千總向朝選一員蠻兵復直壓毛牛地方遊擊羅于朝出營扺禦帶有鎗傷千總楊璠亦帶矛傷副將張興聞報隨撥千總王智帶領官兵二百六十名前赴應援臣思該酋敢於傷犯官兵罪大惡極聲討刻不容緩臣已將從前豫𣲖漢土官兵先催分赴爐地茂保等處駐劄聴候至期攻勦至軍糧必須豫備打箭爐倉雖貯有軍米萬石但瞻對之役甫畢明正番民又新被擾害僱覔烏拉甚屬艱難川西茂州保縣素不産米青稞亦未成熟止可於成都等處附近州縣作速籌辦碾送其川西一路官兵臣現在飛咨松潘鎮臣宋宗璋令其速赴茂州就近調度彈壓並飭𣲖叅將蔡允星即前往打箭爐協同副將張興辦理川南軍務為此奏聞奏入上命軍機大臣等速議議曰金酋恃强肆虐吞併鄰番已屬不法今乃敢逼近内地抗拒官兵悖逆已極自應迅𣲖兵丁遴選將弁統率前往相機進勦紀山雖稱已將豫𣲖之漢土官兵先催分赴茂保等處以備攻勦但此番料理務須大振兵威痛加懲創方足以殄除逆類永净蠻氛本月初八日臣等已議令大學士慶復前往川省酌度情形妥協辦理又奉㫖以張廣泗總督川陕令其速赴川省㑹同慶復將𣲖兵運糧諸務善為籌辦今應再催張廣泗剋日到川㑹商進勦機宜慶復張廣泗未到之先一切佈置防範交紀山詳慎經理至於軍糧最關𦂳要紀山既稱僱覔烏拉甚難川西青稞未熟應如所奏即於成都等處州縣速行趲運以濟軍需或有附近軍營倉糧較成都等處更為便㨗者亦准先行撥發應用俟成都運至陸續補還並令一靣辦理一面奏聞可也上從之是日上又命軍機大臣等傳諭張廣泗曰據四川廵撫紀山奏稱莎羅奔勾結黨與攻圍霍耳章谷千總向朝選陣亡並侵壓毛牛鎗傷遊擊羅于朝經軍機大臣議令該督撫等迅𣲖官兵遴選將弁統率前往相機進勦朕已令星速行文知照前將張廣泗調任川陕總督諭令速赴川省今觀紀山此奏勢不可緩可再傳諭張廣泗令其剋期前往㑹同紀山相度機宜如慶復已經赴川即著一同商酌進兵迅速勦滅毛牛廹近西爐逆酋敢於侵擾傷及官兵猖獗若此總由前此瞻對之事辦理未善無所懲創不足以震懾蠻心且所遣將弁輕率寡謀不知用兵節制兼之崇山宻箐餽運艱難曠日失時烏拉死傷甚衆此皆前事之失可為烱鑒此番千總陣亡由於䧟伏遊擊甫經迎敵即已受傷官兵輕進取敗土衆望風奔逸其疎忽輕遽漫無紀律已可概見張廣泗從前辦理貴州苗疆尚為妥恊此次進勦一應機宜專聼張廣泗調度申明軍律指授方略迅速進兵務令逆酋授首剗絶根株永靖邉境張廣泗有在黔所知習於軍旅臨陣勇敢足以出竒制勝之將弁欲帶往川省驅使者亦可酌量帶往一靣奏聞臣等謹按瞻對㨗奏初至慶復以為燒燬碉樓班滚業經焚斃我皇上洞燭情形即謂班滚狡計百出無安坐受焚之理所奏非實既加訪察班滚果已脫逃而將弁之輕率寡謀主帥之經理不善無一不在聖明鑒照之中兹金川之役以張廣泗曽在苗疆著有成績是以推心委任一應進勦機宜悉聴調度而以瞻對之草率了事為鑑前車其付托之專壹指示之明切膺斯任者宜何如抒忠奮勇仔肩重寄也癸丑上以廣東右翼鎮總兵許應虎與四川建昌鎮總兵畢映對調令速馳驛前往隨命軍機大臣等傳諭慶復張廣泗曰許應虎已降㫖調補四川建昌鎮總兵伊前於廣西義寧軍營奮勇出力著有勞績今來京引見朕觀其人勇往壯健歴練行陣如金川用兵有應用總兵大員之處就近與宋宗璋一同調委統率當於軍務有益是日四川副都統卓鼐奏言奴才在川聞知金川蠻酋搶奪土司革什咱及章谷等處地方廵撫紀山調兵防禦伏思此等逆酋跳梁搶刼若不行勦滅無以懾服諸蠻奴才已於成都滿兵内挑選鳥鎗兵六百名弓兵二百名倘蠻酋敢於侵擾内地即將此八百名兵酌量帶往以為勦滅之用奏入俞㫖報聞甲寅慶復奏言臣於二月二十八日自川起程囬西安准撫臣紀山咨據副將張興禀報遊擊羅于朝因蠻兵有在吕里埋伏之信令千總潘洪向朝選等帶兵偵探行至中途蠻兵從山㘭突出將土兵冲散漢兵奮勇扺敵互有殺傷千總向朝選陣亡張興聞報隨撥兵前赴應援羅于朝仍收兵徐歸大蓋又飛催遊擊保懐智帶原駐瀘定橋之兵來爐等情臣查副將張興調遣失宜遊擊羅于朝貪功冒進咎實難辭惟是蠻兵既敢與官兵對敵又有殺傷勢難中止自須大振國威然後可以懾服番衆前准紀山商調漢土官兵南路𣲖調官兵二千六百六十名西路𣲖調官兵二千五百名其土兵臨時酌調紀山又商請仍調西寧兵為接應臣以西寧兵不應再為調遣因預𣲖臣標屬兵二千名興漢鎮屬兵一千名倘有需用隨時徴調今接准軍機大臣等傳諭令臣親往川省駐劄要地相度機宜妥協辦理臣即於十五日起程前赴川省㑹同紀山悉心查辦其一切籌餉𣲖官分路㑹勦及鑄砲各事宜容到川恭摺分别奏聞至應否須用在京官兵之處亦俟臣審看情形再行請㫖定奪奏入上命軍機大臣等速議議曰發兵征勦臨機應敵必須就近調撥使師行不勞而轉運亦省方為有益前據紀山奏稱已調過建鎮兵八百名黎峩二營兵四百名威茂協兵四百名又留臺站原𣲖兵一千名并檄行裡塘土司汪結帶土兵一千名現據慶復奏稱南路𣲖調二千六百六十名西路𣲖調二千五百名是所𣲖各兵應已敷用即再須調遣自可於川省近地酌撥不必因一時用兵即於他省徴調慶復所奏督標興漢各兵雖經𣲖定且不必遽令前往如或必須調用然後酌量起行至砲位雖係軍營所必需但各標協營均有存貯撡演之砲原以備攻戰之用此次攻勦金酋所需砲位川省各營原貯之砲自足應用若毎一用兵即皆臨時鑄砲轉恐躭延時日未能即得應用况從前瞻對用兵已經紀山等奏明鑄有劈山砲位又有借用貴州之砲於此次軍營是否足敷應用抑或必須添鑄之處應令慶復一并妥酌具奏可也上從之是日慶復又奏丁憂昭通鎮總兵董芳素悉其能請㫖帶赴川省又漢鳳營叅將烏徳納候補叅將郎建業張豹臣標左營遊擊王世泰後營遊擊孟臣寧夏鎮標右營守備楊崑均堪驅策統請帶往以備差遣上命軍機大臣等傳諭曰慶復所奏帶往川省之烏徳納等六員俱准其帶往至董芳不過一聰明人朕所深悉雍正十三年伊身係提督在副將軍任内並未成功且致獲譴今現在丁憂即破例調用亦於軍務未必有濟可不必帶往新調建昌鎮總兵許應虎已令馳驛赴川有應用大員之處隨宜委用當有裨益平定金川方略卷一
