body:
  text: 藝文平定金川雅有序兵部尚書臣梁詩正金川地居西徼為隴蜀荒服侵軼鄰壤遂邇邊圉大師臨境猶負固首鼠天子震怒特遣大學士傅恆經略之授以勝算佐以雄兵電赴星馳刻期底績既殱諜黨旋逼穴巢酋首窘蹙乞哀我皇沛解網之仁矜彼孤窮許其納欵于是蠶叢永靖虎旅遄歸天子乃行賞䇿勳上陵告廟樹豐碑於太學晉顯號於慈宫九有咸歡八方同慶臣詩正躬逢盛事不揣弇陋敬獻歌詩四篇用追大雅遺音于萬一有繹美出師也上命相臣恆西征特行推轂之典復親餞焉有繹西土卭筰作圉蕞爾金川嵎險是阻鄰壤是侮煩我戎旅一章爰植我矛爰彀我弓敢固爾墉弗迓我攻曰重巖是宫二章皇怒斯赫乃集羣策桓桓相恆邦之柱石投袂請行孔武且繹三章皇曰汝恆汝其西邁豫推汝轂汝專閫外克掃欃槍維豫斯惠四章廟算孔長我伐用張皇親餞之貝胄其光旨酒其芳戎車載揚用綏我西疆五章有繹五章三章章六句一章五句一章七句戎車翦二豎也良爾吉阿扣為賊耳目經略至營即擒斬之諸畨懾服戎車既西相恆之傑旦河之秣夕蜀之轄修途嶻嶪遂溯厥穴一章厥穴匪遙乃陟崇椒六師如雲如雲如濤嗟彼遊魚釡鬵曷逃二章粵兹二豎肘掖斯挾恃其狡悖實夷之諜數辭以戮駢首俯帖昔嶺左右罔不震疊三章乃掊崇垣崇垣則頽乃伐髙林高林則摧乃礪我刃乃淬我鋒中堅是衝允焉獻功四章戎車四章二章章六句二章章八句繁雲番酋降也孤壘窮蹙稽顙乞命天子赦之以綏寧荒服繁雲其垂條風聿吹番酋既讋既讋且哀乞貰餘生延頸思來一章有嚴上相秉猷克壯屏除柞棫蒙穢斯蕩弗允其求以遄厥向二章皇曰念哉我置孔恢誰非我民是翦是夷在昔用師彼昏則迷既服爾辜豫其宥之三章爾戈既投爾甲既積遂詣壘門弭耳搕額膝行蛇伏戰戰虩虩約法永遵面汗心革四章崇壇載設元戎聿登羣侯咸在赫赫明明告以皇威涕泗沾膺皇威既宣六師乃旋五章繁雲五章二章章六句三章章八句鸞鑣告成功也皇心悅豫闓澤覃敷巨典鴻文次第修舉臣民樂觀其盛焉鸞鑣載和自彼山阿相鈞入秉嘉績孔多上公既建儀服有加皇曰汝恆匪獨豫嘉上承慈宫亦惟汝庸一章慈宫之訓帝德之運大化以翔佳兵益慎爰諏吉日徽稱是晉景福無疆萬邦咸順二章春露既滋春礿孔時我皇孝思告成有儀曰此武功祖考之貽自東徂西象車載馳三章武功既敷文德斯渥爰樹貞珉璧雍之度雄詞有倬天子所作日月之光炳炳爚爚四章維大清撫御克綏四宇西戎既敘諧燮率土罔有內外悉臣悉主天保采薇治隆于古於萬斯年其承皇之祜五章鸞鑣五章二章章十句三章章八句平定金川雅有序禮部侍郎臣秦蕙田皇帝撫萬方丕冒所暨罔不率俾乃金川不恭敢怙險以狂戎臣失律未即厥辜帝乃震怒有相曰恆請往視師用推轂授鉞以行如霆如雷同惡就殱賊禠氣攝魄匍匐丐厥生相請究功帝曰吁勿盡劉其與惟新以懷以柔賊用革心奔走憬附厥角獻琛於相恆恆以天子威德即撫諭之振旅而歸出師不五旬而金川以平臣惟王者之迹莫備於詩蓋所以歌功德被管絃表金石也今聖主仁武懋昭綏逖荒徼成算所授往返若飛雖虞后之格有苗殷武之入荆楚其膚功迅烈猶或未逮誠宜有風賦雅頌以昭紀聲績臣竊觀史籀吉甫撰宣王之風韓愈栁宗元鋪元和之伐區區之愚知莫可倫擬妄冀有所頌述謹擬平金川雅十二章章八句敢再拜稽首以獻其詞曰皇怙萬方內豫外謐西南之荒有狡不失戎臣乖計是玩是軼是震是怒奮我皇鉞侯誰一德克忠厥圖乃咨相臣汝豫往誅既類既禡既餞于衢厥徒五千匪安匪舒惟此相臣克勇以忠底天之罰匪圖爾躬金川之阻其山萬重匪載匪乘徒行以通金川不譓匪鑒匪茹襟其川溪謂險可據相臣至止聲罪以數執訊匪徐賊用狼顧怒麛抗嶽云胡不亡其巢孔完我摧孰當厥角稽首籲生以降士怒未泄煆我斧斨天子曰咨孰匪赤子彼歸而誅胡寧忍此其汝豫撫勿踣勿犄我疆則敉我戎則弭天子曰咨民亦勞止載櫜汝弓惠我耕市匪缺我錡匪折我矢告於慈寧載色載喜小人革心爰來爰安率彼羣醜局於軍轅相以帝言滌爾疇愆載栗載欣歸琛有虔帝謂相臣歸弼朕躬豫嘉汝績建汝上公錫汝豹尾龍袞以庸暨汝將士第功以從相臣振旅言歸于京對揚休命告功之成燕譽于庭王侯公卿鼓瑟吹笙孔燕孔寧告此武功于郊于宗思樂聖母徽册是崇蜀民既安侯農侯工金川率從天子之庸於赫皇武乃武乃文刻銘于碑以播厥勳龜趺龍額于黌之門若日月光式是後昆平定金川雅有序檢討臣夢麟皇清受籙彼蒼繼序維皇欽若勿怠天眷茂德用錫全宇以定厥家陸讋水栗崩角來庭幽崖朱垠畏稜莫亢歲丙寅金酋搆逆弗靖厥疆特命大吏馴兹蠢爾非無熊師羆旅吐爓生風殱厥醜類帝以蜂蟻未與較也戊辰守者弗警跳梁逾嵗帝乃撫版圖而赫然曰嗚呼維皇天祖宗庇余一人以撫兹寰宇氐羌蠻夷余一人實統御之小醜之不克服其何以柔逺人也惟兹一二重臣弗艱底績曰汝恆汝惟盡瘁為邦心膂一國家事假汝節汝其視師西川刑賞黜陟汝擇自從勿怠勿縱以對揚余休維十有一月天子虔告於廟既禡既類苾芬用饗百爾執事周旋餞塗干戈矛鋋欱噴山野淵淵闐闐雷奔電騖固不必載涖蠻疆而義色仁聲已蹂躙其十二三也癸丑整師西抵軍頑酋誅番氓懾柞棫拔行道兌一月三捷碉卡垂盡怪鳥藩羝退遂罔措鼠竄喙息嗟呀祈命斯時也軍威暢天武揚部曲方張士怒未泄赫赫濯濯聲靈遐亘大學士方欲誅厥渠魁用彰天討固拒而未許也天子曰於豫一人布德四裔絶界不鄰胥吾蒼赤矧兹逆虜震驚胡赦之靳汝恆其納賊降以贊元化降之日幡幟高揭將士歡呀賊囚鞠􅎽囚服泥首大義昭明番氓股栗用獻賮琛長願臣僕二月全川平臣謹按金川僻處遐荒厥土為不毛厥氓為醜虜今不三月而地失其險人革其心非聖謨之逺彰將略之遐著何克臻此而且嚴厥征討播神威也留厥種類示殊恩也感恩畏威永永無極以視古之聲教遐訖神武不殺者夫豈多讓昔唐憲宗取蜀平淮臣叛地復事無足侈而韓愈栁宗元之徒見諸詩歌鏗鍧典麗詞足以耀之也臣謹採古義撰聖武逺揚雅十章章八句亦詠歌之遺意爾聖武孔揚於鑠斯張我車既飭于彼殊方曽是厥子而父乃亢武夫洸洸以屆蠻荒蠻荒伊何維蜀之右大明麗天魑魅肆醜薄發我疆薄煩我旅擾我邊陲驚我士女爰咨於相惟汝往諧于誅于宥厥衡弗乖汝一汝德汝振汝旅有苗是格余錫汝祉相臣拜手維命乃庸是載是何以集厥功黃鉞白旄戎輅熊旗朱芾斯皇于郊之西出次于西于郊于野何以餞之稱觴奠斚珊鞭寶埓靈風肅然百司進止秩彼豆籩蠶叢是抵層冰嵯峨雨雪其雱雄風來加馬足有蜷杖䇿以過相曰勿亟余亦委蛇委蛇維何日六十里步豈不艱純忠被體我部有苖從貌悖心爰置我理以憚彼忱彼忱既憚余威乃揚覆彼穴巢折彼斧槍月匝捷三賊志云戢泥首軍門戰兢涕泣維相曰嘻汝險奚恃赦豈云艱惟汝辜死天子曰俞我鑒匪殊革心恕體汝歸相豫震是西南汝無額額豈不爾誅帝衷仁宅我威既烈我武孔揚不殺而降為奕祀光平定金川頌謹序大學士臣史貽直欽惟皇上御極之十有四年海宇升平人民樂業文教四訖武德逺揚絶域輸誠遐荒納欵洵我國家全盛之時億萬年無疆之慶也金川小醜僻處西陲蹂躪鄰封跳踉邊境我皇上智臨萬國仁覆羣生六合為家何忍置之度外一夫不獲即思引為已辜爰問罪以興師務除殘而救暴速期底定俾警愚頑而前此任事諸臣經理失宜蕩平乏策臨敵而幾成束手任伏莽于林中籌邊而未克殫心等逍遙于河上遂致老師糜餉曠日踰時欲奏膚功迄無成算我皇上乾綱大振巽命重申特遣輔臣親授方略睿周事後哲炳幾先定一舉之功六師並出成百尅之計十道齊飛鞗革鉤膺臨軒而錫上將白旄黃鉞推轂而命元戎於是輔臣虔稟廟謨恭行天討兼程並進都忘蜀道之難并日疾馳爰俟大兵之集必使犁庭掃穴執馘獻俘慰黼座之憂勤靖邊圉之氛沴乃軍營甫蒞威令旋伸立誅耳目之姦已去腹心之疾金戈所指山嶽傾頽白羽一揮風雲變色羽林並奮虹霓耀鎧甲之光桴鼓親提雷電駭征鐃之氣在我師則搗虛批亢士馬歡騰而彼境則脫甲摧鱗番苗膽落計窮勢蹙歸命投誠謹約法於六條子孫戴德尚逃藏於三窟狐潛蹤而輔臣則必欲剗厥根株傾其巢穴彼聞號令愈切憂惶我皇上憫其無知貨以不死謂好生者天地之心而包蒙者大君之度始則以鴟梟成性何難聚族而誅繼則以螻蟻貪生奚忍刑兹無赦班師振旅爰昭不殺之恩息鼓偃旗更寓止戈之武在昔虞舜舞干而苗格周文因壘而崇降胥是道也爾乃尺一甫頒番苗立化傾心革面率衆偕來而輔臣亦克仰體皇仁洪宣聖德登臺諭衆升帳受降玉螺吹而椎髻搖銅鼓擊而文身踊銀鏤與曇花並耀爐煙偕嶺草俱香於時伏罪則涕下沾膺乞命則膝行稽顙羣番鼓舞諸部駢闐歡聲若雷聚觀如堵是役也奉牙璋而往甫及三旬飛露布而來不踰八日此固輔臣忠勤自矢遵行訓示運韜略以無違實由皇上宵旰不遑籌度機宜合恩威而並用時行時止妙用協乎隂陽知柔知剛大道符乎健順仁而兼義總歸物與民胞愛以克威羣仰存神過化日月照而霜露隊血氣莫不尊親干戈戢而弓矢櫜太和於焉保合所以雪山崒嵂倏回大地之春金水瀠洄盡沐一人之澤蠻氛由此而盡息邊徼由此而敉寧成王者無外之規錫四海蒼生之福亦何必繫長纓於闕下始暢威靈築京觀於軍前方稱神武也哉臣幸逢盛世快睹洪猷未能擐甲荷戈踰險阻而躬親矢石竊願含毫濡墨紀謨烈而著美縹緗從此比戶可封普天同軌麟遊鳯舞被化於飛走之倫山峙川流效職於清寧之宇千秋紀瑞萬祀垂聲猗歟盛哉不揣荒蕪敢申揚厲謹拜手稽首而獻頌曰於鑠皇武逺播八埏蒸徒仡仡薄伐金川呌呶跳蕩翦滅遷延天討有罪巽命重宣其一皇咨於恆汝往統師番苗肆虐徯汝平之爰整其旅秉鉞以馳風驅電掣速靖西陲其二岧岧昔嶺鬱鬱巴郎﨣﨣禁旅按律整行霓旌具舉象弭斯張炮聲雷激鐵騎雲翔其三蠢兹番苗聞風膽落鼠伏藏憂心如灼析骸而炊易子而􅌜敢拒王師焉辭鼎鑊其四危巢岌岌孰與為謀投誠歸命生或可求返我侵掠獻我戈矛臚陳六事哀此蚍蜉其五帥為不聞定謀掃穴汝恃爾險中峰巘巘雲梯先登是刈是捩痛斷根株以清番孽其六天子曰咨一德惟恆如子事父受命兢兢包蒙則吉罔或不承勿乘其墉勿升其陵其七番苗悔罪革面革心軍門輸欵爰獻其琛哀哀籲請勿膏鈇椹喻以禍福感悅涕涔其八始時番苗野如枝鹿今懾皇威形如稿木始時番苖逰梁跳陸今懼天誅力窮勢蹙其九始時番兵思抗天兵今胥內附願為聖氓始時番苗鈴柝夜驚今胥向化壺漿晝迎其十班師振旅天子曰忠丹忱貫日爰錫爾公還歸綸閣來輔皇躬文武是憲嘉爾元功其十一飲至策勳天子曰勇蹇蹇匪躬罔恤頂踵五服五章為汝光寵補袞是資垂裳端拱其十二命將興師天子之武撻伐用張桓桓震怒禁暴除殘曷敢余侮番苗來庭敉寧西土其十三決策發謀天子之智密運神機潛天潛地廟算靡遺番苗心悸奔走偕來屬我守吏其十四服而舍之天子之仁柔此萬國詎遺番民並生並育以陶以甄懷我大德皇路同遵其十五來王來享天子當陽武功赫濯文治光昌六府胥治三事允臧於萬斯年聖祚無疆其十六右頌十六章章八句平定金川頌有序協辦大學士刑部尚書臣阿克敦蓋聞綏懷端在文命而耆定厥有武功盛美用昭譜之鐃吹大猷斯煥鐫以鼎鐘維皇帝御宇之十四年二月望前一日平金川捷奏上聞三輔歡騰祥開九土兩宫錫慶霽麗層霄先是沙羅奔狼卡二酋者等夜郎之自大類有苗之弗恭絶險偷安聊成蟻聚經時緩死惟待鷹揚自擁麾乖統馭之機專閫鮮忠誠之節緣繩度索屢煩諭蜀之文束馬懸車未著籌邊之效於是經略大學士忠勇公傅恆桓桓策府親受廟謨仡仡元臣特膺帝簡丹誠皎日三門騰踔熊羆浩氣元雲八陳糾盤龍虎旌旗遙指象地水於行間帷幄高騫肅風霆於部下山連雲棧不言繭足之勞雪積桃關益勵援桴之志封章夜草良謀悉合神機羽檄朝揮妙算能驚鬼膽良爾吉者性同狡兔為窟多方形似妖狐依城有術至則殱諸賊界傳示羣番姦首先誅早奪么麼之魄堅碉繼克益張撻伐之威飛炮轟雷則凶徒粉潰髙牙摩漢而妖壘洞開橫玉弩以星馳直壓巴郎之境揚雕戈而電掃平臨刮耳之崖鼠有穴而將夷岌乎授首虎在嵎而難負渺矣遊魂所謂無敵弗摧趁秋風之捲籜何功不克舒夏景以融冰矣爰乃椎髻斑衣束身匍匐花門卉服泥首逡巡氣盡析骸自分鯨鯢是斫誠傾乞命誰令天日重瞻經略大學士忠勇公乃敬布皇仁三面解好生之網式宣明詔七擒成不殺之功聖朝之逺略方新上將之神威有耀誓深六事指海枯石爛以無渝臺聳千峰與日照月臨而並峙乞慈化國虔頂金仙作鎮蠻荒願祠銅鼓以及火山獠洞水寓苗陬一皆懾以皇靈濡我元化莫不歡欣鼓舞厥角如崩震動恪恭剖心無二馳書獻捷杏花飛露布之香振旅班師楊栁揚春旗之色在昔有媯舞羽來格猶俟七旬涿鹿興師一戰尚迷五里蕩平也如彼神速也如此惟帝曰俞嘉乃丕績惟臣欽若告厥成功蓋歷覽夫前編未足方兹隆軌從此十洲環海咸滋太液之波萬里層城並蔭甘棠之樹奇肱鑿齒候夜月以歸琛蟠木流沙驗天風而納賮臣躬逢景運職領清班敬竭固陋之忱敢效賡揚之義爰拜手稽首而獻頌曰皇帝至德承天之祜曰日以暄曰雨以澍八紘遙逺氣煦體嫗蠢兹彈丸敢負厥固邊吏爰訴匪德攸喻太阿在懸皇帝聖武疇咨奮庸傅巗有相風后力牧欽哉汝往山川輝光風雲詄蕩堂堂六師欣得大將錫之熊旗彤弓交韔于禡于社威命用享相拜稽首廟謨孔昭元戎十乘自我西郊天子餞之金尊翠翿百辟卿士涖班不恌乃訓于羣帥如虎斯虓川流山苞用靖繹騷攸攸斾旌于晉之陽自隴徂川載馳弗遑雪山峩峩大渡洋洋桃關嶔崎舍我乘黃渡瀘伊誰我其敢康下馬率先以達於殊鄉我師既陳先殛其醜誕告爾諸番惟大義之剖乃勵九攻高驤罔後奮我震霆重摧疊朽有凶而伏無鋌而走悔為戎首自罹大咎易子析骸是用告哀蹙蹙稽顙乞其孑遺凸面凹頂繫囚纍纍兒號婦啼昔嶺之崖言言語語謂前蹈于狂迷帝仁如天服則舍之其時仲春月之五日爰受其降高臺崱屴維彼渠魁懼弗敢匿維六事永遵曳踵行膝何遐何荒我威我德其自今以往順帝之則帝曰汝相豫嘉汝庸加汝章服爵汝上公曰汝遄歸日贊贊我天工豹尾揚揚宛馬龎龎翩彼春風言旋于東僰叟巴童歌舞率從五旬告功闐闐振振臨軒受之蠻方耆定煥乎有文皇謨帝訓勒之辟雍惟德廣運億萬萬年宣昭令問用告于天祖載篤其慶惟天惟祖景命溥將兩宫燕喜純嘏是常鴻名顯號玉册金章惠此萬國俾壽而康山梯海航近天子之光屢豐穰穰容保民無疆平定金川頌有序禮部侍郎臣齊召南乾隆十有四年皇帝神武平定金川仲冬命將徂征孟春奏捷下詔班師受其降而不殺也殷武商名頌克鬼方以三年周宣江漢常武之雅近在徐土淮南猶且揚詡鋪張傳播千古況皇帝豐功偉績如是赫赫明明可無歌詩追配於商頌周雅臣愚不自揆倣古以為此詩赫矣聖武纘我列祖以篤其祜命將鞠旅自天而下叶討金川番鹵罙入其阻莫我敢拒其逆是取其順斯撫不留不處前歌後舞以寧疆圉以福我寰宇一章蠢爾金川𨽻我蜀邊馬羌狗蠻窟于雪山雪山巑岏維石巉巉接岷連岍有水蜿蜒羊腸屈蟠恃險而顚乃番簇是兼乃爐地是覘乃碉樓是堅抗我戈鋋二章皇帝曰咨芽枿勿斯將成柯枝閫外誰司天誅是稽我庸治之以警恬嬉聖算深奇勿疑勿遲與神為謀叶曰往視師汝傅恆宜將熊羆虎貔以揚皇威三章維十有一月皇帝齋祓廷授之鉞禁旅偈偈旌旗發發既禡辭闕如火之烈如水之活如矢離筈馳抵賊穴旬日而達雷轟電掣何勍不折何險不拔四章大兵堂堂師律孔明叶鼓向前岡狐鼠敢當走喙且僵誰謂山嶈嶈如趨康莊誰謂水湯湯如度橋梁誰謂碉可藏如隤土牆殱此披猖如炳太陽以消雪霜五章番乞降恐後相臣上奏且俘羣醜蕩彼林藪皇德高厚曰豫聞大道叶驅左驅右寧失飛走矧亦童叟降安可勿受詔書下趣酋面縛泥首率千百其耦泣奉牛酒六章奕奕膚功閲月之中宣示臣工即酬爾庸歸錫彤弓惟休兵重農偃革銷鋒當春始融甘雨和風澤普萬邦叶惟皇威與天同斯罔不恪恭惟皇德與天同斯罔不包容七章聖武昭爍伊止戈是樂紹祖宗神略文德無弗格環海之博是疆是索是耕是鑿吹豳飲蠟萬類時若臣忝佐宗伯實司簡册頌詩有作庶繼桓酌垂示無斁八章平定金川頌有序刑部侍郎臣錢陳羣皇帝十四年二月經略大學士忠勇公臣傅恆既平金川捷書奏聞羣臣稽首呼萬嵗上欿然曰非豫之力乃五后之德文母之訓親詣慈寧宫稱賀行慶典布告天下惟時廷臣咸作為詩歌以紀功德臣伏考史册所載黃帝師涿鹿髙宗伐鬼方周文之於崇於密傳及孫子宣王薄伐玁狁未有不戰而能成功者惟書稱有苗來格乃在班師振旅之後後世言武功者未有倫比今金川番酋恃險搆釁阻閡聲教大學士忠勇公恆祇受廟略師壓境斬偵諜嚴紀律申六事渠魁懾伏無所逃罪俯首乞命皇上恢湯網施堯仁憫其窮而求活命恆納降班師苗至頑蠢罔識天地高厚焉能揣測大聖人度量涵育帡幪異類而革面革心傾巢穴以奉皇師戴上將如慈父母自推轂以迄成事未逾七旬膚功克奏噫何其神也易曰信及豚魚書曰惟德動天無逺弗屆非夫聰明睿知神武而不殺者其孰能與於斯蔡沈言舜之文德非自禹班師而始敷苗之來格非以舞干羽而後至今皇上之推仁也以天自處即沈所謂干羽之舞雍容不迫是也番衆之歸仁也自動以天即沈所謂有苗之至適當其時是也以今視昔殆有同符臣愧無文未能鋪揚駿烈垂于無窮恭繹古今來感通之理天人相與之際風之自也微乎微乎其信然矣謹再拜稽首而獻頌曰猗與帝文萬宇絪縕爾師爾君股肱惟諧威畏德懷徼外其來廣漢之羌秃髮在唐秃髮訛為吐蕃金川其遺種也種人狡狂金川憑阹鳥語獸居釁仇鄰墟天討用申戎車侁侁往綏邊人後先委蛇齟齬老師皇帝曰嘻匪恢我圖任彼負嵎而乃稽誅曰惟相恆一德欽承鉞授壇登宴餞作歌益兵番番廟算孔多出自桃關冰行雪攀天射之山至師殱凶賊心受攻摧其卭籠後漢書冉駹夷依山而居纍石為室又卭籠注今彼土夷人呼為碉也隱阿嶔岑無峭無深回面改襟皇帝好生曰納其誠相勳豫旌爵汝桓圭載歌以晞振旅來歸曰惟上公實勇實忠神明其通賊舞且呶迎我旌旓入穴出巢總戎糾糾率是豪酋獻琛而謳約誓既嚴戴天心忺日輝露沾二月捷聞西顧歡欣寧民息軍凱入春韶龍旗展霄皇帝受朝樂響賞行中外鏗鍧大清天聲告功上陵僾愾薦馨惟祖考靈始時金川服則舍旃聖母命宣祇崇徽音惟孝治心穆穆愔愔天筆隆隆碑于辟雍厥光熊熊蜀民亦勞今者嬉敖既載既燾惟德惟刑逺人勸懲王道永凝泰來之詒上下福綏鞏太平基平定金川頌有序順天府府丞臣馮燝皇帝襲五后之純熙昭登明德敷聞彝訓運淵默鏡宇宙巡靖黎庶宣序品物絪縕紛綸覃及乎海外罔不摶心戢志勤恁旅力允臻王路虔奉我丕天之大律皇帝有事於四方咸若稽卜筮信孚在下乃惟純佑秉德之臣曰恆皇帝灼見厥心克宅以常伯常任以由繹其德用克和我庶政張皇我六師以揚我聖清之丕顯成烈惟十有二年梁州之守臣來告曰金川之蠻弗協於厥類介恃厥衆敢用憑負以即於大戾今不正厥後亦不懲皇帝曰吁爾勤恤爾土戢爾士爾惟時動以威敬哉用咸致秦涼益黔荆衡巫巴之庶士庶長越我御事以西討於金川遏之絶之乃或徐之惟弗敬厥事時則諜有間之越二年罔克告績皇帝曰嗟勩哉我西征之士帥弗用臧俾我衆則瘁豫一人其敢有佚罰亦惟咨爾有臣疇克知天威奮我衆毋怠毋豫往既厥事恆拜稽首曰惟國家先正之臣義厥義臨事勿讓臣尚克綏暨顧以肅將天子之明威皇帝曰俞哉惟汝允諧乃告於廟宜於冡土錫以鈇鉞雕甲龍旗癸丑皇帝臨門以餞元戎五千帥以西邁逾河涉隴遂濟二江越卭崍登天赦隨山刋木束馬以度己亥元臣至於軍討我拜諜俾伏其辜爰總我五帥十有二師降旗奔醜揚武乎昔嶺卭籠摧撓悍夷咸請命於我師相臣曰肆哉我士豫畏天明惟曰干紀亂常者誅罔攸赦爾尚輔豫欽承天子威命皇帝嗟蠢兹有蠻既懾既震勿庸殺之姑惟宥之惟皇太后咨於爾恆用大降爾蠻民之命亦惟爾恆克丕有顯績豫視功載建爾於上公來復相豫以康宅天下相臣乃以天子命俾帥臣諭丕德於金川金川之人咸曰徯我相我志其允格二月癸未受降于壇越既望伻以露布來獻皇帝曰朕承天序遵祖法綏靖我家有罪不敢赦武亦不敢極豫敢曰尚配虞帝之顯德豫惟五旬爰格有蠻兹亦惟天丕建我宗社萬億年無疆之休越我皇太后朝夕訓迪之德咨爾典司其敬告於郊廟允隆我聖母之丕顯休號於是羣臣咸進曰聰明睿哲神武不殺洋洋乎若德帝者之上儀誥誓所不及已皇上仁育萬物義正萬民仰惟前代實與虞帝同德宜崇顯號施尊名令萬世常載巍巍顯翼翼因集展采錯事之臣俾正列其義祓飾厥文以宣究無疆之大烈皇帝謙讓而未悉俞也臣拜手稽首而獻頌曰皇受祖德既蓄萬邦曰威惟畏曰明惟明含厥荒穢合由以容逺撫四極亦是率從孰居西徼頑不即工曰惟金川實古冉駹陵彼種人以桀以訩帝謂守臣往遏其封金川非茹干我顔行卭籠是恃邦汋是通王旅逺阻不時告功念我征夫罹此瘒瘃念我農夫瘁此巖谷皇曰相臣汝惟同德則厲其嚴則勺其慝是拔是震是絶是忽汝惟腹心錫汝斧鉞女惟干城錫汝雕甲朱弓緑縢盧矢四發王旅燀燀蒸徒焞焞奮其愾怒如霆如雷相臣率止既協而歌履彼天險如平不陂沫水湝湝天赦峩峩殱彼攸諜大膊厥徒相曰耆之以肅王誅惟帝之武曷強弗斫惟帝之仁曷柔弗育謂我相臣爾公伊濯龍袞在笥桓圭是爵惠康我民還師偃伯乃惟鍾琪克獲厥心弛其刑梏諭我德音稽顙壇下俾獻其琛恆秉義德揚帝之明澤枯以膏析酲以醒遵我六事來復邦經帝嘉元功爰降命書疇以虎賁豹尾神旗王師之出時惟五旬式是干羽放虞之文帝曰匪豫實宗社之佑繄我聖母丕訓則懋義曰止戈無競維厚金川既寧王會畢圖官臣拜手惟帝之謨平定金川頌有序原任詹事府詹事臣陳浩臣聞大德好生秉仁心以涵育神武不殺揚義問以昭宣恩威丕振要荒普天被澤遐邇均歸幬載率土輸忱格及三苗帝世舞兩階之干羽化行九域王朝集萬國之共球自古所傳於今為盛欽惟我皇上乾元錫福泰治綏猷湛露洽堯天躋八紘於仁壽和風周禹甸被四表以光華臣民是訓是行遙孚鑿齒雕題之境小大來王來享遍逮穿胸䫜面之鄉詎玉壘之窮邊蠢焉搆釁惟金川之小醜率爾跳梁雖蝸角相爭初無傷於治化而犬牙互錯實自速乎刑誅在聖世必視六合以同仁豈偏陲忍令一隅之失所爰命奉詞伐罪非務佳兵何期速旅經時未聞大捷軍中淹滯先申縻餉之條塞外遲回尤重老師之律特宣上相總統元戎于橐于囊北路儲胥畢集如貔如虎東方車騎交馳聖天子親示機宜俾萬里情形瞭如掌上大學士欽承方略覺九重籌畫洞若目前披雲雪以遄征士馬飽騰而山川失險奮雷霆以迅擊旌旗整肅而草木知驚既首縛乎渠魁聞風膽落并立殱夫間諜望影魂銷進克堅碉似嚴飇之捲蘀尋攻昔嶺猶烈焰之摧蓬豹略龍韜飭訴古武通而並進天衝地軸蟠風雲蛇鳥以分羅烹釡底之枯魚行見過河而泣擒窟中之狡豈容脫穎而逃雖傅之翼不能飛巢無完卵即走於險無可挺死不擇音於是力屈計窮銜哀伏罪遣頭人以來請聲與淚之俱傾悔往日之無知面與心而交革然而旌門誓衆必斬樓蘭鈴閣尅期定誅頡利壯軍容於百倍與子同仇決勝算於先機滅此朝食羣醜正驚惶之無地我軍方摩厲以相須欣承詔下九天網開三面擴生成之大度上請慈宫溥赦宥之深仁特申巽命喧傳恩詔反側都安敬拜溫綸幽遐悉暢正帝廷雲燦星輝之候值軍營風喧日暖之時八座登壇鎧仗與韶光並麗六師夾帳塵埃共兵氣同銷既奏凱以馳聞爰受降以頒諭數從前之罪戾萬死何辭許此後之滌除三生有幸豚魚向化欣看蠻部心傾螻蟻銜恩遂解賊夷面縛遵六條以毋犯謹凛王章繡千佛以勿諼難酬聖德安內攘外奏文經武緯之模誅罪賞功成戒休董威之治視商室鬼方之克弗待三年比周家玁狁之襄無煩六月漢世詩歌樂德安能嫓此協和唐代傳著歸忠未易方兹赫濯惟皇上實能以聖母之志為志仁民愛物體懿訓而容保無疆斯元臣亦能以聖主之心為心奮勇效忠遵睿謀而膚功立奏聖孝光昭於寰宇上徽稱而喜動慈顔天威逺播於遐荒紹列祖而茂登郅治勒豐碑於太學龍章丕煥星雲宣偉績於史臣鳳紀永垂琬琰萬方慶洽四海歡騰臣備職纂修承恩殿館恭逢峻烈賀萬年有道之長肅效微忱申億載太平之祝謹拜手稽首而獻頌曰皇帝御宇海宴河清煌煌義色藹藹仁聲不毛窮髮咸耀光明梯航萬里拱嚮神京蠢兹蕞爾遙依棘荆肆掠鄰部蠻觸交爭帝用赫怒敕將整兵前帥不戒於時久更既嚴失律疇弗震驚乃命碩輔秉鉞專征汝往欽哉爰釐爾成載拜稽首式遄厥行祗領睿算風雪兼程千巖飛鞚八門列營先縛姦回絶彼間偵朝野稱快謂絶禍萌寒夜集衆元日宣令如電斯掣似雷斯轟小醜敗逃莫敢抗衡乞降不許俯首哀鳴詔從天下賜以更生憫是窮虜免為鯢鯨昔干天討網羅自嬰今沾德化重列編氓銜恩結感物抱其情有苗之格格於至誠王師不戰永靖欃槍止戈曰武仁與義並凱歌競奏父老歡迎依依楊栁悠悠斾旌帝開閶闔樂舞咸英策勳飲至懋奬忠貞大哉帝德如天難名明威震疊偉烈峥嶸祥凝寶篆瑞叶金莖班聯雀躍億兆葵傾光昭孝治耀於寰瀛丕承丕顯惟聖勵精民物安阜品彚滋榮於萬斯年共樂太平平定金川方略卷二十八
