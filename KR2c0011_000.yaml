body:
  text: 欽定四庫全書御製平定金川方略序金川方略纂輯既竣諸臣以聖祖平定朔漠方略御製序文之例為請夫所謂方略者非遙執事權掣其肘而矜自用千里請戰之謂也惟天子將將將將之道無他信賞必罰而已夫以一隅之不靖徴發士旅飛挽芻糧驛騷率及數省舉億兆生靈之命委之一將而攻守失據險易弗知怠公事而棄時日失士心而張賊勢甚或掩敗為功逋逃告捷此而不誅時乃失罰至夫藎臣宣力盡瘁馳驅金石可孚豚魚斯格成勞卓越則車服以庸之旗常以紀之稽績逮於行間執秩陳於幕府酬庸之典孰大於是此而不酬時乃吝賞且夫天討有罪叛則誅而服則舍兵革非快意之圖慘殺違好生之道然非其悔禍誠切向化革心顧以姑息為包荒旋撫旋叛蔓延益熾雖由司事者動乏成算而廟堂之無策亦已甚矣朕有鑒於大權之不容旁貸有罪不赦有功必録既服不誅命討一出於事理之當然而實無容心焉此兩年中宵旰憂勤始終勿懈保大定功之本意而編集之不可以已也若乃指授機宜視皇祖之親勤鑾馭固無由仰企萬一而金川夙𨽻職方亦非噶爾丹絶漠狡寇可同日而語要之行師者保邦之大事爰允所請辨言以示來許乾隆十七年六月十五日金川圖說金川為氐羌種類與董卜韓胡宣慰司同族明代有哈衣麻衣喇嘛者得封演化禪師領受印信國朝康熙六十一年土舍色勒奔初傾心向化令其頭目赴川投誠遵奉調遣撥發土兵五百名隨大軍巡查羊筒克著勤勞撫臣塞爾圖提臣嶽鍾琪委以副長官司職銜令管理駐牧事務雍正元年督臣年羮堯請授為安撫司得㫖俞允部給印信號紙乾隆七年色勒奔初病故以其子莎羅奔承襲其地距保縣五百九十里東與木坪董卜土司接壤二百四十里南與沃日接壤三十里西與扣色吉生番接壤一百二十里北與雜谷接壤三百里皆崇山峻嶺鳥道羊腸一出陶關即有竹索橋絶險最為難渡其巢穴有二一在勒歪一在刮耳崖相距約一百二十里瀘河經其中沿河崇山峭聳不容馳驟稍平處即係番人耕種之地碉樓石卡夾峙其間瀘河發源志乘無考由郭羅克㑹綽斯甲之水繞日傍山入金川界過勒歪與小金川諸山至章谷㑹合由木坪大河入瀘定橋水勢不一平處則用皮船遇灘則負船盤灘沿岸而過方可乘舟自刮耳崖橋至卡撒約四十餘里其間有左梁右梁阿利丹噶木岡昔嶺色爾力木達諸山俱干霄蔽日壁立萬仭在在皆番碉番卡自為守禦至昔嶺盡處即刮耳崖巢穴碉髙寨厚環以平房背負崇山左右皆係石崖前臨大河近巢穴十餘里道路尤險於石崖之上架木為棧僅容一人馬騾則去鞍以繩懸繫扶拽而行自勒歪至黨壩約五十餘里中有木耳金岡革什戎岡黨噶日傍諸山近巢數里皆土崖夾石臨河陡立勒歪巢穴堅固寬廣倍於刮耳崖亦環以民居中有一溝直通美卧其道路較刮耳崖稍為平敞至於風土情形大都種青稞蕎麥孳畜牛羊砌屋建碉不加藩柵食則糌粑飲則乳酪山茶富者衣氆氌綾綺餘皆毛毯羊皮供養番僧不知醫藥慎重誓盟刻木為信灼羊膀扯索卦以卜吉凶葬則或水或火惟喇嘛之言是聽婚姻論財以牛羊馬匹為聘男女相恱則擕手共唱番歌飲酒為樂名曰跳􅀈莊其性嗜利好鬬輕生易死履絶壁險崖若康莊然凡重物俱背負而不知肩挑女子耳帶大環男亦垂鉺自十二嵗以上皆腰插短刀兵丁則左手擐一鐵袖以為甲習鎗矛弩箭不善弓矢重山叠嶂霧重風髙山嵐瘴氣多寒少暑春夏雨雪經旬纍月罕有晴時每雨則霹靂大作電光中皆有聲至八九月間始得晴霽隆冬積雪丈餘山谷瀰漫堅氷凝結道路不通惟乾隆十四年春經略大學士忠勇公傅恆在營時天氣晴和雨雪稀少向來積雪之山深不盈尺春光照人無復隂霾之象番民咸稱從來罕見良由皇威逺播吉事有祥天意與人心吻合故也附陶關以外鄰近金川各番部落陶關以外即瓦寺安撫司桑朗容忠其先於明代世襲土職順治九年曲翊伸歸誠授職傳至桑朗溫愷屢效勤勞得受功加遊擊職銜駐牧之地曰草坡距汶川縣城二十里西與沃日北與雜谷接壤雜谷安撫司蒼旺即吐番之裔康熙十九年板第兒吉歸誠授為安撫司駐牧之地曰雜谷距保縣城五十里南與金川瓦寺比鄰北與吐番接壤今分為三家管理番民一曰梭磨副長官司勒爾悟其父囊索加布於雍正元年歸誠授職一曰土舍良爾吉以非土司故未請給印信號紙一曰沃日土女澤爾吉其先於明代世襲為沃日灌頂淨慈妙智國師傳至黑兒加於順治七年歸誠駐牧之地曰沃日距保縣五百五十里南與木坪比鄰北與金川接壤小金川在明代曰金川寺演化禪師傳至吉兒卜細於順治七年歸誠授職駐牧之地曰美諾距保縣五百九十里東與沃日比鄰西與金川接壤明正宣慰司堅參德昌其祖蛇蠟喳吧於康熙五十年歸誠授職駐牧打箭爐東與天全州連界西與裡塘接壤木坪宣慰司堅參囊康其祖達結祖烏兒結於康熙元年歸誠授職其地東與天全州連界北與沃日接壤革什咱安撫司扎什羅爾布其祖登進鄒祖額魯七立於康熙四十年歸誠授職其地西與綽斯甲北與小金川接壤綽斯甲安撫司策丁丙朱其祖資立於康熙四十年歸誠授職其地東與雜谷南與金川接壤以上諸番風土情形大都相似惟瓦寺木坪附近內地稍知禮法習俗間有與內地相同者此外西路尚有郭羅克三阿樹羊峝阿壩等大小部落南路尚有裡塘巴塘德爾格忒霍耳孔撒麻書等三百餘種皆與金川遙隔故不備載臣等謹按西南諸蠻有虞氏之苗商之鬼方西漢之夜郎靡莫卭筰僰㸑之屬皆是也其為王朝役使自周武王時孟津大㑹而庸蜀羌髳微盧彭濮諸蠻皆與焉其後楚莊蹻王滇而秦開五尺道置吏沿及漢武置都尉縣屬仍令自保此即土官土吏之權輿歟有明踵元故事分别司郡州縣額以賦役法制略備我朝幅􅊷之廣曠古未有窮髮不毛之域莫不䖍奉聲教稽顙稱臣西南諸蠻次第歸誠悉依舊制撫綏義取羈縻勿絶而已夫治蠻之道雖曰以不治治之然而奸宄桀黠之徒夜郎自大恃其險逺妄思蠶食鄰封中朝置而弗問弱肉强食久且重滋邊釁若唐之吐蕃回紇為患何可勝言語曰為虺弗摧為蛇將若何則不庭之討亦勢所不得已焉耳金川雄視諸番鴟張吞噬觀其侵犯牛毛章谷占據小金川潛窺爐地意豈止修小怨於鄰封擁甲兵以自固而已及乎天威所至拉朽槯枯力屈勢窮頓顙歸命悉還諸番之侵地永矢六事以輸誠俾苞孽無滋根株盡淨邊徼享敉寧之福番蠻絶烽火之虞事出萬全功成永定雖興師二載不無勞費然懲創之功又曷可少哉恭進平定金川方略表經筵講官太子太傅議政大臣領侍衛內大臣武英殿大學士內務府總管兼管兵部事務紀録二次臣來保等誠惶誠恐稽首頓首上言聖武丕彰震遐方而底定皇猷逺播紀偉績以昭垂威與德以兼施永靖要荒之域言以功而益著聿開韜略之函澤洽西陲書傳右史竊惟盛世非無征伐建威所以銷萌至神自裕機權籌逺即堪示後是以周王協謀尚父用傳金匱之編宋廷分賜邊臣亦有環珠之要廓清所著懿爍斯垂及本朝而控馭尤隆凡率土皆聲教所訖流沙蟠木悉占風航海而來烏弋黃支每屢譯重趼以至蠢兹莎羅奔者俗本黎獠地慿峝箐供筰馬僰僮之賦比􅳙駹楪榆之倫恃其雄長諸番遂敢陸梁僻壤穴深卡壘蠶叢罕到之區山峻碉門鳥道難登之棧雖經疆吏之討未即挫鋒重以總戎之征尚稽授首魚因漏網益吹浪而沸脣雁縱驚弦肯凌颷而戢翅斯其怙惡實屬罔悛固非小懲所能示戒欽惟皇帝陛下奉三而治得一以貞仁覆垓埏舉欲納諸熙皥量函中外皆將豫以薰陶爰念夫化日光天必掃此蠻氛瘴霧帷幄之謨獨運無煩借箸而籌廟堂之算如神直可按圖而得臣瑊討賊一軍皆聲勢飛騰爾度視師諸將盡雷風奮發玉壘輝旌旗之色錦江流鼓角之聲諜間先誅鄉導不留管敢穴巢必探么麼敢大夜郎作氣於風叨雪虐之中選鋒於墮指裂膚之候挾輈鋭士麾蝥弧以登城破峽神丁砍蒺藜而拔寨丞相渡瀘河深入將軍從天上飛來固知風鶴之皆驚不信釡魚之能活於是哀號乞命呼籲投誠行成之使頻來納欵之文屢至方將翦而朝食夫且厲以晨炊帝念蕩掃非難愚䝉可憫蜀地古來少日姑莫嗔狂犬之驚氐中久不見天且為發醯雞之覆因其歸命豫以維新宣明詔於金雞逭嚴誅於銅馬忭舞直聞六詔歡呼殆遍三巴當其請涖盟而除地環行陳以設壇擊鈸吹螺音流梵樂鼓嚨連臂曲奏蠻歌受明約於六條願銜恩於萬世獻朱提而滿槖添𢎞農得寶之章進古佛以籠龕交月氐貢香之禮幸日雲之得覩中國其有聖乎誓頂踵以胥捐南人不復反矣計王師壓境猶少格苗之二旬訖露布逹京正協擒么之八日從此遐陬向化奉朝請者逾增納賮之邦荒裔聞聲祠冠帶者彌謹叩關之使涵四遊於一氣合萬國以同家豈非震疊鴻規昭赫聲濯靈於無外抑亦邊陲盛事恢幅長員廣於無窮凡兹偉烈悉本宸衷疆事方殷無日不來劄奏軍書每接逐條必示機宜遂制勝於蠻疆宜揚輝於簡策昔者車攻采芑詩篇纍著乎周京栁雅韓碑記載炳傳乎唐室矧此式光前烈可無昭示來兹共請編摩仰承俞允開方略之館命纂修之官按事撰文直書紀實時日道里之必晰芻糧器仗之必詳稿屢易而後成嵗再更而始竣謹加釐定繕寫進呈臣等或曾在戎行或與聞籌畫尚愧奉行未逮敢稱汗馬功髙深慚參贊無從徒作跕鳶時想兹幸效能鉛槧如飛矢石以揮毫重得詳究韜鈐仰見縧鏇之在手簡書是核非云起例發凡纂輯維勤庶免掛一漏百伏願至諴常感誕保彌殷偃武繼以修文四海享太平之福義正歸於仁育萬年開王會之圖臣等無任瞻天仰聖激切屏營之至謹奉表恭進以聞正總裁官字位過密無法顯示臣來保副總裁官字位過密無法顯示臣舒赫德經筵講官太子少師工部尚書臣汪由敦字位過密無法顯示臣納延泰字位過密無法顯示兆臣惠原任工部右侍郎兼管兵部侍郎事務加一級臣劉綸提調官內閣侍讀軍功紀録三次又加二級紀録一次臣靈育順天府府丞加一級軍功紀録一次臣馬燝原任吏部郎中今升福建布政使紀録十一次臣德舒字位過密無法顯示臣鄂寶滿纂修官字位過密無法顯示臣常亮戶部員外郎軍功紀録三次又加二級紀録五次臣安福內閣侍讀世襲雲騎尉軍功紀録二次又加二級紀録四次臣富察善字位過密無法顯示臣景宣字位過密無法顯示臣官登字位過密無法顯示臣傅顯原任大理寺評事今升山西汾州府同知軍功紀録四次臣圖桑阿漢纂修官內閣侍讀軍功紀録二次又加一級紀録三次臣楊承曾候補內閣侍讀軍功紀録二次又加一級臣袁芳松字位過密無法顯示臣畢誼內閣中書軍功紀録一次又加一級紀録三次臣胡廷樞內閣中書軍功紀録二次又加一級紀録三次臣曹錫寶內閣中書軍功紀録二次又加一級紀録三次臣莊培因字位過密無法顯示臣胡寶瑔原任內閣中書今升江西吉安府知府軍功加三級紀録五次臣沈作朋收掌官內閣侍讀軍功紀録二次又加一級紀録一次臣覺羅巴延三宗人府主事軍功紀録一次又加二級紀録一次臣睦朝棟宗人府主事軍功紀録一次又加二級紀録一次臣毛永燮兵部筆帖式軍功紀録二次又加三級臣薩璧翻譯官户部郎中加一級紀録一次臣徐綿戶部員外郎加二級紀録三次臣輔德原任戶部郎中今升福州副都統紀録十六次臣曹瑛滿謄録官生員臣覺羅滿吉善生員臣滚親官學生臣覺羅福祝