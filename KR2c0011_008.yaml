body:
  text: 六月己巳張廣泗奏言臣調集大兵分派十路定期五月初八日進攻今㨿署重慶鎮任舉候補叅將王愷報稱五月初七日自牛厰起程天降大雪行至素可呢雪山駐劄初八日剷雪開路本日未刻官兵過撒烏山於昔嶺東楚適中地方駐劄派漢土兵五百名㨿住山梁取奪賊卡任舉等即於十二日直抵昔嶺山梁佔踞險要山北二里許地名木岡孤峯壁立為昔嶺一帶賊碉及納喇溝二處總路賊酋於隘口連設大卡數處並砌石城與官兵營壘相對十三日晩官軍暗發土兵八百名順溝而下一靣令官兵攻擊木岡之山卡遥為聲勢賊衆紛紛上山救䕶任舉等於山梁連發十餘砲穿過賊卡賊皆奔竄濳踪十五日早遥見昔嶺山下及卡撒右梁溝内烟霧迷天㨿報稱係前發土兵已將石逹喇第等四碉燒燬擒獲賊番男婦二十餘人擊斃十餘人十五日宻派官兵由山溝抄襲山梁中腰賊卡是夜大雨如注聞鎗砲呐喊之聲不絶㨿守備孟珏報稱我兵已上中峯奪據山梁襲取木岡迤西中腰賊卡五處生擒賊番五名殺傷者不計其數乘勝又奪得賊卡二處軍威正振隨遣漢土官兵一千名直逼昔嶺中峯駐劄任舉等於十七日督率官兵乘勢攻擊木岡寨其寨較之中峯賊卡倍為髙峻官兵奮勇直前用鈎䥥鎗矛刺死賊番十餘人鳥鎗斃賊甚衆目擊官兵人人奮勇爭先竟至舍棄挨牌挺身直入賊番鎗石交下恐有疎失暫時鳴金收兵千總金悦陣亡並漢土兵十七名又㨿副將唐開中髙宗瑾劉徳成等報稱奉委領兵先徃左溝箐内埋伏飭令遊擊劉竒偉守備頼君輔等帶兵於五月初八日五鼓搶過山梁劄營並發兵攻擊䨇碉大銅砲力猛已將䨇碉攻塌無如䨇碉之下復有二碉二碉之下更有砲䑓聫絡色底層壘堅險官兵奮勇擊死賊番數十隨即填壕上碉因賊施鎗如雨弁兵不無傷亡隨傳令不得上碉俱伏於碉外攻擊未時以後大雨如注直至十一日方止隨於十二十五等日派遣漢土官兵圍攻谷里大戰碉將頭道右山梁一帶撲毁焚燒戰碉大碉各攻克三四座不等又克右山大碉三座尚有大賊目阿什則太大䨇碉小碉未克至於谷里大戰碉一座其前又有平碉三間自十五至十八日官兵圍守四晝夜十九日四更有光多木打一帶賊番前赴救援碉内之賊亦乗夜出碉以死拒戰漢土官兵一面截擊一面搶奪戰碉殺賊三人帶傷約十餘人餘衆奔逸黒夜未便追擊現在撥兵㨿守谷里碉以通右山梁糧運至右山䨇碉並上下左右小碉必須奪取方可進攻色底已派逰擊韓樞帶兵二千前徃右山分駐扼要一面攻擊䨇碉一面接應昔嶺又派逰擊吕文魁都司郭虢宗守備趙自超林昭馬國材等帶兵九百攻取逹雜兒腰賊人連夜建立木城踞險拒守二十一日漢土官兵恊力奮勇攻至申末四卡皆獲小金川頭人卡卡䇿旺身先躍進木城連砍數賊生擒逆酋用事喇嘛一名開姑什牙並凶番一名鎗砲擊死賊番百餘名逹雜兒腰已經攻克斬獲首級九顆現令逰擊韓樞土舍良爾吉帶領漢土兵一千七百餘名過右山梁攻取䨇碉又㨿松潘鎮總兵哈攀龍呈稱叅將買國良都司馬光祖等於五月初十日駐營梭羅岡離賊番雪山頂第一要卡約四十餘里已刻領兵撲上山頂見左梁任舉官兵已在彼劄營我兵直至山梁之下劄營候補副將劉忠五月初十日領兵抵撒雪山佔㨿山梁於十三日派外委馬世年帶兵於右山壓梁劉忠由半山坡松林溝口一路跴探高阜處所聴候指派進攻至牛厰地方松林内突出賊番約三百餘人放鎗迎敵我兵奮勇直撲擊死番衆四十餘名帶傷者甚衆賊俱奔入松林逃竄外委劉記印陣亡並沃日土兵一名十五日哈攀龍㑹同劉忠買國良分兵進勦馬溝右梁下營親身跴看當溝中間有石砌牛圏二座可容百餘人左梁半山至溝底松樹叢宻右山之樹更為交雜約有四十餘里方能出箐憑視之頃逆番四出隨令官兵分㨿險要定設卡倫遣兵於十六日搜截松林都司馬光祖前赴溝口拆毁松卡二座過左梁山溝賊番約有三四十人藏伏官兵即施放大砲右梁之兵將至林邉賊俱徃溝下奔逃右梁官兵乗勢追逐擊死賊番十數人因樹木茂邃收兵暫駐又㨿加銜提督岳鍾琪報稱奉派統領黨􅄵一路官兵進勦因天雨阻遲至十五日派遣官兵二千名三路進攻康八逹親帶叅將張豹領兵於高阜處督戰其第二路逰擊路建翰所領攻擊頭卡之兵遇賊迎敵官兵鎗箭齊發斃賊甚多賊遂敗逃入卡千總楊清興楊自功把總李養羮外委史大興周都等奮勇登卡與賊短兵相接路建翰及逰擊王三元守備柴生花亦相繼登卡壕内所伏之賊從傍衝擊路建翰等又分兵截殺楊清興李養羮帶兵三十餘名躍入壕内與賊死戰殺賊甚多餘賊棄卡敗逃楊清興李養羮鎗傷陣亡而躍入壕内之兵亦多半傷亡第一路遊擊王三元等所領之兵行至戰碉不逺為壕所阻隨下山梁衝入頭卡接應惟第三路所派攻擊二卡之雜稄土兵道路稍遠行走亦遲為賊所阻未能前進至陡物黨噶左邉山梁之下切近賊人水泉有賊修理卡塹經住劄作固山梁之副將鐡景祐用砲遥擊致死賊番一名現在布置奪賊泉卡並襲取陡物黨噶又㨿岳鍾琪報稱署副將王世泰與副將劉順高雄所領官兵進攻甲索乃當二路於五月十六日派遊擊保懐智攻擊來當馬牙岡後山梁遊擊羅于朝攻擊上下日旁山副將劉順攻擊馬牙岡山梁副將高雄攻擊囊得碉寨署副將王世泰攻擊俄北賊卡遊擊張玉成留守甲索軍營岳鍾琪現在派撥阿􅄵及十二部落土兵赴日傍山運糧恊助又㨿叅將永柱呈稱奉派統領馬奈官兵進勦隨㑹同遊擊李璠妥商於林噶及駱駝溝等處要隘酌留官兵防守其餘抽撥漢土兵一千餘名擬於五月二十二日由卡卡脚之東山江口進攻其遊擊楊之義都司茍興副將董撫逺原派統領正地一路官兵因甫經前徃二十以外方抵該處尚未報到進攻情形署遊擊潘文郁等所領納貝山一路官兵原係牽制之師須俟卡撒之色底攻克方可飭令前進臣查十路官兵原擬五月初八日並進㑹勦不意隂雨連綿迄今旬餘未霽山高路遠之處又降大雪以致阻滯未能齊進臣現在飛檄督催惟是進攻之路以昔嶺為最要而昔嶺一路現惟木岡一城與中峯大戰碉一座未克倘攻奪此二處則可俯瞰諸碉直搗刮耳崖較别路為甚㨗總兵哈攀龍一路既為松林所阻因將伊所領之兵改由納喇溝前進即抄出昔嶺中峯之右與任舉之兵㑹合並攻昔嶺俟克取之後再分路進勦勒歪又前調雲南總兵冶大雄亦於五月二十日抵臣軍營現已委令前赴卡撒總統滇黔官兵一面進勦色底光多等寨一面抄出昔嶺中峯之左與哈攀龍任舉之兵三面夾攻惟須先破昔嶺戰碉則是扼吭拊背賊巢孤立無援矣兹聞經畧大學士訥親已於五月二十一日自成都起程指日可抵軍營臣再請商一切機宜經畧駐劄小金川適中之地各路鎮將禀報情形皆可隨時指示至卡撒昔嶺等𦂳要之處臣仍不時親徃督催轉飭各將士努力攻擊自必倍加奮勵以期迅奏膚功也奏入諭曰佇俟㨗音以慰逺望臣等謹按金川用兵徃徃以雨雪阻滯為虞乃任舉攻取昔嶺於烟霧迷天之際土兵奮勇連燬四碉擒殺賊衆又於大雨如注之夜鎗砲呐喊之聲不絶於耳竟能直上中峯奪取山梁擊賊甚多軍威頗振可知兵以氣勢為用氣盛則風雷不能奪而鼔舞士氣又在主將之行事合機宜而風采可畏愛也七月辛卯上命原任昭通鎮總兵董芳前徃金川軍營聴經略大學士訥親等委用遇有總兵缺出即行題補壬辰訥親張廣泗㑹奏言五月初八日㑹期進兵以來臣張廣泗已將各路呈報攻戰情形具奏兹㨿由納喇調赴昔嶺之署鎮哈攀龍報稱五月二十九日率領副將劉忠叅將買國良至昔嶺中峯署鎮任舉先於嶺上及嶺南對拒賊卡劄營哈攀龍等見嶺北溝梁名渇足嶺碉寨宻峙令該將於三十日四更起營哈攀龍帶兵督後初一日黎明鼓勇上梁賊番鎗聲四發官兵下山對敵賊俱逃竄奪獲碉寨四座初二日有賊百餘乘夜圍攻被官兵迎拒鎗傷多賊陣亡土兵二名是日該協將令署守備鍾世俊由正嶺直下守備劉斌由左溝圍繞殺傷二十餘賊奪獲木城一座沃日土兵殺獲賊首一顆陣亡漢土兵三名賊又於溝林砌卡斷我水道官兵隨即添卡拒守初八日賊復乗夜從後山梁來攻水卡官兵用鎗殺賊二十餘人賊旋敗走陣亡土兵三名初十日三更把總陳琳領兵抄出溝口截石溝一帶攻賊之左叅將買國良領兵進取奎角援碉賊既發鎗督兵三而夾攻自辰至已賊棄碉逃遁焚碉三座賊復冒火飛撲官兵用鎗砲殺傷甚多叅將買國良手斃賊二名餘俱潰散把總陳琳陣亡並漢土兵六名又㨿昔嶺一路之署鎮任舉叅將王愷報稱移營高阜用砲攻擊木岡木石城俱已擊塌賊乘夜補葺官兵亦乘夜施放鎗砲五六晝夜不息五月二十三日潜發土兵一百五十名攻奪賊卡漢兵一百名埋伏邀截石梁卡路令東峯官兵遥作撲攻右卡之勢夜間用砲上擊令土兵俯伏蛇行躡近木城用挨牌遮䕶多帶乾柴以備焚燒之用不意是夜大雨如注火繩盡濕伏兵無援雖奮勇爭先為亂石所傷未能克復二十六日任舉親抵昔嶺閲視營盤之左有得思東木逹溝乃卡撒昔嶺兩路軍聲糧路攸關為此數碉所阻商同卡撒總統冶大雄於二十八日五更發兵焚燒木逹溝一帶賊碉任舉至中峯調度將得思東大碉三座圍困斷其水道用斧進砍賊番滚崖逃遁得踞大碉一座小碉二座乘勢攻奪得踞木逹碉以上三處共攻克大小戰碉十座石城一座大小平碉一百三十餘間青稞麥豆田地約六十餘頃六月初九日攻克昔嶺溝底石城水卡初十日㑹同副將唐開中攻色爾力半山賊卡自三更交戰至五更土兵奮勇撲攻奪獲木城大卡一座殺賊八名生擒一名又㨿任舉等報稱六月十三日㑹同哈攀龍唐開中令各兵砍木䜿城步步為營十四日分兵三路哈攀龍由右面架梁堵禦買國良由左溝穿林而上以攻木城任舉唐開中由中直撲石城卯刻買國梁率領土兵上嶺漢兵繼進木城左右賊番齊出夾攻買國良手斃賊一名督兵力戰木城内矢石如雨鎗砲交加買國良被鎗陣亡並把總馬良甫及漢土兵二十餘名哈攀龍督兵上梁奪回買國良之尸及失去砲位殺賊百餘收兵回營又㨿哈攀龍報稱六月十五日任舉唐開中攻石城東面哈攀龍攻南面又派土兵一百繞山攻西面又派土兵三百伏林堵禦十六日黎明齊進各鎭將皆身自督戰唐開中劉竒偉俱被鎗傷土兵奮勇有數人撲入賊卡者石城堅固異常官兵環繞木栅任舉督催兵力益奮西南林内突出賊三百餘人任舉率兵堵禦被傷督戰益力復被鎗傷陣亡哈攀龍督兵分赴上下林中用鎗擊死賊人三十餘名收回任舉之尸隨令收兵二十日令土兵於賊城南面連劄數卡石城賊出爭為小金川土兵預伏邀截致斃賊目得以劄卡土兵三名陣亡又㨿卡撒一路之總兵冶大雄報稱五月二十七日令副將高宗瑾攻䨇碉前冶大雄率唐開中劉德成楊朝棟夾攻碉旁未倒次日加兵進攻見任舉帶昔嶺土兵沿梁撲下徃攻木逹冶大雄同唐開中分兵前赴接應又令遊擊韓樞從右山夾攻昔嶺兵威益振二十九日派兵四路圍困光多三寨連燒三座賊死甚多又㑹合昔嶺官兵徃攻得思東寨至六月初九日夜派兵四百分左右翼抄出色底䨇碉之外堵截賊援另派土兵撲碉䨇碉賊番及巴郎木須賊番潛來救應為堵截官兵所衝擊又伏兵齊起鎗弩俱發連戰四陣賊番敗走堅碉未能攻克官兵亦有傷亡又㨿黨􅄵一路提督岳鍾琪報稱五月二十五日進攻革什戎岡陡物黨噶天雨連綿山坡陡滑各土兵不避風雨連夜前䟎天明遇賊土兵奮勇殺賊六名二十六日立卡安砲於樹林稠宻之處開路進取二十九日派遊擊沙亮都司張宏範遊擊阿爾占等分兵三路攻取第二水泉守備黄金玉由右翼樹林内伏兵副將鐡景祐遊擊王珩帶兵接應遊擊王三元進攻康八逹都司孫良材進攻木耳金岡左翼官兵奮勇攻卡奪取水泉鎗砲殺賊甚多守備楊昆等督率土兵奪取石卡二道木卡二處山梁一道即劄立營卡右翼官兵攻賊大卡冒險直上賊憑高臨下鎗石如雨官兵用砲殺賊十餘人把總王憲陣亡六月初二日康八逹巖前伏兵五六十人官兵鎗擊落巖二三十人餘賊奔逃東溝内亦伏賊六七十人外委馬得剛執矛札死一賊兵丁鎗砲兼發殺賊無數陣亡官兵一名又㨿甲索一路之副將王世泰報稱五月十八日帶兵進攻俄北行至頭卡見賊十數名督兵追擊賊俱退入三四道卡内派兵連發數砲碉堅不動因大雪收兵二十四日連設四卡攻戰至三十日陸續殺賊二十餘名六月初五日派兵各帶攩牌火砲伏於兩翼王世泰帶兵自下而上賊放鎗拒敵官兵大砲擊穿賊卡十數洞有賊二百餘人迎戰官兵擊死賊二十餘人賊伏壕中官兵力撲又殺賊十餘人始行回營陣亡官兵四名又㨿甲索一路分攻日旁之遊擊羅于朝報稱五月十八日抵日旁攻賊賊儘力抵禦官兵自辰至未擊死賊番五名連克賊卡二處奪獲木城一座賊奔三卡攻撲未克二十一日分兵三疊魚貫攻擊漢兵奮勇已進石城止隔一壕綽斯甲土兵竟不前進賊壕鎗砲齊發漢兵奮勇不退至三更復奪石城賊番鎗石抵禦兵傷甚多即令收兵又㨿岳鍾琪報稱五月十八日派徃甲索乃當二路分攻囊得之副將高雄劉順於五月十八日進攻囊得至山梁安營松林突出賊番百餘直來堵截一面攻擊一面下營自已至申殺賊數名餘從林内逃遁陣亡漢兵一名二十一日派西寜兵架梁派甘肅兵從中進攻兩碉撲出賊五百餘人對面交鋒殺賊四五十人帶傷五六十人敗入碉内官兵撲奪燒燬小碉一處奪獲蠻鎗一桿割取耳記一個夤夜未敢深入把總郭士榮公守桓馬得龍陣亡乂㨿乃當一路之遊擊保懐智報稱六月初一日夜間賊兵三股於營盤前後左右侵擾又一股直衝後營門鎗石如雨督兵奮勇禦敵四更始退殺賊一名獲長矛一桿又㨿馬奈一路之叅將永柱報稱自五月二十二日進攻卡卡脚賊俱堅守不出至六月初四日派外委楊進孝帶兵於四更潛上近賊中碉之小石厓設伏永柱及外委曹元靈帶兵誘敵把總鐡中竒賈璞於伏兵對面山梁接應遊擊李璠督催千總劉起奉等四員各帶大砲安於北山守備金容阻截卡卡脚來路千總彭翹翼吕渭元等帶兵助陣皆黒夜山頂埋伏五鼓起火伏兵突發午後北山賊勢漸衆曹元靈佯走中碉賊躍出遇伏擊死八人並殺紅衣賊一名連奪四卡安兵把守陣亡漢土兵八名十二日復攻中碉殺賊五名餘奔入坑陣亡土兵二名十三日發兵潛伏山巖五鼓時李璠督兵奪卡殺賊六名一帶山卡皆被官兵奪獲安設連環卡倫十九處又㨿正地一路之副將董撫遠報稱六月初四日官兵直抵正地閲看東南山梁中有戰碉五座賊四五十名防守十二日派撥漢土兵千名親督上坡安砲自本日至十五日用砲攻擊尚未倒塌臣等身臨賊境目擊戰勦情形熟商進搗要徑悉心籌度相機指授務期乗時掃穴早奏膚功上紓聖慮奏入諭曰任舉深屬可惜有㫖交部從優賜䘏即買國良等畢命疆塲雖屬効力之誼而朕觀之實覺不忍為之淚下亦有㫖諭部將此㫖先諭軍前將士知之是日納親奏言臣奉命來川於五月二十日抵成都將西南兩路糧運詢問撫臣紀山藩司倉徳㨿稱現在遂日發運出口糧千餘石雇覔漢番夫役烏拉俱能照軍營限定之數輓運臣隨於次日自省赴營六月初三日至督臣張廣泗駐劄小金川美諾地方沿途經過西路糧臺有糧多壅積者即催趲辦理各路軍營已經運到者除日支之外可餘數日或月餘口糧尚無兵食不繼之虞至於兵分十路進勦現在己未前進及逆酋所恃碉寨木石城卡未能攻奪情形與班第張廣泗備細講求督臣即於初四日前赴卡撒臣留駐美諾就各路鎭將一月以來所報情節逐一查閲分别奬飭申明紀律飛檄通行即於初六日親赴卡撒美溝軍營卡撒羙溝係通刮耳崖賊巢正路上年七月間我兵奪取空卡關即入金酋境内屯駐其地離賊碉不及半里最為逼近初九日復同督臣前徃昔嶺相度賊巢山勢嶺有數路皆可通刮耳崖惟是山陡箐宻碉寨層層獨色爾力一梁其勢尚為平坦賊碉皆在梁旁梁上止有木石城卡數座若能攻克一面分兵牽制梁旁碉寨一面即可順梁而下此路較卡撒美溝正路乘高臨下甚為得勢詢㨿各番咸稱下至底溝去刮耳崖亦不過數里是以㑹商督臣將哈攀龍王愷所領兩路官兵歸倂昔嶺一路同進合之臣等從前抽調添撥昔嶺兵丁共萬餘名以足兵力而圖進取仍督令已到官兵攻擊木石城卡經我兵奪㨿木城數座又攻石城賊守甚固屡撲未下本月十六日署鎭任舉奮不顧身前徃督催致被鎗傷陣亡督臣聞報即日親徃指示調度現在逼攻務期必破再查我兵可以進抵勒歪刮耳崖賊巢惟黨􅄵昔嶺卡撒三路今黨􅄵昔嶺已均有重兵惟卡撒雖現駐兵三千餘名但䕶糧分防各處皆須撥用餘兵不足以資攻勦若另調新兵未免緩不及事莫若就中酌量有應牽制堵禦及彈壓土司之處量地酌留以備攻守將多餘之兵悉行抽調添倂卡撒以重聲勢庶可進勦賊巢現與督臣㑹商辦理再臣與督臣又思賊番因險㨿碉故能以少禦衆今我兵既逼賊碉自當亦令築碉與之共險兼示以築室反耕不滅不休之意賊番自必揺動且守碉無須多人更可餘出漢土官兵分布攻擊似亦因險用險之䇿已飭各官星速修砌遵照逼攻總之就現在進勦情形今秋能否告竣目下尚難預定惟有備細籌商督率將領激勸士卒倘能連奪數碉足以阻賊堅守之心而長我勇徃之氣勢成破竹剪滅不難矣奏入報聞是日上命軍機大臣等傳諭曰㨿大學士納親奏報金川軍情及籌辦事宜有築碉與賊共險之䇿此事披閲再四不能解辦理之意自金川用兵以來駐軍卡撒乆歴時日賊酋逆我顔行傷及將士自當刻期撲滅以收犁庭掃穴之功今觀訥親等所奏情形尚費經理非旦夕可以竣事但攻守異用彼之築碉原以自守我兵自應决䇿前進奮力攻取乃轉令攻碉之人效彼築碉是亦將為株守之計耶且碉不固則不足恃碉固則必勞衆力若以築碉之力移之攻取破彼之碉以奪其所恃不亦可乎在訥親等或自别有籌畫而奏内殊未明晰以朕度之或因慮及山深箐宻入秋難期克㨗預為退駐之地耶訥親等恐未必籌及於此即使有見及此亦非萬全之䇿盖能克其碉而守之猶屬因利乘便之意今因彼守險我亦築碉㣲特勞費加倍且我兵已罙入賊境地利氣候素不相習而守碉勢須留兵多則饋運難繼少則單弱堪虞賊酋凶狡必狃我以持乆出我之不意浮寄孤懸主客之形既别情見勢絀反覆之慮尤深師老財匱長此安窮不可不熟計也况將來金川撲滅之後其地不過仍歸之番是今勞師動衆反為助番建碉之舉恐貽笑於國人躍冶於番部矣昨覽此摺即以為不然思之竟夜益覺其非䇿不如速罷為宜再朕閲另摺所奏任舉捐軀報國畢命疆塲不禁為之泣下在伊等忠憤激發固已甘之如飴而朕以小醜跳梁用良臣於危地思之殊深憫惻雖經交部從優賜䘏以慰忠魂而事後之慮彌切現在大學士訥親尚書班第内大臣傅爾丹總督張廣泗提督岳鍾琪等立營漸逼賊巢凡有進止更當因時度勢鄭重籌辦不宜徒事奮徃以厪朕懐至所調緑旗兵丁或未能勁健可否另調滿洲及索倫兵着傳諭大學士訥親酌量具摺覆奏朕觀金川竟難措置設其易處則張廣泗乆歴戎行之人早已成功矣今訥親雖為經畧只宜持其大綱督令張廣泗等各施謀猷以圖速奏膚功即如建碉之策率皆不中肯綮而張廣泗亦附和而無語可見彼有推諉之意矣殊増朕憂訥親不可不知也此事速行回奏並將近日情形一倂奏聞臣等謹按張廣泗居心忮忌恃才傲忽初至軍營藐視金川之衆率意而行無愼重周詳之識既而張興失䧟徒懐慙憤更乏成筭及聞經畧涖師固有藉其聲威冀幸成功之意而訥親茫無方畧已為張廣泗所輕於是轉幸分謗之有人不以破敵為己任推諉之心聖明早已燭照於萬里之外矣是日訥親張廣泗㑹奏言現在領兵鎭將如任舉買國良俱已陣没唐開中又受鎗傷冶大雄現患傷寒一時統領乏員因思及原任固原提督段起賢籍𨽻成都丁憂家居副將胡大勇素稱勇徃臣等公同商酌俱已飛檄行調又因遊擊劉竒偉都司王一柱受傷調養亦經移咨雲貴總督揀派勇幹歴練將備二三員兼程來營以資委用合行奏聞伏思將領為士卒表率必須統領得人發縱指示方足以勵士氣而奏膚功今軍營各路將領攻勦機宜既屬未諳兼之才智俱係中平即指授之頃尚有不能領㑹者臣等既無素稔可用之員仰懇皇上天恩飭查與川省稍近各省曽經保舉之鎮恊叅遊内簡發十數員馳驛來營臣等派遣委用奏入上諭内閣曰古州總兵哈尚徳湖廣叅將哈峻德雲南提標叅將高欽延安叅將陳文鎭海叅將孟麟雲南遊擊魯文徳朱璣范崇純湖北遊擊馬能陜西遊擊馬雲翔直𨽻遊擊呉士勝着該部即速行文調赴金川軍營聼候經畧大學士訥親等委用是日訥親又奏言欽奉諭㫖令臣將現在征勦情形宻奏臣查各路官兵不能前進者多惟昔嶺一路雖現為石城所阻度我兵力尚可望其不日進取惟是臣與督臣到營未乆戰勦機宜督辦伊始且各路抽調官兵尚未到齊容臣一面指示辦理一面相度籌畫俟月餘後如果我兵已全力攻勦猶有不能速㨗情形再行妥議宻奏請㫖裁奪奏入諭曰卿意遲待數日一舉成功何等慶快殊未憶及朕之懸望耳及至奏到仍不過如是且聞任舉凶問不勝感惜何能慰朕耶又諭曰張廣泗去嵗奏張興之事措辭得體今任舉乃捐軀致命者而汝等不過奏聞其事亦未詳悉殊不知輕重也是日訥親又奏言内大臣班第等帶領侍衛拜唐阿等於六月初三等日陸續抵小金川軍營臣就現在用兵要路籌度分為四路昔嶺一路派内大臣班第黨􅄵一路派䕶軍統領法酬甲索一路派䕶軍統領薩音圖馬奈一路派䕶軍統領烏爾登前徃督兵攻戰其侍衛官員拜唐阿等亦於附近各路分派飭令照看督率臣自成都起程挑選成都滿兵百名帶徃今已抵軍營即將此兵分給四路大臣侍衛等内大臣傅爾丹於六月十四日已抵臣現住之卡撒軍營縁亦係進勦要徑即將伊留住卡撒各路大臣侍衛内班第報稱於昔嶺督視攻戰漸行前進樹立木栅烏爾登報稱在馬奈督視攻戰奪賊四卡其餘别路尚未報到至各土司效力行間輓運米石者臣已遵㫖宣布皇恩將伊等每年賦額并從前加賞土司之例行查廵撫藩司俟查覆到日再將應如何加恩之處定議請㫖其督臣張廣泗所奏川省民夫帮貼銀兩一案撫臣紀山已飭承辦此案之知府李盛唐賫送檔案來營備查俟該員到日再將有無情弊之處清查奏聞奏入報聞是日班第奏言前因建昌道陳緯等辦糧誤遲致甲索軍糈缺乏業經㑹摺紏叅一面飛飭川東道齊格及瀘寜同知耿壽平前徃子龍催䟎速運甲索一路最為遥逺近查黨􅄵至彼處渡河而行不過三四日可到黨􅄵現積米四千儘可分運隨飛咨總統岳鍾琪已㨿諭令綽斯甲土兵暨餘丁人等沿河接遞兩次共運米六百五十石又於該土司境内採辦炒麵糌粑以資接濟其川東道齊格等亦飛調明正孔撒麻書東科等處土司多方奬賞各出烏拉數百加給雇値自五月以後共陸續起運米麵二千餘石兵食已充可無匱缺又㨿該道等禀稱各土司承認帮雇烏拉每日可運米五十石務使有贏無縮惟至深秋大雪恐有阻運之虞臣即行令黨􅄵糧務臨期量行酌撥以圖萬全又打箭爐至甲索山險途長雨雪不時難免停阻因詳諭該道等查明路徑細察情形其應作何變通辦理之處現在㑹咨聼部核議奏入報聞是日班第張廣泗紀山㑹奏言順慶府通判丁紀龍䕫州府經歴蒲宏圖榮縣縣丞劉大麓管理臺運惟知利已岡恤夫艱臣等訪查丁紀龍管理熱籠正糧務凡給發軍裝夫價多有侵蝕班攔臺積米甚多丁紀龍身任督催並不顧問現在另委忠州知州劉乃大前徃料理丁紀龍運米龍肋不催速到積票至二三十張不能交納又内地雇募夫役頗為拮据丁紀龍於本站内留積散夫最衆將額設交管之夫不令背米以致枵腹難堪相率逃散運夫本應按期更換丁紀龍勒令本站番夫長役以致紛紛禀訴至於所管各站之斛大小不均運夫每多賠累蒲宏圖管理班攔山糧務扣剋雲貴軍裝背夫脚價該臺所管三站塘馬及安運馬騾俱經倒斃既不買補亦不報明班攔山積米至三千餘石蒲宏圖不善疏通倉底致有霉變至劉大麓管理熱籠寨糧務擅於蠻地私自製秤稱米桿上無星不能平凖運夫前途交納徃徃賠累又劉大麓將遂寜等縣解運官馬勒住私賣營利肥已剋扣夫價種種劣蹟斷難姑容臣謹㑹摺紏叅奏入諭曰丁紀龍蒲宏圖劉大麓俱着革職其誤運侵蝕情由交與廵撫紀山嚴審定擬具奏平定金川方畧卷八
