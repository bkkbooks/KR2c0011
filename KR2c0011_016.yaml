body:
  text: 十一月辛酉上命軍機大臣等傳諭班第兆惠曰軍營糧務最關緊要從前辦理運餉尚無貽誤現今增調滿漢官兵三萬五千人合之原撥在營官兵及隨役人等數幾十萬以每人每日支給八合八勺計之加以挽運人夫口食一月所需已為浩繁况大兵按起前進來春二月到齊即須陸續按日支給縱使奏捷迅速亦應預為寬裕儲備計班第兆惠目下甫聞增調之信應一面速行籌畫撥運一面將作何辦理及商運情形詳悉奏聞伊等須親身往來查察務期兵糧充足以壯士氣又命傳諭經略大學士傅恆曰鄂容安奏稱陜省料理官兵起程費用不敷咨撥河南庫銀二十萬兩解陜備用現在調撥滿兵共計八千一百名實為精鋭徑旅一可當百且抵川迅速足效臂指之使倚以成功而從前軍營陜甘之兵不甚得力大學士在京時亦曽面奏欲至軍營酌量如可不用陜兵即一面停其調撥朕思該省既經奉文調發必已按營撥派給發軍裝一切經理所費實繁與其俟經略大學士到營方行文停調不若於經略大學士經過之時閲看大槩如不過尋常緑旗充數之兵不能出色精壯即時竟行停止於事為便即湖廣之兵亦應一併酌量專調雲貴二省已足敷進勦之用蓋兵在精不在多無用之兵多人適足為纍耳目今經略大學士按站前進當此嚴寒短晷衝氷雪冒風霜實乃勞苦在經略大學士為朕心誠立功氣壯自不知身之勞勩而朕心深為不忍不能暫釋於懷惟望迅奏捷音以愜懸企經略大學士善體朕意切勿過勞愛養精力以為抵營辦事之用則善矣此時乘騎星速以示與士卒同甘苦實屬可嘉至奏凱言旋雖心切瞻仰朕躬然定當肩輿就道稍為休息其傳示班第兆惠速備軍糧之㫖一并抄寄經略大學士知之臣等謹按君臣上下之際相臨以分而相浹則以情古者堂亷道契恩誼交孚於遣使尤惓惓致意焉雅有皇華四牡以勞使臣而東山之作采芑之章則又皆述征戍之苦憫行役之勞曲體其心之所欲言而代為之言其纒綿悱惻之意實有深入人之寤寐者是以上下交而其志同也我皇上於經略大學士傅恆禮遇既隆恩意尤備千里傳命諄復周詳藹然不啻家人父子之相告語泰交之盛誠足以繼往古而式來兹矣是日軍機大臣等奏言派往金川之船厰黑龍江兵丁到京欽奉諭㫖皇上親賜筵宴臣等伏念此二省官兵三千名以五百名為一起進發計共六起若每次俱䝉皇上親臨賜宴不免煩勞而伊等心中必極切不安以臣等愚見請皇上不必親臨賜宴容臣來保同辦理筵宴之大臣等俟船厰黑龍江兵丁到京次日至豐澤園賜宴頒賞即令於次日起程皇上出宫或於瀛臺或於永安寺回蹕之時臣等率領官兵等道傍排跪俾得瞻仰天顔叩謝天恩倘䝉俞允臣等行知各該處遵行諭曰朕所御䝉古帳房照常預備朕若在瀛臺回蹕時令官兵在路傍瞻仰壬戌上命軍機大臣等傳諭經略大學士傅恆曰今日接到經略大學士傅恆奏摺係初九日巳刻在榆次縣鳴謙驛拜發必係初八日已至鳴謙驛連夜辦理定稿者前曽降㫖令經略大學士途次務須愛惜精神仔肩重任毋得過勞兹又徹夜辦理實覺太勞大學士其善體朕心務自愛養嗣後辦理奏覆事件辦至初更時候尚可若須至二更即當俟下站奏覆不必過速以致勞頓并令達爾黨阿等知之是日上又命軍機大臣等傳諭署巡撫班第布政使高越曰現在調遣京城滿兵及東三省官兵前赴金川軍營沿途料理馬匹安設臺站諸事俱應各督撫親身查辦陸續奏聞其自西安至四川之神宣驛已據該撫陳宏謀等奏明辦理妥協而自神宣驛以至成都自成都以至軍前係四川地方官應行辦理之事近日不知如何料理是否妥協未據班第奏到即或班第尚在軍前高越接到軍機處文檄業已辦有就緒因須詳禀班第以致往返稽遲高越亦應將緣由呈明軍機處或竟行奏聞目下所派兵丁定為五百名一起較之前派三百名人數增多四川境內道路狹隘崎嶇人馬艱於行走若不預為料理必致臨期遲誤可傳諭班第高越令其一面速為查辦一面馳摺具奏如或視為泛常稍滯軍行咎有所歸甲子經略大學士傅恆奏言臣於初九日巳時抵山西徐溝縣地方接奉諭㫖伏䝉聖主深恩恐臣途次過於勞瘁宜加意愛惜并聼達爾黨阿等之言伏念臣自良鄉起程以來雖日行二百里皆可早至住宿之地即有應辦之事不過辦理一二時刻現值隆冬長夜儘有歇息之暇臣自起程至今臣身甚健並不覺勞且仰仗聖主洪福一路天氣晴暖未遇風雪所帶兵丁住宿處所臣皆預為指定交與各該省預備若即照此行走甚為便利臣若體中實在不能馳驅有意勉强不惟上煩聖慮臣心不安抑恐此身過勞遇事稍有貽誤臣實滋懼至達爾黨阿等係䝉聖主特恩隨臣前往之人伊等有所勸阻臣何敢不聼不特沿途有勸阻之處臣當聼從即抵營之後或一時有思慮不及之處伊等之言亦必聼從斷不敢自執已見上厪聖懷也奏入諭曰如此方是朕可釋懷矣是日經略大學士傅恆又奏言將軍博第所奏西安兵丁二千名分為二起於十一月初三初五日起程臣查京兵每起五百名進發現在辦理驛馬已屬拮据若二千兵丁分為二起人數衆多驛馬斷不能辦給即使該兵各騎駐防所拴之馬無須馳驛然途次打尖住宿計算程途當與京兵相值亦多未便臣已行文該將軍巡撫將京兵及西安兵丁行走之處酌量或令稍前稍後總期不至擁擠一處致有遲滯囑其加意辦理并行文成都副都統令將成都滿兵料理行裝完畢即催起程又奉上諭西安成都兵三千名并京兵二千名計算可冀速奏膚功據羅卜藏奏稱進兵應稍待黑龍江兵丁為妥伊係經事之人此處亦當知之臣伏思行兵之道貴乎神速機不可失若有可以進取之機因兵未到齊不將現有之兵調遣進攻則為徒糜糧餉坐失機宜船厰黑龍江兵丁未到之前縱不能深入賊巢然相機攻擊其外或不時侵擾搖動使之不得休息俟大兵一到勦滅亦易矣總之不可欲速亦不可必俟兵丁到齊方進容臣抵軍營後詳加審度彼地情形乘機辦理奏入諭曰甚是實愜朕意是日上又命軍機大臣等傳諭經略大學士傅恆曰黑龍江副都統黑雅圖奏稱打牲索倫等處兵丁人甚壯健鎗箭敏捷慣走山林頗耐勞苦但一時乏糧每有竊取牛羊以食用之事性好飲酒不知禮節約束稍覺費心若能服其心臨戰甚屬得力且伊等行路甚屬簡便曠野之地插木為棚隨便即可栖止黑雅圖所奏深知彼地兵丁情性可傳諭經略大學士知之丙寅上命軍機大臣等傳諭經略大學士傅恆曰汪札爾著前往金川軍營查看一路驛站伊抵營應在經略大學士傅恆抵營後四五日其時一切布置大局已定其碉卡路徑著領汪札爾隨便閲看此際滿兵或有交鋒克捷之事亦令伊目睹一二次回京面奏自能明晰經略大學士抵營宣布恩諭賞賚兵丁軍心如何感激鼓舞將辨士卒用命不用命者經經略大學士整頓賞罰軍心如何奮勉自新大學士到後傅爾丹等情形何似汪札爾還朝俱可一一面陳統計往返程途及在營留住數日明歲二月初間即可到京朕得備悉軍營大槩矣將此傳諭經略大學士知之丁卯上命軍機大臣等傳諭經略大學士傅恆曰盛京副都統哲庫諾來京奏稱伊起程來京時據盛京兵丁等泣訴我等已奉派出師今若不令前往實覺羞憤奉派兵丁一千名至今尚未散回恭候諭㫖朕心甚為軫念欣悅可見我滿洲心誠氣壯勇往向前必能使膚功速奏較之緑旗兵丁不啻天壤若不准前往伊等實懷羞憤且伊等起程所費無幾不過將雲貴等處緑旗兵丁酌減萬餘可耳是以行令阿蘭泰將此項兵丁一千名作速令其起程於十二月初五六間到京可令經略大學士知之是日上又命傳諭曰盛京兵丁巳仍行派往從前曽降㫖令將伊等馬匹協濟船厰黑龍江兵丁今則恐有不敷矣已令軍機大臣等定議如伊等騎用之外尚有餘剩馬匹情願協濟兩省兵丁則准其協濟以盡伊等報效之心如屬不敷則科爾沁大凌河山海關俱已預備馬匹即著停其協濟其盛京兵丁到大凌河山海關時所騎馬匹如有疲乏并交與哈達哈那木札爾令其酌量換給換下馬匹歇息餵養以備别起兵丁補換之用并傳諭汪札爾若途中遇見努三四十八即催令速抵軍營京城未起程兵丁巳交各領兵大臣令其迅速前行一并傳與經略大學士知之是日上諭內閣曰統領盛京兵一千名著仍派副都統哲庫諾黑龍江前起兵一千名仍著博洛納統領後起一千名著副都統黑雅圖統領是日上又命軍機大臣等傳諭經略大學士傅恆曰據湖廣總督新柱奏稱現在調撥南北兩省官兵酌派將辨統領於十二月內起程另摺又稱該省兵丁弓箭架勢雖有可觀而弓力率多虛報如報八力之弓實止六七力其馬匹係就近購買川黔所産並各驛赴口買回挑剩之馬觀此情形則楚省兵力又屬尋常從前傳爾丹等請調楚兵蓋因軍中紀律廢弛士氣委靡不振不得已而為此請如貧家窘迫之時冀得錙銖聊以壯觀一時無暇更求實濟耳今滿兵既已調集九千餘人驍勇敢戰一可當百而雲貴官兵似較楚兵為勝即此已可用以奏功若徒以疲弱充數虛糜糧餉究何裨益新柱所奏現交軍機大臣等議令照數預備勿遽起程俟經略大學士到川酌量應否需用以定行止如尚須調遣於文到日即令星馳前往如可不用即一面行文停止至原派將辨皆係記名可用之人現在軍前各辨戴罪者多且日久疲玩不能振作楚省暨陜甘兵丁即無庸調遣其將辨仍應令前赴軍營以備驅䇿楚省所運炮位業經抵川亦可留為攻擊之用至經略大學士每日衝寒馳騎程站既逺而奉到朕㫖又須逐一奏覆自必徹夜辦理如此勞瘁如此勇往朕心實為不忍實為嘉慰亦實為欣悅雖屢降諭㫖令其節勞而經略大學士勤瘁精詳夙夜匪懈在公忠大臣感激圖報道固應爾朕亦惟於凱旋之時優錫酬庸之典以奬殊勳耳國家眷遇大臣夲期緩急足恃而人心不同有受深恩而忍於辜負者即有感厚恩而切於報稱者假令訥親前往軍中亦能實心任事得如經略大學士傅恆十之二三則此事早可告竣朕亦必從優奬待矣若論經略大學士傅恆平日任用之久眷注之隆不如訥親近今如此為朕任勞任事忠誠奮發休戚相關不辭艱巨是以起程之際恩施稠疊實宜逾於負恩之訥親總之賞罰因人而施經略大學士傅恆有感激圖報之忱朕則從而加恩訥親有辜恩負國之實朕則從而治罪皆出於大公至正始足以伸賞罰之大權而朕心所差堪自慰者亦即在此可詳悉傳諭經略大學士知之戊辰軍機大臣等奏言據辦理糧餉侍郎兆惠奏言臣至軍營查看各路軍糈黨壩官兵夫役日需糧八九十石現儲米一萬餘石甲索日需糧十餘石現儲米七千石正地日需糧十餘石現儲米麵四百餘石馬奈日需糧三十石現儲米二千餘石均可有備無虞惟卡撒昔嶺木岡左右山梁官兵夫役日需糧一百六七十石食指既衆存貯無多現在崇德美諾儲米二萬四五千石沿途起運出口之米及各臺存積尚有三四萬石已令該道齊格設法辦理日逐挽輸臣等閲看該侍郎所奏情形是黨壩甲索正地馬奈等處所運糧石僅敷目前之用其卡撒昔嶺等處大營俱關緊要需糧甚多現在存貯已不敷支用將來增調滿漢大兵漸次到齊則食指愈衆允宜豫為籌辦夲月十二日臣等遵㫖傳諭班第兆惠現今增調滿漢兵丁三萬五千人合之原派官兵數幾十萬口食浩繁須預為寬裕儲備計班第兆惠奉到此㫖自必籌畫撥運應再行令該侍郎等將各路軍營應需糧石並將來大兵齊集應支口糧通盤籌算無論商運官運米石嚴飭臺站官辨上緊趕運不得藉口天寒氷雪稍致遲延並令該侍郎等親身督率往來查看催䟎其有擁擠阻滯之處亟為設法疏通並撫馭夫役令其陸續前進源源接濟毋致逃亡至該省現在存貯未運糧數若干是否足敷運濟抑或尚須籌辦酌撥應令該侍郎等據實查明一面辦理一面奏聞上從之是日軍機大臣等又奏言京兵二千名分起進發前經經略大學士傅恆預為辦理交與翼長章京等約束前往是以途次安靜並無騷擾滋事之處今東三省兵四千名雖俱有官員彈壓但伊等俱係外省兵丁未經內地行走該管官員亦俱係夲處之人不諳內地情形倘管束稍有怠忽或恐生事擾民臣等遵㫖定議此項兵丁既分為八起除盛京二起兵丁及黑龍江續派二千名已奉㫖交哲庫諾黑雅圖統領無庸另議其餘六起應請於侍衛前鋒護軍參領內擇為人謹慎通曉事務者各六人每起分派二人委為翼長同領兵大員於途次將官兵加意約束悉照從前經略大學士所辦成規料理務令整肅安靜抵營後所派侍衛章京內經略大學士傅恆有欲留在軍營委用者聼其酌量留用不欲留用者聼其回京上從之是日那蘇圖奏言副都統努三帶領第一起官兵五百名於十一月初七日到保定臣料理更換車馬就緒即於初八日起行臣隨同一路照應正定臨洺關分站預備車馬俱各照應無誤自京至磁行程原定為十一日今䟎作九日已於十三日送出直境兵丁皆安靜守法邑野無譁踴躍前進各站更換車馬及中伙住宿等事章程既已早定後起官兵到站自可遵循辦理臣仍往來照料並將直𨽻現辦事宜知㑹河南撫臣鄂容安聼其酌量辦理以便軍行奏入俞㫖報聞己巳經略大學士傅恆奏言臣在鳳縣途中接到傅爾丹嶽鍾琪報匣遵㫖開看內有傅爾丹嶽鍾琪所奏願以三萬五千人由黨壩一路進攻再由瀘河水陸並進可破勒歪一摺臣查嶽鍾琪原奏并力於黨壩而卡撒但用兵八千人防禦似為直搗心腹之計但自卡撒直攻刮耳崖與由黨壩攻取勒歪仍須攻擊刮耳崖其事一例今據傅爾丹等奏稱逐一履勘山澗重叠賊人碉寨稠密備禦嚴整而瀘河一道兩岸亦須防賊阻截則是由黨壩直破勒至亦不甚易且卡撒業已用力克取色底雙碉掃清左右頭道山梁若但用兵駐守而不進攻則賊人不必分兵抵禦又將專力於黨壩為死拒計是嶽鍾琪之議猶屬一偏之見傅爾丹等以為卡撒亦不可專事株守意欲兩路進兵其說較為周備臣意夲欲先至卡撒熟察情形再至黨壩親勘確實定議進兵今臣擬至卡撒時倘可進兵即統大兵進勦仰仗皇上天威及鋒乘鋭可以破其堅疊直抵賊巢黨壩一路另派大員添兵協助與嶽鍾琪乘時進勦彼此克捷賊可悉平若至卡撒揆度情形尚應少待數日則臣即至黨壩親行相度酌定機宜今傅爾丹所議近是而其意未必盡屬可據所有實在形勢及進勦機要必俟臣至軍中詳勘熟籌再行酌定具奏又嶽鍾琪覆奏黨壩一路情形自攻克跟雜之後尚未前進現調雜谷土兵二千赴營協力攻擊據云天氣晴明尚無積雪則乘時進勦正可破碉擒賊使無休息之期亦於軍務有益又傅爾丹等覆奏摺內卡撒一路僅堪駐守黨壩之兵較為氣盛而山廣徑岐在在皆須兵力分布是現在不過防禦尚不能進勦其所稱甲索一路既係綽斯甲巢穴僅駐兵一千而張廣泗從前欲令撤歸黨壩所存糧六千石即交綽斯甲看守是真所謂藉冦兵而齎盜糧不知何以出此誠所不解幸而中止否則未有不啓賊人覬覦之心者其布置乖方即此已知其難與成功矣至傅爾丹等摺內挑選新兵以補缺額一條自應以慣於行山之人為上選若簡練有方新兵自足以制勝從前張廣泗將陳亡守兵悉停募補雖意在養贍故兵家口而缺額不補兵數日少不得其用辦理亦為失當臣與張廣泗從未相識近於途次始見其人初若語言慷慨可以動聼熟察其實則一味油滑前後自不相顧但能大言不慙耳至謂與訥親用事之員外郎阿桂交結甚密內外勾通一切䝉蔽之處是否如此容臣抵營確訪再行據實覆奏奏入俞㫖報聞庚午上命軍機大臣等傳諭經略大學士傅恆曰軍機大臣議覆內大臣班第請給緑旗兵丁綿甲一事議稱是否有用請交與經略大學士傅恆定議朕思綿甲於臨陳之時甚為有用今廣儲司貯有二千四百餘副現在起程各兵每起各給與五百副帶至軍營經略大學士傅恆可酌量分給緑旗兵丁之驍勇者於征戰甚屬有益將此傳諭大學士知之是日阿里衮奏言夲月十四日接准陜西巡撫陳宏謀咨稱陜甘二省現在添派漢兵一萬五千名西安駐防滿兵二千名料理起程需費浩繁庫貯不敷支給應於山西藩庫不拘何項銀兩動撥二十萬兩委員星速解陜以濟急需臣隨行據布政使將晉省現存庫銀內動撥二十萬兩委令太原府同知孔傳鏞領解剋期赴陜交納奏入上諭該部知之辛未上命軍機大臣等傳諭經略大學士傅恆曰朕思滿兵前至軍營雖有應得口糧然進勦之時深山險地倘米糧不敷或無暇造飯則肉亦有益意欲將蒙古所進湯羊頒賜軍士因路逺難致而止可傳諭經略大學士滿兵若遇深入山徑是否需帶餱糧如牛羊肉割條晒乾似屬有用即或於彼處預備或須由京發往大學士一面辦理一面奏聞臣等謹按滿兵啓行之際皇上賜宴賞賚恩禮優渥既已逺逾常格又念及軍行或涉險阻無暇煮食令備乾餱以待不時之需睿慮周詳無微不至實乃臣下思慮所弗及也壬申上命軍機大臣等傳諭經略大學士傅恆曰大學士傅恆奏摺自十九日丑時到後連日未得臺報深為盻望此時經略甫在途次此間不過商酌機務傳諭知㑹之事尚非甚關緊要然即已懸念矣將來一抵軍營逐日事宜關係尤重必得聲息時通情形若覩朕懷始得稍慰念軍營所辦事件甚多且進取之際調度機宜懸於呼吸若復料理摺奏誠有難於兼顧之勢然必將接到事件約略聲明或將現在籌辦攻勦不暇即為馳奏緣由先行陳明朕可得其梗槩庶不至於懸望可傳諭經略大學士知之現據愛必達奏報黔省所調兵丁二千俱已揀選預偹調遣計此時已可抵川經略大學士到彼自應留用以益軍威以圖速奏膚功一并傳諭知之是日鄂容安奏言京兵經過豫省原於淇縣之淇門驛河內之覃懷驛澠池之義昌驛閿鄉之鼎湖驛分設四大站預備車馬交替臣細加裁度每站相距三百餘里馬匹交替難免疲乏之虞今各站馬匹既令照數加倍又備餘馬一二百匹分為三分酌於兩站適中之地添備一分約一百五六十里即行交替仍於每起官兵後備車數輛馬一二十匹中途偶有疲乏立即更換俾馬力有餘兵行迅速每日到店亦可早為憩息養其全勇以冀迅奏膚功臣於十二日親至淇門驛詳加查勘各項俱已預備無誤頭起官兵亦於十三日抵豫界之豐樂鎮十四日抵淇門驛每日行百三四十里及百五六十里不等十五日現據獲嘉縣住宿二十一日可抵陜省交界臣親督原派員辨逐程護送仍於沿途詳慎指示務期妥協奏入俞㫖報聞平定金川方略卷十六
