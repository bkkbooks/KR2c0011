body:
  text: 七月癸巳上諭內閣曰經略大學士訥親等奏稱署總兵任舉統兵進攻昔嶺石城身自督戰奮勇直前多所斬獲乘勝追殺致被鎗傷陳亡任舉前在參將任內值固原兵變以單騎手刃亂兵解散賊黨捍禦全城安撫百姓勞績已為懋著故特擢用副將命往金川軍營領兵攻勦所向克敵現已補授總兵官深望凱旋之日録功優叙以奬殊勳孰知伊感朕知遇奮勇捐軀深堪憫惻考諸典禮以死勤事者祀之本朝特建昭忠祠用享疆場效命之臣任舉著入祠從祀所有恤典照提督例給與該部察例具奏伊子亦照提督例給與廕襲該部并行文調取來京引見至買國良等著經略大學士訥親於軍務告竣之日查明咨部一體從優賜恤甲午上命軍機大臣等傳諭訥親曰訥親昨奏到軍機一摺已詳悉頒發諭㫖今再四思維所云建碉之䇿不惟有所難行抑且深為可慮將謂得尺則尺得寸則寸以此為自固之計獨不思碉樓非可易成即使能成而我兵究以攻取為事若再行前進其將再建一碉耶向後屢進不已䇿將安出且調集大兵本圖制勝今不用以克敵而用以建碉必非所願以朕度之此㫖未到之先勢將中止儻其意在必成究屬徒勞無益朕一見此摺即不以為然及問在京大臣等亦皆以為不可朕意張廣泗老於戎行豈有不知而亦隨聲附和在張廣泗未必不謂任事經年未著成效今既有經略肩兹巨任發謀决䇿經略裁之是非得失經略當之而彼得袖手旁觀遂其推諉之計如此則所係更大矣訥親不可不知此意况朕命經略前往原以總挈大綱以朕坐籌遙度於京師不如可信之大臣親履行間察衆人之情就目前之勢相機指示據實入告尤為親切此朕命訥親前往之本意也至宣猷效力仍當責之張廣泗等使各盡其長即使朕親行亦不過指揮調度而所重自在羣䇿羣力從來耕當問奴織當問婢若論用兵熟練朕必不肯謂訥親優於張廣泗即訥親亦必能知此蓋經略統領全軍衆人之謀皆其謀衆人之力皆其力豈必自出所見方為己功耶而朕更有深慮者大兵聚久變患易生在固原平居無事之時尚有一夫夜呼倉猝四起之變何况軍中親信僅滿洲百數十人其餘皆調發客兵及土司蠻卒本非世受深恩為我心膂者比浮寄孤懸孰無室家鄉里之戀而勞役不已奏凱無期版築方殷鋒鋭莫展肘腋之慮良可寒心在部曲士旅固不可不鼓其勇氣而鋒鏑之下人孰甘心驅之太迫變計生焉儻有不測豈不重貽西顧憂耶此所為反覆以思而食不甘味寢不安枕凡思慮所及不得不備細告之訥親使悉知之也金川之役本不容中止况任舉之殁失我大帥如其置之不問何以慰彼忠魂雪我衆憤但憤兵亦將略所忌自宜因時度勢以為進止儻險地必不可爭或别有出竒制勝之善䇿如古所稱用間用術或致甘言或懸重購使彼有內潰之機然後可乘其敝從前王柔亦謂蠻夷易以利動且彼醜類無多不惜厚費或可坐縛逆酋此亦不得已之思耳王柔何時能到軍前曽否建白及此可就近咨詢溽暑炎蒸瘴癘毒虐暴師日久無刻不勞軫念大學士起居善自愛護並傳諭軍中諸大臣將辨其各慎重臣等謹按春秋傳曰王巡三軍拊而勉之三軍之士皆如挾纊宋太祖冬日諭侍臣曰吾居深宫尚苦寒若此况從征將士耶因解衣賜王全斌仍語諸將士曰不能遍及也蓋上下之情貴乎相通上以慈祥惻怛之恩待其下則下必以忠義愛戴之誠報其上伏見皇上身居九重慮周萬里以行師逾載時時厪念不特經略大臣諭令善自愛護即軍前將辨無不慰勉諄摯仁恩愷澤足令聞者感深肌髓矣乙未上命軍機大臣等傳諭班第曰金川運糧蠻夫腳價每石約十餘金又日給炒麵一升所以體恤勞人可謂優渥矣今聞川省每一州縣派夫六十名里下科派津貼每夫一名竟至四五十金之多一夫在途或有逃亡病故仍向本縣補派津貼亦復一例重科里下從中侵蝕幾至窮鄉僻壤竒零小尸亦皆騷擾不寧是居者追呼朘削既有典質稱貸之纍而行者離鄉背井仍不免於饑寒困苦之憂以小民之脂膏徒飽里胥之溪壑以此推之則各土司所屬番夫亦未必能免派纍無怪乎巴塘番民有不服派夫毁橋穵路之事也金川軍務尚未告竣運糧之事勢難中止若不體察情形妥協料理民何以堪朕前因金川軍營止張廣泗一人故令班第暫留協助今既有大學士訥親提督嶽鍾琪等則班第現無専辦之事可以暫回內地往來查察著於沿途即詳加體訪如朕所聞情形果否如此一並妥協飭辦務期無誤軍糈無纍民番始為兩全是日上又命軍機大臣等傳諭訥親張廣泗曰近覽訥親所奏軍務情形似非一時可能就緒今大兵已深入賊境設膚功不能立奏經秋涉冬彼地沍寒難以久駐又不得不暫營和暖之地相時再舉深惟久戍之卒一聞移撤心多渙散狡寇或從而躡其後不可不慮將來移駐何地並如何撤回之處亦當預為籌度萬全且大兵調集逺來自瞻對之役已經三載其附近土司俱應夫役亦已數年運餉從征更多擾纍近聞蜀省州縣派夫徴餉苦纍農民已傳諭尚書班第令其往來查察訥親可即令前往並飭巡撫紀山速為查辦內地如此土司可知恐其積勞懷怨别更生心而我軍孤懸賊境非內地聲援聫絡者可比可傳諭訥親張廣泗咸悉此意處處刻刻留心密切防範至朕命訥親經略原以總領大綱觀察情狀督率調度張廣泗本係川省封疆大吏且統領全師二年于役凡軍務責成朕惟張廣泗是寄目今歷練戎行嫻熟軍旅孰有過於張廣泗者伊當竭誠效力經畫機宜不可因大學士在營稍有推諉之心或存彼此之見現今各路兵勢若何古之用兵制勝者曰觀釁曰攻瑕賊衆所短何在何處有隙可乘訥親張廣泗在營當有成算可詳悉奏聞是日上以金川之役紀山首開事端乃坐鎮省城於軍務既若置身事外而運糧一事復任里胥濫派中飽民番俱纍漫無覺察命軍機大臣等傳㫖申飭臣等謹按金川糧運皇上早頒諭㫖令巡撫紀山給發價值務從寬裕乃奉行不善致有津貼派纍皇上一聞陳奏聖心注念不已屢頒諭㫖既嚴飭紀山復令班第回川查察務使無纍番民計慮既極周詳而愛民如子之誠尤為臣下所當深體者矣乙亥上諭內閣曰我國家從前用兵以雲梯登城為要務其時人思奮勇建功受賞延及子孫今承平日久兵革不試旗人已不知有此藝矣朕思金酋恃其碉樓險固正可用此破敵即使金川無所用之亦滿洲武藝所當訓練者可於八旗前鋒護軍內上三旗每旗派五十人下五旗每旗派三十人擇其少壯勇健者演習雲梯以備遣用交與公哈逹哈查拉豐阿都統永興護軍統領慶泰副都統那穆扎爾管領訓練并令來保傅恆那延泰汪扎爾更番查閲俟學習有進朕亦往觀壬寅上命軍機大臣等傳諭訥親曰張廣泗將原任總兵馬良柱解送到京朕命軍機大臣等召問伊乘夜撤營遺失軍械情節據稱從前駐守曾逹之時糧運為雪所阻已經半月士卒皆煮皮鎧鞍䩞而食接到總督撤營檄文人思更生炮位軍械因雪大不能搬運以致遺失馬良柱前於班滚之役扶同欺隱兹復臨陳退縮罪固難逭但伊在川省二十餘年地方情形頗能熟悉即以進勦金川而論其始領兵千餘在瓦寺松林口奮勇督戰遂解沃日之圍又收降小金川之衆克復孫克宗是伊在三鎮中尚為出力即班第前此亦經備細奏聞至其撤營一事據稱糧運被阻已經半月果爾則時日甚久兵丁何以自存恐屬狡飾之語如實係如此則馬良柱之倉皇拔營又當别論可傳㫖詢問大學士訥親秉公確察不必問之張廣泗與班第彼時糧運是否為雪所阻已經半月之久將情由速行奏聞儻所供屬實馬良柱年雖六旬有餘精力尚屬可用將來仍發往軍前立功贖罪或猶勝於新任苗疆之人也至訥親前次摺奏係七月初十日到京今又幾及半月並無具奏之事朕心日深盻望在訥親之意必係期於速捷以待奏報膚功但軍營事務朕切欲備悉其情形無論大功克成固宜迅速入告即或尚在酌辦亦當隨時奏聞以慰朕西顧之念嗣後著十數日一次繕摺具奏其現在進勦事宜若何天時晴雨若何軍務既不能中止本年儻未能即竣將來作何結局訥親等目下作何籌畫可一并詳悉速奏朕近思我滿洲舊有蟻附登城之技因承平日久未經演習今已特派大臣挑選旗兵數百按期操練務令純熟並暫留馬良柱在京令其度量賊碉形勢協同演習俟訥親奏到再酌量發往軍前并諭知訥親將此項技藝可否為攻擊碉樓之用即行奏聞戊申御史王顯緒奏言川省上司與金川疆界毗連者不一其處如果以番制番不難滅此朝食况番性貪悍慫恿甚易仰懇皇上敕下經略大學士將鄰近金川之各土司無論己未調赴軍前概行明白宣諭令其自統所部土兵以為前驅官軍惟大張聲勢以為後援有能搗破賊巢擒獲逆酋者即以金川土地人民賜之將見各土司爭先恐後盡欲立功受賞伊等言語衣服相同偵探往來亦便前驅之土兵一得路徑破其險要大兵即可尾之而進且金川賊衆見附近土司奮勇并力自度難以瓦全又聞有破格之賞亦未必不自思求生之道縱不擒其酋首縛獻軍前亦決不致如前此之出死力以相拒矣奏入上命軍機大臣等傳示訥親張廣泗是否有可採擇以備一得之用或調伊父王柔面加詢問詳悉奏聞臣等謹按以番攻番固兵家之常言即軍中亦未嘗不用此計乃我皇上虛𠂻若谷延納維殷一聞陳奏即命經略等加之採擇初不以書生未諳軍務而忽棄之芻蕘之言聖人擇焉其是之謂歟庚戌上諭內閣曰金川逆酋不法現在調撥大兵刻期勦滅一切軍需供應絲毫不以纍民惟是飛芻挽粟烏拉之外間亦酌用民夫雖給與腳價口糧而小民不免勞瘁朕心軫念著該督撫查明辦過夫米各州縣將本年錢糧先行緩徵俟凱旋事竣之日分别等次奏明請㫖候朕加恩以示軫恤邊氓之意是日上又諭內閣曰大兵征勦金川各土司盡心出力始終不懈朕曽傳諭經略大學士訥親將效力戎行供應烏拉挽運軍糧之各土司查明功績分别奏請候朕加恩今據覆奏各土司挽運軍糧雖按米給值而供應夫馬尚無貽誤且現在奉調協勦俱屬恭順請加賞賚朕念各土司轉運供應著有勞績雖協力攻勦尚未殄滅逆酋奏報全捷而從事行間應先行分别賞賚以示鼓勵但該土司等向來輸納貢賦多寡不同若免其稅糧人數難均未為允協其明正土司堅泰德昌等著加恩將軍營所有充賞縀匹酌量分别賞給未經查明之長官司土千百戶等俟查明之日一體頒賞是日訥親張廣泗㑹奏言各路於六月二十六日以前攻克情形業經具奏兹查河西四路內正地馬奈二路俱報稱碉寨險竣難克甲索乃當二路月餘並未攻戰河東六路內除納貝一路原係牽制之師其美卧納喇二路已歸併昔嶺為一路是河東可以攻抵賊巢之兵止有黨壩昔嶺卡撒三路今黨壩統領之提督嶽鍾琪報稱所統之兵雖有萬餘漢兵除傷病外止存二千有竒餘皆雜稄等處土兵多屬怯懦若直抵勒歪必須添兵數千方可沿途布置則是亦未能即掃巢穴卡撒一路所檄調添併官兵現尚未到難以進攻昔嶺一路派兵已幾萬名乃自哈攀龍等統領以來二十餘日為賊卡所阻不能前進兼之卡撒右山梁賊碉已為我兵扎卡圍困數日復被賊焚奪不能救回伏思漢土官兵四萬餘名業已十倍賊衆乃今嵗進攻既逾兩月臣等親涖軍營亦已月餘竭力運籌督率究未能使將士共知鼓勵奮勇爭先以致各路毫無寸進此皆臣等措置未當發蹤無方實深惶悚現在可望深入直抵賊巢者惟昔嶺一路務期督率將士奮勉效命一有前進即行飛速馳奏再檄調之原任提督假起賢於本月初五日到營已委令總統昔嶺固原等處官兵并暫署重慶鎮印務奏入報聞是日訥親張廣泗又會奏言松潘鎮哈攀龍統領官兵原係由美卧溝一路進攻嗣因該處有松林阻滯即經調赴昔嶺會合進攻因令酌委幹員帶兵三百移營前赴美卧溝駐防乃哈攀龍所委之千總黃世顯漫不經心復𣲖外委羅匡國帶兵三十名解運炮位以致六月二十二日行抵松林口乾海子左山梁遇賊殺死兵丁二名搶去劈山炮一位已屬大干軍紀及黃世顯帶兵駐劄撒凹山腳該處尚存軍糧七百餘石該員復任意玩忽毫無備禦以致六月二十九日賊來侵犯殺傷官兵占據糧石失去炮位軍械該員退保墨石臣張廣泗聞知飛檄小金川土司帶兵二百前往擊退賊衆止失去糧三十一石似此怯懦疏失之武辨哈攀龍濫行遣委咎已難辭且該鎮調赴昔嶺於任舉陳亡之後不能督率士卒奮勇力攻藉稱欲建木柵方可架炮攻擊延至二十餘日始將木栅建就亦仍未能攻克賊卡是布置疏虞進攻延緩軍紀攸關相應參奏但查哈攀龍係限於才智尚非有心貽誤其臨敵頗知勇往仰懇聖恩將該鎮降級留任自必感激圖奮臣等隨時䇿勵亦可資其效用是日訥親等又奏言卡撒右梁雙碉必須先圖攻克方可再規進取前於五月內派令副將髙宗瑾帶兵逼碉駐劄攻擊旬月以來徒傷辨兵究未能克嗣因副將唐開中鎗傷其所統滇黔官兵需員管領暫令髙宗瑾前赴昔嶺接管與參將劉䇿名共為經理攻勦竟無一技可施及臣張廣泗分派小金川土兵乘夜圍困雙碉絶賊水道而率領土兵之候補守備馬國才不惟不能嚴加防範乘勢攻取反被賊人於雙碉之下奪去小金川土兵所札木卡二處髙宗瑾既不應援劉䇿名又漫無調度而管領放卡漢兵之遊擊韓樞守備杜先俱擁兵坐視不為策應相應據實糾參請㫖將髙宗瑾韓樞杜先馬國才俱革職以肅軍紀並請仍留軍營差委效力至劉䇿名任事僅十餘日應暫行存記俟事竣核其功過奏入上俱可其奏是日上命軍機大臣等傳諭訥親張廣泗曰據奏金川進兵情形並將總兵哈攀龍副將髙宗瑾等分别糾參朕已照所請交部但此次辦理軍務似微有過嚴之處夫軍行首重紀律固不得不嚴惟是嚴於罰者亦當明於賞鼓舞人才之道又不得不少加委曲假如同屬中平之材其十人中豈無二三人略勝者則就此二三人稍示優異以勵其餘又如一人之身或功過相參則當亟加賞賚以不沒其功俾其感激鼓勵奮往直前冀蓋前愆如其再有過犯加以嚴處彼亦甘受無辭蓋從征將士身冒鋒鏑臨陳對敵驅之以性命相搏若不於賞罰之道神明其用甚至有罰而無賞兵丁等豈明大義未免寒心漸就怠惰或更隱含怨憤當此倥偬旁午之際少有變故所關匪細自金川用兵以來大小員辨以過受罰者多人而破格被賞者頗少似非鼓勵將士之道至摺內所稱此皆臣等措置未當發蹤無方在伊等肩兹重任頓師日久其心固切欲進攻以期大捷而兵情地勢難易緩急之間亦當隨時酌度逆酋險碉林立一夫當關萬衆為之阻奪急於期效亦屬無益且恐欲速過甚未免轉有疏虞此又不可不審也再如割取耳記一事朕前恐行之未便是以交軍機處定議今據奏稱接到諭㫖又行酌改用兵大事朝令夕更原非所宜朕於數千里外何能事事遙度悉中機要歷次所降諭㫖其能行者固當遵辦其或勢有難行或已發而未便復收亦不妨據實奏明總期歸於妥協此事既經改辦祇得照行但奮勇兵丁另當熟籌奬賞之法以示鼓勵建立碉樓一事所降之㫖目下諒已接到此次摺內未見奏及或以勢難强行因而中止或照前摺尚在舉行情形究竟若何且入秋將近半月賊境雨雪漸繁將來作何行止朕日為厪念可一併具奏臣等謹按賞罰為軍中機要所謂嚴者在紀律森然人不敢犯非吝賞之謂也訥親等意在急於期效故於諸將士但見其過不見其功實則賞罰不明欲速無益聖明洞鑒已盡底藴至謂十人之中豈無二三人稍勝者即一人之身功過相參當先賞其功以鼓其氣指示明切曲盡人情若聖諭所謂兵情地勢難易緩急之間皆當隨時酌度誠至當不易之論也訥親初至軍營急切督戰以致任舉陳沒無功豈非難易緩急之間有失當乎聖德謙沖謂數千里之外豈能事事遙度悉中機宜而實則諭㫖所頒燭照無遺洞中窽要惜乎在事諸臣之未能善體也是日訥親奏言准兵部咨議覆陜西巡撫陳宏謀請增驛站馬匹工料一案交臣定議臣查四川通省驛馬實有七百餘匹巡撫紀山因軍興額馬不敷差遣先後題請加增經兵部覆准添馬七百二十餘匹現在馳送軍機文報可無貽誤陜省原設馬匹數目較之川省各驛請增之後尚多未便轉議加增以致徒縻國帑奏入報聞辛亥上諭內閣曰主事何曰熙隨往軍營近聞身故雖係患病究因公事前往與效力戎行相同自宜酌加恩恤其身後一切事務及起送回籍俱著大學士公訥親酌動公項量為料理賞恤臣等謹按何曰熙隨往軍營職司文翰非有荷戈執㦸之勞禦侮折衝之績乃皇上念及從征即與效力戎行者相等恩㫖優渥體恤備至如此三軍之士聞之宜何如奮勉激勸也是日陳宏謀奏言准四川撫臣紀山咨軍前添調官兵更增繁費前接准廷寄令於陜省封貯銀內就近撥用當經咨請動撥銀二十萬兩解川已經收明今當庫項匱乏之際請於陜省藩庫內凑撥銀二三十萬兩委員兼程解川以濟急需臣飛行布政使議稱酌留項下止存銀一十萬餘兩不敷川省請撥之數今於酌留項內動銀一十萬兩再於乾隆十三年春撥銀內借動銀一十萬兩共銀二十萬兩即於七月十八二十二等日委員解送四川撫臣紀山收明應用奏入上諭該部知之閏七月癸丑紀山奏言金川節次添調官兵分路進勦費用繁多前後題撥協餉究不敷用據布政使倉德詳稱前後借項已逾百萬奉撥江楚二省銀一百萬兩不足歸還借欵今又奉檄添兵則軍務之需費日繁而凱旋之遲速難定加以辦理善後漢土兵丁歸裝坐糧以及奬賞撫恤及松潘等路駐防臺站官兵更有嵗需供應合再詳請酌撥協川銀一百五十萬兩迅速解川以資接濟奏入上命該部速議旋經部議甘肅撥給銀十萬兩江西撥給銀二十萬兩浙江撥給銀二十萬兩部庫存貯銀內撥給一百萬兩共一百五十萬兩解川應用己未上命軍機大臣等傳諭訥親曰解任總兵馬良柱稱軍械內火箭最為有用伊從前曾禀明張廣泗製備火箭五千枝謀焚賊酋積貯原禀並未批發賊酋糧食俱安置碉樓之上火箭所及可以焚燬無遺即其木碉或為火箭射中亦可令其焚燬賊中素畏此項火器從前瞻對用之已有成效馬良柱所言或尚可採蓋賊酋所恃以抗拒天兵者以糧食不用外求今當此秋成賊糧露積之時施放火箭似可奪其所恃著傳諭訥親詳悉斟酌如屬可行即於成都城內製就解赴軍營應用近日軍情若何朕心懸念并令具摺奏聞山寒氣惡之區以保身為要至馭軍之法雖應號令嚴明亦宜寬嚴並濟惟知督責使令效命於死地而絶無慈惠愷惻之思以及人則人孰肯用命哉必當集思廣益合衆志以成城又朕所以命訥親前往者欲悉知彼地及軍士實在情形也雖兩次奏報攻戰之事而金川究係可取不可取及昔嶺賊隘之外復有别徑可進取否此等總未奏及向聞川省緑旗兵弱今果然否尚屬可用或不可用亦未奏及又用間一事早有諭㫖亦尚未覆奏以番攻番許之以金川土地人民或者衆番合力取之亦未可知若不可行則應速行奏明朕亦知軍中接一諭㫖必費許多籌算或反誤攻取正務但諸事既未詳悉奏報而大功又未速成何能慰朕日夜懸念耶故不辭瑣言詳悉批諭其審籌細酌為之壬戌兵部疏言前重慶鎮總兵官任舉統領官兵進攻昔嶺石城身先士卒奮勇前驅乘勝追殺以致鎗傷殞殁欽奉諭㫖令入昭忠祠以勵疆場用命之臣並命臣部照提督例給與恤典臣等查照定例應請加贈三級贈以署都督同知仍准廕子弟一人以都司推用行文該鎮原籍地方將伊子送部引見其應得祭葬臣等行知禮部工部舉行上從之丁卯上命軍機大臣等傳諭訥親曰川省運糧一事前因紀山所定價值浮多傳諭詢問據稱官運米石定價每石十四兩七錢至民間雇夫出口每名每月俱有幫貼銀兩而官運軍米自出口抵營除支給腳價外每夫每站俱給口糧一升兩夫背米一石即以口外二十站勻算往回口糧沿途臺站已開銷米八斗是給軍之米大半耗費於運夫紀山所奏因此案乃伊自行陳奏之事不無飾詞回護未盡確實若果屬實情則從前西北兩路軍營糧餉浩繁程途遼逺其運糧腳費尚不至如此之多今以本省之米轉運本省即令山谷﨑嶇何至艱難若此朕觀目下情形未能刻期奏凱宿兵既衆食給殷繁長此不已何以為繼大學士訥親身在行間自必豫為籌及或事不能中止則籌兵必先籌食或别有良法或如從前西北軍營之例令范育馪之子弟領資轉運可省官給之煩而於軍餉有濟亦應早為計及可傳諭訥親詳悉妥酌速行奏聞是日貴州巡撫愛必達奏言接准川陜督臣張廣泗來咨以會勦金酋亟需幹員委用已檄調銅仁協副將胡大勇來營聽遣此外尚須選派勇幹歷練將備二三員飭令即日束裝赴營聽候遣用臣隨檄行胡大勇遵照并經提臣丁士傑揀選得黔省上江協左營遊擊田金玉丹江營守備紀萬年長寨營守備李繁盛皆素稱勇幹歷練軍務而督臣張允隨亦遴選田金玉并選滇省東川營參將紀麟昭通鎮標守備馬秉祥俱勇往强幹歷練戎行已各檄飭速往聽遣辨兵鹽菜口糧并應撥馬匹夫役皆飛飭地方官先期料理隨到隨即支應前進以期無誤據各將備呈報於七月初十十五等日已經先後起程理合陳奏奏入報聞戊辰上以山東濟東道髙越為四川布政使令速赴新任己巳上命協辦大學士事尚書傅恆傳諭訥親曰巡撫紀山辦理金川事務與總督張廣泗甚不相合屢經批諭訓飭終未釋然督撫各持意見在尋常無事尚為不可何况軍務倥偬正當同舟共濟而川省情形如此或係有意齟齬掣肘公事或因嫌隙既開遇事不能相下紀山才具本短但在滿洲大臣中尚不失舊家氣象用為巡撫惟慮其被屬員欺蔽若此番之情性乖張與督臣不合殊非意料所及仍留川省恐於軍務無益可傳諭訥親令其詳悉酌量或尚可調用别省或應行治罪以為剛愎任性之戒俱著訥親一面據實奏聞一面傳㫖令其解任來京四川巡撫印務即著班第暫行署理於運糧諸務呼應較靈當於軍務有濟再前次摺到之後又幾二旬日夕跂望即七月十一日所批發傳詢諸㫖應行覆奏者除往返程途積日以計亦應馳到何以遲遲若此深為懸繫訥親接到此㫖務將近日情形詳悉入告并遵照前此十餘日一奏之㫖迅速頻具摺奏以慰逺懷是日上又命協辦大學士事尚書傅恆傳諭訥親班第張廣泗曰四川布政使倉德於辦理藩司事務不能妥協已補授太常寺卿令濟東道髙越代之矣倉德為人才具本短看來尚屬謹飭是以任為管庫之司但如運糧一事係撫藩專責而此番軍需運腳繁費較之從前西北兩路軍營運費反屬繁多而人言籍籍猶以轉運為苦若非辦理未善何至於此在紀山倉德自未必侵肥作弊而兩人才情皆短或為屬員䝉蔽回護已過俱未可知今倉德既經離任其有無欺蔽易於查察可傳諭訥親班第張廣泗等將伊任內經手諸事逐一確查據實具奏若軍務倥偬無暇分心查辦則將此事專付之班第俟成功之日再行詳查彼二人已皆離任不能有所掩飾也平定金川方略卷九
