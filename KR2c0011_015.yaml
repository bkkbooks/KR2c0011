body:
  text: 十月甲辰兩江總督䇿楞奏言臣聞臣弟訥親經略軍務措置乖謬業經恭摺奏請馳赴軍營以圖稍效犬馬之勞現在候㫖兹又接閲邸杪備悉訥親於奉命經略之初即不踴躍思奮進抵軍營之後又怯懦偷安從未一至軍前并敢以帳中望見火光悖謬之言公然叙入章奏終復借有面奏之事希圖規避回京臣伏思訥親身受聖主有加無己之深恩即粉身碎骨亦不足以圖報乃於國家軍旅大事輒敢如此負恩不獨為國法所不容抑亦有玷臣之先人於地下即臣之弟兄輩凡有聞此者無不共憤臣為訥親之長兄當此君臣大義所關實有不能緘默者伏乞皇上聖恩即將訥親拿交刑部嚴加治罪以為負國者戒并懇聖恩准臣原奏容臣馳赴軍營竭盡犬馬之力以冀仰答高厚於萬一奏入諭曰自有處分豈因人言而定耶丙午上諭內閣曰訥親辦理金川軍務畏縮乖張種種舛謬朕前降㫖令其明白回奏今據奏至更復浮混無恥且皆委過於張廣泗訥親以經略重臣軍中調度皆聼指揮功過無可旁貸豈容一切推卸在張廣泗此番罪譴夲無可寬但出之他人尚為有辭訥親則無可委過如摺內所稱各情節訥親身為經略果實見其非何難據實參奏即一面參奏一面提問亦無不可觀其遲回不斷並非伊見不及此蓋以一參張廣泗則軍中之事皆伊所仔肩其責愈重惟留以為卸過之地將來即或無功而歸亦尚藉張廣泗為之代任其責居心若此是豈受恩深重實心任事之犬臣所為乎况伊摺內所稱自任舉失事即頓兵二十餘日不敢前進是其怯懦委靡全無愧憤激勵之意咎無可辭至所詢伊並不親身督戰惟在帳中坐觀諸事亦據一一俯認不諱因奏請將伊交部嚴加議處夫遲誤軍機畏縮觀望設令訥親處分他人罪狀有不問以斬决者乎而自乃僅請交部議處此豈降革所能了局者耶且伊兄䇿楞昨奏稱訥親於國家軍旅大事如此負恩為國法所不容請拿交刑部嚴加治罪是伊兄尚知其獲罪重大國法難容而伊乃如此陳奏則是伊全不以軍務之輕重介意非天奪其魄喪心病狂則目無國法不畏三尺辜恩負國莫此為甚此摺著交部存記尚有續降諭㫖究問之事俟伊覆奏到日并案請㫖是日經略大學士傅恆奏言臣等原議京兵一千七百名船厰黑龍江兵三千名分為十六起起程每起兵三百名今臣等遵㫖酌量議覆每起兵五百名應將京兵一千七百名分為四起頭起兵五百名餘俱四百名仍令自十一月初五日為始啓行船厰黑龍江兵丁到日每起俱五百名起程仍行文船厰黑龍江將軍令各兵輕騎作速來京途中預備馬匹車輛雖多但每起俱已添兵應速行文直𨽻河南西安四川各督撫將軍等令照所添兵數將車馬作速預備毋致臨期貽誤得㫖速行是月戶部遵㫖於各省秋撥案內將鄰近四川之湖北湖南江西三省實存銀一百一萬一千一百餘兩俱解往川省備用又據署撫班第疏請再撥銀二百萬兩經部議撥廣西省銀五十萬兩山西省銀五十萬兩部庫銀一百萬兩俱解交川省應用十一月辛亥軍機大臣等奏言武備院收貯長鈚箭五千枝經略大學士傅恆帶往一半賞給兵丁尚存二千五百枝此項箭枝甚為得用兵丁等不易購覓應請交武備院照式成造七千五百枝連前存共一萬枝俟船厰黑龍江兵丁到京時賞給伊等帶往軍營應用上從之壬子上命軍機大臣等傳諭哈攀龍等曰哈攀龍冶大雄哈尚德三人年力正强尚屬驍勇可備驅䇿特發往金川軍營令及時自效乃伊等到營並未聞有克獲建功之處所領兵丁作何布置作何攻取亦未有一摺奏聞僅於此次傅爾丹等奏摺中具名請安不知伊等在彼所辦何事武辨身臨行陳而坐守經年不能攻堅陷陳能無愧乎可傳㫖詢問令伊等明白回奏是日陳宏謀奏言陜西自鳯翔府屬之寶雞縣起至漢中府屬之寧羌州黃壩驛抵四川境計一十六州縣驛俱在棧道之中山路險窄崎嶇原設額馬僅止五十餘匹自金川用兵以來差使往來供應甚煩晝夜奔馳疲苦萬狀額馬夲屬不敷工料又較短少經臣將實在艱苦情形具奏請增夫馬䝉皇上敕交廷議議令訥親妥酌具奏隨據訥親以陜省原設馬匹數目較川省尚多未便加添覆奏准行臣何敢再為瀆請惟是川陜二省雖界址毗連而道路之平險各别陜省棧道之在險境者十居其八驛馬奔馳勞傷倒斃實較川省為甚自夲年五月以後各驛又添設腰站接遞軍營緊要文報棧道各驛馬匹愈不敷用更值陜省連歲歉收草料飯食處處昂貴數月以來正站腰站馬少夫疲艱苦情形日甚一日臣身在地方目擊情形不敢坐視貽誤不得不據實陳奏仰懇皇上格外天恩俯准臣原奏將漢中府屬之寧羌黃壩等一十四州縣驛每站暫添馬二十匹馬夫十名以資應付每馬一匹日支草料銀八分五釐馬夫一名日支工食銀五分其鳯翔府屬之寶雞東河二驛騾馬尚易雇覓無庸添設馬匹其草料亦請每日支銀八分五釐馬夫工食每日支銀五分一俟軍務告竣即將馬匹變價歸欵夫馬工料亦仍照舊額支領庶軍情不致貽誤奏入得㫖允行是日陳宏謀又奏言接准部咨以京兵及東三省兵丁前往金川進勦自西安至軍營酌量道里險易情形應行安設驛站令臣詳悉籌畫臣查陜西境內自豫省閿鄉驛至西安京兆驛計程三百五十里自西安京兆驛至四川神宣驛計程一千三百八十五里內西安至寶雞縣計程四百餘里尚屬坦途其餘皆係棧道險阻難行若安臺太逺騾馬奔馳易至疲乏倒斃買補費帑煩多且恐運送前起不及回應後起致有遲誤臣酌量道路險易情形謹議陜省境內共安臺七處第一臺自京兆驛接送起至武功縣第二臺自武功縣起至寶雞縣第三臺自寶雞縣起至鳯縣第四臺自鳯縣起至留壩驛第五臺自留壩驛起至褒城縣第六臺自褒城縣起至沔縣大安驛第七臺自大安驛起至四川神宣驛以上七臺每臺預備馬八百匹共需馬五千六百匹原議如驛馬不敷在於營馬內通融撥用如仍不敷即行雇覓騾頭等畜臣查通省營驛馬匹除延榆綏等府州縣僻在邊逺地方緊要不便調撥其餘內地各驛站酌留遞送緊要文報勘合馬匹外共可調撥驛馬一千二百六十五匹其督撫提鎮協營除先經出征金川兵丁帶往馬匹並酌留防汛及存營差操外共可調撥營馬二千七百三十五匹尚不敷馬一千六百匹應行雇覓預備再安臺需車三百輛查自西安京兆驛至寶雞縣二臺尚可行車自寶雞縣至四川神宣驛止共計五臺棧道崎嶇車輛難以行走酌議以騾三頭代車一輛共需雇覓馬騾四千五百匹頭所雇騾馬向來陜省公務往來每騾一頭每百里給與腳價銀二錢雍正十一年運送軍裝經廷議自西安至蘭州以及寧夏每百里給銀二錢六分自蘭州至凉州甘肅西寧每百里給銀三錢在案今查西安至四川經由陜境俱係崇山峻嶺較之自蘭至甘肅一帶尤為險阻難行兼之草料食物在在昻貴目前官商人等所雇馬騾每站價銀三錢以外尚覺艱難此項應差馬騾若價值短少不敷日食難以雇覓酌議每騾一頭每百里照蘭州甘肅事例給銀三錢以免貽纍小民又所需車騾計十六起每起五日往回一次計需八十日更番應差騾馬重載空回俱無停歇若回空之日不給草料價值夫馬均難枵腹若亦照三錢給發則回空究非負重可比酌量减半給與每百里給銀一錢五分以為草料飯食之用則騾戶悉皆踴躍急公大差往回日久可以不致貽誤至於官兵住宿之處房屋不敷應安設帳房并招徠鋪戶貨賣食物一應預備事宜俱已委員分路相度布置布政使武柱將軍博第現在分路親往巡視俟官兵入境臣仍委道府等大員加意查察總期於軍務無有稍誤奏入諭曰覽奏嘉悅頗見汝急公之誠勉之是日陳宏謀又奏言陜境安設臺站需用馬匹車騾不下一萬二千餘匹頭前後在站約計一百餘日所需料豆為數繁多沿途買供難免騰貴臣悉心籌酌查有潼關㕔倉內節年支剩豌豆一萬石原係應行糶賣之項與其出糶採買輾轉多費不若乘此軍需用豆之時通融撥用誠為有益臣與布政司議將該倉現貯市斗豆一萬石酌量借給京兵住宿之各州縣驛均勻分領以供臺站喂養馬騾之用俟明年豆收後責令照數採買運倉無庸開銷腳價至鳯翔漢中一帶各州縣驛相距潼關甚逺不能運濟查該二府暨邠州所屬長武等縣尚有存貯候撥及常平應行出易之豆石可以就近撥運借支明年豆收後亦責令照數買補還倉此外尚有不敷令各屬酌量多寡借領庫銀於鄰近地方採買供支總期兵馬到站俱有官豆可以喂養馬騾不至零星購買致有昂貴缺乏之虞奏入俞㫖報聞是日傅爾丹班第㑹奏言金酋負固無非恃其地險碉堅以暗窺明我勞彼逸臣等再四思維必使我兵自顧無虞方能鼓勇作氣而破險摧堅又須制逺利器臣傅爾丹前在北路軍營見滿兵俱用絲棉長甲抵禦鎗子頗覺有益又有解送到營之糌粑拉鳥鎗食藥三錢鉛子五錢制度質輕形短既能致逺且背負於山林密箐之中又甚輕便前請調遣滿兵如䝉俞允仰懇敕令多製棉甲糌粑拉鳥鎗以備應用奏入上命軍機大臣等議覆准行傅爾丹等又奏言臣傅爾丹於夲月初二日接印視事臣班第於初九日抵卡撒軍營熟察兵情共度時勢查卡撒一路雖得色底雙碉左右山梁等處而前抵刮耳崖賊巢尚隔山梁三道兩旁碉寨甚密備禦甚嚴必須悉力進攻始有克獲無如目下山嶺積雪凝氷天氣漸覺嚴寒士卒皆無鬪志前經略臣訥親督臣張廣泗等於九月二十四等日派遣將領進勦阿利山左首賊碉屢督不前一日連退兩次觀此兵情驟難望其振作現在惟有督令整理碉卡刨挖濠塹嚴加守護然後將所餘之兵相機攻擊其餘如黨壩一路前雖攻克跟雜等寨據嶽鍾琪札稱前抵勒歪賊巢尚有得什溪惡爾溪喇嘛寺間阻目今兵力亦未能進取馬奈正地甲索兵數無多僅堪駐守臣等再四籌商惟有乘機觀釁可克則進可誘則擒總使賊番不得休息而我兵亦不致徒傷賊於積疲之後實已無大伎倆總因目前我兵氣沮力乏所以今冬難望遽克一至來年天氣融和加調官兵齊集悉心籌畫相機鼓舞萬無不克之理此臣等通盤計算似有成竹可恃並非敢緩敵於今冬而幸功於異日若以聞經略前來之信轉致因循怠忽不惟不敢為此事亦斷斷不敢萌此心也至於兵丁實數前據督臣張廣泗查明除去傷亡病故及帶傷調治并分防卡汛之外實在攻戰漢土兵二萬五千一百餘人目下又有傷病遣回者缺額兵數原應即行調補但川省之兵原調續調及補額兵已一萬六千餘名內地所餘半多孱弱若雲貴陜甘官兵程途動經三四月計其到營尚在冬春不能攻勦之時未免徒糜糧餉臣等恭候諭㫖允准添兵之後始行檄調於明年三四月內到齊方為有益奏入諭曰看此汝等明有推諉觀望之心矣朕亦不加督責大學士傅恆不日即到看汝等何顏對朕耳是日班第奏言臣前論奏張廣泗摺內未將訥親過失述及䝉皇上降㫖訓諭惶悚無地伏查訥親抵營之時適各路官兵俱已調齊正在進攻而張廣泗猶駐美諾遲回不欲進赴卡撒經訥親再四勒催并親往督戰張廣泗始來軍營但訥親不能細察形勢督催過激以致鎮將布置疏虞總兵任舉參將買國良相繼陳亡官兵亦多損折自此一切軍務俱不敢主持仍聼張廣泗調度而張廣泗遂無論事之輕重大小動云靣奉經略指示其實則皆出於張廣泗之意而訥親不知也張廣泗之居心委卸舉動乖張訥親未嘗不知臣亦嘗與言及總因訥親以軍旅之事素未諳練冀仗張廣泗之才力希圖成事是以明知其非不惟不能整頓而且每事曲為狥隱訥親之咎原屬難辭臣前因此案辦理不善糜餉損兵實由張廣泗任情狥私所致是以愚昧之見止將張廣泗論奏而不及於訥親今䝉聖恩訓示倘再稍為掩飾罪更難逭臣謹據實陳明奏入上命軍機大臣㑹同該部嚴審定擬具奏癸丑經略大學士傅恆自京起程是日上親詣堂子致祭先是鹵簿大駕向堂子陳設兵部列螺於東旁堂子大門外設立吉爾丹纛八旗護軍纛八杆文武百官具吉服於午門外齊集經略大學士及出征之大臣官員俱行衣諸王文武大臣俱吉服先往堂子門外分翼排立至巳時禮部堂官奏請皇上詣堂子行禮文武各官在齊集處候駕至跪送駕至堂子紅樁吹螺經略大學士出征大臣官員及諸王大臣跪候駕過俱隨行進堂子排立螺止上香畢禮部堂官引就拜位鳴贊官贊奏皇上行三跪九叩禮經略大學士及諸王大臣官員等俱隨行禮鳴贊官不贊駕出至紅樁螺止樂作皇上乘輿至東長安門外向南所張黃幄前皇上升幄御前侍衛進酒皇上親賜經略大學士酒飲畢經略大學士及出征之大臣官員俱佩弓矢跪行辭駕禮有㫖命經略大學士於御幄甬路前乘騎經略大學士遵㫖乘騎上還宫經略大學士出阜城門至張幄處欽命大學士來保率侍衛等向經略大學士進茶經略大學士望闕拜謝起行上仍命皇子并大學士來保等送至八里莊又送至良鄉視經略大學士傅恆飯罷乃還臣等謹按金川濟師專命經略天戈所指席卷可期乃皇上臨事而懼好謀而成用兵之舉夲於至公奉天之心極其誠敬親詣堂子告祭舉行巨典感召天和祥風習習旌旗甲胄煜爚生光而於經略大學士傅恆既重其任復隆其禮推轂祖道萬乘親臨且命皇子逺送郊甸湛恩優渥逈越常倫一時典禮之崇隆軍容之整肅天時之豫順人心之歡悅固有不俟露布傳宣而覘者早知其有必勝矣甲寅上命軍機大臣等傳諭永興傅森曰京師滿兵於夲月二十日即可全行起程應令船厰黑龍江兵接續前往方是可速傳諭永興等將彼二省所派兵丁作速催趲起程伊等既由京師馳驛前往則行裝俱可從簡惟令輕騎來京可耳是日上又命傳諭經略大學士傅恆曰八旗護軍纛既經致祭自應發往軍前著於第四起京兵啓行時分令帶往俟到軍營後聼經略大學士酌量分給現在軍前之滿洲大臣傅爾丹等以壯軍威乙卯上諭內閣曰大學士傅恆奉命經略金川軍務朕念金川用兵幾及二載尚未成功固由士卒不能鼓勇先登摧鋒陷陳然亦非獨士卒之過也訥親張廣泗措置乖方毫無謀略畏縮懦怯並未身親督戰而且號令不明賞罰不當將辨因而效尤至臨陳時亦擇可以障蔽之地為全身計惟令士卒冒險受傷士卒獨非身命乎氷雪沍寒瘴癘水毒之區荷戈擐甲晝夜弗息暴露於懸崖峭嶺間每念及此朕心為之憫惻訥親張廣泗既經治罪其士卒兩年以來重罹鋒鏑饑寒之苦雖在軍律兵不用命法所不容但士卒實為主將所誤咎歸主將則伊等罪為可寬而情為可憫現在經略大學士傅恆賫往內帑銀兩著將漢土軍士分别賞賚以示投醪實惠鼓勵士心務令踴躍前驅鋭師冞入迅奏膚功至將辨等既久未成功虛糜廩祿均屬有罪之人非惟賞不當加即伊等亦何顏受賞但亦因訥親張廣泗所波及朕故不罪今經略視師至彼一應滿漢將辨俱可寬其既往以勵將來尚其各知奮勉思蓋前愆使壁壘一新旌旗生色共成偉績竚待䇿勳布告軍營咸使知悉臣等謹按金川用兵二載奏捷未期凡在行間將辨乏統率之方兵丁鮮義勇之效其誰為無過者皇上聖度包容意在匿瑕掩垢俾之收效桑榆是以重治主帥之失律而於將辨則赦過宥罪以愧服其心於兵丁則分金致犒以鼓勵其氣所以砥礪成全之者至矣是日上命大學士來保傳諭經略大學士傅恆曰今日挑選侍衛朕見藍翎侍衛內行走年淺者多與其挑取伊等不如挑取軍前效力之人著將現在軍前藍翎侍衛俱授為侍衛令其效力行間伊等效力與否經略大學士傅恆自能知之有不奮勉向前者經略大學士即可革退又藍翎侍衛托倫太莫德庫三信保五洽鼐祜納等前在瞻對未能成功亦係統領大員辦理乖謬所致尚與伊等無涉托倫太等亦著授為侍衛經略大學士到日傳㫖賞給花翎是日上又命傳諭經略大學士傅恆曰朕聞大學士傅恆沿途行走部伍甚屬整齊兵丁安靜守法無一人生事者此皆大學士盡心辦理故能妥協如此朕心甚為欣慰達清阿隨軍備辦諸務亦能竭力黽勉著授為頭等侍衛令伊從此益加奮勉悉聼大學士指示加意勤慎不可恃恩稍自誇張在大學士前效力與在朕前效力無異也大學士所過地方程途達清阿一一記明俟至軍營後再行奏聞可傳諭大學士傅恆知之丙辰上命軍機大臣等傳諭經略大學士傅恆曰據貴州提督丁士傑奏稱接准總兵哈尚德來文需用火藥火繩鉛彈等物現在星速製備委員押送軍營朕思金川現在用兵所需火藥鉛彈等項甚多軍營難以製造自應令各該營製就運往為便但為攻敵所需關係緊要必須立法稽查使之均歸實用軍前各營所有火藥鉛彈在夲營領兵大員或者偶一檢㸃即傅爾丹亦未必悉行綜核其中倘有不肖員辨兵丁因見解來數多貪利營私竊取貨賣轉以接濟逆番不可不密為防範經略大學士傅恆在京亦曽言及此到營之日自必留心其作何查察之處隨時加意辦理毋令辨兵等有私行透漏等弊庶於軍務有益今因丁士傑有此奏思及此故隨便傳知是日上命軍機大臣等傳諭傅爾丹班第曰據奏軍營情形但稱冬寒雪大不能攻擊卡撒木岡等處修有碉房足資固守朕命班第前往軍營原以冬雪開霽之時或機有可乘即協同傅爾丹等鼓勇前進不得坐候經略之至屢降諭㫖甚明今乃築碉為固守計此訥親故智不過自留地步偷安旦夕以難巨之任推卸於經略耳金川用兵夲因逆酋負恃險阻意欲并吞諸番若不為之剪除則番衆必因之煽動其罪實不可容征討自不容已從前訥親張廣泗等營伍懈弛士氣委靡不能剋期奏績者皆茍且自全之見誤之也任軍事者當知以進勦為重有戰無守如摺中所稱護衛糧運不過行軍之一事戰勝則運道自無阻礙且可因糧於敵不得因護糧而誤進勦至險隘之區當攻奪而不當戌守如以守而已矣何不專守打箭爐一路令彼不敢侵軼豈不省餉息兵傅爾丹起於久廢之餘年齒已老緑旗之事夲不熟習營辨亦未必聼彼之言雖不敢為偷安自保之計而其勢實不能服衆而鼓勇前進也班第素性善於推委此奏必多出於班第主見其退縮畏葸實乃訥親之續朕謂諸臣平時辦理尋常事件偶有錯誤尚可姑容若遇軍旅大事國家賞罰係焉豈容姑息前此將伊降為侍郎尚屬輕典可傳㫖嚴行申飭伊等既有此情形即勉强前進亦未必有濟著傳爾丹班第且暫行駐守候經略到營布置嚴密奮勇長驅以圖大捷班第等不得因有此㫖於第一起滿兵到日輒先為嘗試輕用其鋒計經略大學士傅恆自成都前至軍營道路險阻紆曲士馬芻糧均須料理周備以養其鋭氣軍營有傅爾丹坐鎮班第度量可至前途迎㑹經略或回成都一路查辦如經理得宜使大兵遄行無滯功過尚可相凖倘軍行稍有阻格必按貽誤軍機之律通前罪一并究處是日上命軍機大臣等傳諭尚書達爾黨阿侍衛達清阿曰朕夜間接到經略大學士傅恆所奏事件係寅刻拜發計算大學士又復經夜不寢矣大學士責任重大此身尤宜保愛可傳諭達爾黨阿等嗣後朕所發事件若在酉戌間到者則告知大學士聼其閲看辦理倘在戌刻以後即暫行收貯不必告知大學士俟次日清晨或帶至下站俱可聞大學士起身甚早行走甚急著達爾黨阿等留心視大學士體中若何如行走從容則可不必勸阻倘稍有勉强伊等即當極力勸阻伊等乃朕特命隨大學士前往之人大學士亦應聼伊等之言也將此一併傳諭大學士知之丁已上諭內閣曰將軍博第奏稱料理西安兵丁二千名起程領兵官員支給二年俸銀前鋒領催每人給銀四十兩馬甲每人給銀三十兩置備行裝伊等具呈願於俸餉內坐扣還項西安官兵既為國家出征效力此項銀兩即著加恩賞給不必坐扣是日署河南巡撫鄂容安奏言官兵進勦金川經過豫省所需馬匹車輛一切分站事宜幸今嵗有秋食物草豆尚易籌辦臣於官兵將入豫境即輕裝前赴直𨽻河南交界地方督率派委各官照料安頓仍親送至豫省西界往來巡查使官兵遄行無滯於地方亦無滋擾今接到軍機處行文京兵三百名一起改為五百名一起臣飛飭各屬每站於原派人員外增派文武員辨其車馬草豆食物務足五百人之用不致臨時周章又查孟縣渡河最關緊要若人馬軍裝並渡恐有稽遲隨靣諭司道各官除多備船隻外仍設法多備車馬緊幫南岸接濟祗渡官兵不令車馬同渡方無遲誤臣臨時親到督率隨事詳慎斟酌務令官兵踴躍前進迅速抵營以仰副聖懷奏入諭曰此乃國家大事應竭力妥辦汝等何省所辦妥協將來朕自知之戊午經略大學士傅恆奏言臣於初六日夜至獲鹿縣接到傅爾丹等奏摺報匣隨遵㫖開看內有小金川土司澤旺投遞番禀一件係張廣泗家人通事與漢奸王秋勒取澤旺財物不勝駭異細按情節張廣泗縱無恥喪心未必至於勒索澤旺財物但觀其平日袒護良爾吉阿扣王秋等則家人通事因此勾通漢奸王秋肆行不法亦所不免軍營情事如此宜乎衆情解體號令不行何能冀有成功之日此事關係軍中耳目番蠻聼聞不可不實力嚴究就臣愚見臣於途次遇張廣泗即先行訊問實情具奏其良爾吉王秋二犯如拿解已近京師即令解京審理在京正法若尚未拿獲及已拿解而去京尚逺臣即遵交臣辦理之㫖將二犯帶回成都與張廣泗家人薛二通事焦修德等嚴審定擬良爾吉王秋夲應於軍前顯戮示衆但沿途解送恐有疏脫請即於成都正法去軍營不逺亦可使番衆聞知戎行益加整肅至金川起事原因澤旺愚懦無能伊妻阿扣淫悍加以良爾吉等衆奸助惡釀成悖逆之舉現在小金川雖屬投順尚不無首鼠兩端皆緣此等蔑倫悖理之事張廣泗不能明正其罪且更加親信為之蔽護自無以服番衆之心臣愚以為阿扣斷不可姑容臣至軍營即為詳察機宜應生致阿扣并確訪阿扣同惡之犯一一致之營中立行正法以快人心務使形迹不露加意慎密迅速辦理其土司印務仍令澤旺管理如此則小金川番衆向為阿扣等挾制者皆得以舒其情而澤旺之仇已復必努力報效庶小金川實為我用而賊酋不得施其暗行勾通之術蕩平之功可速成矣奏入諭曰諸凡妥協詳明有何可諭一如卿議行是日上又命軍機大臣等傳諭經略大學士傅恆曰澤旺首告張廣泗一事計其時日必伊先已聞張廣泗革職拿問之㫖故有此舉動揆其情形軍營消息澤旺等輒已先知則金川逆酋夲同一氣亦必盡知矣經略所奏阿扣奸黨必當明正典刑即此一事已足申法紀而快人心但凶徒狡獪耳目周布經略辦理此事必須加意嚴密毋令稍有知覺轉致藏匿不出或挺而走險著傳諭經略大學士留心防範是日上又命傳諭經略大學士傅恆曰四月間軍營有碉樓火藥被焚一案已於題夲批發令班第從重歸結此㫖可抄寄經略大學士知之張廣泗於此等事件視為泛常不過循例題請交部議處其玩忽軍情姑息屬辨軍營事事廢弛皆伊一人之罪實無可容經略到彼留心申明紀律務令防範嚴密自不至有意外疏虞至辦理此等事件經略槩不宜分心嗣後倘有似此之案聼經略酌量或交班第或交傳爾丹嶽鍾琪或交兆惠俱可經略不必兼營庶務惟專辦進勦事宜剋期奏捷以副逺念是日班第奏言軍行糧隨關係綦重臣於辦糧各員屢加訓誡期於潔己奉公輸挽迅速乃原任保寧府知府周岐為草坡一路糧運副總理但知安坐其於瓦寺土司官寨一切糧運漫無經理又見熱籠臺站地方和暖潛往逗留並不設法催趲糧運以致熱籠之米積至萬有餘石臣經面加嚴飭督催并代為設法派調上下各站糧夫通融協運并委忠州知州劉乃大相助為理冀其悔過奮勉無如該員竟視軍糧為兒戲全不實心料理熱籠龍肋之米雖稍已運通而鄧生班攔又復壅積臣現飭接辦官加緊料理疏通再聞上年改撤草坡運道之事因周岐與張廣泗為姻親營求改撤參革建昌道陳緯曲意逢迎力請歸併南路輸運豈知改調之夫大半逃散新設烏拉又多倒斃幾至貽誤是以冬間復將草坡開運一撤一復妄費無限帑金罪實難逭又有美諾糧務原署汶川縣降調知縣劉士縉貪鄙為心肆行舞弊如招商包運原為節省內地糧夫稍蘇民困茍有人心自當鼓舞商人使之踴躍從事今訪得劉士縉凡有運到商米每石勒取餘米一升方肯收倉竟有掯至三四日尚不收受者以致商皆含怨又借應付差使名色强拉商民騾馬藏匿不還臣過美諾時有中江縣民熊獻璽曽經喊禀又聞劉士縉前在小金川就近採買青稞二千石因見有包運之例希圖冒充包運之數開銷現在嚴飭接辦之員徹底清查毋令朦混經手收放軍需錢糧例應按月造冊報查惟該員托故諉延至今未據造報該二員雖經降調離任既有劣蹟未便寬縱臣謹據實紏參請㫖將周岐劉士縉革職以便嚴審究擬奏入得㫖允行是日上命軍機大臣等傳諭阿蘭泰傅森曰前經降㫖選派盛京兵一千名前往金川後因阿蘭泰辦理遲滯且盛京之兵亦不及索倫是以將伊等停止派往增派索倫兵一千名補額盛京官兵深以不得前往軍營為歉再四懇求效力經阿蘭泰據情轉奏朕比降㫖謂已悉伊等奮勉之志當更有用處今思船厰黑龍江兵丁陸續自彼處起程路逺行疾馬匹不無疲乏之虞盛京兵丁既思效力可傳諭阿蘭泰曉諭官兵將伊等所有馬匹多備數千俟船厰黑龍江官兵到盛京時倘有疲乏馬匹即行揀出另換馬匹乘騎俾速得抵京即與伊等效力行間無異也著御前侍衛額爾登格馳驛前往盛京㑹同阿蘭泰辦理并著公哈達哈馳驛前往大凌河牧場挑選堪以乘騎之馬以備酌量換給船厰黑龍江兵丁騎用昨據將軍傅森奏稱黑龍江兵丁如此際已經遇雪即由䝉古地方行走如尚未降雪即由邊內行走今大凌河地方既已預備馬匹可速傳諭傅森及領兵之協領等令將彼處所派兵丁二千不必經由䝉古地方即從盛京疾速行走遵照所定日期到京不可遲悮又命傳諭科爾沁之達爾漢王羅卜藏衮布曰此次所調黑龍江兵丁二千名道經科爾沁地方可將䝉古馬匹多為預備如有疲乏馬匹即行換給令得疾速抵京著侍郎玉保馳驛前往㑹同達爾漢王妥協辦理所用䝉古馬匹仍照數給還庚申軍機大臣等奏言船厰黑龍江兵丁遵㫖於盛京換給馬匹必能速到若於京城官馬內再選三千匹派大臣一員帶往山海關預備換給兵行似可益速俞㫖允行是日軍機大臣等又奏船厰兵丁約於十月內黑龍江兵丁約於十二月內可以全抵京師報聞平定金川方略卷十五
