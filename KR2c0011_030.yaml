  text: 欽定四庫全書平定金川方略卷三十
  hash: sha256:28b2154ccca646dab2a83a6aae852c9675d5a2958d9d5a94a408c146c2665c89
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0011_WYG_030-1a, image: WYG0356/WYG0356-0459a.png}
body:
  text: 藝文平定金川詩監察御史臣錢琦聖德符元化萬類甄陶一時維泰運隆瑞協師貞吉金川爾小醜胡為教不率方其跳躍時頗自逞馳突神武帝不矜我衆實所恤長策運廟謨干城寄良弼是時霜風寒肌膚增婪栗况聞疆外險蜀道難縷述劍閣山嵯峨錦江波蕩潏千盤入杳冥九折愈紆鬱寧堪士馬喧或慮巔崖滑上相秉忠誠蓄鋭獨勇決生逢堯舜君許身比禹契方奏凌烟勳忍耽終朝逸號令既嚴明刁斗亦森密劒㦸莽奔衝牙纛互坌坲輸挽雜薪芻踴躍鼓士卒或為五營連或為七校發或盤鵰鶚行或挾雷霆出八千餘里路有若風捲疾將軍從天下神速真咄咄先聲實奪人不戰兵已屈嗟哉獸之窮依人搖尾乞昔為桑中梟今為網中鷸昔為蛙躍井今為鼠拱穴約法章倍三來格旬未七聖人覆載恩詎肯遺小物顧惟螻蟻輩寧足汚我鉞詔下許班師滿路和風拂鞭敲垂栁新戈偃草芽茁歡聲雜鼓鐃兵氣淨林樾何以策元勳五等崇華秩何以換征袍七章披繡紱喜起賡明良光華䑌雲日其餘小大從一一恩波溢上以慰慈寧下以安良質小雅賦彤弓奎文炳石碣和氣洽神人海宇永寧謐萬歲拜呼嵩五雲春暖闕微臣效鼓吹霖雨愧鴻筆平定金川詩有序通政使司參議臣薄海臣聞漢代有鐃歌鼓吹之辭唐家作七德九功之舞凡以紀大猷揚駿烈也比者金川土酋不馴拒我討捕皇上沉機內斷戡亂興師特命閣臣傅恆經略其事馳鋭攻堅振疾風而掃秋蘀受降釋縛灑甘露以活釡鱗洪惟廟算高深逺人欵服仰企元勳忠藎帝德敷宣臣職忝龍作納言之後列謹虎拜稽首以陳詞其詩曰武緯文經聖化周熙朝萬國總懷柔無端小醜跳荒裔有詔元臣下益州籌策親承瑤殿上旌麾遙指笮關頭即看授鉞臨軒日已卜斯行展壯猷騰驤士馬氣如虹聚米山川在掌中綏靖逺方酬倚畀肅清徼服仗公忠鈎梯舞處鴟巢破羽黨除時鼴技窮竄伏乞降猶未允誓將罙入奏膚功八日飛書達禁林特容歸欵見天心蠻人悔罪三薰沐丞相神威七縱擒賨曲渝歌歡解網花鬗卉服頌辭金六師往返無多候早暢皇風逺邇欽策勳飲至正春和諸將元功爵賞多神武蘭臺編卓越奎文璧沼勒嵯峩肅申禋祀馳仙仗竚荷嘉庥錫玉禾從此豐熙綿億載白狼朱鷺永登歌平定金川詩修撰臣金甡帝持泰阿柄威德萬方服蠢爾金川酋狡焉逞豕突小醜何足誅煽亂不可釋專閫任誠重應機須早決籌策故紆回養癰計已拙維皇思敵愾清禁慎謀帥國家親重臣忠勇誰第一臣恆仰成算日夜圖展竭克簡至尊心禡牙親授鉞太白高揚光深入敢戰吉天兵莽雲合飛翰不以疾上將更星馳奮身先士卒束馬陟崖巔裹氊驀山足英風振剛氣積石欲摧裂外冦佇披攘內奸先剔抉雄狐及牝雞駢首服軍律鬼蜮始騷除豺狼爭喙息申威旋督戰鉞進乘膽破昔嶺挫凶鋒巴郎克堅壁盡徵諸道㑹共決搗巢策不須九曲穿直以萬鈞壓釜底沸湯煎穴中窮鼠泣哀籲繞軍門令嚴如截鐵投生苦無地束手待椹鑕皇心運金鏡萬里洞毫髮捷書初報聞羅網計難脫聿開自新路期以息征役慮勝在機先神妙應呼吸仰惟天覆恩用戒火炎烈承制赦其人納降斯得活歡聲倏雷動生死肉白骨扶服望壇拜六事誓不越獻賮到金人上供如供佛銜鉤出重淵霜刃竟不削永懷明珠報何敢妄撥刺是時天清明光景頓軒豁兵前草木風陽和普噓拂稜威月􅙡震融樂雪山液廟略既遐宣蠻荒遂寧謐銅梁卷征斾金闕望歸轡勾當公事還從容閣門謁單騎見汾陽七擒服諸葛偉績如古云欽褒聞制曰桓圭五等崇豹尾雙竿揭出師無留行第賞不踰月從戎皆拜恩勤事並䝉恤嘉勞紀功級蘇困賜蠲復策勳還飲至尊俎喜洋溢彤墀肅班賀卿矞浮袞黻庶幾宵旰寬樂愷見玉色是用告成功地天申仰答神祗通肸蠁三極統明察羽衛首征塗珠丘薦芬苾顧歆九廟靈申錫萬年福慈寧垂懿訓啓迪荷明悉歸善晉徽稱奉觴上寶冊孝治表尊親暴亂永不作駿業紹前光兵事為後法雲漢炳天章穹碑鼇負屹文經武則緯在泮禮惟協側想事之殷洎乎伐已卒輿論或然疑宸衷期必拔武師方席卷遽止乘墉克陰陽互開闔威惠兩不測睿知如轉規動與事機合日月逺臨照震電捷轟掣霍然掃妖氛膏降醴仍出乾坤自清泰太虛本無物乃知天合符神武信不殺邊徼長敉寧中區增富實聲靈時一振姦宄絶萌茁止戈乃全勝武德實兼七六字慶軒鼚千秋煥鐫勒作誦記其詳臣職忝史筆平定金川詩有序編修臣楊述曾皇帝受天休命四方萬國罔內罔外悉臣悉庭惟兹金川弗率歷二年所皇帝曰相臣恆汝忠誠勇武克圖我敉寧兹畀汝經略印率虎賁士徂征冬十一月癸丑禡纛長安左門外皇帝親御武帳酌相臣酒寵以上駟雕戈金節倍道星馳十二月辛丑至軍戮漏師巨慝討軍實而申警之進攻昔嶺再擊巴郎以巨炮摧其堅碉酋窮蹙乞命相臣弗許督戰愈力皇上特下寬宥之詔二月癸未酋面縛軍門相臣升壇奉皇上命赦其罪具道皇上聰明睿知神武不殺酋感激俯地矢以六事永不敢渝金川平相臣奏凱還京師道封忠勇公加殊錫皇帝行告成禮親灑宸翰立碑太學昭示來兹蓋自相臣蒞軍洎於受降僅四十日有奇兵不血刃凶頑歸命皆由我聖天子睿算神謨亦惟賢相臣一德一心克成駿烈臣忝侍從末職在文字允宜鋪張揚厲垂之無窮謹撰明良綏逺詩一章拜手稽首以獻其辭曰聖皇建極丕冒九宇靡逺不柔靡德不普蠢兹金川在瀘之涘雪山巉巉繩橋觺觺有軋於鄰匪婚伊冦師薄其疆獸挺而走屹彼崇碉乃穴乃巢伺間竊發有敗遁逃裒鞠頑凶負嵎自固曠誅二載帝殷西顧乃咨相臣汝豫良弼忠勇懋昭與豫一德董我六師肅將天討迪彼昏嚚靖我西徼相臣受命再拜稽首既禡既類吉日惟丑雲旗星罕天子餞之玉斚是斟飛黃載馳桓桓禁旅如貔如虎從我相臣以務烈所天射之巔危巒連延鑿冰為磴束馬而前相臣蒞止師貞以律首戮巨憝曰良爾吉陰諜我圖惟賊攸恃厥辜既伏酋魄先褫爰拔我勇爰選我良或扼其脅或扼其吭如雷斯鍧如電斯掣賊不能支乞命假息相臣烈烈欲集我旅搗其中堅刮耳之􅧓皇帝曰吁止戈為武有逆則誅有順則撫普天之下疇非赤子悔罪來歸受之而已春風始和玉書初下酋衆傴僂厥角來迓高壇列幕香烟若雲相臣是升導揚王綸謂爾羣醜自干大戾爾革爾頑我貰爾罪爾孥我全爾支我屬厚地高天爾生爾育酋先震悚聆言蹈舞帝恩我天我冒我怙我有微忱奉琛以將六條凜凜永矢勿忘在昔有虞苗頑弗率干羽兩階七旬來格我師之出日初南陸迄我受降春荑未緑役不踰時綏懷萬里嫓德重華後先一揆我車彭彭我斾英英鐲鐃騎吹來旋上京帝曰休哉天祖所佑殷薦告䖍以篤我祐恭惟聖母慈訓諄諄徽稱既奉孝思用伸乃詔相臣豫嘉乃績豹尾龍章桓圭載錫穹碑贔屭立之太學炳炳麟麟天文昭爍圓臚方趾黃童白叟軒舞歡呼頌皇仁武惟皇之武天造神斷相臣宣之風行雷奮惟皇之仁乾覆坤載相臣承之露瀼雨霈明良交慶絪緼太和小臣作詩以賡虞歌平定金川詩編修臣張若需文思端拱授雄韜上相專征擁節旄不待縋師窮峭崿已看因壘脫弓刀疆恢駹冉春風逺兵洗巴渝雪浪髙步輦晨趨親送喜慈寧先慰聖心勞王師如漢復如江昔嶺窮酋比吠尨震疉皇威期掃穴包涵帝德在安邦玉音天上催旋旅金佛營門恰受降六事歸誠申九伐宏仁盛烈古無雙軍書三捷掣朱縑偉略堂堂邁玉鈐撻伐共欽天子武純忠早協大人占元戎勳紀旗常重五等榮膺衮錫兼宴錫彤弓開邸第從容羮鼎待調鹽紫宸佳氣滿觚稜渙號頻頒慶典仍天地好生成合撰明良交泰應休徵櫻桃及薦神靈喜楊柳來歸士馬騰氛祲全消寰海晏萬年歌舞樂升恆平定金川詩七言律四首編修臣林蒲封露布星馳奏紫宸歡聲萬里靖邊塵長驅共識軍威盛獨斷還驚廟算神商網豈惟開一面虞階何待舞三旬由來天討原無戰荒裔同歸幬載仁檻底窮猿莽自驕致煩授鉞出天朝三驅直壓吳曦壘七縱重過孟獲橋梟獍已摧餘孽定欃槍迅掃宿氛消卭崍山雪經行處喜見春風折栁條鳴笳疉鼓下沈黎上相星明紫氣齊十二天間馳絶徼三千組練護沙隄降城逺築靈關外銅柱高標大渡西從此金川洗兵甲麒麟閣上煥新題金城何事策屯邊赫濯皇威暢八埏九譯山川歸禹服百蠻歌舞戴堯天雲中鳳綍銜春下閫外龍韜唱凱旋珥筆願將鐃吹譜賡揚長頌太平年平定金川詩編修臣湯大紳皇上御極十四年聖德廣運怙八埏東漸西被訖聲教闕廷王㑹來罕幵金川酋長既內附逖居昔嶺儕獽狿鄰封搆釁思一逞蜂屯蟻鬬驚狼煙國家用武邁前古矧兹小醜喘敢延二三臣工弗和協致老徒旅靡金錢九重西顧赫斯怒與神為謀出萬全致天之罰聲有罪惟汝元輔其仔肩陳師鞠旅授方略並賜節斧輝簡編元輔對揚拜稽首敢不夙夜惟䖍䖍君言不宿趣就道風馳錦鞚飛銀韉忠誠激發薄霄漢徒御整暇彌川原縋幽緣險飽冰雪尅期誓衆期寧愆相度形勢布行陳前茅後徑中中權燕犀冀馬並良産貫頤㦸手紛桓枑胸藏甲兵躬介胄奮勇輒為將士先指揮悉與睿謨合號令更挾皇威宣急擒同惡殺無赦牝雞狡就戮駢金酋聞風膽先破竒兵况復攻其堅碉樓峩峩插雲表當關重閉安如磐轟雷掣電倏摧倒粗砂碎石揚山巔是時我軍威震疊斾旌所向洵無前長驅罙入孰齟齬滅此朝食奚難焉我皇睿慮豫籌䇿鯨鯢赤子心惻然覆幬持載罔不育赦書密下飛郵傳金酋窮蹙計無復析骸易子絶可憐局天蹐地自悔罪宵晨引領矞雲端十行詔許順而撫譬鳥得木魚游淵蛇行匍匐崩厥角環顧笑語聲􅨵􅨏獻琛設誓瀝肝肺永靖蠻觸棲窮邊賨猺相戒弗騷動各保婦稚全胝胼有不吾信悔何及盍亦視我擎降幡元輔登壇布威德春風溫燠秋霜寒我皇神武不嗜殺未折一矢絶一弦七旬未屆有苗格六師諏吉其言旋書成露布告大捷九衢門啓夜未闌至尊開函動顏色入奏長樂為加餐禀承慈訓握勝算奉上尊號臣民歡牽牲奠璧修秩祀功歸于祖德讓天獻功在泮有述作宸章煥爛騰奎躔三四典謨叶雅頌平淮西碑不數韓如拳大字鐫琬琰用垂萬祀永不刋策勳進爵稽古制道封晉國開河山繡衣華袞示殊錫雙竿豹尾隨青駽聖朝信賞賞必當勗爾有位勤其官遂開明堂康至治主上明聖元輔賢并包畜養遍中外遵王之道歌平平梯航山海納職貢自今伊始萬有千小臣職司忝記載才識譾陋筆力綿吮毫濡墨惟紀實愧乏元和聖德篇平定金川詩七言律六首編修臣蔣元益駿烈神謨裕聖衷元臣仗節總元戎運籌自具安邊策因壘還期不戰功雪鎧霜戈輝曉日牙旗玉帳展雄風天威震疊聲靈逺撻伐鴻猷指顧中桓桓羆虎衛中軍上將專征睿慮分鼓舞六師忘雨雪指麾八陳起風雲惟紆諸葛平蠻略漫草相如諭蜀文吉語早知聞五日頻頒寵命策殊勳十行丹詔下雲霄湯網宏開大德昭穴蟻驚魂寧復鬬釜魚餘息詎能跳壺漿夾路迎王旅琛賮盈廷獻聖朝遙想降幡森竪處一時羅拜漢嫖姚闐闐振旅凱歌陳楊栁人歸正及春烽火焰消花似錦邊隅塵淨月如銀戎車周室書三捷干羽虞廷紀七旬物力不勞民氣樂普天率土頌皇仁威行萬里寄鷹揚聲教何曽阻一方卭笮峰髙驚草木牂牁波靜肅風霜已看兵氣銷金虎更奏詩篇詠白狼帝德光天臨照廣從今尉候遍要荒受降獻捷武功成歡洽嵩呼萬歲聲廟算不矜除小醜天顏有喜為羣生寰區一氣歸仁夀河漢千秋洗甲兵載筆小臣逢盛際詠歌蹈舞慶升平平定金川詩五言排律三十六韻編修臣鈕汝騏聖治恢無外皇仁樂並生聲靈通絶徼斧鉞下神京大德宏胞與么麼敢抗衡穴如螻蟻鬭國比觸蠻爭天討原無戰王師自有征分猷䖍後甲命將叶先庚經緯推元老旬宣選上卿機宜傳箭授進止畫沙明廟算包三略邊籌統七兵星馳惟夙吉雷厲不留行蛇虎看擒縱風雲妙合並六千君子隊十二羽林營師以和能克功惟斷乃成投鞭瀘水斷積甲石碉平士氣崇朝奮蠻氛匝月淸指麾搜窟談笑靖貙氓立地蟲沙化看山草木驚摧堅三矢定拉朽半槍橫昧雉逃林雊窮猿抱樹鳴巴郎晨撤壘昔嶺夜披荆陸地羊千足軍門酒百盛萬金求鑄像六事懇輸誠不殺由神武遺生託父兄視師冬欲暮納欵月初正是日諸天朗和風萬里晴冉駹騰喜氣華夏合歡聲免胄泥中見銜刀馬首迎樂傳兜勒曲壇是受降城喻蜀辭無費平淮雅載賡勳華方事業郭李想功名往躡窮邊雪歸聽上苑鶯策勳崇五等殊禮接雙旌涉險資為楫調元待作羮敷天安夜柝率土樂春耕錫宴開三殿觀碑溢二黌止戈昭聖武萬載仰皇情平定金川詩七言律六首編修臣張紹渠暖律吹噓二月春捷書頻報靜邊塵王師指顧應無敵上將籌謀自有神錦繡河山綿帶礪丹靑臺閣繪麒麟承平共慶韜戈日浩蕩恩波及逺人窮荒異類見雕題跋扈强梁劍閣西鳥道盤空通雪嶺龍韜决策奮雲梯旌旗照耀迷星斗壁壘精嚴振鼓鼙自是奇兵多設險長驅萬里掃鯨鯢熊羆戰士枕戈鋋廟算如神出萬全早𨽻烏蠻歸版宇重輝白帝奠山川金鑾詔㫖傳三殿銅柱勳名鎮九邊聖德包䝉頻肆赦櫜弓戢矢憶當年雪霽岷峨曙色開將軍新築受降臺當關已著安邊䇿推轂還資破虜材詔出分明懸日月師行迅疾效風雷蠶叢莫謂憑天險虎騎龍驤捲地來聞道西征奏凱還鐃歌鼓吹動天顏瘴烟夜靜巴江水兵氣晴消玉壘山萬騎流星傳羽檄六軍解甲唱刀鐶月明古戍無烽火碧草春深戰馬閒侍從丹墀曉日紅太平天子策元戎七旬苗格敷文德八陳圖開振武功驛路穠花回玉勒關門細栁映雕弓還銷金甲資農器盛世桑麻雨露通平定金川詩七言排律三十韻編修臣王楷哲后膺符綏萬邦禮陶樂淑總敦龎何來小冦跳笻嶺遂使傳烽及錦江竹弩石弧資跋扈嵐烟瘴雨長愚憃侵他鄰部含沙蜮擾我邊陲吠影尨爰震皇威彰斧鉞聿咨元弼領麾幢騰驤特賜飛龍廄方略親承朱鳥窗軍選禁廂先類禡芻連岷蜀峙崆㟅渡瀘定卜能擒孟減竈寧須暗勝龎鼓角森嚴鳴地軸鉤梯盤曲度雲矼肅清逺服除滋蔓迅掃蠻氛息聚蛖萬里登壇排鐵騎中宵草檄對星釭首誅間諜神機速倏破堅碉賊膽悚悔罪自慚形䠞踖輸誠交聽語紛哤捷音電掣來宫闕大度天齊赦冉駹番樂赴轅吹篳篥濃香夾道爇蘭茳戎衣壯士弛重鎧肉袒窮酋繫兩羫繡佛僅教收畫帳朱提不藉壓歸艭宣揚上意干戈戢暢好軍容劍佩瑽振旅還朝春似海策勳飲至酒如瀧被之爵命桓圭一賚以光榮豹尾雙共識臣忠因主聖何殊玉應與金撞敷陳雅頌鵷班序賡拜明良鵠立􅭽彩煥靈臺星歷歷恩流太液韻淙淙巍峩麟閣圖堪繪琬琰鴻文鼎可扛祖德無疆昭日月慈闈有訓靜矛鏦祥呈仁壽皆懸鏡化洽都盧敢戲橦遙拱宸居馴職貢更修農器事耕䎫條風漸秀青葱麥穀雨初分赤白豇溫瑟迥過鄒衍律衢尊絶勝蔡機缸髙城雪外屯師處應錫嘉名曰受降平定金川詩七言律六首庶吉士臣邵齊然極天威德震遐陬幃幄無勞更借籌已掃風煙開雪嶺却收旌斾下松州燕隨露布飛丹鳳鶯和鐃歌逐紫騮回首西南青一髮春光直度萬山稠峨嵋橫絶指金川鳥道羊腸路幾千域外河山歸禹服寰中日月共堯天不矜兵力誇三捷自有宸謀出萬全一怒安民功勒石漢家勳業陋燕然上將胸中富甲兵登壇授鉞命專征一軍未許驚韓信五餌何勞策賈生日下風雷馳號令春來草木識威名天誅更不煩擒縱白羽輕揮瘴霧清七旬來格頌殊勳神速今還過所聞單騎宛同唐郭令長纓不數漢終軍身先戰士劘堅壘手挈降酋答聖君須信英雄歸駕馭一時龍虎㑹風雲面縛旌門欵聖朝征旗肅肅馬蕭蕭受降城築蓬婆逺赦罪書頒玉壘遙塞草有情霑湛露春風無語息鳴刁寢門為報慈宫喜瓊笈金函上九霄勳名麟閣議酬庸祀典䖍修式聖容章服千官齊策廟梯航萬國盡班封天河淨洗初休戰金甲潛消漸勸農慚列鴛行瞻舜日御煙春露著衣濃平定金川詩五律八首庶吉士臣張裕犖上相傳三捷天威震百蠻一麾驅劍閣萬騎塞陶關時雨蘇巴徼陽春化雪山文鐃騰鼓吹遙聽唱刀環蠢爾跳梁慣咆虓敢負嵎營巢盤鳥道攀樹像人都鼠嘯青楓壘鴟鳴白竹弧天誅寬一歲鄭重仰神謨頑梗綏荒服痌瘝切在躬疲氓勞睿慮禁旅簡元戎傳檄羌雲曙飛芻僰道通求衣念邊璅漏永禁垣中飛翰雄兵集銜枚渡索橋匡王歌六月伐叛問三苗烈焰焚深箐衝梯插麗譙五旬期一舉功蓋漢嫖姚聖德勤威逺慈寧篤好生兩宫恩錫祉三殿詔休兵猘犬嬉晴日長鯨縱大瀛卭徠諸父老扶杖有歡聲天意哀窮冦將軍笑止戈革心投狡窟頓顙脫虞羅妙相香雲捧朱提細馬䭾兩階孚異類威德盛朝多虎帳持龍節中朝第一人功收因壘速城築受降新五等班綸閣三台衛紫宸黑頭兼袞鉞圖畫上麒麟祓禊佳辰過期門脫馬銜平淮回相度定虜頌臣瑊靑簡書勛冊黃封飲至函玉墀頻送喜端冕奏雲咸平定金川詩倣柏梁體六十韻冇序庶吉士臣劉星煒臣聞蘿圖席瑞康回消九嬰之沴昆臺闓塞濁野服三竿之罰夏后鈞臺之上有扈請庭成湯祝網之前漢陰來享非夫白狼丹犬志規荒徼窬木方竹意圖逺略可同語矣皇上軒衡常朗虞干不試驗風受吏已合千八百國重譯納賮無假五十一征蠢兹金酋鱉令遺種廪君餘孽南粵雄長屬國被躪三危險逺七旬頓㦸皇上特簡元臣裒集虎旅彃羽天降鋒車電馳徵則斧吭管敢授首戈鋋罙其巇阻梯衝歷其崇岡遊魂假氣晷刻而已困獸罷鬬終干炎火之威饑鳥向人未遂析骸之請皇上道在定功義均不殺且以斧螳鋒蝟不煩秉鉞有䖍井堙木刋非復止戈為武命相納降有詔撤衛是使赦過宥罪雷雨之澤自天招擕懷逺弧矢之威萬里桐花春轉蜀道軍回班馬嘶風鉦人息鼓淮蔡既定裴度告功玁狁于襄召虎錫命禮也從此桃關解甲永藏黃鳥之旗昔嶺清塵長鎮燕然之石臣拜手稽首而作歌曰皇武烜赫羲軒農威轢八極驅六龍象寄鞮譯咸服從明堂朝㑹鏗華鐘西南絶徼荒服重卭竹􅀢醬輸僰賨峻坂嶻嶪萬壑壅雄虺九首巨目縱諸睒不得安邊封蔓之不圖寧養癰煆乃礪乃膺其胸髙牙杖㦸徒摐鏦螳臂乃敢稽天鋒帝咨於度時爾庸賜以節斧酬瑤鍾羽林千里馳雲衝倏忽凌空飛丰茸繩橋笮索懸瀧淙虎騎騰踔猋不􅔨殛罪行代臣能恭渠魁仰骯心驚忪鬼蜮倚伏紛距蛩汝張汝鼓誰發蹤妖腰椹斧喉戈舂招搖大纛尸奸凶旌髾旄麾披䝉蘢鉤援十二排臨衝銅丸倒㵼掣電瞛金鎖夜落崔嵬峯顤顟酋首鳴咿􅗳碉門跽伏如緣橦惕息欲用逃戈􅪕相臣孔武麾長䡴更搜漏蟻芟辛蜂皇帝大澤春溶溶無雷日出胥帡容天刀乃忍戕蝑蚣番酋厥角䖍給龔前導虎旅周䃔䃧壺漿夾道陳鮮醲茀厥豐草芟苗松長組繫頸被􅥗褣銀鏤香象羅球共相臣宣詔赦鞠凶班蘭𠢐面舞且蛩鳥語格磔魚噞喁聖澤沾濊蘇溫禺邊城夜偃青狼烽錦江玉壘嬉耕傭山䕫罔兩行不逢於鑠皇旅定笮卭師旋二月來三冬手不缺折戣戕􅱬同人九四乘其墉鐃歌鼓吹鳴笙鏞冊功凱宴湛露濃星罕豹尾弓朱彤更獻寶鼎陳黃琮堯典舜典勒璧雍尺天寸地俱朝宗平定金川詩五言排律四十韻庶吉士臣圖􅝅布德協三垣正衣垂四海清巍然胥覆幬蠢爾曷縱橫聖主爰申討元臣自請征神謨持上䇿雄略寄長城驂乘金吾衛分麾太宰卿臨邊占豫動決勝在師貞鐵甲銀濤耀雕旗紫電縈鐃音騰渤碣劍影拂欃槍雪淨晨光迥風高驛路晴馬蹄驕朔氣霜棧促嚴程赫赫皇猷逺森森將律明珠鈐饒妙算玉帳運奇兵中壘鉤援捷期門結束輕桃關煙羃䍥雪嶺勢峥嶸絡繹隨行列方圓互轉更羊腸飛組練鳥道掣䡴輣川沸狂飇驟山頽落石轟凌霄盤隼鶻伏穴泣鼯鼪臂弱寧當轍途窮但就烹簞壺連袂至匍匐望塵迎軍令惟行法天心乃好生投人憐鳥困解網念魚赬大地春溫溥荒陬喜氣盈除壇修盛禮泥首達微情已拜生前惠還餘夢後驚簫笳環漢使歌舞溢番氓野靜雲依陳氛消月照營宸威揚異域淑色靄前旌方聽從戎曲旋聞入塞聲渡瀘踰蜀相縋險陋陰平勞著三巴績階崇五等榮溫綸嘉作楫殊錫重持衡志喜奎章麗書勳睿藻精丹靑照化宇金石勒春黌踴躍人知感高深物莫名百年文治煥期月武功成震疊銀麞貢梯航越雉鳴鈞陶滋品彚和㑹匝寰瀛屛翰資良輔經綸仰至誠小臣多慶幸得與盛朝賡平定金川詩七律六首庶吉士臣吳綬詔岷峨萬里遍堯封尺土何勞設衛重龍武新釐丞相節魚鳬盡偃夜郎烽丹青皇㑹圖諸賧筒布巴人獻舊供楊栁旗回鉦鼓靜錦江花月麗春農崇岡九坂聚蚊蚊相度于宣攘剔勤氛祲雪消張蹕羽旌罕日麗掃欃雲早知充國平羌略絶勝相如諭蜀文上將行師披箐棘麟臺先為策殊勳螳臂持輪困不支驚看王旅集旌麾中行𠢐面縻長組徵則當門坐大旗射雉僅傳一矢定乘墉無待七旬羈堅碉嶻嶪摧梯棧雪夜曽聞哭守陴罝罘蔽野截窮鱗帝有恩言下紫宸女鼓女弓干撻伐于疆于理總陶甄尉他表已來南粵回紇占應見大人羽騎入關歌耆定匝天甘雨盡皇仁十行天詔揭虞干番婦番兒夾道看窮海永清唐吐谷長纓自縛漢樓蘭笵金跪奉維摩像茀草先除大將壇從此南人咸內屬瀘溪五月水光寒金虎銷芒雨洗兵受降無事築三城華陽黑水綏荒徼大輅彤弓酬上卿帝以成功右文母王垂皇雅配韶韺車攻吉日呈鐃吹不數燕然舊勒銘平定金川詩七言律六首內閣中書臣眭朝棟聖謨文武洽重光六宇同風息劍鋩旭日正中狺蜀犬蠻弧斜指走天狼廟謀宵旰勞當寧閫寄旌旄錫尚方番外遙聞先破膽將軍新拜郭汾陽蠶叢拍濩盡堯封路越巴郎更幾重上將風雲盤地軸期門雷雨集天衝塵烽直掃三千界霽色回看十二峯共仰皇靈真逺播降幡歷歷竪邊墉崇臺雲捧九斿旗臺下羣蠻匍伏時占協大人欣利見感深丞相信神威歸琛自貢迦維像報德長留新息祠聖武即今崇不戰殊荒稽首荷天慈軍書七日到皇都露版淋漓墨尚濡困獸豈能爭一鬬前禽真欲用三驅威加猿鳥難通域仁育鯨鯢就死區朝野同時齊拜舞兩階重見格頑愚元勳振旅覲瑤閶三殿春深雨露香克壯其猷臣拜手無為而治帝垂裳笙簧載錫龍光燕茅土還分豹尾揚睿藻九天摛日月豐碑長自耀宫牆帝有恩言相度宣跂蝝從此戴髙天洗兵直挽銀河水洽賚頻頒玉府錢法駕上陵修漢事告功格廟協周篇丹青九譯圖王㑹寶祚長垂億萬年平定金川方略卷三十
