body:
  text: 十月壬午上命軍機大臣等傳諭直𨽻總督那蘇圖等曰金川所調滿兵五千名著總督那蘇圖巡撫阿里衮碩色將軍博第布政使武柱預備車馬按照程站逐起料理倘有未協於心何安寧不有愧耶可傳諭伊等將來兵丁經過該省地方務須躬親前往督率屬員詳慎籌辦俾得迅速前行始為妥協如伊等既已盡心經理事事合宜而兵丁稍有滋事則以滿洲大臣彈壓滿洲兵丁亦屬分誼所當然其各實力遵辦毋得忽視是日和碩莊親王允祿等以棉甲於軍中有益初次起程之雲梯兵三百名已各給一件庫存尚有五千餘件應將次第進發之滿兵四千七百名各給棉甲一件又續派雲梯兵一千名俱已操演鳥鎗應每人各給鳥鎗一桿帶往軍營不敷鳥鎗二百桿請由工部給發報聞是日諸王文武大臣等合詞陳奏曰竊惟人臣事君首重致身之義固宜竭忠宣力以輸效命之忱况國家恩禮大臣備極榮寵原欲其於有事之際可以遺大投艱獨肩重任若以平時謹持小節供職勤敏遂詡為能而臨事之時因循怠緩全無誼同休戚之心以致措置乖方貽誤要任則其負恩誤國之罪為甚大伏見革職大學士訥親以勳舊世臣蒙我皇上眷待優渥身列五等之崇位居百僚之首殊恩曠典極有位之光榮沐無窮之寵賚即令捐糜頂踵豈足以云報稱則凡可以效力之處宜何如殫竭公忠以仰酬高厚乃自金酋蠢動蠶食諸番竟敢逼近內地天兵征勦責重元戎其時訥親即應請命前行殄此醜類而乃默無一言坐視不顧及慶復辦理乖方易以張廣泗督師又復玩兵養寇皇上俯念邊方出師轉餉之勞不欲老我師徒致傷民力特命訥親前往經略聞命之時全無踴躍奮往之意勉強就道逮至軍營遲疑怠忽並無謀䇿可以服衆惟圖暇逸安坐帳中從不親臨督陳以致士氣委靡軍紀弛懈曠日持久訖無成功屢蒙皇上指示傳諭詢問軍情而訥親覆奏遲延措詞舛錯自相矛盾即其奏請建碉甚屬謬誤仰賴睿照嚴諭以破其愚而訥親始終含糊具奏進攻阿利山之時身先退縮衆遂因而奔潰惟委之於兵單力弱希圖延至寒冬可以退息即內大臣傅爾丹等俱不令陳奏一事以期阻隔朦蔽我皇上寬其欺隱之罪諭令覆奏猶敢掩飾支吾至奉命召還乃皇上警其愚頑使之知所愧恥茍有人心定知置身無地哀籲宸嚴留營贖罪而乃一聞諭旨如獲更生即思迅速回京不以軍旅為念種種乖謬之罪擢髮難數訥親世胄勳臣受兹寵命臨戎不能克敵責有攸歸難辭重譴况於聖主之前並不精白一心矢其誠慤乃欺蒙推委至於此極其罪尤無可逭雖蒙皇上如天好生猶崇寬大但令革職效力實不足以蔽辜臣等曾與同列不勝憤嫉謹合詞糾參請旨拏交刑部治罪明正刑章以為負恩乖謬者戒得旨仍遵前旨行癸未上諭內閣曰朕自御極以來大臣中第一受恩者莫如訥親金川雖云小醜而老師糜餉克捷無期凡在臣子皆有同仇敵愾之念訥親身為大學士從前在京時不過於軍機奏到隨常辦理從未向朕奏及逆酋猖獗如此將來作何了局欲請身往視師彼時傅恆即曾陳奏願效前驅朕以封疆大吏自能辦理不必特遣大臣即應派往傅恆亦不可居訥親之先未經俞允及經略需人因以付之訥親朕意以伊平日受朕如許厚恩自知奮勉乃起程之時全不踴躍彼其意以為軍前調集大兵指期克捷勝則引為己功即不勝亦可奉身而退至朕用人顔面所關國家軍旅之重皆所不計其隱衷己不可問及至軍營張廣泗方觀望不前而伊復茫無成算措置乖方朕待之兩月之久而所奏到乃請建碉與賊共險不思以士卒攻討之力轉使建碉資冦是其第一謀畫既已貽笑衆人矣自是始有申飭之旨然猶望其成功而乃身圖安逸並未親履戎行竟敢奏稱軍士夤夜向碉放鎗伊在營中望見火光經朕督飭始行前進而近所奏阿利山之役我兵屢次退回因伊等在彼未至大奔及伊等回營我兵數十人即各鳥獸散將領不復相顧觀此情形是衆未奔而伊等輒己先退又何怪士卒之望風潰散以受恩之滿洲大臣經略重務僨事至此尚何地可以自容乎至前後摺奏於所奉諭旨緊要情節槩不切實明白回奏惟以浮詞架空了事竟有全未覆奏者即同事之軍前大臣等經朕再三傳諭終不令其陳奏一字朕因其久無就緒不得已傳諭詢問示以欲召回京本欲激之使知愧奮或有奏功之日正以召之者促之乃伊一得此旨如獲更生即置軍務於度外托言有面奏情形亟欲回京試思有何不能言之情形而必待面奏乎此不過思家耳以訥親平日之心思智慮且事朕十有三年若謂任其經略無方輒行退避竟不重治其罪將視朕為何如主伊非不慮及此而敢於遽請回京者衆人能知其故乎伊之意中明知不稱任使朕必重治其罪然治罪亦不過如慶復之革職家居轉得優遊自逸為嗣續計向來賞賚豐厚儘足自娛而金川之役傅恆必自請督師朕亦必以此任相屬而彼地險碉林立攻取維艱即傅恆亦未必遽能奏績不過與伊相等即能成功亦傅恆之福命所有與伊無所加損如其不成朕又必重治傅恆之罪而眷念舊臣伊必且復用是治罪之條乃伊所預料即奉到前旨亦無所悔懼惟此旨洞鑒其肺腑伊當俯首無辭始悔其蓄謀之大謬耳此正朕向所謂小聰明是大糊塗也不如此不足成其為訥親而衆人之不能見及即其遜於訥親之處是朕從前任用訥親原未為誤也何言之若今不能燭照其隱微治彼以罪而心猶不服則是終為所誤耳朕臨御羣臣嘗有能肆其欺蔽而不察者乎至所稱回京面奏情形不知以經略之親信大臣奏摺中何事不可備陳如漢文不能盡者則用滿文滿文不能盡者則用漢文何慮朕之不能詳閲耶前已傳旨令繕摺與富成賫回著再行傳諭令伊一一據實明白具奏不得因見朕旨但以認罪負恩奉職無狀浮詞塞責朕向因人材難得欲栽培成就得一二社稷之臣為國家任事此朕本意即用訥親為經略無非欲滿洲大臣歷練戎旅緩急足恃朕已屢經宣示豈有軍旅重事敢於嘗試耶以朕平時之推心任用訥親即辦事詳慎操守潔清舉不足言使伊果於此等軍機重務能調度得宜殫忠竭力俾斯役早竣紓朕西顧之憂即令納賄行私此亦小過何妨曲成今訥親負國負恩一至於此實非朕意所及料亦豈國憲所可容若以向日加恩之故骫法曲宥將來何以用人是以降旨將伊革職發往北路軍營效力贖罪此伊自作之孽而非朕以喜怒為賞罰即皇祖皇考在天之靈皆所默鑒今諸王文武大臣合詞奏請將訥親交部治罪於法本無可逭但須俟伊回奏到日再行酌奪降旨至傅恆念切休戚力圖獲醜蓄志有素甚可嘉尚觀其鋭往直前破釡沉舟之志即可尅期奏凱然軍旅之事原難遙度倘傅恆亦仍蹈前轍縱使粉飾入告自不能掩衆人耳目又何能逃朕洞鑒即或進攻稍稽時日及實有難於克捷情形衆人自有公論朕亦自有籌酌但過猶不及訥親既失於不及而觀傅恆勇往之氣朕實慮其太過朕非教傅恆以退怯也若傅恆如訥親之怯弱前鑒具在也今尚書逹爾黨阿以伊弟訥親獲罪請赴軍營效力著照所請令隨傅恆前往如攻勦之時矢石所及令其持重防護但不得因有此旨於應行親履之處槩為勸阻即傅恆亦必不從而逹爾黨阿亦不得錯會朕意若因訥親之故忌其成功有意阻撓朕必將伊以軍法從事且其地即命往訥親之處從前訥親之畏葸若何此番傅恆之鋭氣若何軍士必能備言達爾黨阿亦可為明證訥親尚有何後言乎朕本信任訥親畀以經略重務其錯謬自出朕意外若因此而於傅恆有所顧惜不令前往是併不能信及傅恆矣豈朕推誠待下大公至正之道傅恆惟當服膺朕旨實心實力仔肩重寄迅奏膚功以副委任著將此旨宣諭諸王滿漢文武大臣知之是日上命廣儲司備銀十萬兩派員運至軍營以為協辦大學士傅恆抵營奬賞官兵之用是日協辦大學士傅恆奏言臣所帶兵丁擬由山西前往其餘兵丁人數衆多山西車輛難行恐馬匹不敷尚須添備車輛擬於河南一路進發計山西路較之河南行程可省二百里又奏言威逺炮甚屬適用康熙年間征勦西藏曽以此得勝又制勝炮名號既佳觀瞻亦屬威嚴請於此二項炮內每項各帶二位並令造辦處員外郎西寧請至城外曠野處試放再交工部委員送至金川軍營得旨即派西寧護送是日直𨽻總督那蘇圖具摺陳請願赴金川軍營協同班第等竭力辦理軍務諭曰此任非傅恆不能勝此功非傅恆不能成故特令伊前往朕志已定不必再言乙酉班第奏言運軍米石撥動倉榖緣川省碾户稀少向係照糧攤派里民先行辦米給運逮起運之後始給與倉榖償還每有殷實之民憚於守候往往棄榖不領以致鄉保乘機冒領官吏暗地侵漁不惟弊竇叢生愚民受賠纍之苦抑且多碾貯榖倉儲有匱乏之虞如遽議採買又恐米價騰貴有妨民食酌擬嗣後再有撥運每米一石定價九錢仍聽糧戶零星辦運按石給與價值百姓赴官領銀較領榖為簡便可免守候之苦而州縣給發米價銀數彰明較著亦難肆其侵漁至向來商運米石悉係碾榖領運亦不無侵蝕腳價乾沒倉榖之弊應請一例給與折價以清弊端又內地背夫口糧向例給與倉榖其實內地自成都至灌縣等處在在可以隨時買食不若每夫一名照日給口糧一升折價一分聽其沿途自買亦無不便而倉榖可以多存再查從前附近省城各州縣既經運米又令雇募臺站長夫未免苦樂不均人言籍籍今議運米則令附近出口之州縣遵照定價辦運派夫則令離省路逺之州縣専雇站夫更替其運送軍裝炮位等項長夫則専責之於成華二縣雇募應用庶勞逸適均且各有専司不致互相推委奏入上諭該部知之是日上命軍機大臣等傳諭內大臣班第等曰朕從前將班第烏爾登薩音圖法酬等派往金川軍營原以伊等皆係滿洲大臣曽經行陳一至軍營必能奮勇先登督兵破賊不意伊等既到軍營並未奮勉而臨戰時反覔可以藏身之處在彼監視夫戰陳之時有覔地藏身之理乎伊等既覔可以藏避之處以保身則并不能目覩兵士之戰鬭而又何以督率鼓勵使之皆舍身奮勇乎本應治罪但念伊等皆係聽從訥親指使是以加恩寬免著傳旨嚴行申飭今朕已命傅恆經略軍務傅恆斷不似訥親之畏怯退縮伊等亦宜痛改前非竭力奮勉以圖贖罪若仍不悛改亦斷不能逃朕洞鑒至時雖悔無及矣臣等謹按金川用兵以來皇上神機默運無不先事綢繆而於在事大臣尤極加意訓勉惟恐或生怠玩自干罪戾當經略新命尚未啓行即已傳諭班第傅爾丹嶽鍾琪等勿因經略有人怠於進取而於烏爾登等又復寬其既往勉其將來諄諄訓誨非惟勸勵期望之切抑愛惜保全之意至深逺矣丙戌上諭內閣曰朕命班第前往四川雖為辦理糧運用兵非其専責但伊身為本兵且係軍機大臣於軍中攻勦事宜及將辨功罪皆伊職掌所在不得以専力糧餉遂一切置之膜外乃伊見軍務未能速竣既不懇請身任其事惟請另派大臣經理而於訥親張廣泗之乖張退縮老師糜餉並未據實入告及降旨詢問伊於張廣泗之罪直陳無隱而一字不及訥親為大臣者固宜如是乎其心自謂辦糧無誤即為克盡已職其他自有任其咎者惟欲脫身事外為自全計而無吉凶同患之心此種習氣在朝大臣亦多不免特未遇其事耳居心若此國事其何賴焉班第不稱兵部尚書之任姑念辦理糧運尚屬妥協可從寬降為侍郎其兵部尚書員缺著舒赫德補授丁亥軍機大臣等奏言船厰將軍永興奏報該處派兵一千名酌撥協領二員佐領防禦十二員驍騎校十二員管領每兵給馬三匹鑼鍋帳房俱各預備整齊臣等查永興料理此項兵丁之時尚未接到臣等原議不知該兵丁等由京分起自驛站前往是以給馬過多鍋帳亦屬多備今應移咨永興或二人共給馬三匹或一人給馬二匹鍋帳等項諒足敷用多餘者便行裁減照臣等所奏計算十二月十五以內到京分起起程官兵騎來馬匹令永興委官一同來京至時將原馬帶回該處仍行令直𨽻總督轉飭該地方遇東三省官兵進關之日所騎馬匹每日酌給草束喂養其兵丁自京往軍營沿途房屋帳房棚厰等項業經行文各該督撫預備伊等帶來之帳房鑼鍋等可同馬匹一齊帶回至棉甲巳經永興給發京中無庸重給請俟命下之日行文盛京黑龍江二處一體遵照辦理上從之己丑上命傅恆為保和殿大學士兼戶部尚書辛卯訥親張廣泗會奏言黨壩一路據提督嶽鍾琪呈報於九月十二日商同護軍統領法酬派侍衛京皎丹泰鍾秋等協同副將鐵景祐等領兵明攻康八達山梁大敗賊番傷斃數人參將烏德納等是夜領兵暗擊康八逹山下河邊跟逹等處我兵鼓勇爭先攻奪燒燬大戰碉二座小戰碉三座平房四十二間木石各卡十座石洞二座並焚賊糧十二倉燒斃斬殺賊番甚多生擒一名並獲牛羊馬騾等物十四日各將備督率官兵攻圍石洞殺賊十一人撲河燒斃三十餘人生擒一人克取石洞其跟雜一帶地方南北約四十餘里東西約二十餘里並田地一千九百餘塊盡獲無餘是夜賊番來犯兩處營卡遇我伏兵鎗炮火箭傷斃賊番無數斬獲逆賊並頭人首級七顆奪獲器械甚多十八日夜守備張漢候補守備遊登俊等領兵由沿河一帶克取葛布基大碉八間小平房六間木城一座石卡四處斫碎大皮船四隻殺死賊番二十餘人燒燬糧倉並斃賊番男婦無數查看彼處左倚山險右近大河前有惡爾溪大戰碉六座周圍俱有石城賊蠻甚衆鎗炮如雨官兵攻戰一夜未免疲乏且離惡爾溪不過兩箭之地又有日旁山賊鎗炮兼施康八達山上又有擂石滚下三面受敵我兵勢單後無接應因暫收兵再圖進取奏入上命軍機大臣等傳諭嶽鍾琪曰據軍營奏報黨壩一路官兵九月內斬獲賊番燒燬戰碉奪取倉舍等情節較之别路大有起色良由嶽鍾琪調度得宜是以有此克獲金川軍務從前因訥親張廣泗乖張遲誤深負朕恩今已重治其罪特命大學士傅恆前往經略傅恆矢志篤誠必能使壁壘一新功成迅速決不似訥親等偷安自逸致餒士氣但軍機惟在呼吸之間嶽鍾琪現在軍中身肩重寄乘此破竹之勢如有應行奮往取效當前者即相機董率將士鼓勇先登縱未能犁庭掃穴而多克堅碉擒勦醜類長驅深入亦足以壯先聲而禠賊膽即經略到後諸事雖屬同功一體究不若經略未至之先嶽鍾琪自行出力奏捷足以見其感激圖報之實心仰副朕棄瑕録用之本意豈不更於顔面有光耶至近日進取情形若何可一併具摺速奏是日傅爾丹奏言緑旗兵丁羸弱成習今奉旨添調滿兵以收攻取實效並命臣以己意參酌臣查現存戰兵各路止二萬四千九百餘名不敷進勦之用應請於雲貴湖南三省及川陕二省加調漢兵二三萬名其滿兵如奉天寧古塔黑龍江三處之人慣於登山捷走可調取四五千人再於京師八旗內調取一二千名定於明年四月內調齊至營五月內乘機進勦其添調漢兵二三萬之內雲南可派廣南府土官儂振裔二官儂振岡領精壯沙兵二千名內帶板蚌習水性者三百名又臨安府納婁司土官普天明土千總李必勝領精壯黑猓玀一千名元江府土守備施諾利土千總施尼勒方國臣共領精壯黑猓玀一千名再貴州長寨營定番州二處派帶狠毒藥箭兵五百名以上各兵臣細加察訪實屬勇悍慣戰即金川逃出之人亦曽稱伊等甚畏沙兵似屬有益奏入上命軍機大臣等速議議曰傳爾丹以軍前現兵不敷進勦之用請添調雲貴湖南川陕五省漢兵二三萬人并京城及奉天等處滿兵數千人除滿洲兵丁巳於東三省及京師八旗內派出五千名無庸另為置議至其所請五省漢兵臣等查議調遣兵丁全資精壯陜甘二省兵數約及十萬兵力素徑又且附近川省原撥止一萬餘名今應請再調陕甘二省兵一萬五千名雲南共兵四萬八千餘名已調二千今應再調二千名貴州共兵三萬七千餘名已調三千今應再調二千名湖南共兵二萬四千餘名應酌調兵四千名湖北與湖南接壤從前嶽鍾琪亦會請用楚兵應於湖北亦調兵四千名以上六省已有二萬七千之數查西安四川駐防旗人當此用兵之時理應出力且西安既屬附近而川省即在本境請於西安駐防兵內調遣滿兵二千名四川駐防兵內調遣滿兵一千名以足三萬之數此項緑旗兵丁料理起程之處應照現在各省兵丁派往金川之例料理西安四川駐防兵丁應令該將軍副都統會同該撫酌量料理陕甘二省調兵數多應派總兵二員副將二員參將四員統領湖北湖南各派總兵一員副將二員參將二員統領雲南貴州各派總兵一員副將一員參將一員統領其遊擊以下應行派往管領之員令各該督撫等照例派往西安應派副都統一員協領一員統領四川應派協領一員統領所調官兵俱交與該督撫將軍等詳加挑選必得精壯之兵毋得以老弱冒濫充數務於來年三月內齊集金川軍營毋得遲誤至傅爾丹所奏調遣雲南沙兵在傅爾丹並未親履其地不過得之訪聞此等兵丁果否勇悍及調往金川實在有用與否應請俟臣傅恆到營之日與傅爾丹等酌看情形如果於軍營有益臣傅恆再行調遣得旨速行是日上又命軍機大臣等傳諭傅爾丹嶽鍾琪曰現據傅爾丹奏請添調滿漢官兵朕已命軍機大臣酌量分派調往計其陸續到營尚須時日從前嶽鍾琪減撤土兵召募新兵千有餘人頗稱精鋭昨奏到黨壩進攻情形屢有克捷固由嶽鍾琪調度有方而新募士卒之奮勇得力已著明效現在所有缺額自應儘數召募充補其各路軍營據報現存兵二萬五千餘人此內老弱病傷不堪臨陳者著於經略大學士傅恆未至之前即行實力裁汰就近召募驍勇以實軍伍務期士皆果鋭餉不虛糜前據嶽鍾琪奏報哈攀龍在軍尚有勞績而後此並未見伊出力之處哈尚德向負勇名董芳等亦經朕特遣諸人現在進勦何地有無奮往行走著傅爾丹傳諭詢問令其各行具摺速奏臣等謹按哈攀龍等銜命從軍猶聽主將指使而其奮勉與否尚勞聖主諄諄垂問彼身為主帥安坐帳中不親行陳者亦思九重之上宵旰焦勞無刻不縈心於戎伍間乎是日上諭內閣曰參將永柱統領馬奈一路官兵進攻尚屬奮勇所有從前革職之案著該部準其開復臣等謹按永柱領兵進攻勒歪因宋宗璋改由卡裏以致久頓未能寸進及調赴馬奈雖能攻取戎布寨而從前稽緩之咎難辭是以經部議以革職訥親屢奉諭旨訓飭軍中賞罰宜明始以該員攻克河東申逹之功奏請開復是時訥親己獲重罪而事得允行聖主之急於録功不以人廢言如此是日傅爾丹以奉命護理川陕總督具摺陳謝諭曰訥親等辜恩負國已有處分卿今護理總督董兵臨敵豈可坐視且朕今命大學士傅恆前往經略卿豈可待大學士之至而後告成功耶此際宜勉之可進則進耳此旨到將近日情形卿何以鼓勵布置何以進取攻奪一一據實速奏以慰朕望不可仍似訥親張廣泗之流也是日那蘇圖奏言滿兵起程事宜軍機處議覆已極周詳簡便臣隨飛飭遵照辦理至每站派馬八百匹應付臣查每站往返約六七百餘里不等恐日夜奔馳馬力易致疲乏臣己多為派備更替以免遲誤并飭地方官多備草料供應其打尖住宿之處派委驛員前往料理至保定係初站更換車馬尤須詳慎籌辦臣俟第一起官兵至保料理妥協即親自送至河南界查看一路行走情形以便逐起遵照辦理仍欽遵諭旨於分站各處所往來照看務使兵丁迅速遄行不致滋事其正定臨洺關分站之處臣現在先委司道大員前往照料斷不敢稍有忽視奏入報聞癸巳軍機大臣等奏言金川現在用兵一應公文往來必須驛站傳送迅速方於軍務有益惟查自京至成都皆屬內地所設各驛有驛丞専管者有州縣兼管者自成都出口向未設有驛站即內地驛站係州縣兼管者該州縣官多不駐劄驛地未免責任不専而駐驛之驛丞亦官卑職小未免呼應不靈均難免於遲誤自應設立専員俾司其事庶緊急軍務絡繹傳報得以迅速無誤查從前西北兩路用兵時北路安設四十七臺每臺派筆帖式一員西路自京至嘉峪關安設十四臺每臺相距四百里中間每三十里設腰站一處每臺派筆帖式一員撥什庫二名自嘉峪關出口預備六臺派筆帖式六員撥什庫十二名跟隨進勦大臣酌量應安塘站地方安設又派兵部司官監收公文在案此次自京至西安計二十四站西安至成都亦二十四站共四十八站臣等酌議每二站設筆帖式一員撥什庫一名計應派筆帖式二十四員撥什庫二十四名令其往來稽查凡軍營馳奏報匣內廷發往事件星夜飛馳不許遲誤時刻仍於每十站設司官一員總司查察計應派司官五員所設驛站內有兩驛相距遙逺之處應於適中之地添設腰站自成都出口至金川俱屬口外地方與內地情形不同其如何安站使得聯絡呼應不致貽誤之處臣等難以懸擬今酌議請派筆帖式十員撥什庫十名司官一員跟隨經略大臣臨時酌量於應設臺站處分布駐劄所有應派筆帖式撥什庫及司官等交與該部旗揀選送軍機處挑定派往督率該處地方官妥協辦理此項派往人員凱旋之日該部查明議敘到臺之日應得月給銀兩悉照從前西北兩路之例支給其自京起程令馳驛前往如此責成既専傳送自速往來摺奏報匣及一應公文俱可無誤於軍務甚有裨益至於設立正站腰站地名里數并安設馬匹及馬匹不敷作何撥補之處交兵部行文直𨽻山西陕西四川各該督撫妥酌一面辦理一面報部得旨速行是日上又命軍機大臣等傳諭陕西湖廣雲貴各督撫將軍副都統等以此次所𣲖兵丁務須詳加選擇必漢仗雄壯技勇熟練方準入選倘以老弱疲怯之人冒濫充數惟該督撫將軍副都統等是問甲午上命經略大學士傅恆擕帶花翎二十藍翎五十以奬賞兵辨之效力傑出者又諭派往軍營之大臣官員兵丁等所借官項俱暫停坐扣俾得全支俸餉以養家屬凱旋時效力有功者仍酌量加恩乙未上諭內閣曰川陕總督印務前降旨令經略大學士傅恆兼管原為節制三省便於調度其尋常應行事件繁多不當令其分心兼顧陕甘事務己交瑚寶辦理四川事務著交班第辦理經略不必躬親總督任內庶務専一經理進勦事宜俾膚功早奏以慰朕懷戊戌班第奏言川省統轄府十一直𨽻州九均有表率屬員整飭地方之責今敘州順慶保寧夔州四府眉州一州現在懸缺成都龍安二府忠資二州委往軍前辦理糧務各該員印務俱暫委各屬護理而州縣中調往軍營臺站者亦復不少俱委鄰邑兼攝在護理府州印務者未必勝任有餘而兼攝鄰篆者不免顧此失彼當此軍興之際差遣紛繁現在不敷委調仰懇聖恩於侯補或應升人員內揀發知府四員同知通判各四員星速赴川以資通融委用庶員缺不致久懸政務不致廢弛地方得以整頓軍務藉以驅䇿奏入上命該部照所請速行己亥上命軍機大臣等傳諭嶽鍾琪曰從前訥親曽奏臨陳之時內大臣及副將等官皆擇有障蔽可以藏身之處遙視督戰此豈身先士卒之道嶽鍾琪臨陳如何雖未奏明然據伊所奏亦稱皆據營員稟報朕聞軍中交鋒之際惟令偏禆率領士卒大員多不親行此係向來惡習嶽鍾琪此時曽身親督戰否將來經略抵營自必親身督率以提督大員必俟經略親臨方行前往豈不於顔面攸關其向來如何行走及目今統兵如何行走之處著即行奏聞前此之失不必回護朕亦不加責若能於經略未至之先奮勇督戰稍有進取則可嘉耳朕前曽傳諭訥親軍營消息隔數日即由驛遞馳奏一次今訥親己離軍營傅爾丹嶽鍾琪即當遵照前旨數日一奏俾音信時通情形如覩以免懸念是日河南巡撫碩色奏言大兵進勦金川經由豫境計需馬三千二百匹豫省驛馬通共四千五百餘匹而各驛路當孔道俱有賫送本章及火票公文别樣差使未便全數調撥臣擬調驛馬二千五百匹餘調南陽河北二鎮馬匹以足三千二百之數其需用車一千二百輛恐各站一時未能多雇酌令鄰近州縣協同雇覔庶可預期齊集惟查各路程途每站俱相隔三百餘里官兵按五日一次接踵而至前後共十六起各站車馬均須更番迭送不能無疲乏之虞臣現在於正數之外每站量為另備餘馬餘車以供臨時更替至沿途駐宿恐店房不敷居住或廟宇空房或搭備席棚或安設帳房務期完密不致兵丁受寒濕之苦沿途日用米麵蔬薪及馬騾草料臣己飭地方官預期備辦黃河渡船亦己雇覔齊全俟十一月初臣仍親往各站查看於駐劄分站處所往來料理彈壓總期軍行迅速仰副聖懷斷不敢稍有貽誤奏入俞旨報聞庚子上諭內閣曰大學士傅恆經略金川現在擇日起程其傅爾丹嶽鍾琪班第等奏報軍營事件摺匣著沿途探聽經略所至地方投遞即著經略大學士傅恆開看俾得備悉現在情形有應辦理者即為辦理有應陳奏者即行查奏仍將原摺封固進呈庶於軍務有益壬寅上命軍機大臣等傳諭盛京將軍阿蘭泰黑龍江將軍傅森曰阿蘭泰辦理盛京兵丁既已遲誤且盛京之兵亦不如索倫逹呼爾其盛京兵一千名來京之處著停止但令哲庫諾一人來京應補盛京兵數著即行文黑龍江將軍傅森將遊牧索倫內之阿爾拉阿巴圖克敦阿巴雅拉阿巴濟親阿巴托新阿巴呼倫貝爾地方之索倫并逹呼爾內之善於步履漢仗可觀年力精壯者挑選一千名餘丁內如有漢仗好者一并挑選派賢能協領一員照例辦理即令來京務於十二月二十前必到其所帶隨從之人若有情願各帶子弟者照原議之數準其帶往到京之後即交與哲庫諾帶往金川癸卯上命軍機大臣等傳諭傅爾丹班第嶽鍾琪曰據訥親奏稱十月初六日奉到會商嶽鍾琪願以三萬五千人由黨壩一路進攻情形詳悉定議之旨旋於初七日札知嶽鍾琪令至美諾面議并知會傅爾丹班第等訥親於初二日至黨壩初四日即回其於彼處情形何能周悉且伊既與嶽鍾琪面談何嶽鍾琪所云三萬五千人進攻之説竟全未述及而必調至美諾往返經旬曠廢時日且正當乘機進勦之時而主將離營他出何以督率調度此在訥親昏憒糊塗己不待言計此時嶽鍾琪傅爾丹當己各還原駐營次可即速傳諭伊等不必前往黨壩與嶽鍾琪商議即遵照近日屢次所降諭旨努力進兵相機攻勦毋得怠日玩時老師坐守其良爾吉王秋二人前降旨令張廣泗親帶來京今據訥親摺中有遵旨明正其罪之語而於何時何地正法並未奏明可傅諭傅爾丹嶽鍾琪等如二人已經正法或張廣泗已經親帶來京著查明奏聞如尚未辦理著俟經略大學士傅恆到日查辦平定金川方略卷十四
