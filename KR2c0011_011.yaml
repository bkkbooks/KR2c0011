body:
  text: 八月甲申上諭内閣曰紀山著革職發往軍營聴經略大學士訥親委用令其自備資糧効力贖罪四川廵撫印務着班第暫行署理戊子訥親奏言臣前定計發兵攻取卡撒右山梁之三層碉及小碉石卡次撲䨇碉再分昔嶺官兵合力取二道山梁原俟檄調補額川兵暨由甲索撤來官兵到齊遣赴卡撒左山梁與右山梁官兵對峙合圍以困賊人色底各寨詎自本月初旬至今陰雨連綿竟無間斷迨至本月二十一日天始晴霽随於二十二日𣲖兵前往圍攻右梁䨇碉並三層戰碉賊人拒守甚堅我兵奮勇撲攻將三層碉攻克在碉賊人多被石壓傷斃其正地馬奈各路俱縁雨阻滯半月以來均無攻勦文報惟黨壩一路據岳鍾琪咨報於閏七月初十日夜𣲖遣叅將烏徳納帶兵千名由兩旁抄奪火燒梁賊卡之後撃死賊番約十餘人縁賊卡後皆挖有濠塹悉下木籖鎗石如雨兵難驟克暫且撤回陣亡漢兵一名土兵八名十三日用新鑄銅砲撃死康八逹賊一名木耳金岡水泉之旁有賊數十人潜行隐伏我兵鎗斃一人餘賊奔退連日隂雨俟晴明即行進攻臣查各路雖值天雨未能前進直搗而賊人則見我師環聚圍攻頗為惶懼伊等百姓咸願歸正求生無奈家口為賊酋拘繋恐見誅戮懇將土司頭人一併招安臣等随諭以百姓原屬脅從投誠固自可准惟莎羅奔郎卡罪大惡極必須親來乞命方可代為請㫖随據有右山梁喇底寨番民二户棄産挈眷來投並擒番婦二口來獻又有左山梁格拉布東寨番民五户挈眷來投並遺火焚碉燒斃不願歸順之番數名官兵俱遥見火發當經臣等厚加賞賚安挿並詢據該番民僉供該處並無存貯食物之家其勢不過兩三月俱應饑餓是以人情惶懼急欲投誠臣查前次籌辦攻勦之法現已將右山梁三層碉克獲復即圍攻䨇碉諒亦易克至川省補額兵丁及甲索撤赴卡撒之兵數日内亦可到齊乘此晴明即當飭令前赴左山梁鼔勇攻撃合圍色底各寨俟有㨗音再為馳報奏入諭曰覽奏兵威似稍振而賊氣似稍挫矣機不可失勉力成功可也是日訥親又奏言攻克三層碉座正在繕摺封奏據克碉將弁報碉底挖有地穴尚藏頭人一名並賊番三十八名在内暗放鳥鎗經該將弁多方計誘始得出碉現俱擒獲合並陳明諭曰何以誘出並今作何處置何不詳奏是日訥親張廣泗㑹奏言欽奉諭㫖行軍之道最宜賞罰分明寛嚴並濟臣等惟有時時恪守凛遵至奮勇兵丁必應熟籌奬賞以示鼓勵查前月二十九日攻克右山梁水碉二座在事弁兵有首先奮勇督率進碉者有争先入内手刅賊人並割取首級者有挺身躍至碉上者有争先撲入碉内身帶鎗傷者有見衆兵延緩㧞刀督催前進者有堵截應援奮力退賊者俱係該統領將備目撃臣等因令查明逐一分别從優賞賚或給銀牌或賞銀兩或與功牌俟事竣議叙并飭各路鎮將凡遇攻撃賊碉有奮勇兵丁均照此例一體辦理庶可杜冒濫之弊而軍心亦咸悦服奏入報聞是日訥親張廣泗又㑹奏言御史王顯緒所奏以番攻番之法言之似易為功行之實難奏效金酋地險碉堅非獨官兵難以力克即土兵亦莫能遽破伊等自相攻撃茍得一二小碉即行踞守或遇難克之處則旋進旋退經年累世搆釁無已今官兵進勦用張天討勢在必克若止令土兵前驅其心渙散且土目必思各取其地界相連零星易取之碉寨以圖佔其土地而於𦂳要之隘口難攻之賊碉罕能致死用命若如該御史所奏許各土司以金川之土地人民冀其合力攻取則是土司失之仍屬土司得之亦非善䇿况大兵已集而又委土兵一似重資其力是明謂我兵力不能取也不惟示弱於逆酋抑且損威於番部臣訥親前涖軍營聞小金川之兵攻克賊卡曾給以千金重賞及用之昔嶺石城仍多退怯此又非重賞所可收效者矣再四思維終無所益可不必行奏入報聞己丑訥親奏言臣查賊勢除拒守之外無力侵犯彼知我兵不深入巢穴不止頗懐恐懼今調遣至卡撒之各路官兵約於是月内全到計此兵力似可前進倘能痛加懲創一次其人心必至散亂因之相機辦理於秋間成功亦未可定是役征勦日乆費用日繁倘今秋未能告成則所費更重但事已如此中止為難惟有節省浮費厚蓄軍威及時盪滅庶帑項不致虚糜耳欽奉諭㫖凡事辦理須歸有益不可拘拘遵㫖令臣於此等處時為留意臣前𣲖䕶軍統領烏爾登薩音圖等進攻路徑未審兵未能進今已調囘卡撒令伊等於征戰時同總兵副將擇嚴宻之地督率侍衛拜唐阿及成都兵丁分起前進攻取是以綠旗兵丁稍有退縮或稍能奮勉臣皆得其實情臣又於衆兵内擇其年富力强者選為驍勇切加曉諭伊等如能於指示之處立有微功即許以授官或倍加糧餉伊等近日頗能鼓舞向前竟有以未得進戰而致憤懣者怠忽之習稍改於舊至於攻取賊巢多在黑夜臣於昏暗中望見官兵放鎗之火光惟令烏爾登等督戰不敢自輕妄動臣又奉諭㫖以張廣泗紀山等撤草坡一路臺夫改由章谷一路運米後又仍歸草坡一路運送以致多費令臣分别伊等是非臣查張廣泗紀山雖屬不和然於公事尚不敢僨草坡改運情由縁張廣泗於夏日過班攔山身衣重裘尚覺寒冷謂冬月運夫必不能堪即交道府等改於南路章谷添買馬騾運米後因南路馬騾遇雪倒斃不能挽運仍改歸草坡舊路並未與紀山商議辦理合併陳明奏入報聞庚寅四川提督岳鍾琪奏言黨壩一路為逆酋門户地處萬山本屬扼要兼自上年用兵延今歲餘致長賊智凡屬可通路徑悉深掘濠塹層壘不一又修鎗孔砲眼潜伏其内碉卡在在備禦嚴宻查黨壩東西横亘一嶺蜿蜒三十餘里其間漢土官兵營盤二十五座放卡一百五處中有木耳金岡左有陡物黨噶右有康八逹由黨壩山梁分脉並列三嶺迤邐而南皆屬賊番戰碉要卡即今進攻之處也嶺北即係雜谷土司倉旺所屬黨壩一帶凡我糧運道路山峯錯雜無一非賊番出没之道在在需兵嚴守但黨壩軍營漢土官兵名為一萬有竒除守營放卡傷病以及分防糧臺塘站之外實止七千有餘地廣兵單不敷分布且雜谷土兵去嵗原係挨門撥𣲖並未挑選致多老弱充數每遇進攻或潜避林箐或臥伏波澗低凹之處堅不前進雖善為駕馭化導或少悛改然土兵宜逺不宜近可暫不可乆今雜稄等處土兵離家不遠不無繫戀妻子之心况随征年餘人情疲猾積習難除惟守營防卡尚可資其遣用其所𣲖松潘口外之唐古忒土兵一千五百名平昔慣於馳馬一旦至此髙峯峻嶺不能登山陟險即所執噐械弓箭短小並無火噐更難適用至於漢兵素有不戰自潰之名業䝉皇上洞鑒其怯懦臣抵營以來多方曉諭開導申明賞罰近亦尚知用命伏思七千餘兵之内雜谷土兵既積猾不力唐古忒土兵全無可用漢兵應敵實不滿二千之數臣雖晝夜悉心籌畫百方措置亦已攻奪水泉殺死賊衆我兵營卡挿入賊地與之共險然總患力少兵單前攻後顧且黨壩一嶺之兵以防各處賊番衝突兼䕶糧運並暗防敵兵從後抄襲甚闗𦂳要斷不能移營䟎前業經咨明督臣張廣泗請增官兵三千名以便進取督臣覆稱原𣲖續調各省官兵前經分𣲖十路進攻撥遣已定現在無兵可撥至於土兵怯懦之習在在皆然臣又以昔嶺卡撒進攻中有刮耳崖阻隔即使果克刮耳崖尚距勒歪賊巢百有餘里其間道路險阻自必躭延時日未若將四路所撤之兵以正地之兵分歸昔嶺卡撒甲索之兵歸併黨壩首尾夾攻使逆賊勒歪刮耳崖兩處要地俱不能守且黨壩至勒歪不過五六十里只須康八逹一破便可直抵喇嘛寺即已搗其巢穴較各路濟事更速咨商督臣督臣又云不便更易竊思始而增兵撥遣已定十路以黨壩美臥甲索乃當正地五路攻勒歪賊巢以卡撒昔嶺納喇溝納貝山馬奈五路進攻刮耳崖止留臣所領黨壩一路之兵單攻勒歪今又續調川兵二千亦歸卡撒臣不知督臣是何意見不肯分兵給臣黨壩一路就近直攻勒歪而反將各路之兵調歸卡撒昔嶺以攻刮耳崖縱使得破刮耳崖倘莎羅奔逺颺逃匿咎將誰委况督臣既知土兵怯懦理應據實奏聞增調漢兵裁减土兵以收實效督臣乂在營一年之乆非初到未諳者比何故明知而緘黙不言臣所未解也竊思唐古忒土兵一千五百名實屬虚糜帑項留營無益莫若遣發囘巢即以伊等所遺之坐餉糧菜等項在軍前附近各處另募新兵旋收旋用一加變通而糧不加增兵收實效於軍務不無裨益奏入諭曰此奏若令張廣泗知之汝等同辦事之人必有掣肘之虞有宻㫖令訥親速奪至張廣泗向在苗疆甚有經濟此番不知何故每致差謬訥親亦以為言汝所奏頗合也是日岳鍾琪又奏言金酋莎羅奔敢於狂逞不法者實縁瞻對之役辦理不善所以遽生悖逆之心而又有助逆之綽斯甲土司䇿丁秉朱從中挑釁以致肆行侵奪荷䝉皇上軫念各土司番民受害不惜數百萬帑金出師征討以靖蠻荒今官兵征勦一年有餘未能克㨗雖云地險碉堅亦由𣲖調之漢土官兵未能慎選於始以致遲誤臣查各路新舊土兵雖有二萬其間惟革什咱沃日兩處實與金川有讐可以出力惜其兵少雜谷土兵雖多因該土司待下刻薄人不用命而瓦寺木坪巴旺裏塘等處土兵俱屬怯懦綽斯甲土兵不惟無用且更須加之防範至小金川上兵尚屬勇往督臣張廣泗乃令土司澤旺之弟土舍良爾吉領兵良爾吉從前勾結莎羅奔襲取小金川生擒其兄澤旺澤旺之妻阿扣乃莎羅奔之姪女素通良爾吉莎羅奔即以阿扣配良爾吉為夫婦并將小金川土司印信交良爾吉掌管土民甚為不服去嵗副將馬良柱領兵應援沃日良爾吉輙敢率領小金川之衆助賊燒燬沃日各寨迎敵官兵及官兵敗賊金酋逃遁囬巢良爾吉無所倚藉始行就降張廣泗至小金川將土司印信仍歸澤旺管理其時應將良爾吉阿扣並助惡之頭人暨漢奸王秋等即行正法以絶内患督臣既不出此今進攻卡撒轉令良爾吉掌兵則所領之兵俱懐疑懼不惟不肯用力且恐良爾吉暗通金酋更生他變臣已將此情節密呈經略商之督臣即行正法令澤旺管領土兵庶衆疑盡釋可望専心用力矣至於川陜雲貴四省漢兵前後𣲖調三萬二千餘名除各項事故外實在兵二萬八千餘名土兵共一萬一千四百餘名共漢土兵不下五萬足資戰守之用但土兵多屬無用臣已另摺陳明竊以為莫若再調官兵一萬名將無用之土兵减撤一萬庶錢糧不致加增而兵力更收實用不過數月之間便可成功倘䝉俞允伏查陜甘為沿邉重地雲貴為苗猓巖疆不便再行調撥惟湖廣鄰近川省兵皆慣於陟險用之川省似屬相宜抑臣更有請者用兵之道有竒有正要必先察地利之險易然後可定進取之機宜今各路官兵俱調赴卡撒昔嶺名雖二路其實止隔一山仍屬同攻刮耳崖刮耳崖固係逆酋要地但地險碉多攻取不易非若勒歪賊巢所通道路甚多如卡裏山固噶溝二處路不甚險可出竒兵直搗勒歪若勒歪一破則四路有自潰之勢臣前曾咨商督臣既未允行今將各路之兵俱調赴昔嶺卡撒舍此可以進攻之道不肯用兵而棄易就險恐非用兵之道仰懇皇上勅交訥親廣諮博採細加籌畫務期有濟軍務奏入上是之臣等謹按良爾吉阿扣二人者實黨惡之巨奸而金川用兵之大闗鍵也莎羅奔與澤旺為鄰利其暗弱而以兄子妻之其陰謀蠶食用計深矣良爾吉與之氣類相感叔嫂私通箝制澤旺莎羅奔即乘機誘縳幽繋數年其後澤旺雖得放還而良爾吉仍占踞土司印信與莎羅奔同惡相濟王師壓境敢逆顔行力屈勢窮然後束手請命其罪尚可赦乎張廣泗不即於此時伸明大義戮此渠魁乃反惑於王秋遊說之詞令良爾吉随營効力其意以為澤旺不足用故用良爾吉為以番攻番之計不知莎羅奔者澤旺之深仇而良爾吉乃莎羅奔之惡黨也不以仇攻仇而以黨濟黨計孰有左於此者且觀澤旺還自金川與其妻誓不相見而阿扣未能加害則知番衆於主僕之義猶為固結阿扣亦有所憚而不敢為彼衆人特懾於良爾吉之凶威而非真與澤旺離心離徳也誠於其時扶澤旺以順人心誅良爾吉以孤賊黨則義聲先路可不戰而屈人之兵矣迨良爾吉暗洩軍情奸謀既露人言籍籍咸懐隠憂張廣泗方且囘䕶前非悍然不顧是以岳鍾琪不勝憤懣據情入告且以商之經略而訥親復猶豫依囘當斷不斷則是於事機之㑹既已覿面失之雖朝議增餉夕籌調兵庸有當乎是日班第奏言臣欽遵諭㫖由卡撒軍營前徃内地經徃南路至打箭爐沿途查勘糧臺將各員分别奬罰䇿勵令皆留意毋致胥役侵扣脚價口粮至里民帮貼運夫銀兩一事臣沿途宻訪民夫應募多須里下帮貼實屬舊例相沿各州縣𣲖夫多寡不同里下津貼亦視軍營逺近並不一例亦從無四五十金之多番夫輓運俱在本境就近站所日得夫價口糧尚無苦累惟查内地帮貼雖屬無多而胥役藉端科𣲖多金從中私飽慾壑者不能保其全無臣現與紀山倉徳面商時刻留心究處又臣等前酌行包運之法不拘官商聴其領運近見商人俱踴躍從事仍恐緩急或不足恃又𣲖令州縣官照依商價領運務令如期至營官運商運兩不相礙已據倉徳詳報檄𣲖簡州等二十餘州縣分别領運共米一萬二千石如此則糧運日益加增足資備用并漸可酌减正運民夫以免里下津貼之費奏入諭曰將來正運民夫全减方妥耳臣等謹按糧運一事皇上體恤隐微從寛給與價值至里下有津貼舊規勢難禁止皇上惻然動念多方籌畫所降諭㫖至再至三至是班第遵㫖籌辦可冀糧運日增民夫日减皇上猶必諄諄訓諭以正運民夫全减為期聖主視民如傷惟恐軍興之際絲毫貽累閭閻至誠惻怛之意誠有淪浹於蔀屋窮簷者矣是日班第又奏言打箭爐明正土司為川南各土司之領袖素稱恭順歴來進藏差遣俱係該土司供應無不盡心自雍正八年乾隆十年兩次征勦瞻對該土司既遣土兵又輓糧運供應烏拉已覺疲乏上年復遭金酋焚掠尤為殘破此次大兵征勦該土婦喇章率子徳昌用兵輓運更屬努力臣親見該土司既殫竭心力而所屬番民凋瘵情形尤深憫惻正擬奏乞恩恤以示鼓勵途間接閱部文知皇仁賞給縀匹等物寵榮已極在各土司等自必感激奮勉益切報効之心至於所屬窮番尚有應加體恤者容俟功成之後會同經略等查明分别等第另奏請㫖奏入上是之是日上命軍機大臣等傳諭訥親曰提督岳鍾琪奏報軍營情形二摺朕細加批閱其所指陳諸事尚屬近理雖伊以廢棄之員經朕加恩擢用領兵日乆未有成績或藉稱兵少不敷調遣以為文過之計亦未可定但伊乆歴行陣所見未必悉屬虚謬即所奏張廣泗種種行徑亦頗與大學士訥親之言相合着將原摺録交訥親宻㸔其所請增調楚兵酌度情形如實屬應行即宜速行籌畫一面辦理一面奏聞其餘據奏俱已咨呈訥親張廣泗將來查辦時即可照咨酌定不必洩露岳鍾琪以提督領兵與總督共事若因此致有嫌疑反多未便用兵之事頗闗重大不可不慎也癸巳軍機大臣等會同刑部奏言革職總兵許應虎邀䝉格外天恩擢任總兵特命馳赴軍營自應奮勇進勦勉圖報効乃將所奉前赴軍營諭㫖不即宣示意圖觀望及進攻獨松毫無調度以致叅將蔡允等失砲損兵律以守備不設失䧟城寨罪實相等又許應虎奉委進攻獨松不遵調度擅自取路的交不惟不能克攻轉被賊番圍困律以不依調遣失誤軍機罪更難逭又許應虎移駐卡撒原以彈壓重地乃因賊番大言恐嚇心懐畏怯稟請撤營律以臨陣先退罪亦何辭以上各欵已據許應虎供認不諱按律俱應擬斬應將許應虎從一科斷照失誤軍機律擬斬監候秋後處决得㫖允行庚子訥親張廣泗會奏言各路攻克碉卡情形自閏七月初五日奏報之後各路所報或係我兵前往攻碉殺賊數人或係賊來侵犯我卡傷斃數賊均非大有克㨗惟黨壩一路於閏七月二十三日進攻康八逹燒燬賊人耳碉一座平房八間并鎗斃賊番百餘人焚燬碉内堆積麥糧青稞無數卡撒一路原擬將右梁三層碉攻克後次撲䨇碉即合力攻取喇底二道山梁並將續到之兵遣赴左山梁合圍以困賊人色底各寨迨前月二十二日攻克三層碉之後因右梁䨇碉守禦嚴宻屢攻未克因即改攻喇底二道山梁據領兵副將劉順王愷等𣲖兵四千餘名分為左右二路越箐仰攻其左路在下右路在上原令横據山梁斷賊外援於閏七月二十七日酌定是夜發兵詎料右梁與二道山梁相隔深溝俱係宻箐峭壁無路可登其左路稍低尚有斜坡可緣官兵已奪據碉卡數處并遣土兵潜越喇底暗燒西南賊碉而右路官兵復繞道随左路官兵之後不能往上以斷外援且統領之副將遊撃等但督率至溝口而止而帶兵之備弁又復落後僅有兵丁在前已至各碉丁圍攻忽聞應援賊番有數十人從山梁呐喊壓下我兵三千餘衆自相擁擠踉蹌奔囘多有傷損臣張廣泗見其垂得復失因即親往督戰分遣官兵攻撃䨇碉下之賊卡并周圍旁碉俱於二十九日全克生擒賊番五名斬獲首級九顆耳記二十三副至鎗砲撃斃賊番亦多當令將䨇碉環攻計我兵二千餘衆困此碉内之賊已如釡底之魚詎料左旁官兵所安堆卡未能聫絡嚴宻致令賊人於三十日夜半俱零星潜遁未獲盡殲但䨇碉既克其右山梁諸碉已屬掃清現在籌酌𣲖遣官兵前赴左山梁攻撃以圖合圍色底巴郎諸碉俟有㨗音再當馳奏至各將弁既不遵照臣等指示臨事又復委靡不前罪無可逭統俟事竣核其功過另行具奏奏入上命軍機大臣等傳諭曰行兵最重紀律若寛嚴不當則無以一衆心而鼓士氣今據奏進攻喇底二道山梁統領之副將遊撃等員僅至溝口而止帶兵之備弁又復落後忽聞賊番數十人應援我兵三千餘衆遂俱奔遁聞之殊為駭聴凡為將弁理當身先士卒乃畏縮不前轉至落後無怪士卒之不能摧鋒䧟陣即使從後督戰亦無見險而止身住溝口但令士卒前進之理又無怪其令之不從矣即不能以一當十亦何至以三千之衆不能敵賊番數十人而至聞風逺遁自相蹂踐此事實出情理之外朕前㫖謂辦理不宜過嚴者原指尋常督師攻勦而言若勝敗在呼吸之間而將備不能用命即重法以狥亦何足惜今奏稱統俟事竣核其功過是又過於姑息矣至䨇碉下圍困之賊又以堆卡不宻致令脫逃種種踈懈不知紀律何在論用兵之道即訥親張廣泗亦當身臨行陣親督將弁但以國體所闗不可冒險乘危以持重為得體若將弁人懐畏怯大功何由而成軍前大兵現有四萬據奏其中土兵怯懦者多即當汰其羸弱而易補精壯何得但取充數至黨壩一路有焚碉殲賊之報比諸路差為振作而岳鍾琪前奏兵勢單弱請調楚兵朕已降㫖令訥親酌量觀此情形更不容緩經略膺調遣大權似此應汰者既不即裁應調者又不速調而於數千里外為此泛泛之空談此事將何定局况前後摺奏皆稱賊番僅數千人乃我兵所到伊等路路俱能抵禦何以我兵四萬之衆尚聫絡不嚴致有踈漏而二三千人反能廣為分布觀此則數千人之語似非確實卿等在彼日乆豈彼中情事竟不得其虛實耶川兵行山是其所長而一臨矢石輙復敗逃所長何在前次摺到雖未有㨗音而措置得宜尚為愜意深冀乘機奮勇可奏膚功今覽奏又失所望將來此事兵力何所倚仗軍務作何調度日復一日師愈老而氣愈怯豈能乆頓堅碉之下坐待成功卿等尚宜熟思應如何籌辦如果無法可施萬難竣事亦當據實奏聞毋得含糊兩可以增朕西顧之憂是日上又命軍機大臣等傳諭訥親曰朕前命大學士訥親赴川經略盖因新舊調兵已至數萬張廣泗料理日乆必有成謀已命内大臣及侍衞等前往相助則經略至彼不過資衆力以督率即可迅奏膚功孰知大兵雲集竟為賊碉所阻遷延數月迄無成效度其事體要非一年半載所能掃穴犁庭者矣而大學士以親近重臣亦無乆駐於外之理是以前次即將此㫖傳諭訥親令其於嵗暮或明春囬京所以遲遲者誠慮經略之名既重虚此往返恐於顔面有闗故待以時日或於此際有㨗音之至耳今觀訥親等奏報情形仍難摧鋒前進且籌度局勢尤非年内所克竣事况有訥親在彼張廣泗轉得有所委卸置身事外自不若仍如前諭召還訥親然日内所以不即降㫖者意欲稍遲時日或得一聞㨗音即訥親還京亦可藉以報命庶為得體乃軍營情事至今猶昔訥親即乆駐師中亦無旦夕可奏之績且伊體素為虚弱當此水土惡薄風霜寒冽之際調䕶一有失宜闗係國體不小待至九月若再無㨗音朕即當明降諭㫖召伊囬閣辦事矣其經略印務俟伊遵㫖覆奏到日另行酌定著再傳諭知之臣等謹按訥親奉命經略恩深任重我皇上用人行政一秉大公初無絲毫偏倚而於大臣則大公之中尤藹然有股肱一體之誼既為之審處事宜又為之保惜身體反覆躊躇周詳懇摯種種不得已之苦衷凡屬臣工宜何如其鼓舞踴躍仰圖報稱也丙午上命協辦大學士事尚書傅恒傳諭訥親曰據紀山奏稱准經略照會以金川糧運恐冬春雨雪輓運艱難須於十月以前預備至明年四月兵糧運籌軍儲雖屬有備無患之計然此乃班第等之事而經略大臣所重則不在此惟當鼔勵戎行指授方略滅此朝食使將士用命軍氣奮揚可以立奏膚功方為勝算乃於今嵗即籌來嵗之糧豫定四月之期遠近傳聞共知今嵗無奏凱之意人心必因此懈怠是於興師攻勦之時即先示以曠日持乆之意何以振作兵氣且賊人屢肆搶刼此項兵糧轉運之時途中保無踈失屯積之所又恐啟彼覬覦况今冬若或撤兵將復運囬乎抑存之以資賊乎倘被攘竊更損國威種種俱未籌及總之運粮一事或出於班第紀山之見猶曰是其専責若大學士訥親用兵一日即向伊等責取一日之糧耳其心惟應以刻期制勝為事則士卒庶知事無寛假奮勇爭先共殄羣醜也從前訥親曾經奏及朕即以為非計今覽紀山之奏是訥親已經咨會查辦未免用心太過以致失宜應令訥親等另行妥酌具奏朕意今嵗不能成功欲令訥親同傅爾丹張廣泗來京若伊等覆到朕准其同來斷無尚令大兵全駐之理今冬必應撤罷軟無能之卒惟擇精銳一二萬人著岳鍾琪統領相機防範随宜攻勦俟朕與伊等籌畫已定然後調集大兵進勦如此辦理則所省糧餉實多又不至師老疲乏何必擁數萬之衆坐飽寒冬無所事事乎朕於軍務機宜及賊境情形每降㫖詢問訥親原欲其速行覆奏知其要領以便裁酌機宜非謂數千里行軍每事必待命而行但事之應行應止亦必奏明朕知若惟接一㫖即随意敷陳或遲乆不覆何以慰朕之懸念在訥親或以朕傳諭之事過多逐件覆奏恐無暇更辦他事其實伊在軍營亦未見其所辦何事也若能早奏膚功又何須用朕許多絮語耶可即傳諭知之是日紀山奏言臣欽奉諭㫖以川省用兵未免有資民力令查明辦過夫米各州縣本年錢糧先行緩征俟凱旋之日分别等次奏明請㫖兹據布政使倉徳詳稱川省毎年額征地丁錢糧共六十餘萬兩向俱按數全完本年錢糧已據解省者業有三十餘萬而未解及已解在途者未知確數𣲖辦夫米之成都雅州嘉定龍安潼川叙州寧逺保寧順慶重慶等府卭眉資茂瀘等直𨽻州并叙永㕔所屬各州縣其間報解錢糧雖有多寡之殊而守法奉公之民率俱全完今以奉文之日欽遵緩徴是同一辦公而完賦遲緩者仰沐殊恩輸將恐後者轉未得沾實恵似應變通辦理以臣愚見應請將辦過夫米州縣未完各戸一概緩徴其已完各戸准其緩徴明嵗錢糧仍於事竣之日一體分别請㫖至未辦過夫米各屬將來或須𣲖及其應徴明嵗錢糧亦一體緩徴以示公溥奏入上命軍機大臣等議議曰川省運送軍糧需用人夫原係小民趨事赴公之本分且皆給與價值口糧非徴召徭役専資民力者可比皇上軫念民艱緩征賦稅原屬仁施格外該撫等惟應遵㫖辦理未完各戸一概緩征已完各戸即緩征明嵗錢糧至於未經辦過夫米之處原屬未嘗出力若恐其將來或須𣲖及預為緩征則無論應用何處州縣人夫難以懸定倘今嵗軍務告竣無須再𣲖此等緩征之處既不應一體加恩若令復完又必新舊並徴轉多催科之擾紀山所奏種種未協未便准行應請勅交署撫班第遵㫖辦理上從之平定金川方略巻十一
