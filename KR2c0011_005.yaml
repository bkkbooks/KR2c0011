body:
  text: 乾隆十三年正月乙未紀山奏言西南兩路軍營漢土官兵暨各色匠役運夫等不下五萬餘人每日約需米麵五百石口外運送軍糧蠻夫不足供役萬不得已添雇內地雅州天全蘆山及成重保順敘嘉等各府州人夫分運又有本人不敢親往者出價雇人代行雇價昻貴若禁其私幫則軍裝必致貽誤若聽其幫貼則民間不免賠纍理合據實陳奏又川兵二萬九千三百有零今調遣出兵已經過半班滚未死雖似實情然金川正在用兵此事似應暫緩奏入上命軍機大臣等傳諭曰紀山所奏籌餉之處著寬給腳力令其妥協辦理務使腹內兵民不致稍有擾纍是日軍機大臣等奏言金川軍營派撥兵丁除土兵一萬名外共調過漢兵一萬六千名此內陜省兵三千名黔省兵二千名其調過川省官兵實止一萬一千名該省馬步額兵共二萬九千三百餘名是調撥之外尚留各標營兵一萬八千餘名以之分布汛守似足敷用今紀山有調撥過半之語或是合護糧運餉兵丁一并計算在內故有此奏但查上年十一月內經張廣泗奏請預於各營召募新兵給與守糧俟土兵撤退即抽調制兵前赴軍營添補將此新募守兵捍衛內地已經臣等議准又從前雲貴督臣張允隨奏於鶴麗永北二鎮密挑精壯馬步兵二千名預備協勦則是兵數已為有餘將來金川軍營倘再有應撥之處或於滇省酌調或於川省抽撥臣等行知張廣泗令其酌量辦理至軍營糧餉最為緊要現在運送糧餉䝉皇上體恤兵民飭令豐裕料理從前所撥餉銀如已敷用則已或尚應需協濟必俟奏請未免稽延時日應令張廣泗就近於陜省封貯銀兩內動撥一面支用一面奏聞令該部撥補還項可也上從之是日紀山又以軍需旁午佐雜不敷差遣奏請揀發十四員並將服闋之大使張存仁典史王經邦留川委用上命該部速議旋經議覆准行戊戌軍機大臣等奏言臣等閲貴州巡撫孫紹武摺內稱據雲南劍川協副將胡大勇口稱雲南有淨瓶銅炮可以致遠攻堅臣業已備細札致張廣泗應請旨敕下雲南督臣張允隨撥調淨瓶炮四五十位即令胡大勇解赴金川臣等看得上年十二月內張廣泗奏明遣員前赴成都製造重五百餘斤之大劈山鐵炮二十位又上年十二月內欽奉諭旨頒發八旗存貯九節炮十位運往軍營是炮位似應足用且由滇至蜀道路﨑嶇解送匪易但孫紹武已經札致張廣泗應將臣等此奏交張廣泗酌量是否需用並應否須胡大勇赴營聽用之處一面辦理一面奏聞可也上從之己亥上諭內閣曰現在進勦金川一應糧餉俱屬紀山料理紀山既有巡撫任內應辦之事難以兼顧著兵部尚書班第馳驛前往將一切驛站挽運沿途查辦俟至軍營調度糧運事務給與欽差大臣關防其帶往之員外郎阿桂主事莊學和亦者給與驛馬癸卯上命軍機大臣等傳諭張廣泗曰前據紀山奏稱運送軍糧情形甚屬艱苦價值亦極昻貴幾與康熙年間北路軍營運價相等紀山既深以運餉為難恐其辦理未能妥協是以特遣尚書班第前往調度糧運至現在進兵調遣攻勦機宜一惟張廣泗是任至四川副都統卓鼐所奏雇覔蠻夫一摺亦著抄録交與張廣泗令其㑹同班第紀山酌量於彼處情形是否有濟應否准行妥協定議如屬可行即一面辦理一面奏聞是日上諭吏部調取原任貴州按察使宋厚來京引見丁未張廣泗奏言臣以庸愚䝉恩督師進勦金川半載未能奏效前於十月內䝉聖主軫念塞外冰雪嚴寒或暫行退駐俟氣候融和厚集官兵為一舉掃除之計睿謨深遠計出萬全而臣不自揣度計圖就現在兵力竭蹶辦理或能於歲底春初早定大局詎料力不從心一月以來仍毫無進取松潘總兵宋宗璋黨壩一路攻打康八逹木耳金岡二處據報於十一月十三日用鑄成大鐵炮攻打康八逹塌其一角又攻木耳金岡將小碉擊去半節打落戰碉西南一角炮擊石壓致死賊番甚多而碉未傾倒十一月二十二日至十二月十九等日連攻木耳金岡由地道施發火藥震塌東北耳碉碉頂衝破西南耳碉一孔又用炮攻擊大碉已去其頂中腰亦被打塌外面石牆俱已傾頺只在二三日內即可傾其堅碉進據其地又據攻圍戎布寨之參將永柱報稱將戎布賊碉四面圍困已經一月賊人窘急十一月十五日乘夜突出百餘人被官兵截殺斬獲首級耳記賊畏懼不敢復出現在絶其水道用炮進攻又據總兵許應虎副將高宗瑾參將任舉買國良聨䘖報稱攻取色底賊碉於十二月初九初十等日用炮攻擊並伏兵邀截共擊中賊碉二百餘炮傾坍一角遍碉孔洞如鱗擊死賊番數十人因炮力尚小不能震塌初九日撤兵之際賊番百餘出碉遇我伏兵擊殺十餘人連日不敢復出十二月二十三日五更撤營賊又蜂擁而來遇我伏兵殺死二百餘人始各潰散漢土官兵傷亡亦有二十餘人查此三路雖乏攻取亦無踈虞惟駐劄馬邦之副將張興遊擊陳禮昏憒怯懦喪師殞命實有逈出意料之外者查馬邦為馬奈之藩屏而馬奈又為巴底巴旺之門户必應駐兵防守是以飭令張興陳禮等帶領漢土兵二千餘名駐守馬邦山梁又與河東對岸駐守之參將郎建業遊擊潘文郁營盤相望亦有漢土兵一千餘名兵非單弱况張興駐劄半載熟悉地形乃於糧運經由之扎果山梁並不設兵防禦賊遂於十一月二十九日乘夜鑿斷山岩窄徑修砌賊卡由山上用礌石下擊糧夫又紏集醜類攻犯其營以致軍糧阻截臣聞報即飛飭總兵馬良柱參將永柱就近應援經署遊擊徐介眉於十二月初三日擊退賊衆糧運復通并遣兵渡河接應已可保無虞張興駐營之右山梁亦係糧運經由之要地遊擊陳禮帶兵三百名駐劄防守賊人屢犯不克陳禮意遂弛懈賊有石炮法安設木架以機發石傷人然所及不過百步而木架一著鎗炮即倒原屬易制乃陳禮並不施放鎗炮擊毁木架任其安設十二月初七午間賊番不過二百餘人齊發機石官兵相率逃奔自相踐踏墜崖死者數十人遊擊陳禮率殘兵退保小空碉樓一座尚可自守張興忽於是夜暗調陳禮帶兵潛赴伊營僅留兵三十名并劈山炮三位及鉛藥等項於碉內次日賊番取去炮位鉛藥並不傷害留兵亦不攻擊張興惟於山梁河口堅砌石卡堆集礌石嚴加守禦以致糧運水道復被阻塞臣聞報隨派參將王世泰飛馳前往相機救援王世泰㑹同郎建業孟臣徐介眉潘文郁等隔岸相度形勢應於曾逹對河兩岸夾攻十一日徐介眉等於河東岸帶兵排列鎗炮遙呼張興奮力夾攻而張興陳禮閉營不出臣又飛飭馬良柱王世泰等多備皮船木筏速發援兵接應十二日張興猶具禀僞言賊衆兵單伊等各盡忠悃死力拒守及十三日王世泰備就皮船十八隻木筏十隻隔岸呼告張興定期十四日兩岸夾攻而張興陳禮又不出營及至十四日王世泰等預備齊全專候張興官兵出營并力因不見動靜使人屢促張興答以我處各自主意及至巳時忽見張興衆兵收拾帳房背負出營河東官兵方謂張興情急必棄營搶筏渡河恐敵兵潛躡其後勢難保全深為危懼不意張興所領官兵反跟隨賊人由右山梁溝內前去河東應援將士登高望之見張興等被賊引至右山梁溝底將官兵分撥三處張興陳禮又各置一溝賊番千餘四面圍困河口集石成堆援兵渡河不須施放鎗炮但滚石下擊船即沉水以致東岸援兵帶水之隔計無所施十八日辰刻遙見河西官兵將器械逐一交付賊人莫解所謂有奔逃過河之漢土兵三百餘人咸稱張興自陳禮失守之後因賊送還營內所留兵丁三十名不加殺害遂與恩錯生格等終日講和宰牛發誓并以白金分散買路賊許送官兵全營過河衆兵屢請攻殺張興陳禮嚴禁不許及至被賊誘至溝底張興陳禮猶令將器械交付賊人以致官兵五六百名盡被殺害遊擊陳禮候補守備徐克讓千把總九員俱已遇害張興存亡未知臣查張興欺誑主帥朦混援兵受賊愚弄至死不悟似此昏憒庸懦之將不能早為覺察臣罪奚辭伏乞敕部將臣嚴加議處至川中將士怯懦至此臣何敢復輕言進兵惟當欽遵諭旨加調官兵厚集軍威以為一舉掃除之計奏入諭曰懦將僨事豈卿所能逆料軍行之際賞罰宜明卿自行檢舉亦是但此時交部必至外人盡知益生議論於事機無益故且不發俟成功之後交部併議未晚也臣等謹按張廣泗欺詐誤公自事後觀之罪狀非一即如張興攻取馬邦一節十月間賊勢初張攔截馬奈一帶糧路隘口馬良柱等於十月十五等日紛紛禀請增兵應援張廣泗猶以賊番並非侵犯營壘不過救援戎布為詞遍諭各鎮將僅將曾逹官兵令該鎮酌撥二三百名協濟維時莎羅奔雖肆跳梁猶遣頭人元丹至羅于朝軍營獻炮三位并搶去各處番民二十名又獻戰碉五座請漢兵駐劄以求就撫張廣泗令其獻出巴底巴旺土司叔姪印信及小金川澤旺之子方准投誠及十月許應虎已解的交之圍土司汪結帶領金川頭人如約獻出巴旺印信并小金川澤旺之子及所虜各處番人一百餘名懇切投誠張廣泗仍不允准雖曰番性叵測不輕受降意在慎重而其實則時露受降之意因使賊得藉納欵售奸益增防禦而三軍之志緣此懈弛不振及至臨時又不能隨機招撫所以馬邦有事之時尤受此病加以調劑乏術措置乖方以及於敗十一月二十九日賊兵大熾攻犯馬邦諸營馬良柱請撤戎布之兵前來應援永柱亦請撤戎布之兵以與張興合勢張廣泗俱斥為悖謬及張興屢經急迫請救張廣泗惟切責其庸懦無能逮後張興四面受圍極其危困張廣泗始令永柱撤兵千餘㑹合救援而自十二月初七至十三日軍中已絶糧七日士卒困憊不能應敵是張興之昏憒怯懦為賊所愚罪固難逭而張廣泗身為大帥罔知輕重緩急沾沾以攻圍戎布小寨為事而馬邦既無援兵又乏糧餉漠然不顧徒令懦將坐困其間大致敗衄咎實奚辭至已負慙自劾便應直吐實情乃陳奏之詞半皆欺隱專務自諱其短惟思委過於人居心尚可問乎是日上又命軍機大臣等傳諭張廣泗曰據奏駐劄馬邦之張興陳禮等喪師殞命張廣泗自請交部嚴加議處偏裨失律主將咎無可辭但果能全局取勝中間稍有挫衄尚在可原此際即交部議未免傳播遠近議論滋多於軍情殊有關係此摺交軍機處存記朕觀川省軍務自辦理瞻對以後大小將辨專意欺誑朦混草率了事竟成積習張廣泗到川半載有餘於賊地形勢凶番伎倆當已洞悉其進取機宜亦應熟籌勝算具有成竹從來軍旅之事為時愈久防禦愈難稍未周密即有踈虞即此番張興失事亦因相持日久所致昔人謂兵貴神速正以此也去冬不能進取尚可諉於兵少未足今張廣泗所請調兵鑄炮諸摺隨奏隨准抽撥調取增兵多至萬餘軍威不為不壯春間即應鼓勇克捷若遲至五六月間尚不能乘機奮迅刻期取勝將使士卒沮氣貽笑羣蠻當作何究竟耶可傳諭張廣泗令其深鑒慶復李質粹覆轍鼓勵所屬營辨令其力改向來積習迅奏膚功以慰朕西顧之念當此大兵雲集各路進勦頭緒繁多雖張廣泗才猷素著而獨力支持恐難肆應臂指之使亦所必資但派員前往又恐意見參差致相掣肘於事機無益可傳諭張廣泗若目下軍前員辨可以了此則已倘或尚待時日需人料理准其於各省司道等官內有平素深知可相親信者一面調赴軍營一面奏聞即如貴州巡撫孫紹武向曾隨伊於軍前辦事黔省雖屬苗疆而古州等處現在安帖金川軍務方殷需員孔亟如於軍事有濟即著張廣泗一面奏聞一面傳旨竟與川撫紀山對調亦可其武職總兵副將等員有知其可任軍務者悉聽張廣泗一面奏聞一面調赴軍前委用臣等謹按自古用人之道疑則勿用用則勿疑我皇上之於張廣泗推心置腹專意委任既悉其才復量其力如陜甘事煩恐難兼顧則令黃廷桂暫為管理挽輸糧餉籌畫頗勞則特遣尚書班第前往專司而惟軍旅之事一以委之而不分其權不從中制且慮乏臂指之使則肆應為難又令就所親信者先行調遣然後奏聞乃至巡撫司道副將文武大吏亦聽隨機請用若增兵添餉鑄用炮位無不朝奏而夕報可者聖主用人之專一至於如此忠義之士有不悅以忘死者乎是日張廣泗又奏言原調漢土兵丁數計三萬已倍賊衆祗緣賊徑岐出而險窄勢須分路進攻處處需兵防範必須增一萬名乃克有濟今應調陜西固原提標所屬官兵二千名即令該標中軍參將任舉星馳前往調派統領又調西寧鎮屬官兵一千名令大通協副將高雄統領又調河州鎮屬官兵一千名令候補參將王愷統領又調甘州提標官兵五百名肅州鎮屬官兵五百名凉州鎮屬官兵五百名俱令金塔協副將劉順統領又調延綏鎮屬官兵七百五十名寧夏鎮屬官兵七百五十名俱令潼關協副將鐵景祐統領應調雲南官兵二千名令鎮雄營參將龍有印統領又調貴州官兵一千名令清江協副將唐開中統領共計陜甘滇黔派調官兵一萬名臣已移咨各該督撫提臣照數檄調謹將辦理緣由繕摺恭奏上諭該部知之是日張廣泗又奏言川陜出師兵丁携帶軍裝鍋帳等項例係給與䭾馬載運由陜甘至川出口路途遙遠係二兵三馬川省在本地出口程站稍近係二兵一馬至於雲南征兵之例若在本省苗疆則雇用民夫如係出口亦有䭾載馬匹貴州征兵之例向來出師本省暨滇楚苗疆因皆係高山密箐不利䭾載是以概用長夫挑運不給馬匹今川省出師金川自打箭爐與維州關兩路出口則跬步皆山較之苗疆之險實為更甚且沿途並不産草馬多倒斃兵丁勢不得不自行背負未經遇敵力已先疲何能鋭戰臣今現已奏請續調陜甘雲貴之兵若拘泥成例給與馬匹出口誠為無益再四思維若自各標起程之日即令改雇民夫既恐滋擾又虞糜費若至川省出口地方再雇長夫不但急切難得且抵營多有脫逃勢難約束臣謹酌擬陜甘川滇征兵仍照各該省之例給與馬匹以資內地䭾運惟每兵百名准其隨帶本營餘丁三十名以備出口負運軍裝並各給以棍棒刀斧俾遇派兵出攻之時即可看守營壘如遇征兵缺額又可即以補充應每名酌給安家銀三兩自起程之日起日給米一升以資長途口食至黔省征兵向無給馬之例自應照例雇用民夫每兵百名除帶餘丁三十名外再給夫五十名以資軍裝擡運所需之夫令於內地沿邊雇募俟抵川出口之時將陜甘川滇之馬留於內地牧放以備旋師䭾載黔省所雇民夫以抵營之日停止俟旋師再為雇募所有軍裝即令各該餘丁背負於日給一升之外再加給銀三分俟旋師進口之日各餘丁仍止日給米一升以回抵各本營之日住支緣值軍務緊急一面辦理一面奏聞奏入上命軍機大臣㑹同該部速議旋經議覆允行惟張廣泗所奏黔兵每百名准給夫五十名之處查照定例每兵百名給夫四十名今酌減十名仍照舊例給與四十名先是上念張廣泗辦理金川軍務准其動支川省養廉俾用度充裕賞賚有資是日張廣泗具摺陳謝報聞丁巳紀山奏言征勦金川一切軍需費用浩繁經臣先後㑹疏題撥銀共一百七十萬兩內湖北江西廣東等省奉撥銀一百二十萬兩俱已協解到川布政司將解到銀兩支發外僅存銀一十二萬兩雖尚有續撥之湖南江西銀五十萬兩未到但司庫酌留封貯銀兩已經借支動用將來解撥還項連前僅可存銀二十二萬兩現在西南二路不時請撥而大兵凱旋遲早難定若不豫請寬裕撥發恐致臨時掣肘合無再請於鄰近省分撥銀一百萬兩解川備用奏入上命該部速議經部議以鄰近省分留協銀兩為數無多不敷協撥酌議將部庫存貯銀內撥給一百萬兩委員解赴四川巡撫衙門交納以備需用上從之二月甲子上諭內閣曰原任福建漳州鎮總兵哈攀龍著即馳驛前往金川軍營聽候總督張廣泗酌量委用川陜二省若有總兵缺出即令伊署理是日甘肅巡撫黃廷桂奏言准督臣張廣泗咨調延綏固原河州寧夏西寧甘肅凉州各提鎮官兵七千名務於三月望外齊抵軍營以便調遣進攻臣隨飛行陜甘各提鎮臣照依檄調兵數即於本標派撥一切摘撥䭾載馬匹支領賞借等項銀兩并口糧草束甘省照上年派勦瞻對陜省照上届派勦金川之例刻即料理檄令兩省布政司就近於道府庫貯銀兩不拘何項先行動支以速軍務至西寧河州甘肅凉州官兵赴川路徑准張廣泗札稱若由口外草地既恐各土司驚疑且慮金酋豫知防範臣即札知各提鎮臣轉諭統兵將領各於附近內地沿邊一帶捷徑直往松潘取路赴營限於三月望外齊抵軍營勿得稍有遲誤奏入報聞己巳上諭內閣曰原任按察使銜辰沅靖道王柔著帶原銜馳驛前往金川軍營聽總督張廣泗酌量委用遇有道缺即行題補甲戌上命尚書傅恆傳諭張廣泗曰原任辰沅靖道王柔以疾在告前赴行在接駕朕因其曾於苗疆辦理軍需降㫖令赴軍營聽候委用可傳諭張廣泗俟伊到日或令辦理糧餉或别有可任用之處酌量調遣伊所奏軍前事宜一摺著封交張廣泗如有可採擇閲看辦理前有旨諭張廣泗如有平素深知可相親信之人一面調遣赴營一面奏聞今王柔奏薦冶大雄劉䇿名二人皆張廣泗所素知者如果實在才具可用於該處軍務有濟即令調遣赴營以資差委乙亥四川提督武繩謨奏言上年十一月內接准督臣張廣泗咨令臣酌派官兵一千餘名十二月初七日復調官兵一千餘名赴營抽換臺兵本年正月初三日又另調兵一千名所有三次派調官兵臣於上年十二月至本年正月內已先後遣發前赴軍營去訖督臣又委員在省製造大炮臣現在督催并將藥彈火繩等項先行運往理合陳明奏入報聞是日紀山奏言督臣張廣泗奏請檄調陜甘滇黔四省官兵每兵百名隨帶餘丁三十名共一萬三千名臣思兵行糧隨若但添兵而不籌餉必至臨事周章查現在被傷漢兵撤回調養者不過數百名督臣已檄調官兵一千名赴營補額張興失利後又札調官兵一千名再加大炮一位即須炮夫四五十名新舊炮夫以及糧夫并各色匠役人等總計每日約須七萬餘人口糧臣已於南路派撥米六萬石西路派撥米五萬石俱限三月內出口再上年十一月間督臣委嘉定府通判黃廷銑等來省打造五六百斤重大炮二十位現已趕辦解送炮十四位今於正月初六日督臣又稱每碉一座需五六百斤重炮入五六斤重子排列三十位一齊施打方能傾倒前擬造炮數尚不敷用必得七八十位或一百位庶足備用除已鑄造四十位并現有六位大炮鐵斤外尚須趕造六十位約需毛鐵二十三萬餘斤煤炭三百四十餘萬斤㑹城鐵斤購覔無餘煤炭亦難猝辦現在設法料理但四省官兵三月盡即可到齊今需炮甚多所覔工料又遠恐一時難以如數造齊除嚴飭上緊趕辦運送軍營應用外事關軍需緊急謹一面辦理一面具奏奏入報聞是日卓鼐奏言打箭爐地方係各番相通要隘宜豫為固守奴才請於從前派備滿兵八百名內酌量帶領五百名前赴打箭爐駐守隘口此等滿兵遇有戰守之事可抵緑旗兵二三千名至四川滿城防守之兵尚足敷用不致單弱奏入上命尚書傅恆傳諭曰卓鼐且不必帶兵前往著將伊所管之兵立即豫備妥協俟張廣泗調取時伊再帶領前去此時亦不必行文知㑹張廣泗三月丙戌上諭內閣曰四川松潘鎮總兵宋宗璋自征勦金川以來未見實心效力伊現於李質粹案內有應行質訊之處著解任令張廣泗解送來京松潘鎮總兵員缺著哈攀龍署理是日張廣泗奏言上年張興失事之後臣飭令各路鎮將相度形勢凡進兵要隘之處皆嚴加踞守不得輕退尺寸仍宜乘隙就近攻擊惟將零星小營暫行歸并聨絡駐守以防賊人豕突兼可保護糧運令兵丁稍得休息俟三月內大兵齊集進攻一月以來各路皆固守無事惟據駐守黨壩之總兵宋宗璋先後禀報進攻木耳金岡賊碉於十二月二十四日將賊人大戰碉并西北耳碉俱已打成石堆賊番逃入土穴仍敢拒敵我兵奮擊賊番死者甚多現候添兵到日即便前進攻勦又據駐守卡撒之總兵許應虎副將高宗瑾禀報正月二十一日有莎羅奔用事頭人生噶爾結等帶領賊番千餘逼至營盤之下高宗瑾誘致生噶爾結一面擒拿一面鎗炮齊發擊死頭目一名賊番數十名始各奔竄夜間又圖攻劫營壘我兵於二月初二日分為三路前往抄擊殺賊十餘人賊始退入深溝遁去現在嚴加固守又據駐守丹噶之總兵馬良柱遊擊王世泰等先後禀報自張興失陷之後河東駐守曾達之參將郎建業遊擊潘文郁營盤皆失對岸犄角之勢賊人可以水陸並來侵犯江岸有一小碉名為噶固原派孫克宗土兵八千餘名在內踞守正月初二日賊番五六百人前來圍攻馬良柱等派撥官兵前往應援雖頗有斬獲而未能擊退賊番至初七日守碉土兵遂與賊講和開碉隨賊渡河徑去臣查參將郎建業與遊擊孟臣原帶領漢土兵七百名駐營曾達溝岸其山梁之上又有守備徐克猷帶兵三百餘名駐守兩相照應本無可虞乃該將辨等懦怯踈虞據報於正月初十日二更時分賊番四五百人潛來占奪郎建業所安卡倫七處攻擊郎建業營盤十一日馬良柱等發兵應援遊擊孟臣亦帶兵出戰皆不能擊退賊番而孟臣即於是日陳亡馬良柱等不思努力救援先於十一日晚令潘文郁將營盤撤赴丹噶又密飭徐克猷令於十二日晚撤至郎建業營盤令郎建業俟徐克猷到時㑹同撤赴丹噶合營固守乃郎建業見賊衆至二千餘人遂不俟徐克猷兵到先將營盤撤赴丹噶致徐克猷隔截於外幸該備熟悉路徑於十三日帶兵翻越雪山與賊且戰且行至二十日抵巴底地方始得保全臣查郎建業潘文郁駐營之曾達乃新撫番民克州九寨之門户克州九寨乃丹噶山糧運經由之要路今郎建業潘文郁二營既撤則克州門户大開九寨番民不過百餘家安能抗拒賊衆必致復被占奪如此則不特丹噶糧運必阻且恐孫克宗或生反覆矣馬良柱等所部漢土官兵共有五千餘衆臣又發兵千餘前往接應何懼於二千之賊番而移營匆遽如此隨於正月十四日飭諭馬良柱王世泰等令其督率官兵奮力退賊然後徐徐撤至克州九寨之後於納貝山一帶據險駐劄計所退約三十餘里而糧運無阻即孫克宗一帶亦保無虞以待大兵到日再圖進取不意馬良柱等於十五日得臣此檄如獲更生置賊不顧於十六日一夜率領五千餘兵盡撤至納貝山下之喇布碉寨內居住臣聞報嚴飭馬良柱始派撥漢土兵據守納貝山而自求退駐於孫克宗碉寨雖地方現在無虞而該鎮將等連次惶遽撤營以致軍裝炮位多有遺失其罪誠不可逭謹另參奏再查此月餘以來盤獲奸細及自賊脫回者共三百餘人臣逐加反覆詰訊僉稱金酋屬下番民咸謂如此獲罪天朝斷無再准投誠之理金川精壯賊番原不過七八千人自大兵進勦以來已去其半現在不過四千餘人日食不繼倘四五月間正當刈麥之時而官兵大至則死無噍類男女悲怨合並附陳奏入上命軍機大臣等傳諭張廣泗班第曰張廣泗奏報金川軍營現在駐守情形內稱副將高宗瑾誘莎羅奔頭人生噶爾結至營一面擒拏一面鎗炮齊發打死頭目一名賊番數十人高宗瑾能以計誘賊亦屬可嘉但生噶爾結為莎羅奔信用頭人或經就擒或已身死俱未奏明可詢問張廣泗令其再行詳悉具奏至孫克宗土兵踞守小碉與賊連和渡河遁去此乃土兵之常技蓋其素性反覆不過隨風轉移即使投順效力仍懷首鼠兩端原屬不可信用現在調集陜甘等處兵丁萬餘儘足以供攻勦之用此項土兵應令酌量情形既於軍營無益即行撤回值此農作之時正可使之耕種又據奏總兵馬良柱不思努力克敵怯懦無能將五千餘衆一日撤回以致軍裝炮位多有遺失其臨陳退縮之狀罪已顯著實無可逭張廣泗又一摺中亦奏伊老不任用若留軍中以功贖罪亦屬無益自當嚴劾以肅軍紀且伊原有應行質訊之處可令張廣泗即行據實糾參解京問擬總兵宋宗璋前在瞻對不能奮勇克敵惟事粉飾扶同欺隱及進勦金川以來雖據報小有攻克仍不能鼓勇前進而欺飾之故智猶昔令統一軍徒使兵惰而損威朕已降旨令伊解任來京其員缺用哈攀龍署理著張廣泗將宋宗璋一併解京以便質審瞻對之案總兵許應虎前在京召見朕看其人尚有勇敢之氣是以令於軍營效用今觀其從事戎行雖無大過亦絶少功績如許應虎無可任用即著回原任辦事至於金川軍營諸將大抵多係辦理瞻對之人不特庸懦欺䝉已成夙習且多瞻顧今另用任舉哈攀龍及高宗瑾唐開中等皆未經從征瞻對無所掣肘自能鼓勵勇往可令張廣泗等酌量情形如現在哈攀龍等力能平定金川則已若尚須統領之人朕思嶽鍾琪久官西蜀素為川省所服且夙嫻軍旅熟諳番情伊雖獲罪西陲亦緣凖噶爾夷情非所深悉若任以金川之事自屬人地相宜伊三世受國厚恩自必竭力報稱以蓋前愆著張廣泗㑹同班第商確如有應用嶽鍾琪之處即著伊二人傳㫖行文調至軍營以總兵銜委用又摺內所奏金川賊番精壯者不過七八千人兵傷疫死已去其半今所存四千餘人現在所資以為食者何物並詢問張廣泗令其留心查察奏聞再張興陷賊以後據奏人懷怯懼近又有遊擊孟臣陳亡不無失利之處此時軍旅方興偶一勝敗固不足憑惟以勦滅之日為定况以國家軍威滅此釜底遊魂正如摧枯拉朽耳張廣泗不可因此憤悶疑慮正宜不動聲色鎮靜安詳以奏折衝之績以副朕望臣等謹按金川用兵一隅皇上日理萬幾而於此事無刻不勞經畫謹密周詳尤留意人才務盡其用嶽鍾琪久經獲罪猶念其嫻軍旅而熟番情出之廢棄之餘委以總戎之任厥後身履賊庭大張威信雖其時經略得人功成不戰要不可謂非臂指之一助也是日張廣泗又奏言所調陜甘滇黔大兵三月內可以陸續到齊䝉恩賞九節大炮并臣在成都所造炮位亦可先期到營四月內正當塞外雪消之際彼時兵力已足攻具已備計賊現存不過四五千人我兵汰其傷病及無用土兵尚可三萬餘人以六擊一臣雖愚懦至極而天威所臨賊人斷不能支以理勢揆度夏秋之間定期竣事奏入報聞臣等謹按馬良柱倉猝移軍遺失炮位誠為有罪然其營中乏糧至煮鎧弩而食張廣泗則諱而不言也且自到營以來軍中勝負不常反覆多故而陳奏克捷之期始謂在於九十月間既又改為明年二三月今又云夏秋之間定期竣事數月之中屢易其說要是胸無定見藉以暫寬督責而非真有出竒制勝之䇿矣是日甘肅提督永常奏言正月十八日接准川陜總督臣張廣泗暫理陜甘總督事務臣黃廷桂咨調西寧鎮屬官兵一千名寧夏鎮屬官兵七百五十名甘州提標凉肅二鎮各五百名每兵百名准帶餘丁三十名所派官兵馬步各半並令取道沿邊直抵松潘臣立即飛咨西寧寧夏肅州凉州四鎮臣星速料理隨於臣標營內挑選精壯兵五百名馬步各半並餘丁一百五十名其鎗炮手弓箭手並矛鏜手以及隨帶炮位器械悉照督臣札開數目撥派帶往惟查從前出口赴川悉由草地䭾載炮位本用駝隻今次既由沿邊前赴松潘必由階州文縣一帶進發山路﨑嶇林木叢雜每多險峻窄徑駝隻實難行走恐炮位運送遲誤關係非輕臣再四思維甘凉肅提鎮三標現有拴喂預備換防哈密兵丁拉車騾各八十三頭目前尚無所用若得以騾易駝登山越嶺較為便易惟一騾抵一駝又恐力不勝重今以二駝折三騾計算䭾炮十位需駝三十隻折騾四十五頭已如數挑選臕壯交與領兵之員䭾炮前往並飛札凉肅二鎮畫一辦理至西寧寧夏二鎮雖無現騾亦經札知令其妥協辦理再查兵行迅速各辨兵製辦行裝帶往盤費不無拮据臣敬體皇上欽恤勞人至意照上年護送夷使進藏官兵借支之例減少其數分别借支照例扣除還項已於正月二十六日起程訖合行繕摺陳明奏入報聞平定金川方略卷五
