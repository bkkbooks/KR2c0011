body:
  text: 九月庚午嶽鍾琪奏言美諾係小金川地方去賊巢路逺雖賊衆不難次第剪除無如深溝高壘形勢便於拒守溝中又穵土穴藏身且於土孔中暗施鎗炮傷及官兵每攻一碉一卡大者官兵陳亡帶傷不下數百人小者亦不下百數十人現今出陳帶傷官兵每百名中竟有數十且有身帶四五傷者以有數之官兵攻無窮之碉卡且無攩牌以禦鎗石率多肉薄而前以致傷亡過多氣皆怯懦若不兼用竒兵止以正兵逐碉逐卡漸次撲滅勢難奏功臣查卡撒一帶現經經略訥親督率官兵奪取色底左右梁固不可輕棄然若令臣統領萬人駐劄卡撒節次進攻勒歪則尚有刮耳崖最險窄之隘口現係金酋盤踞奪取為難即使果得刮耳崖尚離勒歪百有餘里其間道路險阻豈得不費時日兼之賊碉數百逐一攻奪官兵傷損必多且不能阻遏逆酋逃遁之路伏查黨壩存貯軍糧甚多又與賊巢相近且係雜谷與金川接壤要區官兵固不可輕撤甲索係綽酋暗通金川要口若無重兵駐劄綽酋與賊潛通輸糧助兵在所不免以臣愚見與其以一萬之兵緩至二三年之後曠日持久師老力疲何若以三萬五千之衆儘一年之內期於撲滅之為愈耶且用兵一萬護運軍糧防守隘口又需兵數千統計三年之費較之一年之內用兵三萬五千名者猶為倍多豈若斯之糧餉不致糜費士卒不致疲勞軍務可以早竣也又黨壩鄰近賊巢有瀘河一道水路可通且無波濤之險若用兵一萬水陸並進可以直抵勒歪賊巢奪其腹心之地則四面賊黨不戰自潰矣又查甲索與勒歪止一河之隔係逆酋逃遁之徑若用兵一萬由甲索進攻先奪馬牙岡乃當兩溝直抵河邊會合黨壩之兵並力齊攻則勒歪可破逆酋可擒矣至於刮耳崖乃莎羅奔之姪郎卡所居以死拒守應於卡撒留兵八千以備堵禦俟奪獲勒歪賊巢腹心既破四肢自廢我以得勝之兵從後夾攻以堵禦之兵從前進擊使刮耳崖前後受敵郎卡亦不難擒勦其餘兵七千名應留黨壩二千防護糧運正地一千防護打箭爐隘口而以四千護運各路軍糧統需兵三萬五千方可足用臣前奏卡裏山固噶溝二處路不甚險可出竒兵直搗勒歪但自八月望後天降大雪山嶺之上雪深數尺將來積雪更深行路更難莫若專由黨壩甲索兩路直進庶為安便然臣之所以必欲專由黨壩甲索兩路進兵者蓋緣勦賊務擒其首甲索一路係逆酋通綽斯甲瞻對必由之徑若大兵從此進攻則逆酋不能逃遁又恐逆酋由瀘河用皮船溯流而上逃奔綽斯甲有黨壩之師水陸並進遏其去路不能逺揚則逆酋不過逃匿馬邦刮耳崖一帶地方搜擒猶易且鄰近之革什咱木坪巴底巴旺打箭爐皆係恭順土司必不敢輕為容隱倘如此布置臣年雖衰老尚可一力仔肩務竭駑駘以圖報效若由卡撒昔嶺進攻一䇿乃督臣張廣泗誤聽漢姦王秋之言目前雖得色底左右梁半係馬良柱買國良所取故地徒費周章斷不能刻日奏績若果臣言可採請將無用之土兵暨帶傷衰老之漢兵盡數撤回以省糜費選派精壯漢土官兵三萬五千名以資進勦專責臣辦理一年之內可以成功奏入上命軍機大臣等速議議曰用兵之道必先審定形勢使全局在胸然後竒正並施首尾應接斯用力少而成功速若惟事攻堅收效尺寸曠日持久以冀漸抵賊巢必致老師糜餉今逆酋恃險負固蟻聚蜂屯自大兵進勦以來幾及二載尚未奏捷雖由卡撒昔嶺進攻亦已奪取色底左右山梁其實去賊窟尚逺又以冬令不能進攻期以來年今提督嶽鍾琪請用兵三萬五千以一萬由黨壩水陸並進直抵勒歪搗其心腹以一萬由甲索進攻先奪馬牙岡乃當兩溝直抵河邊會合黨壩之兵併力攻破勒歪以擒逆酋仍於卡撒留兵八千以為堵禦俟奪獲勒歪以得勝之兵從後夾攻以堵禦之兵從前進擊使刮耳崖前後受敵郎卡可以擒勦復於黨壩留兵二千防護糧運正地留兵一千防範爐地餘兵四千護運各路軍糧並於逆酋逃遁之徑預籌堵截以便搜擒嶽鍾琪注意巢穴欲先獲渠魁使脅從解散餘地悉平似有成竹在胸是以一力肩任諒亦不無所見但從前張廣泗等分路進兵亦經屢次審度然後專意昔嶺以重兵攻擊雖據嶽鍾琪以張廣泗為誤聽王秋之言不過奪取故地徒費周章而嶽鍾琪現駐黨壩亦未著有功績惟以兵單為詞且伊此奏內尚有馬奈應行駐兵亦未籌及若果以三萬五千之衆由黨壩直入破巢獲醜不惟取徑之捷師稱神速亦無煩增餉添兵實為勝算惟是黨壩一路是否可以直逹不至又如昔嶺之難攻瀘河一道是否可以徑過先據上流俾賊番不能兩岸阻截并甲索進攻馬牙岡等處是否易於奪據可以會合河邊黨壩之師逆酋不致逃遁及卡撒留兵八千足敷防禦更能夾攻刮耳崖以擒郎卡一年之內果否可以成功其中機要尚須細審形勢籌畫周詳方可決䇿應將嶽鍾琪所奏交與傅爾丹班第令將黨壩甲索兩路及卡撤馬奈等處一一詳度形勢如何進兵如何運餉並需用軍械舟楫等事逐一熟籌悉心定議速行具奏候旨遵行上從之是日訥親張廣泗會奏言巴朗一寨為賊巢之要隘上有小碉即在阿利山腳下乃巴朗之保障賊人守禦甚嚴官兵一時未能克取臣等籌酌阿利山左首尚有賊碉三座并各石卡若能先取上靣之碉卡從上壓下小碉自易攻克隨於八月二十九日經總兵莽阿納董芳會同內大臣班第護軍統領薩音圖率領侍衛及副將劉順參將楊朝棟等帶領成都滿兵及漢土官兵攻擊阿利山梁左首碉卡臣等亦親往督率是日官兵奮勇直撲碉前斬殺賊番二十四人奪獲賊碉一座至九月初一日復用大炮攻擊山梁左首第二戰碉擊死賊番六十餘人割取首級六顆中傷賊人無數奪獲器械火藥甚多當將大碉一座攻克又克平房二十四間石卡四處初三日又克大石卡一座平碉房七間尚有石碉一座石卡二處如能克取則山腳下小碉不能孤立矣無如賊人守禦甚嚴一時難以驟克臣等現在籌酌辦理俟有就緒再當馳奏至於各路尚未報有攻克之處其馬奈一路前經外委馬如麟攻克賊碉六十餘處不意八月二十四日夜有賊二三十人假扮革什咱土兵混入營內值漢土兵盡皆睡熟以致守備王良弼帶傷并亡漢兵五名所得營卡仍被奪回并失去半截廢炮一位現在飭查因何失事確情另行具奏又據參將永柱報稱包登等處有畏罪投順之番民五十名俱係實心來降隨向糧務移取銀二百兩米五石賞給分别安插又據提督嶽鍾琪呈報陡物黨噶之山坡下有金川蠻民及從木耳金岡逃出番子共二十名口俱傾心投誠隨每户賞銀五十兩大銀牌各一面布各二匹所有半月以來軍前攻勦并番民投順各情形臣等恭摺奏聞奏入上命軍機大臣等傳諭訥親張廣泗傅爾丹班第嶽鍾琪曰據訥親張廣泗奏報軍前情形朕披閲之下見其失當之處頗多如馬奈一路有賊二三十人假裝革什咱之土兵值漢土官兵睡熟以致殺傷官兵搶去炮位所得營卡盡失夫立營警夜嚴更鼓慎巡防乃軍法所最要今有賊入營兵將皆酣眠不覺且賊不過二三十人乃竟至傷兵失械營卡不守則其平日毫無紀律視同兒戲可知金川自用兵以來大約失之嚴迫者少失之懈弛者多總由軍紀不明以致無一合宜殊非朕本意所及料也又投順番民參將永柱即賞銀二百兩米五石嶽鍾琪所報投順番民每户賞銀五十兩銀牌一面布二匹此等番民從賊日久得之即應正法今因其投誠待以不死足矣何庸加以重賞即云借此招徠以孤其勢不知彼中人民頗衆安得人人而賞之且金川番民若果能縛獻莎羅奔即加優賞亦不為過乃以泛泛投順之人用賞如此是以利購也即使盡得其衆僅餘一莎羅奔而戮之究竟金川之地仍不過安插此等番民是始而費我兵力中而利以誘之終而投順之番仍得利而居其舊土豈有以數千百萬之帑項為此無益之舉耶再軍營進攻年餘所得碉寨原不為多乃嶽鍾琪又稱每攻一碉大者官兵帶傷不下數百小者百數十名現今帶傷官兵每百名中竟有數十且有身帶四五傷不等者兵丁臨陳帶傷自係奮勇向前之人既已受傷又至四五處即應體恤調治或遣之回營另調補額豈有受傷之兵悉留軍前並不另調精壯之兵遷就茍安一無籌畫至此凡此種種失當之處皆行軍所宜痛戒訥親張廣泗將次來京可傳諭傅爾丹班第嶽鍾琪等令其留心以此為鑒申明紀律詳酌機宜善為調度以副委任是日訥親以嶽鍾琪所稱添兵三萬五千願於一年之內破賊情由具摺陳奏上命軍機大臣等傳諭曰據奏嶽鍾琪自願以三萬五千人由黨壩一路進攻再由瀘河水陸並進儘一年之力勒歪可破逆首可擒計此時訥親張廣泗尚未起程著會同傅爾丹班第嶽鍾琪等將各情形逐一詳悉定議具奏至嶽鍾琪所稱需用三萬五千人即可奏功現今軍前有兵四萬餘衆何以曠日持久尚未克捷屢稱兵力單弱不敷調遣此中情節著一併據實奏聞再訥親奏稱黨壩卡撒兩處現俱進兵伊與嶽鍾琪未暇覿面俟今冬不能攻勦之時再往黨壩面商訥親既經召還黨壩情形傅爾丹亦須諳悉正可乘隆冬雨雪不能進攻之時前往面會嶽鍾琪詳議一切事宜較之文移往來更為妥便可一并傳諭傅爾丹知之是日訥親奏言臣恭閲硃批嶽鍾琪二摺查得黨壩一路駐兵一萬有餘土兵居其大半嶽鍾琪所稱土兵無用漢兵不敷之處俱屬實情至稱進攻賊巢之路卡撒不如黨壩之易今棄易就險有乖兵法臣思黨壩為進攻勒歪之要路卡撒為進攻刮耳崖之要路刮耳崖既破固應進兵勒歪即勒歪既破亦仍應進攻刮耳崖兩路俱屬賊酋之巢穴總須彼此夾攻未便因卡撒一路地險碉多遂置而不問也又嶽鍾琪添調楚兵之請無非為兵力不敷起見但楚省程途遙逺調兵又多按程計日約須四五月之久已屆寒冬不能進勦况以官兵易土兵所給之糧必須純用本色需糧尤多以難運之糧供冬春坐守之兵殊為非計且嶽鍾琪至軍月餘量度兵單無用不敷進勦何以並不報知於臣及臣督促進兵至於再四始以增調為詞誠如聖諭所云聊為文過之計耳所請召募新兵減撤土兵之處已會商督臣咨覆準行矣至嶽鍾琪所奏土舍良爾吉應行正法臣查良爾吉之罪原應伏誅但督臣既已寬之於前今投順隨征已及年餘此時忽加誅戮反出無名是以未經辦理奏入上命軍機大臣等傳諭曰覽諸摺所奏辦理不能愜當之處不一而足即如良爾吉本一姦匪土舍且為逆酋姻黨王秋亦係漢姦在尋常尚應治罪况為良爾吉親信黨與耶經略至營既知張廣泗墮其術中實與慶復誤信汪結無異彼時即應早為剪除及該土舍於緊要處所全不用命該督有意徇庇經略亦應申明軍律按法加誅乃因該督攻圍太近情有可原一語遂至失刑至逆酋求降之時該土舍泄漏軍情領兵大臣既所親聞罪狀昭著如此尚稱暗傳消息無迹可據誅戮反出無名是何語耶王秋托病告歸美諾張廣泗始終回護經略何以亦聽其逺揚倘致兔脫則將來貽害更大此旨一到著將訥親奏摺與張廣泗看令其明白回奏即令張廣泗親提良爾吉王秋二人隨同爾等牢固解至京師明正其罪自入秋以來即屢有欲召卿回京之諭卿亦自請來京而摺中尚稱俟今冬不能進攻之時再往黨壩與該提面商斯言果出中心之誠然耶抑何前後矛盾若此殊所不解可一併傳諭知之臣等謹按良爾吉王秋朋比作姦為賊間諜法在必誅訥親寧不知之特以經略無方威聲頓挫其氣焰不足以懾服張廣泗則反為所牽制是以當斷不斷耳皇上洞矚隱微萬里之外有如目擊訥親於權衡輕重之間茫無措置轉欲養姦貽患豈非自取罪戾乎癸酉上命軍機大臣等傳諭傅爾丹嶽鍾琪曰川省自瞻對用兵而後繼以金川之役慶復疏縱於前張廣泗怠弛於後曠日持久師老無功朕特起爾等於廢棄之中委以軍機重任今訥親張廣泗俱已召取回京軍中事務一聽汝二人辦理事權歸一當合兩人為一人合兩心為一心汝二人自思曩受皇考異數殊恩歷膺重寄其後干犯重辟者何事即釋罪家居而敗辱之名終身不能湔洗今棄瑕録用豫以自新之路當如何感激奮勉如何竭力報稱如果能克捷速奏蕩平豈但收之桑榆前恥可雪皇考厚恩向所未能報效者亦足仰酬萬一顯爵厚賞朕何吝焉是惟汝二人之福如其彼此各存意見不能鼓舞軍心以致公事不能就緒不獨軍法難逭將併前罪一體追問非慶復張廣泗等可比蓋伊等本無罪愆但以辦理不善不稱任使尚當繩以軍律不容假貸何况汝二人罪棄之餘若更不能奏績其罪更當何如汝二人當日同獲重罪今又同在一方勝則同其功負則同其咎勿稍有參差勿互相推委勿因循而怠事勿粉飾以邀功勿口為大言而防範不密勿急於督責而别滋事端務期協力和衷同心籌畫迅奏膚功以稱委任乙亥上命軍機大臣等傳諭訥親班第張廣泗傅爾丹嶽鍾琪曰金川用兵以來將領參劾者接踵而題補無人殊失鼓勵戎行之道前曾傳諭訥親張廣泗等而伊等仍未辦理因命軍機大臣等查明情節據今年五月張廣泗原奏川陜副將以至千總遇有缺出即於此次立功人員內題補特傳諭該部議準並令同訥親揀選至八月初訥親奏到則稱將辨獲過者多立功者少是以尚未揀選題補夫軍行紀律全在賞罰得當鼓舞人心今將士有罰無賞自必志氣隳頺何由使之感激奮勉踴躍用命是以前批訥親摺奏有此畨辦理軍務似覺過嚴之諭正謂張廣泗等委過於下偏裨動輒得咎實為過刻而非軍律太嚴之謂也若以馭軍而論則此番正失之於寬豈有刁斗森嚴而如馬奈軍營賊人夤夜潛入將卒酣寢漫無知覺之理又豈有隊伍整齊衝堅犯陳而如訥親所奏麾之不前侍衛等從後用刀背驅迫之理觀此則將辨之怠玩士卒之疲懦直如兒戲何怪其久無成績屢有失事也至謂將辨立功者少無可揀選此語亦謬同一戴罪圖功其中豈無一二鼓勇先登之士就其臨陳奮往即可定為優等藉以激勵衆心賞一人而得千百人之力其機端在於此不待建立殊勳方可奬拔也訥親等從前辦理未妥可速傳諭班第傅爾丹嶽鍾琪當以此為戒務須從公賞拔為戎行作氣使出力者知所勸勉並不得誤會此番辦理過嚴之旨一意從寬則軍律益致懈弛失之更逺此於軍務大有關係著即傳諭知之丁丑上諭內閣曰金川用兵一事兩易寒暑尚無成績賊酋僻處窮山本屬么魔小醜但即其命名觀之莎羅奔者番語為諸酋之長是其意雖未敢顯稱名號而夜郎自大抗拒天朝并吞番衆蓄志已非一日前春侵擾霍耳章谷毛牛等處切近爐地紀山倉猝發兵逆酋雖歸巢竄伏而未經懲創勢復鴟張因命興師致討總督慶復辦理瞻對一役草率了事所奏班滚燒斃之處朕洞悉其疏謬當為批示豈可復委以軍務因思張廣泗從前經理苗疆熟於軍旅伊又先經奏請從戎是以調為總統初到軍營亦有急公任事之意但以二萬餘人派定十路進攻勢分力薄即已非計又奏稱冬月可以克捷屆期罔效則易為次年春夏再易為次年秋冬逮至副將張興陳亡失機難掩則又稱兵力單少朕復允調滇黔陜甘徑卒萬人意謂一舉而膚功可奏惟善後事宜所關甚重因命大學士訥親前往經略詎料張廣泗迄無成功又因訥親至彼轉懷觀望即先是凡所陳奏亦悉浮遊閃爍於張興馬良柱之事動輒委過於下朕已微窺其意及訥親奏至與朕所見相符又稱其偏徇黔省將辨高宗瑾袒庇失律千把信用賊酋姻黨良爾吉漢姦王秋軍中消息賊輒先得一聞訥親奉朕旨有按法當誅良爾吉之言張廣泗即代剖甚力後於昔嶺賊番乞降之時在軍大臣曾聞良爾吉有怨望實情口稱不知己之下落焉能顧汝而王秋亦復托病避歸美諾則是張廣泗始終回護情節顯然且密露軍機於賊黨矣張廣泗從前奏稱慶復誤信土目汪結墮其術中而伊之任用良爾吉王秋如出一轍何以明知而故蹈之耶且伊於二人若不過用人之誤猶為可恕至以軍情相告骫法而曲庇之其居心如此又安望有犁庭掃穴之期耶至訥親素未涖師摧鋒陷陳之事實非所長祇以張廣泗調集大兵布置經年當有成算計經略抵營之日正當告捷之期便可籌辦善後事宜自屬訥親所優為耳初不料訥親至軍於彼處情形既未諳悉將吏人等方且聳聽經略之指揮而伊並無竒謀異䇿以竦動衆心且身圖安逸並未親臨行陳士氣因以懈弛不思廷臣中平日受恩深重者孰如訥親其應感激圖報者孰如訥親雖朕因伊體素弱屢經降旨令隨時將息此在朕體恤之道則然然以滿洲大臣當此戎馬倥偬之際孰不思同仇共憤剪此朝食而訥親乃因此旨輒安坐帳中不親臨陳朕猶待之數月及見所奏竟稱兵士向碉放鎗伊自帳中望見火光是從未奮勇督師矣於理可乎即謂大臣舉動有關國體當為意外之虞固不可親冒矢石獨不可臨陳指揮使士心踴躍乎况意外之虞亦屬未然之事一何示怯至此及朕嚴加飭諭始前往督戰即已奪碉據險設早能如是其克捷又豈僅此乎且自古豈有開關延敵坐獲全勝之理可見前此實由伊等頓兵不進不能勇往出力而非堅碉之必不可克也訥親既曠日持久了無成績朕不得已欲召之回京又恐於命往顔面有關屢次傳諭詢問且寬其期以待捷音誠使得朕此旨而奮不顧身則自閏七月以至於今尚可有所勦洗以蓋前愆也且獨不思將在外君命有所不受今命伊前往者何意所辦者何事回京將何以報命而乃一聞召入之旨如獲更生並不請命留駐以待竣事惟以入覲得以將實在情形陳奏明歲再往軍營為辭不知軍營有何必須面奏之情形又有何事為朕所未悉僕僕往來有是政體乎大臣躬膺重寄豈宜若是乎滿洲大臣身當軍旅又豈曾有是事乎至傅爾丹班第等同在軍中自列名請安而外軍中事宜從無一字奏及因降旨詢問而訥親即以傅爾丹等覆奏之詞敘入伊摺內披閲之下不知其孰為傅爾丹等之言孰為訥親之言朕因思從前西北兩路用兵大臣等習氣惟以摺奏相傾軋訥親親見其事以此為戒故不令傅爾丹等紛紛陳奏復降旨詢問而訥親並未覆奏傅爾丹等亦至今默無一語豈訥親竟未向伊等傳諭耶夫不使衆人之鼓舌搖唇可也而集思廣益理所宜然今在已既無竒謀異䇿可以服衆而同事之人又不使之陳一謀建一議此何心也若恐他人揭其所短制之使不入告則伊在軍有何事畏人攻訐而必不使人陳奏乎况軍務非他事可比勝則雖欲斥其短而不能不勝則人人指摘欲掩之亦不得也且廷臣中孰有能於朕前公行萋菲者乎自朕臨御至今又曾有受人搖惑者乎凡在大臣等皆不可存此心而訥親尤為不可若謂朕屢次飭諭或由軍機大臣中有與訥親不相能者覬覦而傾陷之於朕前為浸潤之譖則是伊等能排擠訥親安知將來又無人排擠伊等乎即訥親自思數年以來曾有為訥親所排擠而朕不能覺察者乎且朕於訥親到軍兩月之久見其漫無建立始降旨督飭而前後陳奏自相矛盾之處不可枚舉在訥親平日豈非大能辦事之大臣朕亦初不以張廣泗之老師糜餉移其責於訥親而訥親以第一受恩之人誠不料其舛謬若此今若按法以繩人將謂訥親平時宣力如此尚不能免何以示勸若委曲含容人又將謂前此慶復之草率朦混今此張廣泗之稽遲乖謬朕則知之而於訥親則不知何以示懲二者朕必居一於此朕誠不能辭過亦實為抱慙今觀金川窮寇以國家全盛之力何患不能成功今年不捷不妨待之來年惟是大臣如訥親其受恩非他人比乃此次奉命經略諸事錯誤一至於此殊出朕意外朕實難以措置是以特召莊親王來保史貽直阿克敦舒赫德及軍機大臣等面降此旨著訥親張廣泗明白回奏己卯上諭內閣曰金川用兵一事前因張廣泗布置經年應有成算是以命大學士訥親前往經略籌辦善後事宜不意訥親至彼張廣泗既漫無成功諸事推委而訥親復不能躬歷行陳惟圖安逸經朕督飭究不能大有克捷即摺奏諸事亦前後矛盾於情形並不明晰總不似伊向日辦事之勤敏精詳實出朕意料之外若非伊福薄難勝斯任何至於此朕自御極以來第一受恩者無過訥親其次莫如傅恆今訥親既曠日持久有忝重寄朕實為之抱慙則所為奮身致力者將惟傅恆是屬傅恆年方盛壯且係勳舊世臣義同休戚際此戎馬未息之時惟出入禁闥不及援枹鼓勇諒亦心所不安况軍旅之事乃國家所不能無滿洲大臣必歷練有素斯緩急足備任使傅恆著署理川陜總督即前往軍營一切機宜悉心調度會同班第傅爾丹嶽鍾琪等妥協辦理務期犁庭掃穴迅奏膚功以副委任臣等謹按金川用兵已幾二載皇上日理萬幾多方籌畫凡為臣子仰承宵旰之焦勞莫不劘心切志思欲靖妖氛而紓宸慮惟大學士傅恆懿戚元勳受恩優渥宜其造膝密勿慷慨請行皇上俯允所請命以督師之任一時聞者莫不歡欣踴躍謂大功旦暮可就蓋以乾綱獨斷賞罰無私違命者伏辜懷忠者奮厲加以廟算如神風雲指顧芻糧山積徑旅雲屯而大學士傅恆素秉忠純感激奮發鼓其朝鋭之勇一往無前固不俟交鋒接刃先已奪其氣矣厥後成功迅速果如夙期我皇上始以文王之一怒耆定武功既則虞帝之兩階誕敷文德干戈自兹而永戢邊境從此而敉寧伏讀聖諭誠為克敵遏劉之一大機會也是日上又諭內閣曰金川逆酋不法雖出師征勦因無滿兵尚未奏凱若不早為籌畫不但兵丁久駐塞外甚屬勞苦亦且虛糜國帑朕思我朝滿兵素稱勇敢身臨行陳惟有捐軀效命奮勇先登從無退縮若選派滿兵數千前往必能速奏膚功現今雖於八旗前鋒護軍內挑兵一千名操演雲梯但為數尚少著再擇漢仗好者一千名合為二千之數從前已降旨令東三省各選驍勇兵一千名以備調用雲梯兵丁應如何料理起程東三省兵如何量其道路逺近令分起於何時自彼處起程明歲幾月抵京作何料理令赴軍營之處著軍機大臣會同督理操演雲梯大臣莊親王恂郡王阿克敦豐安詳悉妥議具奏其京城兵丁即著派出之王大臣等會同前鋒統領護軍統領等公同挑選旋經莊親王允祿等議曰從前派往北路滿兵起程時乘騎馬匹俱係官為辦理此次金川軍營道路山多路窄非北路曠野可比若撥給馬匹則經過地方俱係內地馬匹難於牧放且路途遙逺亦不能速抵軍營臣等酌議自京至西安計程二千六百餘里分為八站每站預備馬八百匹車三百輛自西安至軍營沿途山路有不能行車之處交與該督撫等按照自京至西安分設驛站數目酌量道路險易情形應行安設幾站之處詳加籌畫如遇不可行車之處核照車三百輛之數或預備馬匹或預備騾頭總期不致貽誤倘驛馬不能敷用即於各該省緑旗馬匹內通融撥用如仍不敷即行雇覓騾頭等畜應用馬匹倘有倒斃即行動項買補應需車輛俱令雇覓應用現在操演雲梯兵丁先令三百名起程其餘京城及東三省共兵四千七百名每起酌定三百名共為十六起每隔五日一次起程京兵自十一月初五日始先行起程盛京兵令於本年十一月內船厰兵令於十二月十五日黑龍江兵令於十二月內陸續抵京即備行裝自十二月初五日為始隨京兵後次第起程派往官員俱分别等次賞給銀兩東三省兵丁沿途俱給口糧再查操演雲梯兵丁一千名已屬敷用其添派一千名不必再行操演雲梯令該管官操演鎗箭熟習步伐仍令大臣時加查察上從之庚辰上命軍機大臣等傳諭班第傅爾丹嶽鍾琪曰朕前諭軍營事務令傅爾丹班第嶽鍾琪會商妥辦日來不知該處情形若何雖天寒多雪開霽之時尚可用力曾否有奮勇前進攻克之處今朕已降旨命傅恆前往所有現在應辦攻勦事宜爾等務須乘機度勢可進則進毋致後時從前張廣泗聞有訥親經略之命輒心懷觀望諸事推委軍營大臣等皆不免此習今當以此為戒不得仍前因循怠玩坐待傅恆之至轉致稽遲有誤機會現在各路進攻如有可以克獲情形著即具奏至營中堪用之兵實數若干傷病回營者缺額曾否募補京中所運沖天炮位於何時送到用之可能應手一並詳悉奏聞是日上諭內閣曰張廣泗自受任金川以來措置乖方陳奏閃爍賞罰不當喜怒任情委過偏裨以致人人解體又復觀望推委老師坐困糜餉不資且信用賊黨良爾吉王秋泄露機密曲法庇護玩兵養冦貽誤軍機法所不宥著革職拿交刑部治罪令侍衛富成押解來京訥親身為大學士膺此經略重任前駐軍營漫無勝算且身圖安逸並不親臨督陳鼓勵衆心轉以建碉株守為長策及傳諭欲召取回京伊並不計軍情緊要非克捷無以報命而以面奏情形為辭亟思回京朕以國體攸關寬期以待伊復無敵愾之志惟欲遷延時日以俟歸期至陳奏之事矛盾舛錯不可枚舉與伊尋常之辦事精詳急公黽勉竟似出於兩人夫大臣誼均休戚平時之眷待優隆正欲其緩急足恃能勝艱巨之任為國分憂耳若僅以任職勤敏為能則朕假之事權憑藉威柄茍非庸劣皆可優為即以操守而論伊係勳封世祿且數年以來朕時加賞賚非他人可比縱餽遺賄賂豈足以動其心是苞苴不入亦不得謂之潔清惟於重大緊要之關鍵方足以見報稱之實心今訥親乃至於此伊即不自顧惜獨不為朕用人顔面計乎從前年羮堯隆科多等在皇考時恣肆妄行事發之時皆即按法治罪朕自臨御以來以恩禮馭下然即大學士鄂爾泰張廷玉亦未嘗不時加戒飭使不敢縱正所以保全大臣至訥親之受朕殊恩廷臣無出其右乃中外所共知者十三年以來所以教訓成全幸免隕越者以其尚能承受朕恩耳今伊福薄災生於此等緊要關鍵處乖張錯謬一至此極朕反覆思之實無以自解論其負恩之罪理應拿交刑部問擬但觀其退縮偷安之意即就獄亦非所深恥然在朕十餘年加恩眷舊終不忍令其拘繫囹圄訥親著革職赴北路軍營自備鞍馬效力贖罪著派侍衛鄂實德山齎朕此旨於途次傳諭奉到諭旨之處德山即押訥親前往軍營所有前奏尚有面陳情形即著伊繕摺交與富成齎奏呈覽其經略印信交鄂實馳驛齎赴金川軍營候協辦大學士暫管川陜總督傅恆到日接受即授為經略統領一切軍務平定金川方略卷十三
