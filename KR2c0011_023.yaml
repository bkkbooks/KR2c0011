body:
  text: 正月丙子經略大學士傅恆奏言臣自正月初二三日攻賊碉卡之後審悉從前攻碉之誤決意俟大兵續到但足敷用即為直搗中堅之計現在按兵不動示以不測今聞賊酋因良爾吉被誅已失內應又知各土司俱畏服歸順尤為奪魄兼之我兵逐漸加增番衆糧食將盡實為震恐屢屢出卡乞降隨據賊酋於十二日投遞番字稟帖具訴乞降之意臣令將辨傳諭如果實心投順莎羅奔郎卡二人必須親自來營尚可待以不死十五日該酋又遣頭人來營并將搶去緑旗兵三名送還臣面加詢問據稱莎羅奔云向來實係無知犯法因與鄰封仇隙得罪天朝後來大兵進𠞰屢次乞降投誠之人多被殺戮土司雖欲出降實係畏死不敢親身到營今大兵又復增加統兵大人是天朝第一大人百姓驚惶又且日食不繼倘大人果肯貸我一死自應事事如命臣察其言詞細審動靜似係實情因面諭之曰莎羅奔郎卡二人抗拒天兵罪在不赦其從前乞降不過以獻出鎗炮送出搶虜之人希冀緩兵全非實心投順今現在大兵陸續到齊自必搗爾巢穴滅爾族姓殱爾渠魁但我聖主如天好生無不遍覆爾等既稱百姓日食不繼我兵不須攻擊但多駐一兩月百姓皆當餓死我心亦所不忍如果莎羅奔郎卡二人親縛來營乞命我當奏請待以不死此非寬莎羅奔郎卡之罪實為爾等百姓故耳如無真實投順之心但以出降恐被殺戮為詞則不必更來懇請我天朝大臣統領全師欲誅莎羅奔郎卡其勢甚易豈有誑誘無知番酋至營殺戮之理據伊頭人稟稱大人鈞諭當轉告該酋倘若仍不從順百姓亦必不從當共來歸順臣因諭令暫去征討金酋原因莎羅奔郎卡二人恃其險逺抗拒王師不得不加誅戮該酋如果開關納款面縛乞命受降之後統兵直抵巢穴剪除醜類亦有何難但番性愚頑惟示以威信始可傾心讋服日久可保無虞若一意誅鋤則其心轉相固結必致死守不服相距逾時亦難保無酋首逺揚之事似應準其投誠仍抵賊窟赦其民人將莎羅奔郎卡帶入內地還朝獻俘則天朝討罪之義既伸皇上好生之仁益普恩威並著可以永靖蠻氛現在各土司聞臣傳諭金酋之語甚為恱服然此亦不過因其懇乞且大兵未至暫與講論其實尚未可以遽信臣度兵數一足敷用即統率前進可以直抵刮耳崖莎羅奔郎卡縱或逺揚亦可安輯餘番班師振旅奏入上命軍機大臣等傳諭曰據經略大學士忠勇公傅恆奏報賊酋連日屢遣人來營乞降經略諭令莎羅奔郎卡親至待以不死請帶入內地還朝獻俘朕思賊酋既窮蹙歸命經略大學士又許以不死若帶至內地獻俘闕下勢不得不懸首藁街非所以示威信也天朝舉動懾服四夷全在光明正大如諸葛之於孟獲使之弭首帖耳革面革心傳之苗裔永無攜二若既云納款又復縶之檻車置諸極典將使番衆寒心後雖有令無足徵信經略大學士目下倘已將該酋擒縛就途應於成都省會或所至之處宣朕諭旨施恩釋放派遣辨兵押送回巢曉諭羣番令知覆載深仁怙冒無外則恩威兼至信義交孚垂之史册洵為盛事如尚在往返請命未有定局經略大學士即遵前旨星馳還朝交與總督策楞聽其妥辦亦無異經略大學士親自經理至所云乘其投誠仍抵賊窟斷可不必賊首既傾心面縛又何俟跋履險阻深入不毛勞士馬而費時日增朕懸注耶封公諭旨原因經略大學士宣力超越等倫示奬勵之茂恩循酬庸之令典自屬賢臣分所應得今經略大學士奏稱晝夜悚惶舉止失措並將原旨繳還此亦非是朕奉聖母恩命經略大學士豈可徑自繳還在經略大學士以奉到此旨時莎羅奔郎卡未經擒獲未為成功是以固辭耳朕初意亦謂乞降之説賊酋未必果能回心向化稽首軍門今觀所奏則其窮困哀籲出自真情受降班師伸國威而彰大信讋蠻服而靖邊氛成績顯著孰過於此朕已明降諭旨並將來摺發抄綸綍所頒風行海內經略大學士素明大義豈得再辭奉到此旨定當早已起程將來贊襄左右數十年調和燮理為國宣猷斯為善承恩澤之大臣也經略大學士尚其勉旃戊寅軍機大臣等奏言據陳宏謀奏稱班師之後滿兵六千人又以西安滿漢官兵回營人數甚衆若皆取路於棧道分起按日約須三月有餘官兵不無久待莫若分為兩路一由陜西山西入京一由成都登舟從川江順流而下江水未發正可遄行直達襄陽從襄陽河南入京不過二十四站俱係平坦通衢可行大車不致擁擠一處兩路日期相仿可以迅速到京似於軍行有益臣等查前據尚書舒赫德奏大兵凱旋之日若仍由西安一路誠恐應付竭蹶聞由川江可以直達湖廣一水可抵京師欽奉諭旨以舒赫德等所奏官兵水路回京之議原因五六月間禾稼遍野恐致蹂躪兼可節省馬匹今既即行撤回其所到之處逺近不一楚蜀兩省船隻一時驟難雇覓水路紆回阻滯更費時日且陸路經過地方章程已定易於辦理自以仍由陸路為便已經臣等遵旨傳諭大兵經過之直𨽻河南陜西等省督撫遵照去時成例一一妥辦今大兵業經停撤現在於奉到諭旨之處起程逺近前後勢難齊一其已過成都滿兵不過三千人將來即由棧道行走而未過成都之兵業已先行自可不至擁擠遲滯且水路船隻俟行知楚蜀兩省到日然後辦理既緩不及事而兵丁跟役軍裝器械等所需船隻繁多一時恐難雇覓川省陸路馬匹已辦有章程若又增辦船隻必致周章而襄陽未經預備驟令料理恐一時不能齊全兵行迅速勢須守候轉致遲延即由襄陽至河南一路亦非大兵前此經由之道又須另為籌辦夫馬而自陜入豫之兵復陸續雲集分頭供億更恐應接不暇况本年春令較早萬一巴蜀雪消川江驟漲瞿塘灔澦竒險堪虞一經羈阻是欲速反遲欲省反費種種未便似應遵照前奉諭旨官兵仍由原路回京庶不致臨時岐誤但軍行甚關緊要該撫陳宏謀若因有水陸分行之説遲回觀望將陸路一切應行預備供億之處轉致延誤則責有攸歸俟命下臣等即行文該撫令其迅速辦理並應親身往來稽察督率屬員妥協料理毋少玩忽得旨速行是日陳宏謀奏言陜省自去冬以來臣將通省道府以下各官調集辦理臺站事務原覺官少不敷今京兵過境臺站捲撤各員甫回本任時屆青黃不接正須料理借糶事宜其被災之處又須查辦加賑本擬仰請聖恩揀發數員來陜以備凱旋辦差之用今京兵即日抵陜請旨揀發緩不濟急不得不通融辦理查有革職西安府通判張廷柱武功縣知縣侯鈞降調長安縣知縣董三錫咸寧縣知縣劉度昭皆係因公罣誤並無貪贓劣迹久在陜西其才具俱屬可用不揣冒昧仰懇聖恩容臣將此四員委辦臺站馬騾等事俟事竣核其辦事果能出力臣當給咨赴部引見可否録用伏候欽定奏入得旨允行二月辛巳上諭內閣曰經略大學士忠勇公傅恆奏到軍前情形諸摺朕披覽之下深為嘉恱賊境堅碉林立若仍蹈前轍徒事攻撲雖經年不能奏績經略大學士傅恆因有鋭師深入從中峯壓下直搗賊巢之策再三執奏不已經朕嚴切訓諭果能洞達事理翻然解悟而賊酋因我軍威大振窮蹙窘迫屢遣頭人抒誠奉幣哀籲乞憐經略大學士必令莎羅奔郎卡面縛軍門縶之檻車獻俘闕下朕以懷逺招攜降者不殺宏聞三面活此一隅諭令振旅還朝納降之事交總督䇿楞隨宜辦理在經略大學士傅恆受鉞専征忠勇奮發志期蕩冦振我皇靈是以決策長驅計圖一舉殄滅而朕覆載為懷涵育異類是以定計撤兵則後此之保全物命休養太和阜裕國儲寧謐逺徼者皆經略大學士傅恆之功其視殱醜執馘者為尤大也國家晉爵酬庸封公已為優典若以經略大學士傅恆一片赤心忠純體國豈尋常之析圭擔爵可同日語耶其封公諭旨應即祗領拜恩不得再行懇辭前後所降諭旨并經略奏到諸摺著發交諸王滿漢文武大臣公同閲看俾悉經略大學士為國宣勞奮身殫力具有苦心共相勉效即朕之開導指示亦悉出於仁至義盡而始終籌辦此事揆理度勢務合機宜訓飭褒嘉無非為國體為政要初無假借無容心朕賜詩有云上相有心期利執大君無物不包蒙此二語實足該括用兵全局並我君臣各盡其道之心事俱為披豁矣是日上又諭內閣曰此番用兵在事諸大臣皆能急公奮往勞績懋著前經降旨將舒赫德等交部議敘都統汪札爾總督策楞奉命星馳不辭勞瘁甚屬可嘉著一體從優議敘乙酉經略大學士傅恆奏言提督嶽鍾琪以金酋遣人至黨壩乞降惟願貸以不死諸事如命應否準其納降稟商到臣臣隨遣遊擊吳士勝前往黨壩告以卡撒軍營現在亦屢有頭人乞降如莎羅奔郎卡果親自來營亦可貸以不死令其相機辦理今遊擊吳士勝於二十一日自黨壩起身徑從賊境勒歪一路由刮耳崖前至卡撒於二十三日即抵臣營據稱前往提督大營見有頭人得食阿朗具訴莎羅奔從前祗與鄰近土司仇隙誤犯天朝原不敢有一毫叛逆之意惟馬邦一事實係頭人之罪並非莎羅奔本心後來屢次乞命奈張總督必欲𠞰滅我等以此顧惜性命死守亦並不敢與大兵對敵今經略大人若肯全我等性命許我等歸降情願比各土司加倍出力報效馬邦有罪頭人及所有鎗炮並內地人馬俱願獻出提督諭以莎羅奔印信號紙原係我為請給若有叛逆之事不惟爾罪重大即我亦為有罪之人爾等原係無知誤犯我已將情節稟明經略求免誅戮經略現在遣官到此爾可歸語莎羅奔不必疑懼如果親身到營叩頭乞降經略必不殺爾我可力保得食阿朗聞言不勝欣喜口稱經略大人若果恕我一死莎羅奔願為大人建立祠宇令喇嘛念經報答大恩世世子孫不忘大德提督諭以我允爾轉稟經略但自此至卡撒路逺若即從爾勒歪地方至刮耳崖前往卡撒軍營更為捷速得食阿朗即於二十一日早整備夫馬迎接士勝並有親近用事頭人十名前來跪接口稱莎羅奔患病郎卡親身迎接後見郎卡出寨跪迎言詞恭順與得食阿朗所稟相同臣查逆酋此番乞降情狀似與從前狡飾者不同而吳士勝所見郎卡狀貌與糧務謝應龍所語無異將來到營自可不虞假冒隨遣吳士勝仍往黨壩告知嶽鍾琪以莎羅奔如果親來提督即可帶至軍營俟嶽鍾琪稟到另行具奏奏入諭曰已有旨允降班師但遵旨而行朕亦不多諭矣丙戌上諭內閣曰朕臨御寰區敉寧中外前因金川小醜致煩王師經略大學士忠勇公傅恆奉命遄征威信克著朕命納降順撫振旅還朝從兹邊境乂安蠻氛永靖朕嘉績酬庸經略大學士傅恆已晉封公爵至中外在事諸臣或馳驅逺徼宣力封疆或夙夜在公懋襄機務宜加顯秩用奬勤勞太子太保大學士來保著加太子太傅太子少保協辦大學士事吏部尚書陳大受户部尚書舒赫德太子少保四川總督果毅公策楞太子少保陜甘總督尹繼善俱著加太子太保刑部尚書汪由敦著加太子少師吏部尚書達爾黨阿理藩院尚書納延泰俱著加太子少保其兵部尚書梁詩正協辦大學士事刑部尚書阿克敦工部尚書信勇公哈達哈並久膺委任厯著清勤亦宜一體加恩以昭風勸梁詩正著加太子少師阿克敦哈達哈著加太子少保是日上又諭內閣曰長蘆鹽政麗柱奏稱大軍凱旋辦理一切善後事宜官兵糧餉等項在在需費即協撥軍餉省分嵗支俸餉亦所必需請照康熙十四年之例蘆東每引增銀五分並請敕令兩淮兩廣河東浙江等省一體按引增課以濟軍需麗柱此奏殊屬猥瑣鄙陋金川用兵供億固為浩繁但國家當全盛之時無論已經允降班師即使尚在用兵公帑所儲儘足敷數年之用不致拮據康熙十四年增加鹽課原因開創未久三孽煽動兵連數省正供缺乏不得已而為之旋即復舊今時勢懸殊豈可援以為例朕辦理庶務悉斟酌時宜一出於大公至正豈肯稍有假借乃衆人不能體會轉以其私意小見臆度觀望紛起言利豈朕而容聚斂之説得以行於今日哉昨有唐綏祖倡捐養亷之奏朕已降旨申飭今麗柱復以增課為請是羣情之不顧大體競思懸擬此風斷不可長若不懲警將來效尤波靡習尚日益澆漓閭閻不無驚擾麗柱著交部察議是日上又命軍機大臣等傳諭經略大學士傅恆曰軍營所鑄二千餘斤銅炮撤兵之後既未便委之番境而崇山峻嶺運回亦覺艱難不若鎔化銅斤載歸四川省城以供鼓鑄搭放兵餉縱少損工本而化無用為有用亦訃之得者其自京運往之沖天九節諸炮皆國家利器皇祖時所造貯之禁中即成都亦不可存留自當從後從容運回京師少靡腳費亦所不惜其餘炮位俱應收貯總督衙門一切軍裝器械著交總督䇿楞逐一留心檢點舒赫德因查核軍需尚駐成都著一同商辦丁亥上諭內閣曰金川用兵一事今允降班師大局已定皆由經略大學士忠勇公傅恆忠誠任事有以倡率諸臣故能肅軍紀而靖邊徼迅奏膚功朕思督撫身任封疆關係綦重從前瞻對之役慶復若實心辦理金川必不敢復生反側即金川之役張廣泗若實心辦理軍務亦必不至久延乃張廣泗措置乖方有心貽誤而訥親以親信之大臣銜命前往一味倨傲偷安其於軍前實在情形及張廣泗種種劣迹槩不據實入告伊素性刻核遇事吹求張廣泗之劣迹豈誠漫無知覺蓋恐張廣泗發其隂私故含忍蒙混而公事之敗壞至於不可收拾是以復費上年如許籌辦賴有經略大學士傅恆殫竭丹衷不辭艱瘁奏報悉歸確實行事恰合機宜賊酋聞風震懾哀籲投誠朕得以洞悉情形俯準納款決䇿罷兵而偕行宣力諸臣如舒赫德䇿楞尹繼善等咸能知所效法勇往急公固由經略大學士傅恆有以感動激發而實在諸臣職分內應盡之事也夫撫育黎元澄清吏治綏輯邊方皆封疆大吏専責食其祿者忠其事人人各有當盡之職督撫受朕簡任若必待倡而後和安所得如許公忠體國之大臣馳驅盡瘁為之標凖且已獨非大臣乎其平日所為靖共爾位者何事如或地方猝遇重大之事廷臣中一時不得可遣之人而守土大員又不自知奮勉將必朕親行而後可乎朕非忍薄視諸督撫謂皆慶復張廣泗之流而慶復張廣泗固督撫中人且在督撫中衆所推為尚能任事之人也今見其身罹重辟則從而指摘之非議之試平心而論前此不嘗稱譽之推重之耶慶復張廣泗之在雲貴川廣陜甘頗著能名而終於敗露可見平日茍且塗飾其居心欺詐為天理之所不容必至僨事喪身無可解免此諸臣亟當猛省早圖易轍勿謂逺省之事可以藏垢匿瑕幸逃法網也至於軍旅為國家重務詰戎禁暴督撫最當留心而軍律以賞罰明當為先鼓勵人心振作士氣全在於此有如張廣泗於馬良柱之摧鋒陷敵威著羣蠻者則揑款劾之許應虎之失機陷賊茍活幸免者則奏請令其回任其顛倒任情一至於此而贓私狼籍婪及叛番貽笑外裔更為無狀則張廣泗之立行正法而未處以凌遲重辟尚屬伊之僥幸任督撫者寧可不以是為炯戒而勉效公忠耶此番命將出師飛芻挽粟太府金錢不無耗費然負恩誤國之人由此發露底裏朕得按法懲創巾國憲以警官邪而忠純報國者試之艱巨驗其謀勇亦得訓導成全端表率而風有位此於世道人心深有裨益乃國家億萬年無疆之休非一時一事近功小效之所可同日語也惟願諸臣有則改之無則加勉以副諄切訓誡之至意戊子上諭內閣曰適經略大學士忠勇公傅恆據奏稱奉到十六日諭旨敬謹遵行於本月二十九日或三月初二日星馳就道納降之事交策楞辦理如此方為明於事理能知輕重之大臣朕心深為嘉恱罷兵一事朕再四熟籌為國家逺大之長計無踰於此蓋得其地不足耕得其人不足使逆則討之順則撫之乃天朝控禦蠻方之道且地居竒險人力難施搗穴攻巢多戕物命况盡有其地既未可列為郡縣歸我幅􅊷則雖縶莎羅奔郎卡之頸致之闕下不過戮二番酋何足輕重而取其地以與他番何如即撫此二酋使效順奉命朕初意猶不過乘其呼號請命因便納降不謂窮蹙若此恭順若此據經略大學士傅恆前後奏報莎羅奔郎卡屢遣親信頭人致詞獻幣稟稱果貸其死當為經略大學士建祠頂祝所約六條如不許再犯鄰封退還各土司侵地獻出馬邦凶首呈繳鎗炮送還內地民人與衆土司一體當差皆一一如命且稱願較各土司分外出力是乃所謂革面革心而其所求望風稽顙不敢遽赴軍門者螻蟻貪生之本念耳如此而必加以誅戮豈朕覆載包容之量耶王師不戰止戈為武威既伸矣功既成矣班師振旅允合機宜息事寧人貽休奕祀我國家正當全盛之時以東三省之遼逺蒸徒萬騎匝月而抵西川誠昔人所云從枕席上過師者傳之史册休有烈光令非此番辦理先聲震疊軍紀嚴明攻𠞰奮勇則賊番挺其螳臂未必若是之厥角歸誠此經略大學士傅恆之功視獻囚執馘者為尤大也前此經略大學士傅恆屢以志期殄滅不肯遽歸為奏朕甚為懸切目下既經翻然就道不妨宣示初心蓋子不可違父臣不可違君乃綱常之大義召之不至勢無中立非捐軀不返則必以違旨得罪夫以朝廷第一大臣而委命蠻荒成何國體軍前諸大臣及將辨士卒立視大帥之冒犯鋒鏑而不能衛尚可相率生還不懼國法耶若顧惜前勞固執成見遷延抗旨勢不得骩法姑容夫以負恩受戮之人尚不免為之致惜况在忠誠效力之賢臣而以鋭意立功罹於國憲朕心抑復何忍在經略大學士傅恆身膺閫寄報國心殷固宜以敵愾為急朕培護元臣裁成開導俾袪偏見以宏逺謨而大學士即能深體朕意不執成見正合軍志所云允當則歸而調元贊化可為數十年之良佐我君臣斯為各盡其道則金川之役雖不無勞費而朕賞罰公明誅有罪而人知警惕旌有功而人知勸勉庶績由此咸熙風尚由此丕變生靈由此阜安我大清億萬年無疆惟休豈勝慶幸著傳諭諸王滿漢文武大臣知之己丑經略大學士傅恆奏言臣原擬本月二十九日或三月初起程今於二十八日接提督嶽鍾琪稟稱綽斯甲從前屢遣頭人為金酋乞降今若受降不可不令綽斯甲預聞其事因差千總馬鵬前往諭意今據馬鵬回營稟稱莎羅奔事事遵依並請提督由勒歪前赴卡撒稟懇經略允降又差一土舍同頭人得食阿朗前來迎接又求差官先往勒歪教以迎接叩見之禮提督即於二十九日由勒歪前赴卡撒臣查金川用兵以來已經二載因前人辦理不善以致糜餉老師蒙皇上天恩命臣前往視師正在酌辦𠞰撫事宜復蒙諭旨訓示以化外異類不足以煩天討惟以休兵息民為國家之要務臣仰體聖心商酌起行適據嶽鍾琪稟報乞降情事已令總兵冶大雄由勒歪往迎嶽鍾琪若莎羅奔郎卡親至臣營而請免死即可以受降報捷若兩酋畏死終不敢出即允準六事聽其在河邊叩首服罪亦可完事臣亦不虛此行現在嶽鍾琪於二十九日前來大約初二三日可到臣營臣稍待數日自可竣局若尚稽時日臣亦定於初四日起程計算三月初十以前可以抵京仰覲天顔矣入奏俞旨報聞庚寅上諭內閣曰朕前降旨將金川用兵以來在事大臣及隨營文武官辨與有勞績者交部從優議敘今據四川總督策楞奏稱從前訥親張廣泗老師糜餉虧損軍威將辨等征戰出力之處並未存記檔案若行文各將辨查報必多揑飾徒滋冒濫朕因訥親張廣泗自經任事毫無實心其所奏報多屬虛詞是以諭令軍前確實查辦今既稱並無册檔可稽則該部無憑置議其官辨人等優敘之處自不必行但即此而觀訥親張廣泗於有功者既漫不經心茫無記載則其所參有罪者必顛倒任情多屬屈抑著交該督䇿楞詳悉查明量豫昭雪據實奏聞請旨至陳亡將士仍遵前旨查奏交部議恤臣等謹按訥親張廣泗軍紀不明賞罰不當我皇上降旨申飭至再至三及是念及有功員辨應與優敘而訥親張廣泗當時並不將立功之人查記檔案其為漫不經心無以鼓勵士氣復何所辭咎乃皇上又念及伊等參劾之人必多顛倒任情以致屈抑特命總督䇿楞詳查量豫昭雪聖慮周詳無微不至豈特被屈得伸之人頂戴髙厚即有功而未邀優敘者仰見皇恩優渥如此亦無不心恱誠服如被恩賜矣是日侍衛鄂實奏言臣欽奉諭旨大兵既撤訥親不必帶至軍營著於此旨所到之處如係府縣地方即會同地方官將訥親正法倘無官員之處鄂實即係欽差侍衛竟行宣旨正法事後告知經略大學士忠勇公傅恆尚書舒赫德可也臣於正月二十九日行至班攔山接奉諭旨即會同協領法保並辦理糧務知州劉桐又適遇領兵前鋒侍衛舒泰亦抵班攔臣即告知舒泰等帶領滿兵於是日在該處宣旨將訥親正法訖臣前往軍營留住一二日即遵旨回京奏入報聞平定金川方略卷二十三
