body:
  text: 閠七月辛未訥親奏言褒恤任舉之㫖已通傳各營大臣將辨臣前議築碉之說實緣所費無幾賊人堅守不出可乘其來擾得有掩殺乃不得已而為之非藉此為制勝良謀今奉聖明指示仰見睿謨逺照苐臣等又細加商酌目下雖無大成效每因砌碉賊來侵擾得有斬獲亦不至有誤攻勦就現在情形尚屬可行至王柔於六月初四日到營始云尋覔漢奸前往間諜難保必擒賊酋久之終稱不得其人又欲祈請終南山道士用五雷法以擊賊碉更為荒誕不經大約全屬不識番情徒托空言而已昔嶺一路雖未能深入直搗賊巢亦可將卡撒一帶橫截在外現在商酌差人偵探山箐可截之路如可乘虛度越令我兵褁帶前進以攻不備誠如聖諭可圖破竹之勢也奏入報聞是日訥親張廣泗㑹奏言伏讀上諭以目今大兵已深入賊境設令膚功不能立奏經秋涉冬彼地沍寒難駐又不得不營向陽和暖之處相時再為籌畫伏查賊境目下雖當伏熱之時並無酷暑之氣緣其地髙處則寒低處則暖隂雪則寒晴霽則暖故自山腰以下稍低之區即向秋冬氣尚和燠雖值降雪亦不多存我師仍可相機進攻若欲另覔駐營之地則自出口以至軍營尺寸皆山實無地可以移營且我軍已距賊巢不逺若一經撤退則險要盡失賊必乘勢占據官兵復取為難且恐士卒從征日久一聞撤退之信必致渙散其心而各土兵以為金川不能撲滅反與結好尤為可虞此臣等所以未敢竟籌撤退也至諭㫖觀釁攻瑕賊衆所短何在有何隙可乘誠見聖主洞徹兵機惟是金酋自知罪大惡極祗思固拒以延時日所部番衆未嘗無投誠之意無如伊等妻子皆為逆酋執縶巢穴是以不能潰散至賊人天時地利皆其所長惟人數無多是其所短統計賊番現存不過三千餘人再有損傷則日見其少勢必不能久持是以現在頗多籲求投誠者而逆酋自知罪重未肯面縛祗因屬下番民傷斃甚多日向莎羅奔等懇求投誠以全身命而逆酋亦陽為懇求以安衆心是允降既於事機未協而賊境尚無瑕釁可乘惟曉諭以脅從罔治渙散其固結之心并飭令各路將辨相機攻擊但能日斃數賊不使稍有休息又廢其耕牧之計目下已日食不繼將來必益無以為生可以坐待其斃以臣張廣泗愚昧之見度之今冬明春當不難犁庭掃穴矣而臣訥親以為我兵果能奮勇爭奪數處賊必內潰然尚有不得不為過慮者賊巢食用果否至於匱乏究難臆揣而我兵攻勦以來一無可乘之機且卡撤昔嶺二路尚係臣等親臨督戰乃僅攻撲數次未得寸進朝夕籌商終無善䇿逮至冬寒春冷士氣恐益不揚以臣訥親愚見如至冬間尚然頓阻似應減撒久役漢土兵丁令留駐官兵時用炮擊碉卡則賊亦不得休息俟明歲再加調精鋭官兵三萬厚集軍威於四月進勦則我兵丁足以分布直搗掃穴犁庭最遲亦不逾秋令如此既可節省糧餉又可少休挽運夫役至糧運尤關緊要誠恐將來寒沍夫役背負維艱臣等已飭行各路糧務道府等員倍加挽運務於今秋大雪未降之前即將明歲三四月之糧均行運貯附近軍營以免缺乏再臣張廣泗前㑹同臣班第等奏請酌行商運之法現在商人赴司領運者甚屬踴躍據報已有一萬五千石之數陸續起運出口將來日久愈多啇運不竭庶可減派夫役以紓民力兹奉諭㫖令臣班第往來查察臣訥親隨即欽遵令其起程并照㑹臣紀山速為查辦以安閭閻其附近各土司久應夫役洵屬積勞然皆知大兵征勦原為伊等謀久逺安全之計現皆效力恐後並無怨望生心合并陳明是日訥親又奏言進勦金川如秋間不能前進應先期籌畫加調官兵厚集軍威業經臣與督臣另摺㑹奏臣再思來歲加調官兵計增糧餉需費數百萬實屬浩繁細察賊情若將我兵酌留萬餘名據守要害相機隨時用炮攻擊賊碉使之不得休息其接壤土司令各於本境自為防禦似狡寇亦能坐困第久駐終非長䇿若俟二三年後再調集官兵乘賊疲困全鋭進搗自必一舉成功此二三年內或有機㑹可乘擒獲賊酋亦未可定臣為民力國用起見故計慮及此若以迅奏膚功而論仍不如臣另議明年接辦之可速捷也謹將所見一并陳奏伏候聖裁奏入諭曰此見非矣豈有軍機重務身為經略而持此兩議令朕遙度之理如能保明年破賊添兵費餉朕所不惜如以為終不能成功不如明云臣力已竭早圖歸計以全始終是日訥親張廣泗㑹奏言七月十四以前各提鎮將領報到情形業經具奏兹十四日以後黨壩一路自七月初一日至十七等日共攻奪石卡二處用炮擊塌石土各卡擊死賊番五十餘名甲索一路於七月初七八等日殺死賊番十數名馬奈一路於七月初五日擊死賊番數名昔嶺一路於七月二十日奪得木卡三座旋經失去僅殺賊五十餘人卡撒一路於七月十七至二十九等日奪獲水卡碉房二座斬獲焚斃賊番四十餘人伏查河西四路其馬奈一路僅可禦敵未能進取正地一路因賊碉險密難進已將副將董撫逺調回卡撒軍營甲索乃當二路駐彼日久毫無進取前經檄留副將王世泰分兵駐守其副將髙雄劉順之兵盡撤并於昔嶺卡撒嗣又因該處道路叢雜悉屬賊境要隘兹大兵減撤恐綽斯甲無所彈壓心懷反覆則糧運經過或有疏虞是以僅將劉順調赴卡撒至河東現止四路除納貝一路原係牽制不進其黨壩一路總統提督嶽鍾琪設卡攻擊賊番雖頗有傷斃而康八逹木耳金岡之碉尚未能攻克前進卡撒一路所需調并之兵尚未到齊查右山梁雙碉為色底巴郎之屛障小金川土兵連撲三次未能即克現在圍攻其右邉水碉二座已經奪據至昔嶺一路原可深入直搗因有石城一座劄踞山嘴為賊境咽喉前經開穵地道施放地雷穴中探聼不凖雖傷損賊人頗多而石城仍未能克現在飭令另跴旁徑取路前進攻擊卡撒所調之兵到齊即行飭令從左山梁取路前進並夾攻色底俟一有克捷即當飛速馳奏原任提督假起賢因昔嶺石城久攻未克於七月二十八日夜乘卡撒官兵攻擊右梁雙碉水卡計欲親身臨敵督戰黑夜行至半途為鎗子所中並未損及筋骨尚屬輕傷易痊合並附陳是日上命協辦大學士事尚書傅恆傳諭訥親張廣泗曰覽所奏軍營現在情形各摺幾於智勇俱困金川小醜不意負固難於勦滅遂至於此官兵攻撲進不能前退不能守即小小獲勝尚未傷彼皮毛何况批郤導窽得其要領以成破竹之勢奏內所稱逆番來歲口食不繼可以坐待其斃我兵果能奮勇攻奪數處賊必內潰又稱賊巢用度果否至於匱乏究難臆度既云可以坐斃何又云究難臆度始終迄無定見而所稱來歲增兵三萬是否能奏膚功之處亦非確有所見必不可已之成謀夫兩軍相持賊人無坐而受縛之理縱復窮幽絶險亦無兵力必不能施之地既已用兵豈容撤退古有裹氊縋險衣草自蔽種種竒䇿以成大功者獨非於此等處施之乎今乃欲待其自斃自斃果有期可待乎如果實有不能勦滅之勢何妨明言其所以不能之故直請班師今又未能確指其必不可勝而欲以三萬衆嘗試之為此無可奈何之說卿等身在戎行目擊情狀尚不能確有成算遊移兩可朕於數千里外何從批示何從傳諭且大兵有四萬之衆彼止三千餘人何以彼應我則覺有餘而我攻彼惟慮不足日久懸望軍營消息而奏到乃復如是殊非所料卿等可將實在情形或增兵必可成功或用兵勢有不可詳悉審度歸於一是迅速奏聞勿為兩岐之說要知閫外之事惟卿等專責朕固不遙制也至逆酋佯請歸誠固不可信然或因此離其黨羽攻其腹心亦可從中得間與否亦並籌酌奏聞是日上又命傳諭訥親曰朕前命訥親前往金川經略原以一隅小醜大兵雲集不難犁庭掃穴速奏膚功並籌善後事宜歲內可以回京今觀前後所奏一時難於克捷大學士心膂重臣諸務資其贊襄豈可久留逺徼即如所云須俟一二年後成功亦無在彼坐待一二年之理應即還朝辦事其經略印務令訥親酌量或交張廣泗或交嶽鍾琪或交傅爾丹暫令署理聼其俟來春另調大兵再圖進取可即速奏聞候朕降㫖至傅爾丹嶽鍾琪俱曾統領大兵究屬老成宿將是以簡用於廢棄之中冀於軍務有濟乃自到營至今未發一謀出一䇿親在行間一若置身局外即內大臣班第烏爾登法酬並帶往之侍衛等亦皆未見出力之處不知伊等在彼所辦何事現駐何地殊非遣往之意可逐一傳諭詢問是日訥親奏言臣查閲各路禀報多有頓兵不進者商之督臣欲并兵合力督臣以為地勢番情必當如此分布其實兵雖四萬有竒分路太多在在勢微力弱而督臣之不肯遽為歸併未免存回護之見也至其好惡每多不公人心不能悅服即如參劾貴州副將髙宗瑾進攻不能克獲尚屬兵家之常而其種種欺飾則大干軍紀臣聞督臣於貴州官兵素有偏袒是以未肯即行參處致傷和氣適因昔嶺兵丁乏員統領將該副將調往囑令督臣諄切訓誡以期後效詎復將圍困賊碉之卡被賊人奪去不能救援臣㑹商督臣奏請參處督臣立稿僅請交部察議經臣改擬革職督臣原稿轉歸罪於甫經任事之參將劉䇿名亦經臣更正具奏其偏狥懦將輕重失倫如此又臣㑹同傅爾丹將應援退怯之貴州千把等鎖拿乃該千把等逃至昔嶺軍營髙宗瑾知而不報督臣亦佯為不知其袒庇劣辨如此又諸將備惟任舉實屬奮力勇往身先士卒力戰陳亡督臣猶以為疏於布置輕冒鋒刃今督臣布置月餘已極周備仍不能督兵攻克是忠於王事者轉加以不美之名而干犯軍紀者偏欲為之脫卸此又偏狥不公所以不得人心者也至於用兵數萬攻勦經年賊酋本非徑敵路險亦非難至而所以不能速滅者蓋圖終必先謀始撫臣紀山於始事之時並未將糧運經由之山川險阻預立成算匆卒出師倉忙轉餉以致多用帑項經理周章糜餉之咎所不能免督臣張廣泗未能嚴督攻勦曠日持久賊得乘間嚴密備禦故今歲加調官兵即從前已到之地轉不能復至且因分路太多而應進之路每苦兵力不足是則失於籌算昧於地形頓兵老師誠難辭咎臣奉命經略理應參奏但若此則臣與督臣勢難共事而歷練戎行又誠如聖諭未有過於張廣泗者即撫臣經理糧運不遺餘力挽輸既無貽誤吏民尚屬相安亦難更易生手臣之隱默未敢上瀆宸𠂻私心竊計和𠂻共濟早靖蠻氛以紓聖慮兹䝉皇上訓臣以總挈大綱勉臣以廣資䇿力誡臣以自執已見警臣以驅迫過嚴臣惟時刻敬守謹將臣與督臣共事大端恭陳聖鑒奏入報聞是日訥親又奏言欽奉諭㫖調撥滿洲索倫兵丁應否如此辦理交臣定議臣詳思軍營地勢不便騎兵弓矢亦無所用至於破碉攻卡在我滿洲索倫兵丁勇往之氣實較勝於緑旗但攻一碉樓須用奮勇兵一二百名在前又須數百名為後繼並須兩面埋伏兵數百名從前攻賊時皆因前隊已進後無應援多致貽誤今若令滿兵前進而以緑旗土兵為後繼恐伊等依舊遲疑不前則前進者不免受傷如此一二次即驍勇者亦不免於退縮如全用滿洲則須得數千之衆費用既繁亦難得如許驍勇且滿洲索倫長於馬上弓箭此地無所施展至如何攻取破賊之處臣業已詳加籌畫另行具奏謹將滿洲索倫兵丁不便調用情形據實奏聞奏入諭曰數千滿兵之費用又多於數萬漢兵之費用乎至所謂甚不可者則已知彼處地方形勢矣朕亦難以强行所詳加籌畫者亦不甚為得計又諭曰今已因雲梯兵降㫖詢問可一併再為詳議是日班第奏言口外挽運糧夫給與腳價口糧仰䝉聖恩寬裕加給最為優渥較伊等平時民間傭值不啻倍增尚何至有擾纍無如民間里下舊俗必資幫貼始肯應募歷來用兵皆所不免非止川省此次用兵為然因其民俗相沿亦遂安於無事至若附近各土司連歲軍興供應夫役原不免於積勞然䝉我皇上恩給價值並無苦纍况伊等蠻民山多田少不敷口食向有逺赴內地下壩傭工者得此官給夫價優裕更非强迫惟瓦寺沃日小金川三土司部落稀少明正司則因瞻對之事甫息金川之役又興不無困憊臣與督撫二臣詳籌設法或更換調減或添撥漢夫邇來較前已大減省各土司皆恭順趨事並無怨望之形但念內地里民幫貼雖實無多而或保長胥役借以科派飽壑亦未可定兹䝉諭旨垂訓臣即欽遵於閏七月初一日由軍營起程前往內地詳加查察務期杜絶私弊以安閭閻奏入報聞丙子張廣泗奏言五月初一日據叠溪營遊擊阿爾占轉據武舉張鼎禀報四月二十九日傍晚天降大雨至三十日四更時分忽然電光閃爍雷聲震地將作固山頂漢兵營盤中戰碉一座擊倒亂石壓死官兵及家奴共四十六人帶傷官兵數十人又據經管火藥外委龔世榮禀稱貯碉火藥十六籠盡被雷擊無存臣查番地山髙石厚隂雨日多番民所居碉樓時有雷擊之事然從無擊倒者若果被雷擊倒則火藥自必仍壓碉底何至原貯火藥無存明係辨兵疏虞失火延燒故為揑報飭委龍安府知府等㑹同嚴審確情兹據訊明外委龔世榮等供詞本月二十九日天雨傍晚有值日看管碉樓火藥之兵丁魏良棟王思賢二人口銜烟袋上碉看漏回卡歇宿不料誤遺烟灰在火繩之上延燒火藥十六籠以致轟倒碉樓壓死官兵魏良棟等二人亦俱傷斃適值四更時分大雨鳴雷因而揑報雷擊除移咨提臣嶽鍾琪查取失火各官職名及傷斃各將辨人數另報理合先行具奏奏入報聞丁丑訥親張廣泗㑹奏言各路官兵自閏七月初三以前攻克碉卡業經臣等㑹奏兹查昔嶺山梁石城一座為賊徑之總隘賊衆併力拒守勢未能克因查昔嶺之下卡撒之右共有山梁四道其頭道山梁已為我兵所據惟餘雙碉未克雙碉之旁有水卡碉房二座亦經奪據日用大炮攻擊雙碉但雙碉之旁有三層碉房一座雙碉之下又有小碉石卡我兵雖圍不能嚴密擬先發兵奪其三層碉小石卡則雙碉不難攻取俟雙碉一克將昔嶺官兵一面留攻石城一面酌分與卡撒右梁官兵合力攻取二道山梁地名喇底奪據之後即由三道山梁直搗色爾力賊卡路更近捷臣等正在籌畫布置不意自初五日至今天雨連綿大霧迷漫現飭官兵預備齊全一俟晴霽即行分路撲攻臣等復查軍前各省官兵進攻日久傷病者多俱經陸續遣回內地調養征兵缺額過多就近於川省續調兵丁二千名赴營補額已報到數百名又甲索乃當二路之兵日久未能寸進已將副將劉順髙雄檄調歸併卡撒止留王世泰帶領川兵千餘土兵數百名勢覺孤懸既不能進取亦不能彈壓綽斯甲現據提督嶽鍾琪屢以兵單為詞因即將王世泰所領官兵飭令就近歸併黨壩約計調撒劉順髙雄二將之兵共有二千餘名與川省未到補額兵丁千餘名均在本月半間可抵臣等卡撒軍營一到即當遣往卡撒左山梁地名普瞻該處有賊碉數座一面督兵攻擊一面分兵直從左山梁壓下與右山梁官兵對峙合圍則色底賊人左右各碉皆在圍困之內諒賊亦難踞守也奏入諭曰此次所奏撤無用之兵并力攻勦實合機宜雖目下尚無大捷而調度有方用是稍慰是日訥親張廣泗又奏言馬良柱於上年攻克孫克宗之後即由彼取路直抵丹噶劄營並分兵駐守曽達所有該處軍糧即係派雇孫克宗番民挽運因雪山阻運常有缺額二三日及四五日不等逮至大雪擁途竟有缺至七八日並十餘日者臣張廣泗極力督催始得勉强接濟惟是缺糧之際兵丁日給食米一升尚有支食餘存及貿易人等售賣炒麵食物等類尚未競至枵腹至馬良柱所稱煮食皮鎧鞍䩞則此番征兵皆係步戰未帶馬匹焉有鞍䩞若皮鎧則軍中更未携帶何從煮食此支飾之詞也且丹噶缺糧數日乃在馬良柱軍營未撤之先逮至將撤之際則糧已運到并有挽運在途尚令運回者馬良柱實緣畏賊襲追罔遵指授遑遽撤退以致軍裝炮位遺棄頗多非關缺糧之故至於上年糧運總因籌辦未善惟黨壩與小金川兩處尚不至缺糧其餘臺站因概用本地番夫烏拉並未派調內地漢夫一名領運故阻糧不但曽達丹噶為然即南路總兵許應虎初駐正地繼至甲木的交并副將張興駐劄之馬邦以及西路之卡撒各軍營俱有缺糧至數日旬餘者臣因川省文員狃於積習悖謬之處甚多即於臣張廣泗一切教誡皆罔聽從欲參則不可勝參幸䝉聖明照察欽差尚書班第來川督辦並奉嚴㫖訓飭撫臣紀山始行添調漢夫多方設法復䝉特命臣訥親來川經略加緊飭辦現在軍糧乃得供支無誤其從前辦理遲誤之大小各員均難辭咎查籌畫不善派調糧夫不足則係臣張廣泗巡撫臣紀山前任布政使李如蘭現任布政使倉德督率不力西路則係總理松茂道唐進賢副總理保寧府知府周岐南路則係總理原任建昌道陳緯副總理原任打箭爐同知鮑成龍專辦丹噶曽達卡撒糧運遲誤之員則係署汶川縣知縣劉士縉專辦正地甲木的交馬邦糧運遲誤之員則係榮經縣典史嚴惟寅瀘州嘉明司巡檢王洪德仰祈敕部一併嚴加議處奏入上以張廣泗身在軍營辦理軍務自難兼顧糧運免其議處餘俱諭部嚴察議奏臣等謹按糧餉為軍營所最重張廣泗目睹軍營缺乏者已數處隱忍者幾一年並不據實參劾以肅軍紀乃至皇上特命班第前往督辦又命訥親前往經略查察既周嚴㫖屢降自知無可掩飾然後具摺糾參其前此之辦理疏忽固難辭咎而有意狥隱更為罪無可寬矣我皇上以軍旅重大寬其罪正所以責其成既已格外承恩自應竭誠報國而玩愒因循惟事欺詐其能逃於聖明之鑒察乎是日訥親奏言馬良柱移營缺糧一案臣遵查卷宗本年正月初八日馬良柱報稱丹噶兵丁缺糧八九日隨營支放把總李明傑呈報自正月初一日起至十二日止缺少官兵口糧六七日不等又十一十四等日馬良柱報稱曽達缺糧四五日至七八日二月二十日馬良柱禀稱撤兵時夫役兵丁缺糧一十五日俱有卷案可查又前隨馬良柱在營之辨兵有現在臣營駐劄之把總李玉資外委廖雲詢據伊等稱上年十二月十三四日前往領米因糧運雪阻未得領回此後各營俱不能按期領米將所餘之米衆人分食或得一碗或得半升惟撤兵前營中缺糧二三日别營尚有多缺幾日者或刨圓根或穵野菜根療饑或賣衣買食後到孫克宗地方始補給半月口糧臣細核呈禀及詢問辨兵情詞缺糧日期參差不一然大約缺乏屬實理合陳明至雲梯兵數百名不敷攻撲之用若至數千名則糜費繁多今擬於卡撒一路將可以圍攻之處用兵圍守奪其糧水可通之路又賊番人少其與我兵相拒之碉卡既已悉衆拒守則其內必虛應伺其不備乘虛襲取或從林箐抄出其後庶使賊首尾不能相顧量度漢兵派遣圍攻尚堪驅䇿至於偵探路徑於林密箐深之處若選長於步履熟習鳥鎗之侍衛官員兵丁數百名分隊率領相機跴探自能攀越前進冬春積雪深厚勢屬難行倘來歲夏間尚須增兵繼進則於明春陸續遣發來營令率漢兵同進似屬有益其馬良柱所稱斷絶糧水圍困賊衆年餘之功賊必立斃臣查金酋地勢有可圍困者有必須攻取者亦有應抄前截後斷其聲援者并有應聲東擊西避實攻虛者種種情形不一若必并金酋之境而全圍之則自去歲至今已有年餘曽未見有成績賊人食用有資何由使之立斃又據稱此時若行撤兵則已得之地必復被賊侵占此固早已慮及但體察各處情形尚非緊要路徑若至冬間原屬可守可撤惟卡撒昔嶺黨壩三路則係進攻要隘不可撤兵讓地又據稱瓦寺頗有二心臣查瓦寺地方與汶川縣聮界臣蒞軍營經過其地該土司謁見極為恭順現派兵夫應役亦未見别有二心惟聞上年馬良柱初進兵時調伊番兵隨征與金酋對陳有止放空鎗之語今瓦寺之兵即在臣現駐之卡撒劄營細察别無他故奏入報聞是日上命協辦大學士事尚書傅恆傳諭訥親曰據奏選擇長於步履習熟鳥鎗之侍衛官員兵丁數百名令其分隊領兵偵擇路徑朕現在特派大臣揀選精壯滿兵三百名演習雲梯即令伊等兼習鳥鎗俟其熟練之時再選擇侍衛等於明春帶領前往以備率領官兵進攻之用傅爾丹及班第烏爾登等現在軍前何以並未見伊等督戰出力即成都派往之滿兵一百名亦未見其作何赴戰以理揆之或由任舉之變恐冒險直前有意外疏失不令伊等對敵亦未可定夫兵以克敵為勇若護惜而不令其摧鋒陷陳則命伊等前往之意謂何我滿洲舊習不應有此傅爾丹身經百戰何未受傷此亦有命耳如果能奮勇先登正伊等見長之地豈肯瞻顧不前如此可知並非伊等退縮必係訥親過慮而不令前進也可將此㫖傳諭伊等又革什咱與金酋世讎或許以重賞令其設計擒獻但須確有斬獲憑據毋稍留疑竇貽後來之患朕觀訥親等及軍士皆不無畏難之意則今歲斷不能成功矣其應添兵再舉或應緩期待釁此時或另已籌有長䇿可畫一定議速行具奏庚辰上諭內閣曰原任重慶總兵官馬良柱雖經獲罪但朕觀其人材與庸懦無能者有間在緑旗將辨中猶為强幹之員伊獲罪情節尚可原宥且在川年久於番地情形頗為熟悉著仍發往金川軍營交經略大學士訥親總督張廣泗以副參等官酌量委用效力贖罪是日上又諭內閣曰據紀山奏稱瀘州士民周其睿等連名具呈以伊等荷䝉皇恩休養生息連年豐稔前歲又逢蠲免條糧無由報稱伊等十鄉士民情願辦米五千石交倉以資積貯川省連年用兵一切挽運糧糈雖寬裕給與價值未免有資民力朕心方切軫念斷無復聽其捐輸軍米之理紀山之為此奏其見益鄙但士民既已爭先交納若仍令領回轉需運費且阻子來樂輸之情著將此項捐辦米石抵為下年應完正項錢糧是日紀山以欽奉諭㫖申飭辦理糧運不能覺察科派具摺請㫖嚴加議處上諭該部嚴察議奏平定金川方略卷十
