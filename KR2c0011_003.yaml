  text: 欽定四庫全書平定金川方略卷三
  hash: sha256:1d047ffa9b7e27f8d08c9cf8b60ba6e84381a46e0b1ecaa2741d99b9688b51f4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0011_WYG_003-1a, image: WYG0356/WYG0356-0048c.png}
body:
  text: 七月甲寅慶復張廣泗會奏言莎羅奔與其兄就日吉父子同惡相濟致干天討莎羅奔居於勒歪寨就日吉父子居於刮耳崖官兵自應分路前進攻此二寨臣等酌定西路委松潘鎮宋宗璋統領漢土官兵四千五百名由黨壩進攻勒歪參將郎建業永柱帶領漢土官兵三千五百名由曾頭溝卡裏一路亦進攻勒歪令馬良柱帶漢土官兵三千五百名由孫克宗一路進攻刮耳崖參將買國良遊擊高得祿帶漢土官兵三千餘名由黨壩一路亦進攻刮耳崖南路委建昌鎮許應虎統領參將蔡允帶漢土官兵二千七百餘名由革什咱攻奪正地古交一路前進與西路宋宗璋黨壩曾頭兩路官兵會合夾攻勒歪泰寧協張興同遊擊陳禮帶漢土官兵三千二百名由巴底娘盡一路前進與馬良柱孫克宗達壩溝兩路官兵會合夾攻刮耳崖再金川河西各寨亦應分兵勦洗派遊擊羅于朝帶官兵一千名同土司汪結帶土兵一千餘名由綽斯甲一路前進攻取河西各寨諸路定期於六月二十八日齊進各指定攻取地方不得避就退縮再臣等原奏臣張廣泗駐劄雜谷閙軍營今細加相度尚屬偏於西路是以仍回汶川與慶復商酌一切六月初四日再由瓦寺取道沃日徑赴小金川美諾寨駐劄地既適中又與賊巢相近便於調遣俟各路齊進之後臣張廣泗當率兵前往賊境相機策應計獲凶渠毋令兔脫臣慶復現駐汶川彈壓瓦寺并與草坡一路相近今七路進攻仰仗天威會合不遠臣慶復酌擬出駐舊保縣以便商辦事宜仍可查察瓦寺奏入諭曰朕始謂大學士慶復尚在汶川軍前有張廣泗一人足資辦理是以有旨令入閣辦事今觀此奏是前臨軍營矣若接旨而已經起身回京則已若尚在軍前且不必來京可俟奏凱功成大局已定然後起身可耳是日慶復張廣泗又會奏言南路各番寨向被金酋占據官兵所到本地番人皆擒獻賊目迎降魯密章谷一帶賊俱逃遁官兵直抵河口收撫安插其巴底之林噶札科二處地最險要有賊目帶兵把守經遊擊羅于朝陳禮等派遣守備王珩領官兵四百名土司汪結等帶領革什咱及新撫巴旺土兵一千餘名分路撲碉攻破戰碉殺賊六十餘名生擒番目等十餘名臣等查巴旺巴底既經投順則進攻賊巢之路已通惟孫克宗為西南兩路通衢尤關緊要其地有上下之分上孫克宗近西路金酋就日吉遣子郎卡率兵踞守下孫克宗近南路有頭人札什邦遣伊子壻赴營投順遊擊陳禮土司汪結等帶兵星往接應察知其誠給與白旗招安上孫克宗賊目聞知來攻張興派守備司廷佐等領兵前往堵禦賊猶據險力拒我兵奮勇直前攻毁碉樓殺死賊衆自六月初二日至十三日建昌總兵許應虎遊擊保懷智守備徐克猷等後先策應力戰賊或死或逃盡得谷豫寨碉六十餘座而馬良柱又派遊擊陳上才潘文郁等帶領漢土官兵自六月初九日從美諾起程至十二日連日力戰頗有斬獲賊且戰且走奔入孫克宗官寨十三日官兵奮勇壓攻賊死者甚衆土舍郎卡潛逃上孫克宗地方全復其河東領兵把總韓偉分勦他撒等五寨亦俱得勝所有上下孫克宗地方分别勦撫情形臣謹繕摺縷陳奏入諭曰覽奏報攻勦情節總與去歲瞻對相仿即幸而成功恐亦未必遠勝前此所為也是日慶復張廣泗紀山又會奏言金酋狂悖不法固屬不赦之首惡而綽斯甲乃敢以姻戚私情陰行附和其罪實無可原但其地與金川相連而力又強悍若明露並勦之機恐二賊并謀有傷兵力是以該酋前到汪結處有悔懼效力之請即責以立功贖罪解其同謀抗拒之計兹蒙聖諭訓示周詳該酋誠偽原屬難信今當以兵據其險要俟金酋蕩平即回戈南指乘其不備自易勦除至金酋顯行悖逆本身親屬之外凡係用事黨與自不容稍有漏網其餘屬下番民誅之不可勝誅且迫於使令非如黔省古州之苖滇南昭通之猓自懷叛志者可比苟其投戈順命自應伐罪弔民再古州在黔楚西粵郡縣之中昭通亦與滇黔蜀三省郡縣毗連故當建立重鎮呚土歸流設官撫治久之可成樂土至若金川正在衆番蠻土司之中深邃幽險難以安設營鎮且尺寸皆山箐深溝隘可耕之地絶少若駐兵防守無所得食雪山重疊運餉更難又與古州之有田可屯者不同臣等酌議惟俟將來蕩平之後就現在恭順效力之土司擇其從征有功之子弟頭人量為畫界分授少其地而衆建之既以彰賞罰之典又使力少不能為亂庶幾可以寧輯邊陲伏祈訓示至副將馬良柱統兵一千五百名先解熱籠之圍後援沃日官寨一案查本年三月內金酋侵犯沃日各寨經宋宗璋馬良柱等發兵五百餘名令都司馬光祖守備徐克讓楊懷玉把總柳占春等先後往沃聲援都司馬光祖於賊兵未逼沃日之時先行赴沃與該處土兵協同拒賊賊來攻寨彼此勝負未決而守備徐克讓等兵會合在熱籠地方賊衆大至被圍寨內馬良柱在巴納山聞知奮勇前戰晝夜數十合轉鬭數十里直至松林口山險箐密遊擊李成邦三次帶傷不稍退縮官兵奮不顧身殺賊數百人賊始披靡而退官兵遂抵熱籠解圍所殺賊衆留有尸骸經臣張廣泗目覩屬實馬良柱既抵熱籠稍休士卒總兵宋宗璋遣遊擊陳上才等領兵一千三百名翻山接應馬良柱揚威前進往援沃日賊兵自巴納敗逃之後俱已膽落小金川又復投誠賊兵知勢不敵遂爾逃散馬良柱隨受小金川之降派漢土官兵前赴小金川美諾官寨踞守其地金酋始領兵守穴不敢復出所有前摺未曾分晰情形合並附陳奏入諭曰此奏略遲而又不過小小取勝未報大捷朕甚懸念也八月辛巳慶復張廣泗奏言臣等分派西南兩路鎮將定期於六月二十八日會勦兹據西路統領總兵宋宗璋呈報木耳金岡碉寨堅固為勒歪賊巢之門戶又有作固山康八達兩處為之犄角隨派參將張豹等由中路攻木耳金岡遊擊阿爾占等由左翼攻作固山遊擊王三元等由右翼攻康八達寨連日攻圍未能即破因密察地勢有革什戎岡為作固山之屏蔽必先奪取方可斷各寨之援隨派守備楊崑千總席雄等統兵截殺賊死甚衆遂進圍作固山戰碉又令參將郎建業過山協攻又令張豹等帶兵暗合官兵俱奮勇前驅不避鋒鏑自七月初六至十二日連戰得勝直撲作固山戰碉立時攻破賊盡燒死現在籌畫攻取木耳金岡康八達二處又據參將郎建業永柱等報稱自綽斯甲進發郎建業等攻奪西山梁守備張懋德等領兵抄賊後山千總彭翹翼領兵接應永柱等在山角護營官兵奮勇連放大炮自辰至酉擊死賊番百餘張懋德奪卡三處殺賊四十餘人又據威茂協馬良柱報稱六月二十八日抵稱斗寨與陳上才潘文郁會合二十九日至兩河口七月初一日進溝上山聞金酋於納貝山修碉設卡嚴兵把守派遊擊陳上才等為左翼守備何耀祖等為右翼馬良柱及遊擊潘文郁等前後接應初二日賊伏兵松林被官兵鎗炮擊死百餘人初三日進至江卡連破碉卡數處又進至得利寨攻圍一夜初四日辰刻施發地雷官兵奮勇連克大戰碉二十餘座小戰碉八十餘座自得利以下一溝兩岸碉樓甚密寨落頗大乘勝分攻連破達庸等寨番蠻慟哭乞降良柱遵檄勦撫兼施準其投順令各回本寨陸續招徠小寨二十餘處又木耳子地方有賊番一寨甚屬險固領兵土目係刮耳崖並勒歪兩賊首之大頭人馬良柱因革什咱土兵阿則等探得大頭人懼我兵威潛回刮耳崖商議因設計即令阿則等殺死看寨之小頭人甲噶等割取首級餘衆開碉迎降並革達寨俱開碉投誠亦準其歸順其丹噶山離刮耳崖四十餘里山岡緊要初九日分派潘文郁陳上才等左右攻擊馬良柱率兵為之策應鎗炮齊發賊兵不支順山入林而逃我兵奮勇爭先焚燒碉寨二十餘座燒死男婦甚衆初十日進兵至松林遇賊截殺賊望風逃竄追至美斗等寨焚燬大小戰碉六十餘座有納貼麻咱等寨番民色當朋等率衆環拜泣懇投誠察其委屬真誠準豫招撫十一日探知守備徐克猷帶領川南官兵在索落腳劄營與丹噶山隔一山溝中有曾達碉寨阻隔現在設法攻擊俟克破曾達會合川南官兵再遣發官兵接應參將買國良進搗刮耳崖賊巢又據參將買國良遊擊高得祿呈報七月初一日抵不史山腳住營密探山頂空卡關有賊番數百人把守隨派守備楊耀斗等分攻買國良等帶兵督催初二日賊番分路拒敵官兵奮勇夾攻自辰至未賊番敗潰奪獲官卡初四日遊擊高得祿等進攻邦噶山腳碉寨攻燒碉房二十餘座燒死男婦甚多是晚賊來劫營買國良督兵攻戰互有殺傷天明賊始敗退高得祿圍攻戰碉未能即破現在設法攻取又邦噶山腳左溝大戰碉實為賊番聚衆抗拒之處七月十六日令兵丁各備乾柴守備楊金玉等管領將水碉三座用柴布砌一時地雷烘發斫死賊番四名生擒十五名其餘盡皆燒斃奪取水碉而左溝戰碉又被官兵密圍賊番無不喪膽二十日又督兵負薪力撲碉下越坑毁牆燒燬戰碉七座獲賊番六十名燒死者不計其數此西路鎮將呈報進攻賊境情形也南路統領總兵許應虎呈報督兵進攻正地賊番占踞東山梁石卡三處抵禦官兵六月二十八日許應虎同遊擊保懷智等三路夾攻賊番大敗官兵連得賊卡三處除斬殺生擒之外帶傷及滚崖跌死者甚多查正地山口之獨松車寨均為賊境要害先破獨松與車寨方可進攻説怕等處以抵勒歪對岸隨於二十九日遣派革什咱土舍扎什羅爾布往攻車寨次日又派遊擊王世爵接應力攻賊番棄寨奔逃克破碉寨八處七月初一日派參將蔡允遊擊保懷智往攻獨松初三日又派遊擊王世爵協同攻取初四日被賊衝突該將不能抵敵以致失去炮位陳亡漢兵九名帶傷者二十二名又據報稱左右山梁地形陡險雖將下層攻奪尚有第二層名澤鋭絶頂名多爾潛藏賊番出沒擾犯初八日復有五六百人於澤鋭逞凶密令保懷智乘夜出其不意帶兵直抵澤鋭賊衆大敗官兵追至多爾山頂賊番入碉用鎗拒敵漢土官兵四面鎗炮齊發賊不能支棄碉奔逃燒燬碉樓四座正地偏右順河而下尚有顧務等寨未除若置此路直攻獨松説怕以上恐賊尾我之後因令保懷智等分兵三路進攻賊正拒敵土兵撲至寨後震喊如雷賊惶懼奔出碉樓逃竄奪獲戰碉二座碉房十八間有下得四寨頭人六太等並未拒敵叩營投誠已經準其降附又據泰寧協張興呈報督兵進攻馬奈山梁遍察山形俱屬峭壁陡巖中係大江凡險要之處賊俱設有戰碉修砌石牆聯絡馬奈官寨施放滚木礌石七月初二日我兵奮勇力攻斷賊水道密令守備李金徐克猷遊擊陳禮分翼進攻張興抄後策應先攻頭道山梁兵丁奮勇賊番敗逃奪得馬奈大官寨一座碉房四十餘座右面山梁又奪得官寨一座戰碉四座碉房二百六十餘座守備徐克猷用皮船渡河翻山以抵金酋卡隘分兵三路進攻奪得戰碉十二座賊人敗遁又攻取逹腳直木碉樓三十餘座尚有大戰碉五座喇嘛寺一座必須相機攻勦方得與達壩溝官兵會合又報稱七月初八日遣候補守備金容遊擊陳禮守備王珩帶兵進發燒燬碉寨十餘座戰碉二座正在籌畫攻取附近馬邦之札果隘卡忽於左右梁後有伏兵百餘潛起旋派左山梁官兵奮勇齊攻賊不能支滚下山坡追擊至扎果隘卡連夜攻戰至十二日奪獲碉卡一座平寨一十三座移營占據頭道卡倫守備王珩等報克大戰碉一座平寨二十六座守備徐克猷派攻河東初五至初九日前後得大碉六座大小戰碉二十餘座連破九寨總計碉樓二百餘座生擒賊番四十名殺死四百名帶傷者不計其數止餘緊要官寨二座現在籌算攻取又據阜和營遊擊羅于朝呈報領兵進攻上納龍山梁奪獲山梁一座卡房六座進攻甲索獲大戰碉一座石卡房二十餘座尚有木城數座離大河三十餘里河岸一帶俱有戰碉石卡把守甚嚴現同汪結等熟籌克取此南路各鎮將呈報進攻賊境情形也臣等查前𣲖鎮將會攻金酋各處賊巢宋宗璋許應虎等分攻勒歪會合之路尚遠其刮耳崖之三路官兵馬良柱連戰克捷乘勝直前勦撫兼用相去賊巢不過三十餘里張興進攻亦離賊巢不遠買國良等進攻邦噶三路軍營相望聲勢聯絡現令調到貴州貼防之兵前往幫助買國良等協攻此三路中有一先抵刮耳崖臣張廣泗即親往督率策應再許應虎攻獨松未破據革什咱土舍扎什羅爾布投誠該鎮力請大兵由該地進攻刮耳崖計擒賊酋就日吉該鎮已經允許臣等伏思與其坐守獨松不能前進自不若由别路進攻刮耳崖為是俟刮耳崖各兵會齊之後再分兵接應征勦勒歪之軍既據其心腹兩酋不能相救掃蕩自易矣奏入諭曰自汝等定期會勦之奏至朕日夜望捷音之來遲至今日亦不過小小破碉克寨何足慰朕耶此內馬良柱尚屬奮勇有所攻克至於許應虎在朕前力請出師效力今一獨松即不能克所謂奮勇直前者何在且攻碉獲勝情形總與班滚之事無異朕所慮者將來金酋又似班滚之生死不明則勞師動衆訖無成功必有身任其咎者卿等始終籌畫勿但顧目前為國家圖永久靖安之策邊防銷疥癬窺伺之萌必如古州之至今苖民相安耕作控禦有方斯得矣臣等謹按軍旅為國家大事膺斯任者必本忠誠之念竭其智勇以敵愾奏功始為無負若乃志存欺飾或欲僥幸成功或冀粉飾了局徒使帑藏虛糜於內士卒捐軀於外是其孽由自作明有王法幽有鬼神所不能逃也皇上屢頒諭旨諄諄訓誡以為必有身任其咎者丁寧反覆之意至深切矣九月己丑紀山奏言西路沃日軍糧原議由草坡蓽蓬二路挽運今查此二路﨑嶇陡險且中隔雪山一座前因西南道路未通是以由此轉運今巴底巴旺小金川孫克宗魯密章谷等處次第恢復西南兩路已通若仍由草坡蓽蓬運餉恐轉瞬秋深雪積凍滑難行甚有關係查有南路之兩河口至孫克宗地方略為平坦再加開通人畜便可行走將來亦無凍阻之虞已準督臣飭鮑成龍購買烏拉二千頭幫運俟早晚成功照例變價奏入報聞乙未上命尚書傅恆傳諭慶復曰朕曾降旨令大學士慶復來京後因伊尚未起程又令仍在軍營辦事兩次諭旨伊俱未覆奏今侍郎玉保具奏熬茶夷使有應行防禦之事慶復若已起程來京必由陜省即令在陜暫住候玉保信息俟應召來之時朕再降旨召取回京庚子張廣泗奏言臣於十月十八日自成都啓行由汶川舊保一路出口赴雜谷閙軍營駐劄分兵七路進攻一月以來各路攻克碉寨漸逼賊巢業經奏報臣自入番境經由各地所見尺寸皆山陡峻無比隘口處所則設有碉樓纍石如小城中峙一最高者狀如浮圖或八九丈十餘丈甚至有十五六丈者四圍高下皆有小孔以資瞭望以施鎗炮險要尤甚之處設碉倍加堅固名曰戰碉此凡屬番境皆然而金川地勢尤險碉樓更多至攻碉之法或穴地道以轟地雷或穵牆孔以施火炮或圍絶水道以坐困之種種設法本皆易於防範可一用而不可再施且上年進攻瞻對已盡為番夷所悉逆酋皆早為預備或於碉外掘壕或於碉內積水或附碉加築護墻地勢本居至險防禦又極周密營中向有子母劈山等炮僅可禦敵不足攻碉撫臣紀山製有九節劈山大炮二十餘位每位重三百餘斤馬騾不能馱載雇覔長夫擡運以之攻碉若擊中碉墻腰腹仍屹立不動惟擊中碉頂則可去石數塊或竟有擊穿者賊雖頗懷震懼然即甃補如故臣相察情形惟有大用火攻庶幾有濟因飭官辨多派兵丁砍伐柴薪臨時運至碉下應用又恐賊人發鎗下石勢不能近因令豫砍大木作排如攩牌式進攻時先以排禦其鎗石使負柴者隨其後火發之後排亦可以助力仍使放鎗炮以絶敵之撲救現在用之各路已有成效惟是此項舉運柴木兵丁倍須奮勇舍命爭先當酌加賞賚以鼓其氣臣查現今進勦之漢土官兵三萬有餘每日之費不下三四千金與其曠日滋費何若策勵以圖速成至賊碉多踞絶險難以猝近奮勇力攻士卒不無傷損自六月二十八日進兵以後各路報克碉寨雖不下數百而其極險緊要之碉不過十餘處漢兵陳亡已八十餘名土兵一百三十餘名漢兵帶傷者三百五十餘名土兵四百九十餘名此等陳亡帶傷兵丁雖俱有賞恤銀兩而定例必於事竣後通行查給臣思陳亡者不無搬骸安埋之費受傷者急須調理方免致斃臣仰體皇仁量行先加賞給俾共加感奮益圖報效奏入諭曰看此則奏凱尚需時日何能慰朕西顧之憂哉辛丑上命軍機大臣等傳諭張廣泗曰前據奏報金川情形雖未大勝而連破番寨去刮耳崖僅二十里似乎不久可以成功朕方盻望捷音之踵至乃此次所奏以賊碉所踞俱在絶險攻克頗難並未言及刮耳崖如何進取是奏凱尚需時日伊前後奏報相隔不過數日而情事各異即奏到之日亦遲速不同至所奏訪查班滚蹤迹其未死可知從前以其焚燒自縊朕即謂情節可疑焉知不詭計兔脫潛往金川勾通致釁今查奏如此則班滚之潛逃舍金川而何往伊既附賊酋必教唆謀逆勾結黨援衆番聳聽是以螳臂自恃敢於跳梁蓋番性難馴又多狡獪雖各分門戶而聲氣相通鬼蜮之技隨在皆有即如郭羅克之後則有瞻對又繼之以金川即崇喜土司之仇殺雖為穴中之鬭亦係啓釁之端若瞻對辦理妥協何至復有金川等事看來此等番蠻皆懷蠢動叛服俱不足慿信即裏塘土司汪結於征勦瞻對時效力著有功績為大學士慶復所任用今覽張廣泗所奏王懷信供詞上年汪結授為土司訪得班滚亦差人到汪結處投哈達道喜似此心懷叵測則番衆之暗傳聲息從可知矣且據昔什綽所供汪結做中班滚的兄弟俄木丁投降了呌班滚逃往别處去益可證班滚之始末汪結咸知則汪結蓋一陰巧小人彼既外示出力於我而內仍不使班滚怨彼此乃番蠻兩下獲利之巧智而慶復特墮其術中而不知耳將來此人須另有一番處置方可今汪結現在軍前尤宜事事密為留意不可稍露機宜致彼生疑而蹤迹班滚之事尤不可付之此人也總之此次用兵非小小克捷懲創於目前所可了事必須統計金川番情大為籌辦實足以懾服諸蠻為一勞永逸之策方不至事久復有蠢動若此時尚稍有遷就以圖速成將來辦理愈難反不若無此役之為得計矣金川之役興師運餉勞費已繁且天氣漸寒正宜乘時勦滅以奏膚功上年瞻對出師朕屢加督䇿始得結局兹因張廣泗嫻於師旅一以委之自無煩西顧之憂是以未屢頒旨訓飭今看尚無奏凱之期又不能不厪懷矣可傳諭張廣泗令其審度機宜速殫智勇籌全制勝永靖蠻氛以副朕特用之意瞻對乃前車之戒不可蹈也是日上自行在命尚書傅恆傳諭大學士張廷玉訥親曰現在征勦金川不過與前此辦理瞻對相仿並無善策如所奏攻擊碉樓惟開穵地道施放地雷已為衆番所熟悉不知用兵之道豈必專仗火攻即碉樓亦僅止一隅何若相度地勢或斷其糧道或絶其水路使之坐困諒無不斃之理張廣泗於此等俱未籌及朕意興師已久尚未奏凱緑旗兵丁不足取勝與其日久而師老不如選京師旗兵之精鋭一以當十汰緑旗之間冗以省無用之費益徑旅之資若成功迅速較目前為尤省也且張廣泗以旗人管旗軍料亦無掣肘之處但是否應如此傳諭張廣泗著大學士等再行詳悉酌定具奏丁未大學士張廷玉訥親遵旨覆奏曰用兵之道原非專仗火攻聖諭所指或斷其糧道或絶其水路使之坐困允合機宜至諭旨欲選旗兵之精鋭汰緑旗之間冗在京師旗兵較之緑旗兵丁自屬勇往但此番金川用兵舉動措置較之前次瞻對之役似為上緊據張廣泗奏稱征兵去刮耳崖僅二三十里則就現在情形而論已經扼其險要如派京兵前往即以一當十數亦不少目下天氣漸寒道途遙遠非若前此派往瞻對止數十人易於料理且旗兵自京抵營約須三兩月之久中間或已就破滅或已經圍困待斃俱未可知且可無庸傳諭張廣泗也報聞丁巳上命軍機大臣等傳諭張廣泗曰據報辦理金川情形及今又經逾月尚未見奏捷音想該督嫻於軍務熟練機宜必待實奏膚功是以相持許久但前據該督奏稱戰碉險絶難以猝攻必須徹底殄除方無貽患如此時已經搗穴殱渠誠為盡善若尚需時日則彼處地近雪山朕思際此冰霜嚴冷我師屯聚誠恐墮指裂膚難於取捷或且暫行退駐向陽平曠之地令得稍為休息俟氣候融和再加調官兵厚集軍威以成一舉掃除之計其應行防範之處務須嚴密周詳毋令乘機兔脫全在該督計算萬全可諭令酌量機宜妥協辦理臣等謹按金川地多雪山秋冬寒沍皇上身居九重之上慮周萬里之外豫敕帥臣移師暫駐平原向陽之地密加防範毋令賊得侵軼俟春氣融和加調官兵厚集軍威以為一舉掃除之計後覽紀山所奏黨壩九月中旬已連降大雪復以彼地情形冬令嚴寒運餉進兵均難得濟諄諄傳諭張廣泗知之廟算周詳至當不易乃張廣泗胸無成竹惟思僥幸成功輒以移師為非便增兵為糜餉且力言戎布已將攻克巴底有兵留守黨壩雜谷綽斯甲等四面防範周密賊酋如在釡底不出明年二三月克擒此賊曾不逾時而張興失事遂至恇怯失措自謂何敢復言進兵厥後倉猝移軍致多損失而添兵增餉之費較倍於前春來擒賊之言莫能奏績是聖主於閫外之事坐照無遺而臣下不能仰遵節制動失機宜誠為罪無可逭也是日上以四川按察使倉德為四川布政使建昌道石杰為四川按察使候補道陳仁為建昌道平定金川方略卷三
