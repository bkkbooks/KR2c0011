body:
  text: 乾隆十四年正月庚戌上命軍機大臣等傳諭經略大學士傅恒曰元旦天氣清朗旭日融和羣情欣豫朕心深為嘉恱以此驗之定卜今嵗事事暢順所至如願經略大學士傅恒已抵軍營茂迓天庥和輯士衆必能一月三捷迅奏膚功也除夕申刻接到十二月十八日奏摺籌辦諸務俱周詳妥協惟時朕已封筆此皇祖皇考所貽成憲經嵗惟此片刻之閒而經略大學士所奏遴員辦理糧運一事若俟部議行文外省督撫不知應發若干員迨其咨商往返遷延時日恐至三月杪經略大學士奏凱時該員尚未必到齊即交軍機大臣辦理亦須遲待數日是以朕即自行酌定口授内侍繕寫其中有向經記名者於履厯片中查派並量地方職任之繁簡設員之多寡如各省首府及黔省同知本少者皆未派出河南路不甚逺添派數員已行文各該督撫令於文到三日内馳驛前往庶可及時任事足敷調遣各該員辦理妥協自應照軍功議叙其庸劣者但議處該員此朕所親定與該督撫無涉朕於夜分籌辦如此即封筆後亦未嘗稍閒也至經略大學士所奏清字一摺及覆奏密諭諸摺岳鍾琪具禀一摺俱未批發俟初二日另頒諭㫖以元旦應言吉事期速成功也其傳諭湖廣雲貴河南各督撫諭㫖及揀派各員名單著一併抄發鴻鈞運轉氣象更新専聴經畧大學士喜音以為歡慶辛亥上命軍機大臣等傳諭經略大學士傅恒曰朕閱經畧大學士傅恒屢次奏報番境道路竒險軍行艱瘁朕知經畧大學士乃自請督師之人所奏實不過十得其五然即此而觀則人力之難施大概可見從前訥親張廣泗若將此等情形據實入奏朕必早有裁酌何至勞費若此此固朕上年運度駁雜所致而朦蔽之罪伊二人實已不容於誅矣且如天赦班攔等處羊腸鳥道備極險巇經略大學士惟躬親跋履乃深悉其難而訥親則肩輿牽挽鞭撲騶卒以為笑樂宜其視若尋常耳但經畧大學士密奏撲碉終非長䇿應另為籌辦朕思賊番據險負嵎凡屬要害俱有堅碉撲碉而外更有何計訥親張廣泗之罪實在欺蔽偷安種種乖張至於驅兵撲碉似未可以為非朕前曽密諭欲令索倫兵善登山者潛繞賊碉之後攻其無備惟此一䇿或尚可用然亦未知果能奏效否况據稱小金川地方處處均有碉樓可見番境築碉自古為然此乃天造地設以為羣酋窟穴即得其地亦不能盡行毁撤經略大學士昨在小金川暫駐籌辦未知所籌辦者若何又有抵營通盤籌辦妥協然後進取之奏經略大學士意中欲作何籌辦附便詳悉奏聞至稱小金川番人迎接時其恭順不及瓦寺沃日朕思瓦寺沃日與内地切近向化是其本心小金川較逺原屬化外皆係天然界限所以古稱蠻夷荒服以不治治之經畧大學士留兵在彼彈壓想確有所見不専為米糧火藥也此事屢經貽誤從前馬良柱連有克捷若益以三千人早可奏功而張廣泗不與此一誤也張廣泗分兵十路措置乖方不能乘機前進此二誤也訥親身圖安逸不能鼔勵士衆又不將實情入告此三誤也用兵何事經此三誤賊酋轉多三番抵禦又不知増置堅碉若干目今更難措手經畧大學士昨奏比初辦更費事之語甚是朕在數千里外固不能預燭其難是以又有此畨料理經略大學士未履其境亦無由深知其難是以力請視師今朕已洞悉形勢經略大學士目擊身親所見寧不相同朕前調遣滿兵本期一舉制勝邇來揆理度勢前所諭四月初旬之期更不可再有游移且滿兵必須及鋒而用計其全數抵營尚不出二月有暮春匝月之功自可奏王師三捷之效經略大學士奏稱俟至四月容臣奏到然後頒發班師諭㫖朕已於前諭詳示至三月杪四月初如十分得其七八自當無惜一簣之勞若僅得其半即宜於威武振揚之時納降順撫善圖竣事待各營整隊分撤以次徐行辦理亦須經月已在仲夏暑雨之時矣至前諭分設武弁駐守勒歪刮耳崖若三月内果得勒歪刮耳崖尚須斟酌若不能則但以萬人令岳鍾琪坐鎮爐地加意防禦自足綏輯蠻徼朕熟計深思無過於此再經畧大學士所奏岳鍾琪具禀一摺深中肯綮努三所帶第一起滿兵遲滯不前雖已行文督催究不知何日抵營各起滿兵於何時全到彼中形勢偪仄難容多人滿兵若已敷用即可及時進討其逺地如雲南甘肅之兵應計其能於二月内到齊與否若能到催其速到其未到者俱應照湖廣之例速檄停止縦中途遣回較之緩不及事徒勞往返者尚可少節糜費著傳諭經畧大學士傅恒及尚書舒赫徳知之是日上諭内閣曰大學士傅恒奉命經略軍營一切機宜悉聴調度朕觀番境情形大兵自當徑由黨壩一路攻取著傳諭經略大學士傅恒統領提督岳鍾琪督率官兵尅期進𠞰迅奏膚功其卡撒一路亦屬緊要應酌分滿漢官兵數千交内大臣傅爾丹相機辦理收犄角之效岳鍾琪等身膺軍旅重寄各宜稟承節制協力和衷共建殊勲以副委任壬子上命軍機大臣等傳諭經畧大學士傅恒尚書舒赫徳曰今日新正令辰恭迎皇太后聖母鑾輿内廷春讌仰䝉慈諭經略大學士傅恒忠誠任事為國家實力宣猷皇帝宜加恩錫封彼以公爵以旌勤勞欽承慈訓深愜朕心但封公之㫖應俟奏捷到日頒發著先行傳諭俾知聖母厚恩在經略大學士素志謙冲必將具摺懇辭此斷可不必經略大學士此番出力實為國家生色朝廷錫命褒庸祗論其人之能稱與否豈必犁庭執馘方足稱功即如大學士鄂爾泰張廷玉亦因其勤慎翊贊封爵酬庸何嘗有汗馬勞耶假若經略大學士因有此恩㫖感激思奮不顧艱險必期圖所難成抑或避居功之名必欲盡掃蠻氛生擒渠首方馳露布而凡有克捷槩不具報皆非朕所望於經畧大學士者即不具奏舒赫徳亦應一一據實奏報總之馳報軍情宜於頻速必朝夕相聞瞭如目覩方足慰朕懸切朕前諭四月初旬為期乃再三審度更無游移用兵原非易事又何可逞人力以違天意耶經略大學士試思在京辦事之時識見才力視朕何如今朕意已定自當遵㫖而行况經略大學士即能成功亦皆衆人之功朕降此㫖所以擴充經畧大學士之識量使盡化一已功名之見耳一切機宜連日所降諭㫖俱已備悉惟望經畧大學士仰體慈懐欽承渥澤諸凡從長妥辦俾國家軍民均有禆益朕實嘉焉是日上命軍機大臣等傳諭將軍博第曰據尚書舒赫徳奏稱西安滿兵行至四川地方前赴軍營有不須騎用之馬匹四川官員已將銀買留伊等馬四千匹朕思馬匹乃武備要用不可空缺今西安滿兵留川之馬既經川省官員購買則西安空缺之馬亟應補額可傳諭博第將兵丁在川所賣馬匹酌議作何抵補西安現今有無存貯馬價兵丁等在川所賣馬價或已交官或係兵丁等自用一併查明奏聞辦理是日卓鼐奏言梓潼以南各站應備夫馬俱已將次齊全惟劒川昭化等站缺馬尚多經臣勒定限期嚴飭齊備數日以來所辦之馬亦俱絡繹到站川省馬匹本少而臺站人員又不能加意喂養是以毎多疲痩一經馳騁便易損傷臣等現飭各屬務須多偹豆草加意喂飼自可日漸臕壯惟是原定程站係仿照部議三站合為一站之例併為五大站安設站逺途長馬易疲乏兼之棧道﨑嶇更艱跋渉川省以夫代車亦難兼程背運再四思維惟有查照向來正腰各站之數改為一十四站每站四五六十里不等可以日行兩站如此稍爲變通不惟朝去暮還夫馬均得休息不至人疲馬乏轉致遲滯而且官兵行走原定五百名一起五日全行今每五百名可䟎為四日全行每起早一日通計便可早十餘日但分站太多馬匹恐不敷用酌議兵丁跟役俱按雇馬脚價毎站折給銀一錢五分不惟可省馬匹抑且便於照料背負行李似此調劑則毎站止須馬三百五十匹夫八百名即充足有餘較之原定夫馬之數増減不相上下而於官兵行走大有裨益矣再查副都統努三所領頭起官兵於昭化劍川等站均有阻滯臣先後途遇俱已設法料理業經前進無阻正月中旬約可抵營翼長四十八等所領二起官兵與臣卓鼐於十六日同抵昭化因夫馬尚未齊備囑令暫駐統俟數日内各站一色齊全依次而進奏入報聞是日班第奏言臣身任封疆凡官兵過境一切應付事宜自應迅速料理乃因調度無能以致夫馬遲誤䝉皇上格外矜全念臣逺在軍營僅與交部察議竊念承辦司道俱獲重譴而臣封疆大吏轉邀寛宥撫躬自省慙悚難安伏乞皇上將臣一併嚴加治罪至調任川北道鹿邁祖自委辦以來並不實心經理難以姑容現在另疏紏㕘合併陳明奏入上命該部嚴察議奏癸丑上諭内閣曰此次大兵進𠞰金川一切催䟎官兵稽查驛站馬匹諸事欽差大臣如尹繼善舒赫徳皆因經畧大學士傅恒公忠體國勤勞任事舉能感動奮勉調度得宜於軍行甚有裨益朕實嘉悦前已降㫖將尹繼善革職留任之案加恩開復今尚書舒赫徳經過一路地方日馳二百餘里而且留心整頓諸事妥協殊屬可嘉著一體交部議叙甲寅上命軍機大臣等傳諭經畧大學士傅恒曰經略大學士傅恒現在已抵軍營所有分起前進之京兵及東三省兵并黔省陜甘由階文前進之兵俱於何日到營其成都滿兵經經略大學士留於美諾防守目下曾否調至軍營岳鍾琪召募新兵已得幾何傅爾丹所調補額之兵應已早到通計軍前以此㫖到日計算現兵若干續到若干自中途發回者若干各兵何日可以到齊著即奏聞至軍營専以籌辦攻𠞰為要其他不必分營即糧餉至重已有兆惠等専司轉運經略但須提撕警覺令不致懈弛貽誤耳臨陣交鋒決䇿制勝第在瞬息間運用神明専由大帥自非平日愛養俾精力有餘何以仔肩重任經畧大學士正當體此毋親細務而妨大計也乙夘經略大學士傅恒奏言伏查小金川土舎良爾吉賦性凶殘狡詐百出佔據伊嫂阿扣欺奪伊兄澤旺印信曽同莎羅奔攻取沃日至天兵進討始震懾來歸此等叛酋本應即行正法而張廣泗輕信漢奸王秋之言轉加任用使領蠻兵以致包藏禍心暗通消息軍營舉動賊輒先知其罪無可復逭况屢奉諭㫖明正國法而任事諸臣往往以握兵之故多致游移遂成姑息即臣在途諮訪人言或云大兵齊集方可舉動或云金川奏捷再行料理紛紛勸阻衆口一談臣竊思肘腋之賊尚未能除何以鼓勵衆心削平逆冦但彼現在領兵與金酋聲息相通縦使駢首就誅而其屬下番蠻萬一激變别生事端亦不可不為深慮幸有伊弟小朗素向稱恭順頗得衆心可以資其總統因於十二月二十日嚴兵防範密令副將馬良柱將良爾吉小朗素二人並以迎臣為名調出伊等營伍良爾吉先至牛厰地方見臣隨帶逆黨頗多意圖擁䕶觀其狀貌猙獰言詞狡黠若自負我軍素嘗倚重必無敢加誅戮者次日至邦噶山去卡撒十五里小朗素亦至臣面諭以良爾吉種種罪惡應正典刑今即授爾為副土司統領番衆隨召良爾吉面數其罪梟首軍門小朗素戰懼悚息幾不能言隨從良爾吉來營之衆無一人不屏息股栗者一時兵弁及番衆等歡欣恱服咸謂此賊早除則金川久當平定無俟今日勤動王師矣此皆我皇上天威逺播震懾要荒是以臣甫至軍營即能斬刈賊黨衆志咸孚也其蠻婦阿扣已令侍衛伊徳馳驛前往㑹同原駐小金川之侍衛富徳帶兵擒拿即於小金川地方正法訖良爾吉頭人蒼旺漢奸王秋俱在黨壩臣即行令岳鍾琪將蒼旺正法王秋挐解卡撒質訊後再行奏聞王秋妻子亦於二十二日密挐斬首市曹訖至良爾吉等黨羽多人臣體脇從罔治之意出示曉諭以安反側而土司中如綽斯甲等向懐首鼠兩端今臣不明指其人亦通行出示曉諭以破其奸使之警省畏懼不敢復行狡詐以輯衆番其示稿二道恭録一併進呈奏入諭曰經略大學士初至軍營即能斬除賊黨處若無事朕實嘉恱従此賞罰嚴明大功之成計日以待之臣等謹按良爾吉蔑倫助逆親率狐黨以抗王師洎乎官軍屢捷金酋窮蹙歸巢然後陽為歸順揆之憲典本無可原乃張廣泗偏聽漢奸王秋之言不惟屈法包容而且予之兵柄彼遂肆其奸計陽附隂違潛通消息以致軍中舉動賊營備知將弁領兵敗多勝少迨奸謀既露罪狀益彰我皇上洞燭於萬里之外決意翦除而張廣泗惟恐激變目前益致金酋猖獗訥親畏葸狐疑反謂誅之出於無名共為掩飾保䕶惟經畧大學士傅恒肅將王命獨斷不疑執而誅之無異孤雛腐鼠究之惡黨雖衆無一敢肆其邪謀而兵弁番民莫不額手稱快葢機貴密速惟斷乃成觀經畧初履賊境布置嚴密防範周詳因小朗素以統轄餘番用馬良柱以調離奸窟既密且速不動聲色而羣奸授首壁壘一新莎羅奔郎卡雖未望見旌旗業已氣盡能索宜其不出旬日間乞降恐後矣是日經畧大學士傅恒奏言臣於本月二十一日已抵卡撒軍營就近周覽形勢所有左右山梁不過兩坡相對地非甚廣賊人所守各碉俱在目前亦不甚大似乎攻克非難不知何以用兵一二年尚不能進取及查安營之地規模狹小與賊相望且雜處番民市肆之中觀瞻不肅無以示威嚴而占地利臣已另行相度擬於嵗内移營於舊壘之前又軍中向無總理營盤之員不復知有紀律今臣已委總兵官冶大雄總理以肅軍紀至於營中諸事茍且廢弛而緑旗兵丁怯懦無能貧窶特甚其勢斷不可用目下大兵未集而臣亦履勘未周必俟巡覽周徧審其難易險夷使胸有成竹且滿兵亦漸次抵營然後可議攻取約在新年必當進發臣細度情形前此之誤在於専攻碉卡毎攻一碉需時甚久兵力大傷所得不過尺寸賊境堅碉林立且聞大兵將至守禦益嚴毋論攻其有備克取為難即使數日而克一碉恐數年不能竣事今惟竒正兼施相機行事或以奇兵繞出其後或以偏師另行取徑彼出則直挫其鋒并力斬殺不出則聽其坐守空碉而以銳師深入専搗賊巢又令各路齊進使之彼此受敵左右不能兼顧晝夜不息寢食無暇自必至於内潰而酋首可擒矣在此時衆論皆畏其難即臣亦何敢輕敵獨謂其易然到營之日仰仗天威立時殄滅賊黨先奪其魄即日進師較之従前自應改觀也至諸將所報近日攻擊情形詳審其詞俱未可信即如莽阿納所報初十日樹林内殺賊三人又攻八卦碉殺賊三人俱不能得其尸首岳鍾琪所報殺賊數十而斬首僅一級康八達殺賊五十人亦不過據兵弁托詞拖尸而去何足為憑此等皆係向來舊習臣當設法稽查必以首級為據使之不敢虚報則功績自難朦混再臣前在灌縣曽令内大臣班第前往黨壩相度形勢據云黨壩與卡撒道路形勢相等亦未見其易於攻取臣意俟大兵漸集臣即於卡撒進攻令岳鍾琪於黨壩攻𠞰如進兵尚須時日臣擬前往黨壩勘明實在情形仍交岳鍾琪辦理臣即回營調度定駐卡撒進兵奏入俞㫖報聞是日經畧大學士傅恒以奉到議叙恩㫖具摺懇辭諭曰覽卿奏辭已悉謙冲但如卿之忠誠實力即議叙亦不足以盡朕嘉悦之懐不必固辭是日經略大學士傅恒又奏言成都以西至卡撒軍營凡官員兵丁夫馬例給口糧草料皆在各糧臺支發今查管理糧務各員辦理此事並無章程祇憑片紙給發不用印票竟可任意開冩冒名支領毎多逾額重複而管糧官亦不免藉此混開無従稽核臣思錢糧絲毫為重官吏浮開固有闗於國帑而冒領滋弊又將貽累於應得之員均為未協總因管糧之員不過佐雜庸才以致如此草率計臣所帶官弁兵丁不過一二百人尚有冒領浮開之弊將來大兵經過弊竇尤多核銷何據臣已咨明撫臣班第速飭布政使行查嗣後大兵到時官員兵丁馬匹應領廩糧草料俱於成都給與印票各糧臺驗票給領庶浮開之弊可除而支領亦不致冒濫矣奏入俞㫖報聞丙辰上諭内閣曰前據張廣泗力言良爾吉王秋不可輕動恐致滋事即軍前諸人皆明知其罪而疑畏不敢先發今經畧大學士傅恒甫至軍營即取兩年逋冦如檻豚圏豕以快人心而警番衆非謀猷明斷識力堅定曷克臻此即此已當優叙但經畧大學士傅恒於従前議叙之案現在具摺懇辭若此案仍交部議叙無以善體冲挹之美其前日所賜雙眼孔雀翎想接到時亦必謙讓未肯服用今即以為經畧大學士此番酬庸之典如仍執意謙讓是乃不遵朕㫖達爾黨阿舒赫徳亦必當力勸也至王秋以王者師王者賔名其二子此即與邪逆夏如春等無異漢奸心懐不軌造言生事大率類此各省督撫平時必當留心凡涉此等名目多係叵測之徒即當嚴行查察究處不可視為泛常著通行傳諭知之是日上命軍機大臣等傳諭經畧大學士傅恒曰經畧大學士辦理良爾吉一事甚覺従容然自朕觀之又似畧少防範此等番民皆属化外大學士一身所闗甚重豈可輕身接見少有疎忽今其事雖已過而将来前抵軍營察看地方情形所經之地皆與賊巢相近非内地可比斷不可恃勇輕舉也是日上又命軍機大臣等傳諭經畧大學士傅恒曰據經畧大學士奏稱前往黨壩勘明仍交岳鍾琪辦理臣定駐卡撒進兵軍前機宜自難遥制但須胸無成見揆形勢之當然以定進止方可適中窽要經畧大學士成見未化以朕度之究應趨歸黨壩為是想兩地勘明必有成算當不出朕前所指示也馬良柱此番似属得力想因大學士奏請錄用感激圖報黽勉向前冶大雄生致良爾吉經畧大學士用為營盤縂管或亦因其人材足取此二人如果能奮勇應酌量加恩經畧大學士一面傳㫖一面奏聞馬良柱曽任縂兵向日攻𠞰金川亦有微勞若有總兵缺出即可補用以示鼔勵朕西顧懸注日夜焦勞即此次於亥刻接到經畧大學士奏摺辦理已過三鼔良以經畧大學士勤勞於外朕中宵髙枕心實有所不忍耳可傳諭知之丁巳上諭内閣曰向来命将出師大帥必有㕘贊今經畧大學士傅恒奉命督師内大臣傅爾丹尚書達爾黨阿舒赫徳縂督尹繼善䇿楞俱著㕘賛軍務經畧大學士傅恒調度一切機宜和衷採納務期籌畫萬全於軍旅實有裨益是日上又命軍機大臣等傳諭經畧大學士傅恒等曰經畧大學士所奏直搗刮耳崖固亦用間出奇之一䇿不入虎穴安得虎子古人固有此言然必計出萬全乃可懸軍深入設不過冒險直前則所謂一夫之勇耳番境乃天生絶險為鼠輩窟穴自朕思之此事實應早為轉計昔聖祖仁皇帝三征沙漠究未親擒噶爾丹維時諸将皆鋭意俘馘聖祖仁皇帝因糧運稽遲不得已下詔班師其事載在方畧夫以皇祖之神明英武當時文武大臣之智謀勇畧滿兵之驍健果銳尚不能得志于平原曠野之沙漠豈非限於地之遼逺勢有所不能乎今經畧大學士傅恒自問一已之韜鈐若何同行㕘贊諸人之籌䇿若何滿漢兵丁之力量若何而必欲為所難為耶我皇祖之英武超越千古至今薄海内外莫不震叠亦由聖心知進知退洞悉機宜能忘一己之成見俯納羣言歸於一是實乃大聖人萬全無弊之道可以垂教奕禩子孫臣庶皆當效法經畧大學士奉到朕連日所降諭㫖定必悉化成見循理度勢熟籌長䇿慰朕懸注縂之國家經費不可不節民力不可不恤而川省之險逺疲困不可不思患預防朕所見者逺所全者大可詳悉傳諭經畧大學士傅恒並傅爾丹達爾黨阿舒赫徳尹繼善筞楞是日上又諭内閣曰侍衛富徳伊徳於良爾吉案内承受經畧大學士指示辦理妥協而伊徳於途次隨従行走又甚黽勉著加恩将富徳伊徳俱授為二等侍衛己未上命軍機大臣等傳諭經畧大學士傅恒曰金川水土惡薄與内地迥殊前據鄂實奏稱人易發喘須服人參經略大學士傅恒亦奏稱番境氣候不佳觀此則蠻方荒徼非人所處也明甚經畧大學士質非强壯所以勤勞罔恤者惟恃此心之忠誠堅固然軍中事務至繁機宜闗係至大祇賴經畧大學士指揮調度必應加意愛䕶使精神充裕然後肆應有餘况天下事頗有力不従心之處非謂有是心即能事事周到食少事煩古人所戒可不慎乎今發往庫參三斤賜經畧大學士服用餘照另單傳㫖分發以示朕注念諸大臣之意壬戌尹繼善奏言陜省安設臺站所撥營驛馬匹經布政使議於臺站處所預備豆草酌中定價令各該員弁於到站之日折銀現買署撫臣瑚寳因兵丁所闗馬乾草折銀於各本營買補豆草委無銀兩攜帶買喂奏請先於管理各臺站官員處照數支領豆草飼喂事竣在於各兵丁季餉扣除奉㫖交臣酌議臣查兵丁所闗草乾銀既於本營買補豆草自無現銀攜帶瑚寳請先在站支領事竣扣除原属通融辦理自應先為支給瑚寳又稱各兵所闗馬乾草折日有定額而陜省今嵗收成適遇歉薄即酌中定價亦多不敷若悉在該兵季餉内扣除難免虧缺請自到臺之日起至撤臺之日止共支豆草若干除將各兵應領馬乾草折按日扣還外其餘不敷草料銀兩作正報銷臣查陜省今嵗收成委属歉薄物價昻貴而各兵所闗乾銀毎馬毎日止五分三分不等若概於季餉扣除誠如聖鑒難免拮据似應如瑚寳所奏將不敷之數作正報銷至回馬兵丁一項原應令其自備但陜省本年食物既貴而兵丁逺赴臺站當差若令自備口食似非仰體皇上撫恤邊兵俾免内顧之至意似應如瑚寳所奏毎日酌給口食銀四分以廣皇仁臣又查各臺站住宿之處因房屋不足需用帳房俱係派撥兵丁自營逺送逐日看守此項兵丁與回馬之兵在站應差者情事相同可否一體照給口食謹并奏明奏入諭曰亦著一體給與平定金川方畧巻二十一
