body:
  text: 十月辛酉張廣泗奏言臣等分派西南兩路鎮將定期六月二十八日進攻至七月中旬各路呈報進勦情形業經㑹奏兹據西路統領宋宗璋呈稱革什戎岡儘南之陡物黨噶尚有要卡數處乃我兵前進必由之道令遊擊吕大智阿爾占等領兵攻擊自七月十五至二十二日得石卡兩處戰卡二十九座並獲矛刀等物擊死賊番百餘官兵亦有陣亡帶傷者遊擊王珩進攻木耳金岡遊擊王三元進攻康八達守備馬廣由康八達左山梁直下攻擊悍憎碉寨皆小有斬殺我兵無損而各碉不能即克七月二十七日密派候補㕘將張豹統兵進攻木耳金岡宋宗璋親行督陣兵丁奮勇殺賊一百五六十人賊人大敗逃入碉内死拒宋宗璋以陡物黨噶木耳金岡各寨雖路險碉堅賊人備禦嚴密但未經克破即難直搗勒歪因於八月初二日至十六日分派官兵應援截殺數日間共殺賊二百餘人奪獲作固山梁石卡一處而賊碉不能即破現在設法攻擊以期必克又據㕘將郎建業永柱等呈稱七月二十三日進攻卡裏得大山梁一座又得賊卡二處擊死逆賊五十餘人八月二十三日乘月進攻卡裏擊死賊番數人餘賊竄入溝箐又據新陞重慶總兵馬良柱呈稱撒籠革不籠等寨在丹噶山之右達壩溝之左必須攻撫收為我用七月十六日遣兵分路進攻焚燒撒籠等七寨大碉二十餘座小碉四十餘座燒死賊番甚多十八日攻取讓噶等寨賊番迎敵官兵奮勇追殺賊敗入碉抵禦至十九日賊知不免情願投誠隨獻鳥鎗八桿並遣頭人前來因准其招撫進攻噶固碉寨賊番畏懼乞降亦予招撫二十五日進攻曽達碉寨奪取戰碉一座燒死賊番數十人生擒二人隨遣官兵攻取石達大碉此碉堅險非常天雨連綿現在晝夜夾攻是月十五日夜有賊番四五百人前來刼營官兵知覺用力攻擊直至次日黎明賊始敗去殺賊無數並獲鳥鎗刀矛等物又據帶領川兵㕘將買國良帶領陜兵遊擊張廷蔚帶領黔兵遊擊韓樞等聯衘呈報七月二十九日攻擊色底大戰碉燒燬左邊碉寨三座八月十八日有賊番百餘在右山梁施放大砲直至官兵營盤副將髙宗瑾㕘將買國良等用計伏兵殺賊百餘人斬獲首級十七顆賊衆大敗此西路各鎮將自七月中旬至八月下旬攻勦之情形也南路統領許應虎呈稱七月十四日派遊擊保懷智効力革職㕘將楊澤厚等進攻甲木賊寨十九日連燒碉房二十二座燒死賊番無數奪得蠻監一座内禁各處擄去男婦逐一救出燒燬蠻監領兵前進直撲甲木官寨賊兵抗拒多被殺傷仍入碉死守甲木地方已平一半甲木與的交止隔小山梁一道至刮耳崖均不過五六里現在設法攻擊又據副將張興禀稱馬邦寨之右有大戰碉一座左溝内有平碉二十餘座七月十四日遊擊陳禮等分兵三路無分晝夜奮勇夾攻數日賊番畏懼乞命出碉赴營呈獻鎗矛投順共得戰碉一座平碉三十餘座至馬邦曽達二寨周圍有石城戰碉俱甚堅固現在㑹商馬良柱設法合攻又據遊擊羅于朝呈稱來當山梁木城石卡下有巴寨賊人屯糧在内羅于朝同汪結暗襲巴寨明攻城卡賊見巴寨火起棄城逃奔對哇山登上石城我兵追趕連奪石城五處計燒燬巴寨碉房五十餘間燒死男婦甚多賊糧俱為灰燼奪獲木城一座石城三座石卡三十餘間對哇山梁東面有木城石卡七道賊俱逃入其内羅于朝王世爵製備攩木柴束並備賞項於八月初四日進攻頭道石卡頗有斬獲賊俱逃入二道石卡攻不能克因設法伏誘擊死賊番奪獲碉卡追賊至馬牙岡地方放火焚燒大戰碉賊蠻焚死無數乘勝攻至戎果寧得地方亦有斬殺生擒者馬牙岡一溝碉寨稠密正欲進攻因雨暫停俟晴明再為進勦奪獲賊卡現令土司把守此南路各鎮將自七月初旬至八月下旬攻勦之情形也臣查宋宗璋由黨壩進攻勒歪地險碉堅甚於他處自七月十二三日攻克作固山梁革什戎岡之後迄今月餘所有木耳金岡康八達陡物黨噶等碉卡僅獲石卡數處而大碉未克賊番固多授首而我漢土弁兵傷損亦復不少此乃征勦逆酋正路是以賊守最固己飭該鎮相機設法攻取以期必克至郎建業等進攻卡裏一路經今兩月僅奪石卡二處而傷兵失砲有過無功查此一路官兵臣原派令由曾頭溝前進因卡裏小道去勒歪止數十里之近而郎建業又素稱熟識番情是以宋宗璋令其前進以為竒兵臣亦准其所請不意為賊阻遏臣已檄令仍由曾頭溝來聽臣調遣馬良柱於進兵之始奮勇攻擊勦撫兼施旬日之間乗勝直前去刮耳崖僅二十餘里而為色底等碉寨所阻總兵許應虎雖前攻獨松失利迨其改由的交直抵刮耳崖對河相離不過六七里而為甲木等碉寨所阻副將張興攻克馬柰等險寨兵勢頗振去刮耳崖亦不過二十里而為馬邦所阻遊擊羅于朝等攻奪來當山梁城卡頗有斬獲亦去勒歪不遠現在相機進攻臣查諸路鎮將雖無出竒制勝之䇿即臣亦不能有所指授然皆人思奮勉即漢土官兵亦皆努力用命其所以始進頗鋭而中間停止不能直抵賊巢者由相去賊巢愈近碉寨愈堅拒守愈固而地勢亦彌險也然我兵已有數路逼近賊巢營壘相望賊人四壁俱殘腹心漸潰臣查另有山梁一道地名昔嶺在叅將買國良等所攻美溝之右其山至髙若我兵攀援而上可以俯瞰勒歪而直下刮耳崖為尤近賊現於山頂修砌木城石卡臣所調黔兵二千益以川省土兵千餘名令由此路前進臣亦於九月初九日親往督率指示務期奪據此嶺則俯視賊巢直下攻取賊必反顧巢穴而色㡳曾達馬邦甲木等寨皆可克取即宋宗璋所攻之木耳金岡等處賊人亦難於固守矣臣擬仰仗天威於九十兩月進取賊巢期在今冬粗定大局而善後事宜方可次第辦理總以一勞永逸為圖不敢稍存將就了事之念以滋日後釁端也再近日屢獲賊番僉供莎羅奔之兄就日吉於八月初五日已伏冥誅是否實情現在另行確查奏入報聞臣等謹按熱籠解圍之後金酋逃竄回巢不敢復出小金川素與為唇齒之依者經馬良柱招降轉為我用而張興又領兵直抵牛厰逼近賊巢番民焚香跪接乗此機會自牛厰直抵刮耳崖破竹之勢可成也乃其時張廣泗昩於進攻之術誤以美諾為西路可進牛厰為南路可進又欲前往雜谷以商進攻黨壩之䇿夫黨壩一路初無可乗之機而雜谷閙距黨壩尚有六七日之遠其為懸揣臆度闇昩機宜固己無辭解免迨乎訂期六月二十八日七路進攻之後在在均有克獲諸番往往歸順官兵奮勇賊勢窘蹙正軍威大振之會而張廣泗不能剪除良爾吉王秋之奸轉墮術中令良爾吉與買國良會攻刮耳崖以致良爾吉等肆其譎詐漏洩軍機使賊得添碉建卡挖濠設防備禦既完官兵遂難前進此當日在事文武咸所目睹至今猶有咎責者也是日張廣泗以叅將蔡允千總馬繼領兵攻取獨松被賊搶去砲位殺傷官兵請㫖革職審擬遊擊保懷智王世爵不能奮勇禦賊總兵許應虎身為統領調度不善均難辭咎但俱現在進兵懇恩令戴罪効力俟事竣核其功過又奏言川東道陳緯久任蜀省才具明晰諳曉夷情請調補建昌道辦理軍糈上皆可其奏乙亥上命陜西固原提標中軍叅將任舉馳驛前往金川軍營聽總督張廣泗調遣委用壬午紀山奏言秋氣漸深凡㑹城得雨之時番地每即降雪是以川西草坡一路糧臺已准督臣移咨捲撤赴章谷河口按臺接運蓽蓬一路現在議撤至黨壩一路據該臺員報稱於九月十二至十六等日大雪不止作固山積雪五六尺不等䭾運軍裝糧米俱在述格寨存貯現在飛飭設法開路但必須雪止方可施用人力蠻夫不敷輓運又於雜稄土司採買騾馬幫運至松潘協黨壩一路糧石因運道遥逺口外雪大牛馬倒斃者多此川西糧運情形也至川南糧運先經採買烏拉二千頭供運後因不敷又添買二千頭幸無遲悞而明正司所屬地方牛多瘟疫不得不添雇蠻夫背運蠻夫不足又兼僱漢夫赴爐幫運自爐至章谷原定六大站每站有八九十里站大實難趲行督臣已據糧務道酌改四十里一站爐城九月十四至十六等日亦連降大雪平地二尺以至大砲山亦積雪四五尺軍糧俱暫駐山脚下現在飛催開穵通道此川南糧運情形也臣查各路環攻未能直抵賊巢另查有昔嶺山梁一道現在督兵由此進攻糧運亦改於曾頭一路添設臺站合行陳明奏入報聞癸未上命軍機大臣等傳諭張廣泗曰前因川省氣候早寒恐氷雪嚴凝官兵艱於取㨗曾傳諭總督張廣泗令其酌量情形或應暫行退駐向陽平曠之地令稍為休息俟春氣融和再加調官兵一舉克㨗今據廵撫紀山奏稱黨壩等處九月中旬已連降大雪不但糧運堪虞我兵亦應籌畫萬全通盤計算或酌留官兵防守休養士卒俟春融再候進止可見彼地情形冬令嚴寒運餉進兵俱難得濟張廣泗前曽奏我兵逼近賊巢而昔嶺憑髙可以出竒制勝大約九十月間可有就緒如果能如期奏凱固為甚善但目今未見㨗音或者尚需時日該督身在軍營因地制宜待時而動自必豫有成算著將紀山奏摺再行傳諭知之再紀山奏稱莎羅奔差頭人赴軍營及撫提衙門投禀乞降但未親赴軍營真偽難測不便准其投誠張廣泗亦曽奏該酋與伊兄就日吉父子屢遣番目乞降㫁難允行是該督已洞燭其奸詐所見極是逆蠻反復狡獪即使面縳歸誠尚難保其日後不復肆橫况此番官兵雲集正當犁庭掃穴痛絶根株一勞永逸㫁無草率了局之理著傳諭張廣泗務將莎羅奔擒獲明正典刑即使堅壁待時更當嚴加防範無致巧為兔脫又如班滚之焚毁空巢也十一月己丑紀山奏言湖北江西先後共解到餉銀六十萬兩各路軍需撥解已陸續動過銀一百萬兩有零雖尚有奉撥廣東省銀六十萬兩未到然將來解到之日除歸還借動各項外僅餘銀二十萬兩大兵尚未凱旋在在均需支用合再陳請在於鄰近省分添撥銀五十萬兩解川備用庶臨事不致掣肘奏入上命該部速議旋經該部議准於湖南撥銀三十萬兩江西撥銀二十萬兩俱速行解川協濟辛卯張廣泗奏言臣前奏昔嶺山梁可以俯瞰賊巢擬於九月初九日親往督率進攻乃九月初八日據署泰寧副將張興呈報馬邦馬奈一帶已經就撫之夷目恩錯因總兵許應虎撫馭不善復行背叛於九月初五日帶領蠻兵千餘將駐劄馬邦之逰撃陳禮守備王珩營盤後山梁搶占晝夜圍攻並將許應虎軍營糧石火藥鉛子俱行搶去又據駐劄馬奈守備李璠報稱九月初四日兵丁押運米四十八背至卡卡脚一更時分山溝樹林内突出番蠻八九百人亂砍䕶運官兵二更時分有賊五六百逼近馬奈營盤至次日辰時方退適革什咱巴底巴旺土兵奉調前來重賞鼓勵奮勇直前賊蠻奔逃官兵乘勝攻取前後兩寨臣飛飭附近之馬良柱張興發兵應援又飛調原守卡裏一路之叅將郎建業永柱等帶兵速來小金川聽調隨據許應虎呈報九月初四日四更恩錯帶領刮耳崖甲木賊番千餘鎗砲齊發攻壓我營連日晝夜攻擊賊人未退糧運阻塞又據報賊勢頗熾急切難除已照㑹張興速遣兵七八百名到的交應援臣因張興之兵不敷應援隨於調到郎建業等所領官兵二千餘名内派出一千八百名臣親身帶領赴丹噶山馬良柱軍營策應派委張興帶兵二千餘名渡河往的交應援二十五日據許應虎呈報賊攻營壘連日分兵力戰賊始􅇓逃官兵因之糧石未便遣追臣查恩錯係馬邦馬奈一帶管事頭人前於七月内張興攻克馬奈許應虎攻克正地之後畏懼投誠該鎮將利其道路可通糧運遂准收撫此等收撫原不過一時權宜仍須日後查别良頑以定勦撫此滇黔楚粤厯來辦理苗疆之成規為許應虎所熟悉不知該鎮此次領兵何以每事乖張且多任意而行皆於事後通知並不與臣預為商酌即如進兵之始原派令由正地進攻乃因獨松未克遂舍正地而徑趨的交及至的交之後屢攻甲木不克招降恩錯而遽責以運糧又令出兵數百為我前驅以致恩錯悖叛阻截糧運此等情節皆無隻字報臣今幸賊兵已退若仍令久駐恐再僨事已檄於十月初二日速赴臣營另候調遣該鎮有勇無謀性又躁急實非統領之才也至馬邦馬奈一路賊氛未靖臣已交與馬良柱張興竭力進勦以通糧運查丹噶山去刮耳崖賊巢僅二十餘里中隔深溝二道山梁四層懸崖陡峻實難力攻再四詳審惟有奪據昔嶺方可乘髙而下臣隨於十月初一日仍回至小金川調集官兵即日親赴卡撒就近督率指示務期俘擒首惡然後分兵四出淨盡根株此番用兵遲滯實縁地勢奇險而臣限於才力然竭臣之愚決不敢一時稍懈奏入報聞臣等謹按張廣泗所奏許應虎的交被圍臣於調到郎建業等所領官兵二千餘名内派出一千八百名親身帶領赴丹噶山馬良柱軍營策應是的交被圍張廣泗親領兵赴援固已形諸奏牘矣今四川總督策楞查報事實册稱九月十六日莎羅奔遣頭人生格到張興營盤聲言投誠並禀稱莎羅奔已遣頭人往解的交之圍先於十三日莎羅奔果遣土目喇梅朗康結持信到的交而許應虎之圍始解張廣泗並未親往救援夫以大帥身居閫外統領全軍膺股肱心膂之重寄當鎮臣被圍寇氛方盛之時並不奮袂投戈挺身赴敵而於事後陳奏乃公行欺誑於君父之前即此一節罪不容誅矣壬辰張廣泗奏言臣現在督率各路諸鎮將奮勵攻取期於今冬掃穴犁庭以紓聖主西顧之憂惟是金川事尚未竣大兵未可全撤各路從征之土兵萬餘久役未免疲乏且轉瞬届春咸懷東作之思自應酌撥囬巢土兵一撤則官兵分佈單弱若於内地添調則川省在在兵單若於鄰省調撥不惟多糜帑項且恐致滋驚擾伏查雍正年間滇黔苖疆用兵有招募餘丁給與守糧以資防禦事竣裁撤之例請即照此例豫於各營招募新兵給以守餉隨時訓練俟土兵撤退即於各標營抽調制兵前赴軍營添補而内地即以此等守兵捍禦似屬有益奏入上命軍機大臣等速議議曰從前陸續派撥漢兵一萬六千名土兵一萬名恊力進勦此項土兵俱係按寨派撥從征既久又近春耕之期自應酌量裁撤俾得及時耕作此時軍務未竣正資兵力自當抽調制兵前徃以供調遣應如所請照雍正年間滇黔苖疆用兵之例於各營内招募餘丁給以守糧訓練熟習俾資内地捍衛其召募兵數及土兵應作何減撤之處俱令該督一面辦理一面奏聞上從之是日張廣泗以各路官兵多有傷故又續調川兵二千名補額十二月乙亥張廣泗奏言兵臨賊境自八月以前尚能克取碉寨乗鋭而前直逼賊巢逺者二三十里近者十餘里似旦晚之間可以犁庭掃穴乃去賊巢彌近而碉寨彌堅官兵皆為頓阻聽之則擁師坐守促之則徒致傷兵且九月内許應虎又因賊夷恩錯反覆阻糧圍困臣親赴丹噶救援雖賊已敗潰而徃返半月有餘遂致軍機遲滯查進攻刮耳崖非襲奪昔嶺不可而昔嶺附近要隘賊碉皆須力攻非用大砲不可臣於十月初一日由丹噶復囘至小金川調兵造砲擬不過半月之内兵至砲成臣即親赴卡撒距昔嶺二十餘里就近指示督率進攻乃臣由丹噶起身之後賊人復犯馬奈軍營隨遣叅將永柱署遊擊徐介眉等帶兵一千餘名又令許應虎將的交撤囘之兵一千名飭委都司茍興守偹曹登德帶領前徃應援賊俱敗入戎布寨内現在四面晝夜攻圍以致馬良柱所帶之兵仍在丹噶就近聲援未能即赴卡撒而試造之砲又因匠作器具不全屢鑄不就現在飛委員弁星赴成都趕造並飭催馬奈將士速將戎布攻克即由彼取道彚集卡撒候臣親徃督攻是以一月以來臣復停駐小金川坐糜糧餉惶悚無地十月二十八日欽奉上諭以塞外地近雪山氷霜嚴冷或且暫駐向陽平曠之地稍爲休息俟氣候融和厚集官兵以爲一舉掃除之計臣查蠻境寸歩皆山髙出雲表故盛夏猶有積雪然地處西南與北塞稍異髙處則寒低處則暖隂雪則寒晴霽則暖即金川賊界四面皆有雪山我兵皆已度越雪山進抵賊巢不逺若復退駐賊必前徃奪據明春攻取爲難現在各路官兵雖未能直搗巢穴然已扼吭拊背賊亦屢次遣人投誠臣曾面見頭人諭以莎羅奔罪無可赦必欲免死求生俟官兵進抵巢穴面縳而來另候酌奪即日押令囘巢及臣自丹噶囘至小金川莎羅奔又邀請羅于朝汪結至勒歪懇請招安並遣頭人隨同前來臣復面見再加曉諭以此番用兵務期勦除兇逆不滅不已今嵗不能至明嵗明嵗不能至後嵗决不似瞻對燒燬罷兵也臣查自八月以來我兵阻碉不前賊應愈肆䲭張而反呈獻砲位印信及被虜土司兵民者並非誠心乞命不過暫緩我師以圖休息不久仍出肆掠耳若我兵一退正墮其計又詢之土人云此地冬雪尚少春雪毎多三四月後方能融化如其言果實則力攻正在此時再查金川所恃地險碉堅非恃衆也現在我兵之數已倍於賊若能破其所恃則現已足資辦理否則雖厚集兵威亦衆無所用且雪山囘阻糧運艱難若再増兵則糧運愈艱臣當就現在官兵努力辦理不敢遽請增益目前戎布寨已將攻克俟馬奈一帶肅清賊人不敢出犯巴底地方許應虎餘兵留守正地則革什咱可以無虞黨壩一路現在鑄造大砲並開挖地道賊亦不敢出犯雜谷至小金川通賊路徑皆有兵堵禦綽斯甲一路現在添兵前徃是四面皆已防範周宻賊酋如在釜底一俟兵到砲成各路進攻以臣料之不出明年二三月克擒此賊不難也奏入報聞是日張廣泗又奏言攻克堅碉必須大砲各營現有百子劈山威逺等砲僅能對敵於行陣之前無益於摧堅之用紀山所鑄大劈山砲重三百餘觔分發各路應用頗爲得濟然尚嫌力㣲而再議加重則又移動爲難臣查從前兩廣督臣鄂彌逹曾令廣東巧匠鑄造九節銅砲運京䝉世宗憲皇帝頒發西北二路軍營後值黔省苖疆有事亦曾頒給四位此砲合之則可摧堅分之又易擡運用之於此一帶番酋之地大有禆益伏祈勅賜頒發四位來川臣仍密咨廣東督臣䇿楞雇覔原匠來川再行照式製造庻勦滅逆酋可以收速成之功矣奏入上諭内閣曰據張廣泗奏請頒發九節砲四位來川備用朕思川省征勦逆酋不妨多備數位着將京城八旗存貯者選擇十位交與工部照例派員即速運徃是日張廣泗又奏言陜甘地界九邊其間營伍𦂳要夷情重大雖各有撫臣經理而於提鎮則無節制之權戎行則無整飭之責至川省營伍吏治之積習嘓嚕奸匪之横行皆需督臣督率經理是以臣身居蜀地心繫秦中雖陜甘現在無事而臣以爲消弭有事正當在於無事之時可否仰邀皇上天恩時命公正幹濟之大臣暫署陜甘總督印務俾臣得專力軍前諸務俟措理就緒然後另行奏請定奪庻巖疆不致貽悞奏入上諭内閣曰張廣泗逺在軍營不能遥制陜甘二省事務着黄廷桂暫行料理至一切武備尤關𦂳要更宜留心如有地方重大之事仍與張廣泗㑹商俾無兼顧之慮得以專力川省該部卽行文該督等知之平定金川方略卷四
