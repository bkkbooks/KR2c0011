body:
  text: 二月壬辰經略大學士忠勇公傅恒奏言莎羅奔等於正月二十日遣頭人具禀細訴向來愚蠢無知初與隣封搆釁後則畏死自守非敢抗拒天朝今易子析骸竄身無地呈獻甘結遵依六事又賫牛羊皮幣臚列營門叩求收納臣以元兇並未面縛來營峻拒其請該酋又屢禀自知罪重如山到營難希倖免哀懇求生情詞廹切臣仍不允賊勢益窮轉求綽斯甲土司哀懇提督岳鍾琪代禀以冀格外開恩赦免一死提督岳鍾琪見其中心誠服許為代禀該酋踴躍歡欣即迎請提督從賊巢之勒歪刮耳崖前來卡撒大營䖍備夫馬伺候迎送壺漿夾道供張殷繁極其恭敬讋悚經提督岳鍾琪來營備陳該酋言語情形臣傅恒終不允其所請伏思該酋罪惡重大久稽天誅此時惟有面縛投營泥首伏辜或可請命於朝冀格外寛宥之曠典若窮蹙乞命又懼誅不出何容假易不日大兵到齊鋭師深入俘馘渠魁殱除醜虜實屬法所當然是以尚在籌畫進勦乃正月二十八日奉到諭㫖令臣傅恒納降班師臣伏惟我皇上好生為心包容為度以化外逺夷不足深較但使服罪輸誠不妨兼覆並載仰見皇上伐叛柔服義盡仁至又軫念軍營將士戮力同仇川省民夫輸將恐後疆塲鋒鏑之危老弱饋餉之苦時時上厪宸𠂻惟期攸徃夙吉不欲久為煩擾此誠聖天子息事寧人之至意今明㫖頒來適在納欵投誠之㑹臣自應仰體聖心相機辦理伏思金酋向與諸番搆隙不過穴中之鬭原非抗衡天朝此次大兵來營未及三分之一而賊已窮困乞降即俘戮之不足為武臣等公同商酌允准納降隨據該酋於本月初四日遣令番衆於軍門之外除道設壇鋪陳供張初五日早莎羅奔率衆來降從前因莎羅奔係土司郎卡係土舍是以止莎羅奔一身請降今至期郎卡亦隨來營據稱若不來見恐終不能免伊之罪臣傅恒陞帳受降臣傅爾丹臣達爾黨阿臣舒赫徳臣尹繼善臣䇿楞同至營門莎羅奔等率衆喇嘛及頭人番衆跪迎皆服鮮衣舉香作樂臣傅恒至帳中莎羅奔先領衆頭目俯伏帳下臣傅恒責以爾土司世受皇恩乃不法生事侵擾隣封並敢負固抗衡罪不容誅莎羅奔悚懼戰慄禀稱土司如同螻蟻豈敢抗拒天朝縁居衆土司中每被欺凌欲徃成都控訴無路可通不得已用兵抵禦以攄夙憤致煩天兵問罪即畏死自守不敢復出下情難申今得見經略大人如見天日惟哀籲赦宥永戴皇上如天之仁此後不敢復蹈前轍并懇大人賞給印牌如有受屈之處得赴地方官告理不為衆土司阻格臣傅恒諭以今後惟宜遵奉國法無得再生事端喚令至前手授賞賜之物即膝行前來領受叩謝繼則郎卡率衆泥首帳前倉皇震恐臣傅恒責以抗拒之罪並諭以朝廷既赦爾等必不加誅郎卡隨俯伏叩首臣傅恒見其係一少年喜事不安本分之人因諭以此番䝉朝廷格外曠典汝幸得寛宥嗣後倘不安靜致生事端煩我再領兵前來汝即不能似此相見矣郎卡聽聞此語恐懼無措臣隨亦加賞賚又據莎羅奔等獻古佛一尊銀萬兩臣傅恒受佛却金該土司不肯收回禀云此銀恭獻經略大人如獻與達賴喇嘛一般蓋明其誠敬之至也臣再四曉諭據禀大人既不肯受我等應將此銀為經略大人建葢生祠受降事畢臣等各回本營莎羅奔郎卡復焚香跪送其時天色晴朗和氣薫蒸將士民番觀者如堵莫不歡慶臣傅恒於初六日起程回京其陸續班師各事宜交與臣傅爾丹等辦理竊念臣傅恒奉命來營仰仗皇上徳威遐播視師匝月兵不血刄而賊已革面傾心天討既伸仁恩逺布一切番夷罔不畏威懷徳仰聲靈之赫濯悦愷澤之覃敷從此可以永靖蠻氛敉寧邊徼無任欣忭奏入上諭内閣曰今日據經略大學士忠勇公奏報莎羅奔郎卡親詣軍營投順情形朕不勝欣悦此皆上蒼孚佑宗社貽庥有以黙相朕躬皇太后懿訓詳明有以啟廸朕志荷兹福庇感慶實深經畧大學士忠勇公傅恒丹􅇆壯志勇畧宏猷足以柔懷異類迅奏膚功即諸葛之七縱威蠻汾陽之單騎見虜何以加兹實為國家嘉祥上瑞前已進爵封公酬庸更無殊典所賜四團龍補褂著祗受服用再照元勲揚古理額駙之例加賜豹尾鎗二桿親軍二名優示寵章均不必懇辭至提督岳鍾琪能承經略大學士忠勇公傅恒指示開誠布信直造賊巢用使番酋弭耳惕息厥角恐後成勞懋著功在諸將右著加太子少保仍交部從優議叙其叅贊諸大臣及在營大臣等雖前經議叙而前後殫心宣力實屬可嘉著再行交部議叙自去歲之徵兵命將與今歲之決䇿班師初不意畨酋畏威懷徳革面革心一至於此固朕宵旰憂勤事無大小先幾籌畫恰合機宜亦由經畧大學士忠勇公傳恒秉心忠亮克承訓示成此殊勲可見作善者昌將來數十年贊化調元懋襄郅治實嘉賴焉其傳諭諸王滿漢文武大臣並宣示中外知之臣等謹按用兵之道攻心為上良爾吉者金酋之腹心也倚為内應益肆負隅經畧抵營首即按法加誅羣情歡悦賊徒解體如綽斯甲向與金酋狼狽為奸前此檄召不至今則不招自來金酋見羣情不附大兵雲集加以食用匱乏人心渙散是以惶懼無措哀籲乞降當是時軍威丕振功已垂成不惟經畧身膺督師重寄專意掃穴犁庭即凡在行間孰不欲執馘獻俘為功名自見之地然令乘機進取務使莎羅奔郎卡繫頸闕下懸首藁街非不大快一時而兵力雖强未免尚延時日獸窮則攫更或走險為虞我皇上神機黙運獨斷不疑法天地之包容明神武之不殺惟以民力之輸將士卒之疲困内地之撫綏為念毅然罷兵經畧大學士忠勇公承命受降奏凱敉寧之績垂之無窮然則決䇿破奸功在經畧而聖徳廣大睿謨深逺則有非臣下所能思議者聖諭所謂君臣各盡其道誠歸功於下盛羙不居之至意云是日上又諭内閣曰今日金川奏㨗之報到京甚為迅速臺站官員著交部議叙其馬上遞送報匣人等亦著該督撫查明酌量賞賚是日䇿楞奏言大學士忠勇公傅恒已定於本月初六日起程一切軍務俱已一一指示交臣接辦臣初至邊境雖尚未備悉番情現在留心體察復與提督岳鍾琪細加講求知番性本屬難馴每因睚眦之忿即起爭端或親族之微嫌或疆界之錯雜互相傾䧟至於仇殺攘奪數十年不解臣等惟有悉心調處示以誠信務隂消牙蘖之萌而不强之以所不欲使之競心漸平咸知畏威懷徳則化外番酋自必永久恭順可以仰副皇上懷柔逺裔之至意現在撤兵之事及一應兵糧火藥器械軍裝俱一面妥商辦理隨時奏聞俟有就緒臣即星赴成都葢此時外番之綏輯猶易而内地之經理甚難川省吏治民風積習難挽官則疲玩已極民則凋敝不堪兹䝉皇上委任隆恩務必殫心竭力以察吏安民為首務固不敢稍有瞻狥亦不敢急切求效惟有審其緩急次第整頓期於一二年内盡滌頺風以紓聖主厪念於萬一奏入諭曰卿所見亦得其大端矣甚善甚慰加意為之癸巳上諭内閣曰金川大兵奏㨗番衆歸誠皆䝉列祖皇考在天之靈黙佑朕躬致此嘉慶理宜展謁陵寢以吿成功擬於三月十三日啟程恭謁孝陵景陵禮畢即由馬蘭峪前徃易州恭謁泰陵一切應行事宜各衙門照例敬謹預備甲午軍機大臣等奏言伏見金川軍務告竣天威遐暢聖徳覃敷荒徼敉寧蠻氛永靖四海享昇平之福萬方䝉覆冒之恩茂迓純禧仰承神貺既昭大業合舉隆儀恭查雍正二年平定青海遣官致祭天地廟社陵寢載在㑹典今兹金川之役嫓羙干羽兩階允宜䖍告神明導揚休羙應遣官告祭天地太廟奉先殿社稷永陵福陵昭陵昭西陵孝陵孝東陵景陵泰陵用薦成功以展嘉慶恭候命下交欽天監選擇吉期一切應行典禮交内務府禮部樂部敬謹辦理得㫖允行是日軍機大臣等又奏言金酋納欵輸誠聖恩施仁解網班師奏㨗海宇騰歡臣等恭查㑹典開載順治十三年題准王貝勒貝子公及大臣等凱旋到京次日在京王以下各官俱朝服齊集凱旋將軍等各具盛服候御殿行三跪九叩頭禮賜宴凡兵丁曾在陣前先登効力者俱令與宴又康熙元年議定凡大兵凱旋次日皇上陞殿筵宴又雍正二年青海大㨗經禮部奏請於四月十五日陞殿受賀是陞殿賜宴向來著在彜章允為鉅典此次金川告㨗永靖蠻氛盛烈豐功超越千古誠宜率循令典肇舉隆儀展臣子慶賀之忱慰朝野歡欣之願據經畧大學士忠勇公傅恒奏於二月初六日班師起行計程應於三月初九日到京伏乞皇上即於初十日陞殿經畧大學士忠勇公傅恒率同凱旋諸臣叩謝天恩在廷諸王滿漢文武大小臣工進表恭賀十二日頒賜筵宴揚采薇天保之鴻庥普飲至䇿勲之渥澤光昭典禮慶洽輿情則太和翔洽於寰區嘉慶交孚於堂陛矣諭曰金川吿㨗邊徼敉寧大學士等查照㑹典奏請陞殿受賀此次膚功克奏番酋向化革心仰賴上蒼福佑宗社鴻庥朕何敢自以為功現經蠲吉謁陵並依典禮遣官祭告但從前青海平定皇考世宗憲皇帝俯允廷臣之請曾經舉行朝賀典禮具有成憲其勉從所請一切禮儀該部查例具奏是日軍機大臣等又奏言鴻功懋著宜焜燿於簡編駿烈丕昭必刋垂於金石欽惟我皇上允文允武乃聖乃神普庶類之生成澤周海㝢統萬方而撫馭化洽寰區頃以金川土酋侵擾番衆用申撻伐以儆愚頑乃縁經理遷延以致膚功未奏皇上赫然斯怒再整六師爰命重臣授以方略霆驅電掣霧集風馳叛黨伏辜堅碉立碎旌旗氣肅則草木皆兵士馬歡騰則山川失險賊酋膽落番衆魂飛我皇上宏一視之仁開三面之網憐其窮蹙憫彼愚㝠既悔罪而抒誠遂兼幬而並載經畧大學士忠勇公傅恒仰承廟算逺布皇威集益廣思殫心竭慮登臺發令覩番部之心傾却贐受降解賊酋之面縳軍踰雪嶺纔及三旬㨗奏甘泉未逾八日此元臣之顯績實由聖主之徳威允宜刻石紀功昭示萬世臣等謹按雍正二年世宗憲皇帝平定青海特允廷臣之請御製碑文建立太學與聖祖仁皇帝平定朔漠碑文並垂永久今我皇上承烈顯謨能邇柔逺寧謐荒徼綏靖蠻氛聖聖相承後先一揆伏乞親披睿藻永勒貞珉樹之成均頒於黌序則皇猷之允塞式於九圍聖武之光昭垂諸奕葉矣得㫖允行是日上諭内閣曰辦理金川軍務以來軍機處行走官員甚屬黽勉供職著分别等次交部議叙其隨經畧大學士忠勇公傅恒辦事未經議叙之沈作朋常亮富顯程燾並隨尚書舒赫徳出差之三寶著一并交部議叙丙申上諭内閣曰金川平定振旅功成當朕運籌决䇿宵旰焦勞之際仰賴聖母皇太后慈訓詳明愷惻至再至三啓廸朕心得以有所遵循竣兹重務生靈蒙福邊徼永寧其祗告成功應行典禮悉皆諏吉次第舉行敬惟國有大慶歸羙尊親矧兹蠻服之廓清實本慈幃之聖教宜循令典恭上徽稱前者仰䝉聖母皇太后懿㫖於本年四月内冊封皇貴妃攝六宫事今逢嘉慶適遇吉期晉顯號之加隆奉璇宫之欣豫應行一切禮儀該部詳悉具議以聞是日上又諭内閣曰金川奏凱大功已成而始事之輕遽則紀山究難辭責至於班第固係專辦糧運而其奏請重臣督師居心亦不可問其二人情罪雖與訥親張廣泗有間未便以張廣泗之例處紀山以訥親之例處班第然均屬有過無功豈可置之不論今若槩從寛典仍令回京或授為副都統侍郎之職伊等亦有何顔與在廷諸臣同列班行且返􅇆自問諒亦難安而衆人見紀山班第之負罪重而受罸輕惟思巧圖僥倖茍免自全實無禆益於國事朕思紀山曾經駐藏班第亦微諳夷情俱著賞給副都統職銜自備鞍馬紀山前徃西藏調回拉布敦辦理部務班第前徃青海調回衆佛保來京另用如此則既開其自新之路亦足以警戒將來朕於臣工功罪賞罸一秉大公至正從無絲毫假借亦無絲毫容心紀山班第現有經手事宜尚須留辦著總督䇿楞酌量俟伊等諸事完結即令由川起程各赴駐守之地己亥經略大學士忠勇公傅恒奏言金酋乞命臣遵㫖受降班師自卡撒軍營起程沿途經過臺站處所即有内地商販人等焚香跪送及抵陶關經郫灌等邑直至成都一路見民情踴躍欣喜比户供設香燭里閈之民拜跪輿前臣面諭爾等百姓自用兵以來背負軍裝輓輸糧餉未免勞苦皇上極加憐憫屢頒恩詔垂賜賑恤緩征錢糧今撤兵之後各宜務農力穡安分守己共享太平無負皇恩浩蕩優恤爾等厚意百姓咸稱皇上撫恤我等感激無涯中心歡悦願祝天子萬年雖僻處鄉隅者皆扶老携㓜夾道跪迎數十里間歌頌之聲不絶於路及至省城署前見有搭臺演戲者臣隨詢撫臣班第藩司髙越等諭令即速拆臺止戲皆云自伊等出郭迎臣之後地方百姓樂於慶賀太平衆情歡豫禁阻不得倘過拂其意轉致含怨是以祗可聽其歡樂因在臣署前鼔舞歡暢直至二更又為臣製萬民傘並欲建生祠縁一時未及先設長生禄位附供諸葛祠中臣伏思金酋蠢動妄支螳臂大兵壓境懼罪求降臣奉命出師銳意勦洗䝉皇上好生之仁如天之徳休兵息民羣情悦豫如此此皆仰賴皇上洪福之所致而蜀地民心醇良易感亦於此可見將來總督䇿楞遵㫖留心培養加意撫綏川民感戴之忱當益深無既矣奏入俞㫖報聞臣等謹按罷兵之後蜀民歡悦感慶至於如此此實出於中心之誠然非可强而致也益見我皇上神謨勝算息事寧人使民忘其勞而益戴其徳誠為逺大之訃至當不易以視曠曰持久取必於俘馘者其功效之大小廣狹誠不可以同年而語矣庚子軍機大臣等奏言恭查聖祖仁皇帝實録康熙三十六年七月乙未以平定朔漠遣官吿祭天地廟社諸陵同日遣官告祭仁孝皇后孝昭皇后孝懿皇后陵次日遣官告祭先師孔子今金川平定應於告祭天地廟社奉先殿諸陵之日遣官告祭孝賢皇后几筵次日遣官告祭先師孔子恭候命下交所司衙門敬謹辦理得㫖允行壬寅岳鍾琪奏言撤兵之後卡撒大營現存米麵一萬二千二百餘石不但不能運回内地即運至小金川崇徳地方每日以千名運夫計算五日一回尚須四個月方能運完臣等再四商酌各番離營遥逺雖經奉㫖酌量賞給亦覺負運為難惟小金川尚屬相近查自用兵以來續派該土兵二千八百名在營一年零九月尚屬出力且該土司地方值金酋蹂躪之後久廢耕作擬賞糧米七千石半為補給坐糧之用半為皇恩賑賞之需聽其自行背負以省錢糧又駐劄大營一帶均係金酋地方三年未得耕種各寨待哺嗷嗷鵠面鳩形屢向臣等求乞若大加賑恤固非衆土司之心然不量為周濟亦非所以推廣皇上胞與為懷一視同仁之至意謹擬賞米一千石以濟窮番餘米數千石留給現在兵丁夫役及運費脚價俟大軍全撤尚有餘存即分賞隨行漢土兵丁彚冊報部奏入報聞是日䇿楞岳鍾琪㑹奏言金酋納欵乞䧏遵依六事内有呈繳器械砲位及送還内地人民縛獻兇首等項兹於初七八等日獻出九節砲三位鎗三百九十六根雙手帶七把腰刀六十二口鐺一把鏢子頭四十箇砲礶二箇又送還搶去雜谷等處番民二十名官兵八名臣等將所獻番民訊明各土司所屬分别收領官兵押發原籍不許入伍刀鎗等械酌給新募兵丁以為差操之用餘存各件與砲位分别運送成都又據縛獻馬邦作惡頭人郎多阿朗到營力言此係起禍之源請於番衆前正法洩忿臣等當委馬良柱騐實並非假冒而該犯自知必死久斷飲食各頭目又堅請如前臣等伏思與其令該犯全尸道途不如俯允該酋所請當衆梟示以彰王法隨公同傳集官兵於土兵聚集之處將郎多阿朗斬首梟示訖奏入上諭該部知之平定金川方畧卷二十四
