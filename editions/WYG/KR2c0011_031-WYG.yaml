body:
  text: 藝文平定金川歌有序協辦大學士吏部尚書臣陳大受臣聞乾司虎首執參觹以厲伐坤為龍尾拓河漢以包荒是以玉麟象仁金彪示義青邱搏羊水之兇丹浦戮犬戎之孽兩虬御姒軋防風之專車八駿驂姬跐偃王之無骨或囚饕餮於三危放槃瓠於石室雖武落文離風披雨漉若一張而一弛乃三推而三解也皇帝握旋衡而運斗秉璣鈐而振樞闢八夤以為門則金犛服軛包九環以合宙則石馬負圖聲靈烜赫震於無雷光華照臨爍於倒景月􅒸含耀燭龍厥角惟金川莎羅奔狼卡者儋耳聾聽從目盲眎廪君化虎誰敢咆嘷九隆背蛟亦能﨣螑乃厲鼈令之魂欲并旄牛之種忘白狼金印之賜背黄龍清酒之盟雖其焦螟麽類不足以血天鋒龍蛇荒窟不可以營雲衛然而蠶食漸於青衣狼煙驚於玉壘豈可使蚩尤稽九伐之威鬼方厲三年之討昔惟師行宿留未即扺巇遂至賊醜胮肛欲圖負固皇帝赫然震怒簡命元臣宜社禡牙推轂餞斚天䇿剛斷控龍御而執乾符廟算閎深肅神謀而運坤軸期門佽飛之卒超乗而先髶髦戴鶡之夫投石而躍爰率禁旅以先啟行招揺西指已彃鳳麟之洲辰星東赤遂毁蠻夷之廟千乗電掣萬騎雷轟挾日而馳萬里蹍周穆七萃之軍追風而凌九折轢漢武五道之将赤羽青鏃翨硩天鳥之巢狻鍪鮫鎧攫閷銅頭之獸龍淵太阿之劎錫自尚方辟邪六駁之旗麾於南極乃有醜類惡物比周弗順良吉外姦阿扣内宄雖為我之臣隸實作賊之羽毛多魚之師誰漏定是汋奸綘市之屍忽蘓豈非鬼蜮于是元戎甫莅天討遂申血已釁於鼜鼖首更梟乎罕纛黝額朱殷飛頭不返蠻乃膽褫魄墮狼㚄熊顚彼酋之體三分我軍之氣百倍惟時皇帝穆然璇題玉英之中周乎熊耳雞頭之表自夜不寐每盡虬漏吐珠昧爽丕顯不待雞人嘑旦地形險阻無不爥聞士卒辛勤盡皆聆䏅故勝慮獨决於元堂而指畫合符乎萬里将相勱力偏校用命於是進攻昔嶺再搗巴郎飛箭連珠状赬虬之拔五􅚣焱車火傘若霹靂之破卭崍比鴛鴦之銃不翼而搏非犀象之燧無蹠而擘礮石交加戰碉立碎酋乃竦心北首回面内嚮陳露犬與紈牛獻賨布與罽毳願縻長纓而逭巨闕銜碧玉而脱昆吾掃彼三窟之營奉我六事之約然而䲭鴞晝瞑雖覆而不出危巢狐貉性疑将擒而尚顧舊穴是以螳蜋之臂已折於當車蹭蹬之鱗将伏而死浪皇上體天地之心符亭育之化上徳不殺神武止戈皇太后念西南練卒必有憚人而羌氐來朝皆吾赤子欲湔其舊染與之維新武攘文綏兼幬並覆天子開蛛蝥之網而将相厲雷霆之威将鏖戮其封豕長蛇而耀靈於碧雞金馬賊酋呾義赧仁乞鄰求説迎我偏師入其重險臣鍾琪憑仗天威克伸信義酋乃如蘁啽囈如解狂醟譁譟震天扶服額地牽乗黄兹白之馬獻青璧白玉之漿貫胸之國拔鏃知恩離身之民抱頸感徳時當剺面内首之期再奉􅀢衣弢弓之詔日在奎維月軌青陸雷電啓蟄之始勾芒發生之初酋乃除道治壇降於中軍之壘相遂攝衣升幕麾乎羽林之軍揮斥則䃱磹飛瞛叱咜則豐隆助擊乃進銀燭黄膏出自蘭滄之水朱提白霧湧於珍甕之中寳鏡金軀五獅之搏醉象星毫銅爪靈鷲之御飛蛟悉索其琛跽而輸欵而且卉服熊冠錦髻象額瓢笙鼓角鞮鞻侏離莫不鴃舌喁口踏歌連臂金麩之賮既却玉題之廟是崇縲兇獷以馘囚犯鋒者草薙入子女為臣妾服隸者生歸黑齒白民踰九菌而受吏黄支烏弋㑹百濮而賔将爰櫜麟角之弧遂脱虎賁之劍爾乃優賞崇功酬勞勲劼爵上公而服九命錫豹尾而勒太常奏凱樂於朱鷺赤蛟鼓鐃歌於白麟丹雁告乎陵寢則步禹跡以覲光欽於慈寧則奉姒徽而上號開明堂以受朝賀命鞮象以著職方天文彪列掲七曜於辟廱日氣熉黄駢五精於太學是則金繩瓊檢不必東崇白環紫玉自來西極臣忝列台衡備司綸綍帝猷天縡親覿耳目指麾掌握近䢝神靈恭惟至尊之勤勞適當萬方之凱豫宸慮浹乎始終非羣臣所備悉穆光動乎咫尺宜率先以作歌謹獻鼔吹之曲用繪乾坤之容皇武耆天門開熿流沙爍丹厓月􅒸之西輿鬼維有獸狙獷行駓駓髹脛血胟刀不刲於皇師貙熊羆白髦虎爪參觜觹屠天狼掃欃槍鯨魚之屍凌波僵驅不順來我降其一禽睢盱稽王誅趯距掎角首不鉏皇赫怒揮金戈相受神柄厲鏌邪皇謨内定横天摩其二師行萬里㨗於弧矢凌蜀跨巴飛驤乎玉壘皇神武將相厲手驅熊羆搤瘈猘誅其腹心墮肝肺昔嶺墮巴郎碎雷霆擘山巨礮礨皇靈澶漫天地外其三蠻剺㓤懼誅拔如鳥将墜羽之矞勁箭欲加碉翮鎩解翎脱距不可活王師嘽嘽罙且撻其四皇帝有命降其克奔陰以搏斮陽以嘘歕戈矛歸武庫弓矢弭櫜鞬鐏鐓與戣劉各無朱殷痕東尉建日出西候置崑崙赦彼陸梁罪歸我燾養恩其五相帥虎臣如虓斯闞壓於其徼利用伐斬垢不可濯若面之黶毒則有􅢮豶豕當蓄困獸當檻取其鯨鯢以削天巉其六我有驍桀将徼外知姓名單騎入狡窟欲以長氂纓示以相燀濯告以皇威明熛熛虎符節熊熊龍旂旌鵬騫石棧道金鍪耀日晶乞降須授首後至則以烹蠻衆呾且駭扼吭喑不鳴要當即縲頸敢死嬰天兵其七蠻酋扶服既来怛我王旅如雷除壇張幕崔嵬白羽赤纛交麾椎髻冠以熊皮毳服斑斕披離獻我黄金朱提奉以寳佛金資作廟世世祝禨皇靈晱暘西陲其八金川跳踉皇武劖即降而歸皇所鑒将相晉爵豹尾彡衣錦繡袞龍鱗嵌韜甲縉帶光金緘虎賁闟㦸疾走颿乃考王㑹圖儖儳權扶魚復趯若毚大開明堂羅􅀈幓格於寢廟陳天函慈宫上號色以諴豐碑隆碣排廊巖帝文照耀聲渢渢歌以凱奏諧英咸其九平定金川歌有序戶部尚書臣蔣溥伏惟皇上經文緯武纘承列祖鴻業即祚以來三階正六氣調萬㝢清百蠻服蠢兹金川地居險惡搆釁隣封允大吏請聲罪致討典兵者弗戒於事老師逾年大學士忠勇公傅恒一秉赤誠毅然請行詔授為經略禡牙賜鉞以乾隆十三年十一月之三日啓行星馳出桃闗步行天射山踐歴冰雪與士卒共勞苦皆感奮用命至師斬渠姦摧堅碉天威丕振番酋讋慄請降經略以其勢窮乞命不許其請我皇上好生之徳不殺為仁詔經略納降維時酋首莎羅奔狼卡革面革心率衆來軍轅稽顙聽命經略乃宣德音登壇受降時未七旬功收萬里乾隆十四年二月十四日露布至闕凱旋皇上論功行賞進經略公爵章服有加受賀謁陵告廟尊上皇太后徽號御製文刻石太學傳示無窮臣溥職司珥筆伏見盛徳大業義鬯仁翔惟聖主能得賢臣而誕敷遂以來格輒先忭舞上紀鴻庥謹撰凱歌二十章以獻廟算親籌出萬全臨軒授鉞為綏邊相臣矢志如金石萬里闗山自請前益部經年孰老師天心特簡慎機宜春風定掃蓬婆雪吉日重揚太乙旗世篤忠貞将相才對揚虎拜讌瀛臺文箋露濕初賡句武帳霜明又賜杯懸車束馬度青岑西指桃闗積雪深天射山髙徒步歴絶甘分少得軍心肅將天命劍光清姦諜先誅紀律明風聽諸番齊股栗直教草木識威名雷轟飛礮下碉樓昔嶺巴郎指掌收一矢天狼看即靖聖人詩句憶從頭轅門山翠直旌竿請欵人來願卸鞍但使千羣能面縛亦須稽顙到呼韓義育仁濡萬國風慈寧心與聖心同受降計日三城築上相來歸爵上公刮耳崖邊樹色春壺漿夾道走麖麕詔書寛大從天下正是開門請吏辰将軍携挈二酋歸六事申明約不違皇帝好生春浩蕩香焚樂作舞鮮衣却獻朱提布至誠番羣羅拜獲更生帳前手捧牟尼像望闕心齋讚佛聲上公忠勇贊吾君露布飛馳八日閒諸葛渡瀘曽未到而今不數七擒勲闗隴迢迢奏凱長大清門闢照春陽七旬干羽風遐暢六月車徒甲永藏雷霆雨露靖邊隅鑾陛花香舞蹈俱肅肅九賔皆脱劍恢恢王㑹自開圖豐澤園深敞賜筵酧庸疉疉主恩宣分将豹尾隨雲麗被得龍章近日鮮松柏元宫儼式憑告成受賜福先膺歡聲父老觀扶杖聖子神孫此上陵愛日承顏玉殿溫鴻名表上禮崇尊要令中外知康樂錫類皆由聖母恩湛湛恩波溢蜀江蜀民煦嫗更豐厖海棠花裏巴渝舞雞犬都應樂此邦聖製鏗鍧二雅傳岐陽鼓並澤宫鐫元和韓愈無鴻筆清德巍巍億萬年聖人心築太平基五夜焦勞萬姓知授略元勲能祇若功成惟賴帝為師平定金川歌原任禮部侍郎臣沈德潛皇帝在祚至仁大武無雷月􅒸悉臣悉主况大渡化林以南畨酋處所久隸我置吏久頼我鎭撫鳥獸無知侵凌邊圉䝉昧乎堯禹一章蠢爾小醜距趯翅張恃兹碉門嵑焉髙岡旁殘而種類沸羮嘶螗始命翦之遷延歳杪為奸頑所愚餉縻師老如螳斯逞如斯狡欲逃我天討二章聖人赫怒爰興師征廟謨神武授兹忠貞集羽林簡精兵足糗糒揚麾旌虎牙干城丞徒増増咸統於恒恒拜受命于帝之訓鼓行而前山川震将卒歡呼忘行陣三章踰厜㕒冒霜露七千里餘如跬步斬奸猖斷間諜靡旌摩壘賊震讋将軍從天下虓虎軍聲鏖天威所到賊敗逃掀其籬籓困其邊腹翼圍箕張勢迺窮蹙四章維彼鷇麛喬嶽壓之維彼卉芽賁育擢之内絶餽饟矣外絶援黨矣願革面而稽顙矣經略元臣謂爾不龔今何戰戰前何洶洶刌爾脰梟爾顱誓剷爾元凶五章㨗書夜奏達於楓宸天子曰俞哉我威以振我兵以神唯彼既輸誠雖獸亦人戢虣以武柔服以恩予以不死同覆㠯天庶跂行喙息之輩得侁侁而甡甡元臣之報國曰忠大君之好生曰仁六章軍門開番酋來繫頸乞命聲何哀元臣推誠心傳諭㫖謂皇帝徳並葢載不孥戮爾赦爾死罪與更始番酋罷泣聲歡喜萬歳齊呼徹壁壘南人從此不反矣七章大軍旋歸于郊于墉鵷班逺迎聚觀耆童元臣抑抑彌虚衷帝謂綏靖唯汝庸加爵異服饗彤弓參贊旅卒胥酬功煥天文紀功載勒石于辟廱千萬億年昭仁武于無窮八章平定金川歌有序工部侍郎臣􅄞璜皇帝御極之十有二年西蜀守臣以金川酋莎羅奔搆釁隣番不遵約束請致討既出師踰年功未奏上乃命相臣恒往經略恒至師乃戮賊奸之在我軍者遂帥師攻其碉碉摧賊益失恃乞降不許上恤其窮蹙命恒納降班師而進恒公爵詔甫下金酋率衆稽顙軍轅以降益我軍之未集者猶在中道也十四年二月㨗書聞羣臣請御殿受賀上推本慈訓敬上皇太后徽稱以次舉行告成典禮論中外功賞御製文勒太學傳示無窮臣璜日侍内廷親見聖天子文徳武功廣大神速覲揚光烈逺邁隆古不勝踴躍懽忭謹撰凱樂歌一篇凡八百四十字以頌述盛美於萬一帝有九有提乾綱聲靈赫濯覃要荒戊巳都䕶若西域益州贊普馴番羌維番依山累石室仇池樓櫓盤羊腸蔚宗立傳紀不得高宗三年之鬼方憑深阻峭各種落崆峒石門逺且障金川釁與小者搆嗟爾醜類何跳踉小金川苦告邊吏聖人得不揮戈鑲我師其西即爾壁我任我輦車牛糧我糧我師歳復歳醜亦嵎負仍巢藏帝心焦勞審厥罪初六不律占否臧赫斯怒矣篤我祜曰咨相恒汝忠良臨軒授鉞汝其往讌則有詩餞有觴鋭師六千闞虓虎愬武古通咸在行賞罰用命不用命惟汝同徳國以匡恒拜稽首曰祇若天子庥命敢對揚時維仲冬十一月疾馳秦隴經冰霜方叔旂旐吹央央召虎江漢流湯湯桃闗曉衝片片雪天射山步高髙岡嘗吐調藥予挾纊作糜取薪行擔囊衆整戎肅秉廟略小金川入雄趪趪賊之耳目良爾吉謬效職役奸而佯我軍之情洩與賊番婦表裏為昬狂親數其罪戮以狥羣番風聽驚奔忙大營伐鼔涖卡撒申令禁旅驅洋洋鉤援臨衝悉所向堅碉石破聲雷硠立時飛礮下昔嶺接日摩壘無巴郎已布雲師復鳥陣敢肆鋒蝟與斧螗望風稽顙再三請未許肉袒迎牽羊燎毛底事烈火熾卷籜奚待衝飇涼俾先服心次服力遂左拔角右扼吭觸機落穽計無出搗巢掃穴期方将如天好生皇帝徳明見萬里敷春陽羽書勤省五夜達阿柄獨握諸臣襄慈寧不問外朝事闗心為恤邊氓瘡敬承懿㫖睿謨合藹然和氣宫庭翔納降班師進恒爵酬庸懐逺惟民康詔書尺一沛雨露番土草木回寒僵其時其酋遵我約迎我虎将壺盈漿入其勒歪挈之出莎羅奔老狼卡長除道築壇相臣莅鳴螺膜拜齊焚香使金如粟却不受長生鑄像諸葛傍今如孟獲讋銅鼓昔非夜郎踞竹王願隨楛矢貢肅慎亦隨白雉朝越裳從而征之嫓軒武待以不死軼漢光星馳露布九日奏一矢豈不銷天狼羣臣表賀皇帝受東風凱入開明堂國人喜迎相臣至袞衣巻然豹尾槍宴成論賞恩廣博解鞍萬馬嬉垂楊出禱蚩尤于大纛入銘司勲之太常上陵告功孝惟孝星輝雲郁福簡穰惟謙受益却尊號逺跨兩宋踰三唐特進徽稱壽文母錫類四㝢同嘉祥蜀人宵眠野無警以長兒女以耕桑番人熙熙率其業相告鄰里無搶攘仁義之劍道徳胄宰制六合承天慶鐫功勒成聖有作照萬萬古垂文章虞典周詩並陶鑄韓碑栁雅豈頡頏聖祖沙漠畫親定世宗青海風遐昌纘緒詒翼欽我皇用編方略傳無疆形容至治大手筆以配吉甫非臣璜平定金川歌有序内閣學士臣劉綸欽惟皇帝陛下睿聖文武徳威遐鬯凡有血氣罔不在宥金川土酋莎羅奔者俶擾番落勤我王師乃以穴鼠潛狐敢稽授首皇帝念羣策之未集韙元臣之請行大選車徒指授方略自戒塗以迄誓衆有謀而斷靡堅弗摧小醜敓魄蒲伏乞命皇帝復緩幕府焚巢之請沛朝廷祝網之恩納欵班師中外禔福策勲飲至神人畢懽徵諸往牒惟有虞之舞干格苗姬文之因壘下崇庶足倫比其他鋪陳景鑠無得而稱焉巨綸謹按漢世鐃吹本周禮大司馬有功凱樂之義魏繆襲吴韋昭並沿之至唐岑參劉禹錫諸人或凖以近體然其揚厲偉伐後先一揆竊不揣凡猥擬撰鐃歌八章以獻附於瞽矇之末睿圖應第一六師爰發計安蠻服沛若時雨也睿圖應我武揚披王㑹考職方征不譓提天綱榿林棘路咸我堂皇我堂皇疇敢僭以忒大化不爾外爾乃自速殛游魂在釡丐殘息蠲剛日第二禮優推轂望隆秉鉞徂征有寄在師中吉也蠲剛日爰禡牙寄專閫帝用嘉彼黒子憑幽遐爪揃同類不安厥家天梯雲棧徒迴斜期門佽飛魚以雅竚露布無留遮三軍告語歸當無及瓜出天彭第三馳傳兼程用抒勝算決幾於㨗戰則克也出天彭捫井絡星言軷舍匪穜匪索爾碉手摧爾城肉薄崐岡之熖爾螢爝土囊之飇爾秋蘀蠻髳膽一時落師行衽席人不知元戎得非天上來叶俘孽豎第四土舍良爾吉偵諜為奸至是伏法振軍威孤惡黨也俘孽豎以尺組于以坐之招搖之下叶軍門霍霍開齋斧蟣胏蜣肱無處所緣崕擣中虛犁庭須一鼔惟帝有恩言還朝眷予輔無戰王之征止戈聖之武翦孤雛第五先聲雷動番衆瓦解回首面内規革心也翦孤雛之翼不足以囮折窮獸之角不足以羅三宣六慰嗟爾么䯢昔狡營而獷走今爨舞而渝歌洗兵甲斟天河金川水長不波桴棡鼓第六築壇納降請以六事自効獻琛輸賮大畏懐也桴棡鼔聲聾瞶空戴頭効羅拜約六事呼萬歲睢睢盱盱䑛鎗而誓朝獻狀于鴻臚夕編名于屬吏磨崖石第七受成太學立石紀功昭兹来許也磨崖石刋典謨燕然銘庸足橅日月出矣光天衢匽參斿縣六符挂弓榑桑東始旦傳檄崦嵫西未晡升嘉壇第八荒徼綏靖禮交樂舉敷文徳告武成也升嘉壇薦靈畤惟天祖鑒有咫越多方頻送嘉奉慈嶽介丕祉王公宰執卿士按冊披圖願得熙鴻號我皇不居曰若勲華詎裒益乎唐虞繼自今萬億年光寳書平定金川歌副都御史臣陳惪華雕題鑿齒拱金湯蠢爾番酋敢跳梁震疊皇威齊納欵鐃歌一路達長楊師旅經年駐雪山紅崖萬里路間闗元臣奉命趨卭筰早有先聲震百蠻子月提師下益州闗山風雪撲氊裘衝寒棧道忘宵旦籌筆星馳古驛樓汶水蒼茫近冉駹貔貅百萬擁牙幢令嚴刁斗申軍紀直欲犁庭靖蜀江琱戈貝胄列旌旄豈有窮猿敢遁逃偵伺奸酋雙授首轅門初試鸊鵜刀荆襄秦晉士如雲神策雄師領六軍駮石一聲寒賊膽帳前泥首百千羣志期掃穴翦渠魁肆赦恩從日下来小醜洗心兼革面望塵膜拜殷懽雷游魚釜底貰餘生大渡河西詔罷兵往矣霏霏當雨雪歸哉楊栁滿春城閫外專征建壯猷析圭拜爵帝恩優旌旗章服酬勲烈争仰三公尚黑頭振旅還朝錄大功欣從小雅賦彤弓豐碑仰睹天章煥鳳藻龍文氣象雄元戎絶徼捲蝥弧荒服輸誠凛廟謨好向凌烟書姓氏韜戈寰宇盡歡呼對揚休命上鑾坡衅甲銷兵樂太和自此虞絃登上理明良萬載叶賡歌平定金川歌有序編修臣諸錦國家當全盛之朝重熙之世海外有截悉主悉臣蠢爾金川自作不靖延以歳月尚屬㝠頑皇上用是震怒爰命經略大學忠勇公臣傅恒授以方略時惟乾隆十三年戊辰仲冬三日飲餞興師當午日升雲物煥朗所經驛路倍站兼行濟以師武臣力梯雪履冰罙入其阻碎碉誅諜一戰而摧不浹月而莎羅奔等窮無顧藉稽首膝行革面攄心投誠乞命我皇上天覆地涵義正仁育逆則討之降則受之文徳武功包荒整旅責以莎羅奔六事罔不率從特允大學士所請奏凱虎旅懽呼里閈頂祝是皆廟算天威賴及萬方有慶重以聖母皇太后垂慈德溥無疆所謂禁虣戢奸保大定功安民和衆豐財武有七徳實見於兹臣不勝懽忭踴躍謹作從軍樂二十四解以附於凱歌之末用以見天保治内采薇治外彰郅隆之大化焉敵愾重敵愾驅我數馲駝天上下神兵努力折折坡一解前頭看後頭齊戴鐵兜牟前行連後行齊著繡裲襠二解千金辨鞍馬百金裝寳刀我歌蘭陵王火伴看孟勞三解斫却楊栁枝絲多亂人思丈夫圖麒麟決勝横草馳四解誰奪綠沈槍誰占碉樓營誰竊佛郎機誰略内地兵五解誰虐爾隣番誰盜我馬匹蠢爾抗天朝壓境轟雷疾六解誅諜斬鯨鯢受降還服叛主将有神機皇猷多勝算七解渠魁赦不殺厥角稽首降虎帳樹旌門番部為駿厖八解始去雪霏霏歸来栁濯濯凱歌入國門從軍古云樂九解莫誇李衛公髙築籌邊樓請看建生祠逺過悉怛謀十解莫羡武鄉侯川有籌筆驛誰看摧金酋我有八陣石十一解回紇莫跋扈推誠郭令公李愬具櫜鞬肅揖裴晉公十二解往者蜀道難即今蜀道易融為日月光海宇消兵氣十三解震以克鬼方豫以利行師大有公用享无妄茂對時十四解卡撒具夫馬来自刮耳崖昔為􅀈與豺今為楙與櫰十五解牛羊滿原野皮幣堆山邱壺漿迎夾道供帳羅前騶十六解蜀民鼔吹喧嬌歌與急管不數千足羊更有萬民繖十七解男耕亦有饟婦織亦有裳吉甫萬邦憲南仲獫狁襄十八解飲至宴太平策勲榮特進雙翎豹尾槍上公兼相印十九解閥閲書青史神聖勒豐碑鴻號垂無窮置郵遜徳綏二十解皇帝授方略銜命即驅馳相臣神且武寧得久勞師二十一解皇帝有恩言偕朕贊昇平相臣忠且勇已事即遄征二十二解皇帝承聖母愷澤復慈祥告廟謁三陵顯比開明堂二十三解三皇世如春五帝時如夏晉祝萬年觴樂天保天下二十四解平定金川歌有序檢討臣張馨皇上御極之十有三年金川土酋不靖特命大學士忠勇公臣傅恒往討之撻伐既張受降而返是役也冬至出師閲次年春二月振旅膚功迅奏古罕匹焉薄海内外靡不仰天威之震疊欽帝澤之崇深胥慶交忭臣幸際昌期備職史館自慙譾陋未能鼓吹休明敷揚盛烈恭擬凱歌十二章謹拜手稽首而獻於庭曰河潤星輝過百年萬方綏靖荷堯天荒隅何事興蠻觸漸說烽烟近兩川屹屹層樓迥建碉篁深箐密路葶苕習流都藉皮為艇懸渡還憑笮作橋元臣銜命出神京慷慨疆塲自請行三十登壇威信著恪將忠藎贊昇平輓粟飛芻赴劒南連雲棧閣置郵驂儲胥霧集蠶叢外粻峙渾堪埓武擔兩翼材官擬佽飛蹶張驍㨗秉神機鉤梯百丈身騰上練習都穿短後衣漾日旌麾指僰駹道旁欣覩碧油幢王師直是從天下電掣飇馳達錦江桓桓虎旅素調嫺挾纊投醪上下間取次六師將雨集春風二月度桃闗㦸門笳鼔閙如雷細樂濃香夾道開卉服諸番齊拜舞争看天上令公来六事湔除總悦從誓將奉職愈䖍恭自兹雪嶺牂江畔犵鳥狪花浥露濃鐃吹旋時春漸深韜藏貝胄與朱綅戎車纔指南人服并亦無煩七縱擒耆定遐方我武揚翠珉百尺峙宫牆韓碑栁雅都寒儉雲漢天章自煒煌歸化城邊青海西兩朝威德制羌氐天兵此度綏蠻服共慶豐功駿烈齊平定金川歌有序内閣中書臣沈作朋恭惟皇帝御極海宇清寧邊隅靖謐維金川酋長恃其險逺侵擾羣番有稽天討乾隆十三年冬特命大學士忠勇公傅恒視師金酋望風投欵歸誠向化踰月奏凱兵不血刃微臣載筆軍門親逢其盛凡所目擊比事屬辭得凱歌三十六章其辭曰四海昇平書軌同么麽敢逞醜夷中皇威逺不遺荒徼方略親承屬上公薇垣上相得勲賢圖像雲臺獨妙年吉䜟先傳輿誦協羣看下馬定金川先是有一馬平川及馬到功成之諺至經略大學士馳驛赴營果符吉兆大散連雲入劒闗輕鞍倏過百重山將軍果是從天降萬里征程匝月間經略大學士於棧道中亦䇿馬兼程而進闗前跨水架繩橋風裏垂虹影動搖桃闗外即有大川限隔中外渡以繩橋毎臨風蕩漾過者輒目眩心駭一自王尊先叱馭烝徒踴躍馬嘶驕懸車束馬阻崔嵬上將偏能策杖来鳥道直飛雙舄度天赦納窪諸山經略大學士皆步行而過蠶叢不待五丁開電駛風馳驛路長宵燈候館檢封章更緣密勿承宸翰奏牘親裁達九閶龍虎臺髙兩翼均鳥魚陣整五兵陳九天九地靈機運壁壘旌旗照眼新忠勇公到軍移兵前駐整肅軍紀煥然改觀元戎親蒞一軍驚鐵礮雲梯壓境横磧上縱衡諸葛陣胷中百萬范家兵貔貅為旅虎為臣江漢飛翰擬未真更有先聲能奪魄翦除奸黨疾如神計誅良爾吉等暗傳消息禍非常黠鼠妖狐肘腋藏獨屏羣疑誅反側銛鋒真欲邁干将井蛙漫敢抗顔行殘喘偷從兔窟藏樹幟羽林纔及半降旗一片出巴郎敵營宵警撼山阿送鬼番巫走疾呵番人祈禱輒有喊聲謂之送鬼報道天兵雲集後碉樓占得咎徵多番人毎戰輒打卦卜吉凶自大兵到􅁲皆不吉夜聞呼號聲我皇耀德不佳兵祇為綏邊事逺征伐叛懷柔須互用頻聞天語日先庚吉甫忠誠見倍親曽磨盾鼻細披陳妖氛未息身何有一㸃丹心向紫宸誓斬樓蘭答主知蹶張争欲效驅馳却因天子仁恩重不願将軍似貳師聖徳包䝉量廓如孚誠渙號格豚魚狐疑頓解麏奔息額手天家法網䟽泥首軍門乞命艱自知負罪重如山呼邪踵接屠祁至為覲中原碩輔顏經略既至莎羅奔狼卡謂活佛降臨以得見顔色為幸遂相率歸命窮鳥投人夾道遮開關致館静無譁番庭直任行旌過鞭弭歡迎似一家將弁往来巢穴金酋執禮甚恭火號機橋罷詰晨歡謠忭舞息烟塵洗兵不待銀河水蘭錡都隨草木春盛夏崖冰接澗平漸吹暖律入咸英蠻方箐色中原栁花氣氤氲兵氣清正月晴和宛同中夏箐色青葱野花雜發崇山積雪入雲髙五月瀘中向不毛我澤如春煦絶域採將正月露紅花正月杪將弁等從伊巢穴折碧桃花數枝而出崖深刮耳聽馳驅館我戎行秣我駒更喜皮船跳玉尺有擕金川中鮮魚至營者攜来軍府供行㕑鼔吹香烟夾道迎願開梵宇祝長生標銅刻石紛誇武誰可銘恩到敵營馬耳羊腸天外險長蛇封豕一時馴鬼方祇是㝷常路戰略如今更入神宵旰勤思在止戈欽承慈㫖迓休和舞階真見苗頑格始信謙冲受益多縆懸纎路夢魂驚姦宄潛踪險亦平峻崿空横矛劒狀奔濤齊和鼔笳聲㨗音萬里達楓宸露布傳來未及旬一路歡聲雷動地旗旛過䖏綵霞新露布用絳帛大書凡八日抵京破虜争誇血戰功當年衛霍漫英雄何如因壘無遺鏃共慶来蘓中外同采芑方歌雨未濛西征馬首倏来東妖氛掃地旄頭滅寵錫承天豹尾雄酬庸典禮一無私繡袞桓圭尚固辭將士惟傳勾當畢日邊相慶我來思車攻六月雅詩醇鼔吹鐃歌樂府新蕩冦豐碑隆屭贔凌烟勛績照麒麟牙帳雲屯檄草攢栁營烟漠劒花寒書生競説從軍樂策馬渾忘蜀道難蠻烟瘴雨坐穹廬領略番情到羽書豕有狼毛鼠象鼻喜将餘事補方輿番豕毛色如狼而黄鼠鼻下垂類象瀛臺列坐草如茵飲至筵開酒再巡回首霏霏推轂日還歸俱是去時人賜經略大學士等將宴豐澤園去時士咸集隆恩曠典極其羙盛帝承上帝好生心列祖神宗實鑒臨執馘獻俘全不用歡騰寰宇薦元音櫜鞬歸来戢甲兵憲邦文武篤忠貞邊陲無事民番樂主聖臣良慶太平平定金川歌有序内閣中書臣倪承寛皇帝御極之十有四年仲春十有四日經略大學士臣傅恒以平定金川納降獻㨗聖威逺播愷澤遐敷班師策勲爰以成功上陵告廟敬晉徽號於慈寧宫鴻烈光昭典禮具舉廷臣咸獻歌頌以紀功徳臣䝉被恩澤簪筆西清日以恭紀絲綸為職業乃得敬悉皇猷臣謹按周禮大司樂王師大獻則奏凱樂大司馬師有功以凱樂獻於社鄭康成註兵樂曰凱獻功之樂也漢鐃歌朱鷺以下十八曲詞甚古質魏晉以来亦曽擬之而其鋪張揚厲逺不逮古唐之鼔吹十二曲平淮西雅紀命將用師之艱難元和聖德詩具載聖明并包畜養之休澤臣弇陋無文詞語淺薄輒依韓愈指事實錄之意謹撰凱歌十章不敢逺追采芑常武雅音而於武功之成聖主憂勤惕厲之意亦足以發揚於萬一謹稽首頓首撰列如左撫運第一彰天討也大金川為西夷蕃部僻處窮山數年以来併吞番衆侵擾霍耳章谷毛牛等處切近爐地朝廷不得已而用兵所以綏靖邊疆寧謐區宇也惟皇撫運徳洽寰區仁風旁扇愷澤遐敷逖矣金川獷頑不恭漸擾爐地邊服逞凶因崖築壘負固崇墉赫赫皇猷聿猷天討風馳電掣軍威浩浩用揚我武化以干羽柔逺寧邇寄兹國輔法宫第二大命將也皇上以臣傅恒經略金川總統軍機偕臣班第傅爾丹岳鍾琪等調集陜滇各省大兵務期犁庭掃穴迅奏膚功法宫宵旰區畫金酋決勝千里帷幄密籌簡任福將慰西顧憂瀛臺賜宴歌鐘以餞曰惟忠誠實荷帝眷節制之師感義忘私堂堂正正履險如夷雲横棧閣雪霽闗山皇威遐暢震讋百蠻師之出第三記軍行勞也經略臣恒以仲冬長至帥師出京衝寒遄發日行數百里將抵軍營山嶺險峻冰雪凍滑輒徒步登邁為士卒先師之出日長至風雲馳熊羆鷙整以暇忘勞瘁来桃闗値寒沍行危橋竹索渡維元戎先徒步天山髙疾以赴脚齒利不可駐磴稜層鑿冰作秉丹忱士卒暮萬峰雪如春煦軍威振第四恤將士也上念冰雪沍寒師旅暴露於外命經略臣恒賫往内帑賞賚漢土軍士勵勉將弁踴躍前驅鋭師罙入軍威振相恒来視師氣新壁壘色煥旌旗簡練出傑雋祕算握神機投醪邀實惠行歌敵愾無苦饑頻拊循詔雲飛来京都惻然五夜念征徒金粟厚賜賚叩首效嵩呼懸崖峭壁上躋攀奮勇忘其軀荷戈環甲行勿息策勛指日翔天衢蛩駏第五誅賊黨也臘月二十一日經略臣恒駐小金川邦噶山斬良爾吉阿扣等於軍門番衆無不悦服蛩駏並負嵎表裏為奸邪蠶食遍蠻疆退匿險且遐總統承廟算縛賊如麕麚桀驁恃無恐倏焉翦爪牙一朝揮天戈已斷常山蛇除惡務根本况敢留萌芽先聲已破膽蕃部歡迎遮整嚴兵氣盛陳雲髙西華量九地第六克堅碉也經略臣恒以臘月小除日試砲山梁身臨險阻指示機宜即於己巳元日帥師攻打碉卡連日殺獲無算中旬賊屢乞降量九地騰嶕嶢山梁憑險阻軍行蹴踏聲喧囂戈予卷雪聽鳴􅀈流鋋􅀈㩧飛刃縱横禽驚獸駭窮蹙乞命堅碉屹屹乃自穽大軍雲集一舉平奸宄已殱無從偵滅此朝食矢忠靖神武不殺我后聖破壘第七禀成算也經略臣恒視師決勝料勢將從昔嶺中峰直搗賊巢以成永靖蠻疆之計破壘兮專攻趨昔嶺兮中峰溯馬奈兮搗刮耳金川恬波兮皮船艤既揚我武殷闐銅鼓密箐深林孰敢保聚爰據卡撒已抜黨壩番境敉寧洽我雅化仁恩浹第八頌神武也正月十七日上以金川恃險不出久苦士卒定議班師以經略大學士臣傅恒秉心忠亮勇略超羣晉封公爵勅令還朝仁恩周溥上格天心而軍營即於此時乞降矣仁恩浹遐哉溥百戰百勝非予武勞士卒予心苦恃險而驕神所惡夫豈貪有此地土皇曰還歸我心膂牧民愛民天所予乃誘其衷使就撫么麽弗復為首鼠好生第九許投誠也莎羅奔孤窮乞命就降經略臣等以元凶不出峻拒其請嗣奉納降班師諭㫖而莎羅奔於二月初五日帶同郎卡率衆来降遵依六事番夷懐徳邊徼敉寧好生之徳欽若昊天無不幬覆詎遺金川投誠哀籲乞命陳詞天討既申咸赦除之誓以六事舊染維新和氣蒸薰我澤如春䝉奇兜勒吚嗢頄䫜敬獻古佛樂以鉦鐃爾舍爾舍爾田爾田同我大平毋恃碉堅師告㨗第十樂凱旋也上以金川平定班師策勲聖武逺揚光昭典禮師告㨗凱旋歸昔往雪霏霏今来栁依依皇仁施絶徼宴樂歌采薇至善不戰功成巍巍讓美弗居長信崇徽虎賁脫劒收牙璋蠻氛肅清三辰光紫宸端拱勅幾康安邊守土臣賢良風雨以時物繁昌百祿是荷萬福無疆平定金川方略巻三十一
