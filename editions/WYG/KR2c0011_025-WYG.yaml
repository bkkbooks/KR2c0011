body:
  text: 二月癸卯舒赫徳兆恵班第㑹奏言大兵既撤從前一切軍需支用銀米臣等現在遵㫖清查其部撥及各省協濟銀兩倘有餘存應行核計兹據署布政使髙越冊開金川用兵以來川省舊管新收共軍需銀七十七萬二千九百餘兩部撥及外省協濟已解到川省銀八百七十九萬一千一百餘兩共銀九百五十六萬四千餘兩現存銀一百五十萬三千餘兩據該司冊稱軍興以來借動司庫及各府㕔州縣酌留存貯銀五十七萬一千餘兩尚未還項臣等伏思酌留封貯之銀原以備地方𦂳要之需不可久缺應即於前項餘存銀内照數撥出還項尚餘存銀九十二萬一千餘兩現在應付回兵水陸船隻夫馬在在需用又有從前雇馬雇夫運送米石置備鐡斤草料等項均應找給價值又出師官兵應需賞恤自應遵㫖寛裕留備查各省尚有奉撥未到銀兩内長蘆三十萬兩昨已解到連現在收貯銀共一百二十三萬一千餘兩應請將一百萬兩留備前項軍需支用尚餘銀二十三萬餘兩查川省本年額賦奉文緩徵且係臨邊要地而爐藏各站歲有供應寧使多備無缺應再撥銀一百萬兩以備歲需之用除將山西解到銀三十二萬兩照數收貯共銀五十五萬兩尚少銀四十五萬兩請於近川之湖廣起解銀八十萬兩内委官持檄徃迎解員截撥以足一百萬兩之數其餘江浙等省未到銀二百餘萬兩如未出境者仍令解回本省歸欵已經出境者皆令於所到省分就近截收至山西尚有未到銀五十萬兩必由西安前進西安庫貯無多現資隣省接濟應將此項銀兩全數留陜無庸再解來川似此酌量截收既省沿途脚費又於各省有濟仍將收過銀兩造冊具題並行令各該省將解回本省及截收某省銀兩數目造入季冊報部查核奏入上命軍機大臣㑹同該部速議旋經議覆於江浙等省未到銀二百五萬兩内撥銀四十萬兩以補陜省酌留之數再撥三十二萬兩以補甘肅備貯之數餘俱照原奏行甲辰䇿楞岳鍾琪㑹奏言征勦金川𣲖調土兵一萬按照舊例每名賞給行裝銀五兩每月支安家糧餉銀一兩一錢一分五釐今臣等詳加自𣲖調以來各土兵内有僅領數月坐糧或支一半行裝銀兩而全未支領者甚多出師二載核算應領銀數尚須二十餘萬因思現在各路軍營積存不能運回之米石欽奉諭㫖令臣等酌賞出力土兵莫若即查明各土兵應領銀數除離營甚逺之􅂻塘巴塘十二部落等處不願領米者仍聽照例由地方官請領銀兩其餘近營各番即以此項米石按照各營折色定價扣算給發令其自行背運如有餘剰再遵㫖分别賞賚約可節省十餘萬金臣已現在通飭照此辦理奏入俞旨報聞丁未上命軍機大臣等傳諭經略大學士忠勇公傅恒總督䇿楞尚書舒赫徳總督尹繼善曰川省馬匹協撥購備為數頗多大兵回營之後所餘之馬除補營驛缺額之外其尚可餵養者未便全留該省徒費飼秣經略大學士忠勇公傅恒雖奏稱馬多疲乏然亦未必悉不堪用官兵由成都回陜者逐漸經過則馬匹亦逐漸餘剩自宜預為之計若此時不行捲站之法兵過馬留勢必又須𣲖夫趕送轉多煩費可傳諭舒赫徳䇿楞令將餘剰之馬按站捲回即交陜省存留以補缺額縱不無疲瘦而大差既竣加意餵養自可備用較之叧行動項購買者猶屬省便並傳諭經略大學士忠勇公傅恒總督尹繼善知之是日上又命傳諭經略大學士忠勇公傅恒曰據䇿楞奏稱莎羅奔郎卡感朕宥死之恩選進番童番女各十名代伊等服役已專差送赴經略大學士忠勇公處又現在刮耳崖修建祠宇供奉經略大學士忠勇公長生禄位兩酋此番向化實出至誠但伊等更生固朕曠蕩之恩亦由經略大學士忠勇公傅恒忠誠辦理之所致生祠自應聽其建立至番童番女理不當留己令總督䇿楞量加奬賞可傳諭經略大學士忠勇公將所送㓜番即發還成都交䇿楞傳令該酋領回是日上諭内閣曰原任總兵任舉奮勇捐軀前經加恩優䘏廕子今伊子任承恩來京謝恩召見之時看來頗堪上進但年齒尚㓜著暫行回籍令伊祖伊母善為撫養教導俟成立後來京當差聞其家道貧乏著賞銀五百兩交伊母為養贍家口之資並傳諭廵撫阿里衮留意照看是日䇿楞岳鍾琪㑹奏言莎羅奔郎卡悔罪輸誠䝉皇上天恩􅃠開三靣貸以不死自兹以徃該酋自必畏威懷徳安分守已永靖蠻烟但犬羊之性靡常防範之方宜預查逼近金酋之土司地方周圍環繞有雜谷綽斯甲革什咱巴底巴旺小金川等處雜谷地廣人衆金酋不敢生心綽斯甲本屬姻親亦未必與之搆釁惟革什咱巴底巴旺小金川沃日等處勢孤力弱從前金酋常懷兼并之心今若不為未雨綢謬之計恐日久别生事端亦未可定臣等擬於卡撒兵糧盡撤之後暫駐小金川駕馭各土司諭以聨絡聲氣共相和好為合從之計遏窺伺之機庶防微杜漸邊釁可以潛消矣奏入諭曰甚是惟應使番部自為藩籬使我聲息常通亦祗可如此而已三月庚戌上諭内閣曰前因金川軍務奏報徃來關係𦂳要特命増置臺站設立牌單稽查果能迅速馳達復經兵部特派司官八員筆帖式八員專司收發晝夜在署輪值又派差官十二員徃來遞送晨夕馳驅無愆晷刻均屬黽勉勤勞今軍務告竣臺站人員已邀議叙其兵部辦理臺報司員筆帖式差官等著一併交部議叙壬子經略大學士忠勇公傅恒奏言臣自成都入陜途中連次遇雨麥田茂盛今自西安至同州一帶入山西境麥莖加長葱蔚可觀有數寸至一尺者皆縁去冬得雪土膏本屬滋潤而今春又有雨澤近日所得之雨更為深透臣所至之地百姓俱言今春麥熟最好目下晴霽十餘日後再得微雨一次麥秋定必豐盛即此後不復得雨亦可决其有收衆口一辭咸謂數年以來所未有民情實為歡慶臣不勝欣喜蒲州一帶偶因荒歉民食艱難仰賴皇上加恩賑恤不至失所今麥苗可望大熟民氣已甦將來接濟不缺尤可稱慶奏入諭曰實可慶慰京師昨夜又得寸餘膏澤實從來所罕遇也臣等謹按是時金川平定經略班師途次陳奏之詞不言軍旅惟及民事蓋當前此軍需旁午之時我皇上諄諄以民依為念是以大學士傅恒道路所經耳目所遇凡地方之雨澤閭閻之情形無不極其留意詳悉入告以慰聖懷蓋所以仰體聖天子如傷若保之懷而我皇上之誠心為民念念不忘稼穡益可見也癸丑上諭内閣曰經略大學士忠勇公傅恒因朕賞給四團龍補服具摺奏謝並請於朝賀大慶之日遵㫖服用其尋常仍服公品級補服此固出自大學士忠勇公傅恒謙冲本意然朕此番奬賞實出至公且具有深意不可不為明晰宣示蓋論大學士公傅恒平定金川之功自不可與揚古里額駙開國之勲並論但彼當開創四征之初今屬守成無事之日以大學士公傅恒之忠誠智勇練達宣力令與同時同事亦必能懋建殊勲可信其易地皆然也夫軍旅之事國家不能保其必無大臣身係安危為社稷所倚頼如張廣泗不過封疆大吏其人亦不足論至訥親爵位既崇又任用有年朕之加恩超越儕輩上年命以視師實寄以心膂如朕親行不意辜恩貽誤一至於此為大臣者若惟事偷安自逸任意乖張國事其何賴焉朕既用以自愧更因以滋懼是以明正刑章不肯曲宥而大學士公傅恒見朕縈懷西顧毅然請行仔肩重任自奉命西征冒涉風霜均勞士卒步陟巖阻晨夕辛勤拜發封章裁决軍務常至達旦事事妥協周詳至則申明紀律誅賊腹心雪夜督師攻碉毁卡必期焚巢掃穴一舉蕩平大振聲威賊番震慴始稽顙歸命出於至誠迨承朕㫖納降班師星馳就道諮詢庶務仍係丙夜辦理奏覆此所謂誠貫金石信格豚魚是以時未七旬兵不血刃而番酋洗心革面永矢歸誠現據䇿楞等具奏守備王如林前徃黨壩夜過勒歪馬上遺失衣裝為番民拾取次日莎羅奔專差送還即此一端足見威信感孚叛番恭順之實效從此邊徼敉寧閭閻樂業而中外大臣咸知所取法股肱一體休戚相關夙夜匪躬緩急足資倚任實我大清萬年無疆之慶國家酬庸盛典原非朕所得私今兹疊沛殊恩昭示風勸亦為朝廷逺大之計不僅為金川平定一時一事而然在大學士公傅恒實應欣承無愧不然則莎羅奔畨蠻小醜即迅奏膚功亦與當年岳鍾琪之樹績青海大學士鄂爾泰之綏靖苗疆等耳朕於臣工賞罰大典悉有權衡銖黍不爽天下臣民宜所共悉所賜大學士公傅恒照宗室公式之朝帽頂及四團龍補服並於朝賀典禮之時時常服用不必懇辭其尋常入朝入部辦事應從所請隨宜即用公品級補服以成謙挹之羙是日大學士來保奏言經略大學士自京起程之日特派諸王大臣率令侍衛等於郊外餞送今班師凱旋抵京之日似應仍派諸王大臣於郊外迎接謹將王公及文武滿大臣等列名進呈御覽恭候欽定上命色布騰巴爾珠爾查拉豐阿於初八日隨大阿哥前徃迎接裕親王履親王諴親王恒親王竒通阿哈達哈豐安𢎞凱羅布藏色貝趙宏恩那木圖特庫阿岱李元亮海望徳通徳齡介福三和馬靈阿雅爾圖勒爾森於郊外迎接是日䇿楞岳鍾琪㑹奏言從前臣岳鍾琪减撤土兵召募新兵千有餘名又陸續召募二百九十餘名頗稱勇鋭除已經頂補及病故傷亡外尚有無缺可補之新兵一千五百餘名兹值大兵凱旋一切坐餉行糧俱經停止新兵均屬無糧可支若不亟為仰懇聖恩不獨疆塲効力不獲仰邀收録以勵人心且若軰俱係各省游手好閒之徒一旦失所流落西蜀於地方亦非所宜臣等再四籌酌惟有仰懇皇上天恩暫准賞給守糧容臣等抵省後即分發通省協營統限以到營後半月内將各營老弱不堪充伍者秉公裁汰即以新兵抵補庶為日無多不致虗糜糧餉而新兵可免失所營伍又得收精兵之效奏入得旨允行是日䇿楞岳鍾琪又㑹奏言撤兵後各營所存之米多寡不一少者僅足敷用多者既不能運回内地若概行賞給亦屬可惜兹查土兵中陣亡病故者尚有一千七百餘名帶傷者二千二百餘名例應照内地兵丁折半賞給約需銀四五萬兩似應將此項米石一體扣算折給以省錢糧惟是賞恤定例應自外省查明報部由部核題奉㫖始得辦理未免時日甚遲米石無人看守再懇聖恩准臣等即在外查明土兵傷亡等第確數按照部例先行以米扣抵報部核銷其距糧務路逺或不願領米者仍照舊例造冊報部核辦奏入得㫖允行是日䇿楞岳鍾琪又㑹奏言卡撒軍營應運回内地糧餉軍裝砲火鉛彈等項甚多糧運停撤無夫可覔若於逺處雇覔又致靡費錢糧隨商令漢土官兵分臺遞送即將卡撒餘存米糧酌量賞給鼓勵兹已全數運出金川地界其西安成都滿兵俱已起程陜甘雲貴緑旗兵丁亦已出金川境䕶軍統領烏爾登法酬副都統盧色力等俱於二月十三十六等日報到起程日期臣䇿楞於二十二日前赴小金川羙諾地方臣岳鍾琪亦即前徃建昌鎮馬良柱松潘鎮哈攀龍帶領川兵殿後彈壓約於二十五日可全出金川地界自凱旋以來迄今半月金酋日遣頭人在營供應夫馬而窮番來營拾取我兵遺棄不堪物件者絡繹不絶俱有頭目管束極為安靜奏入俞㫖報聞甲寅經略大學士忠勇公傅恒奏言臣於初四日自山西平定州入直𨽻界内察看情形須得雨澤乃辰刻至獲鹿縣地方即遇天降時雨申刻方止約可二三寸不等一路春膏融洽行至正定百姓爭先出迎歡聲載道俱云十餘年來無此應時好雨臣問此後尚須雨澤否據云目下即不得雨亦無妨碍麥秋决可豐收臣觀此雨實屬有益農功謹此附奏奏入諭曰京師亦甚霑足實同欣慶也乙卯上諭内閣曰人子報本之忱必念爾祖國家酬庸之典爰及所生大學士忠勇公傅恒夙夜宣猷贊襄機務前因金川番蠻不靖丹誠奮發自請督師朕以其世篤忠貞服勞王家鍾慶椒塗聨輝懿戚悉由乃祖乃父積厚流光誕兹良弼陛辭之際朕欲加恩賜之祠堂秩於祀典大學士奏稱臣仰䝉髙厚榮賁先人實出至願如果憑仗天威肅清荒徼凱旋之日擬當懇請殊恩今威信逺孚番酋效順膚功克奏績著旂常宜考懿章以示優錫其照勲臣額宜都佟國維之例勅建宗祠春秋致祭增光爼豆用奬忠勲該部即遵諭詳議具奏丁巳經略大學士忠勇公傅恒還朝是日上諭内閣曰金川平定邊徼敉寧大學士忠勇公傅恒凱旋陛見奏稱是役臣雖勉効馳驅而番酋歸命悉仗天威至於歴練戎行信孚蠻部深入賊巢膽勇雄决則岳鍾琪洵為克勝委任此固出於大學士公傅恒之讓能推羙然岳鍾琪之奮徃任事實屬可嘉前已降旨晉階太子太保交部從優議叙伊前於青海奏㨗曽封公爵兹復樹績蠻方收桑榆之效著再加特恩授兵部尚書銜於本身封為三等公以昭録功懋賞之典俾宣力疆塲者知所勸焉臣等謹按語曰師克在和信哉是言也觀前此訥親張廣泗之彼此牴牾卒致僨事及大學士傅恒涖營羣臣輯睦庶務修舉抑觀其凱旋復命即讓能推羙於岳鍾琪則在軍之虛已和衷廣思集益可知是誠能仰體聖衷宜乎克副委任而為人臣者亦當知所法戒矣是日大學士忠勇公傅恒傳諭曰十二日筵宴隨大學士前徃之軍機處官員及在京辦理軍機處行走官員俱著入宴戊午上御太和殿受羣臣朝賀是日諭内閣曰朕賜大學士忠勇公傅恒四團龍補服先經大學士公傅恒奏請於朝賀大慶之日遵㫖服用尋常仍服公品級補服朕諭以入朝入部辦事姑從所請以成謙挹之羙今日朕陞殿禮畢後大學士即易補服朕思章服之榮原以旌有功而勵臣節從前勲舊大臣䝉賜者皆時當服用若僅用於朝賀典禮之時而尋常入朝又旋易本爵服色殊覺参差非禮嗣後入朝著即遵前㫖時常服用其入部及在家聽其自便以終成大學士之謙吉葢朕之加恩初不為大學士一人且不為其一時一事立功而然如以功而論較之開國元勲自有不及而其忠純堅定之心則一是以能感格上蒼諸事順遂完羙而威信所孚番蠻向化且金川不過么魔小醜即俘䤋其首殄滅其衆亦無關輕重惟是從前張廣泗既乖張貪縱不肅軍紀因特命訥親前徃更不料其毫無實心惟安逸是躭傲慢自恣番蠻初聞特遣重臣意其必有過人之略乃見其所為如此將謂中朝大臣舉皆相似其貽笑外番可勝言耶今大學士公傅恒自奉命以至抵營本精白自矢之忱殫夙夜匪躬之誼歴艱險而逾壯誅奸宄而不疑用是威懾羣番信孚異類革心歸命一出至誠俾向日之見輕蠻服玷辱班聨者盡為湔洗實足稱國家倚任於朕顔面有光即舉朝大臣亦大為增色朕因此益信天人感應之理惟在一心其有心作偽者天討必不能逃而立心忠實者天休必所嘉佑我君臣當善承天意交修罔懈庶幾亮工熙績海宇乂安為我大清永奠丕基垂慶無疆之至計也著宣諭中外知之己未上諭内閣曰大學士公傅恒奏稱軍營隨來之叅將吳士勝家有老親道逺難於迎養吳士勝著以近省叅將補用是日上又諭内閣曰訥親於從前金川軍務支用養亷及濫賞建碉等費經户部題明著賠續據尚書舒赫徳查奏訥親濫用冐支銀米均應著落伊兄弟名下追賠朕以䇿楞辦理諸務實心實力坦白自將毫無觀望加恩免其賠繳令愛必達阿里衮按年交清今思廵撫雖有養亷而應辦公事亦多設措賠項未免拮据朕念伊等祖父曾為國家効力況弟兄罪不相及愛必達阿里衮應賠銀兩著一體寛免此朕格外之恩伊二人更當殫心職業力圖報稱如稍有疑慮因循不克勉矢真誠不能逃朕洞鑒也庚申上幸瀛臺賜羣臣宴出征有功兵丁皆與焉辛酉上謁陵駕發京師是日上諭内閣曰從前任舉奏請帶徃金川之千總傅徳把總晁宗志俱著照伊職銜留川補用平定金川方畧卷二十五
