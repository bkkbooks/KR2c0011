front:
  text: 欽定四庫全書平定金川方略卷二十七
  hash: sha256:290d9081e914ef0049a9d732a1388ce408a17601bd01390c6a7318a094b7c756
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0011_WYG_027-1a, image: WYG0356/WYG0356-0398a.png}
body:
  text: 藝文御製詩命傅恒經略金川詩以賜之壯齡承廟略一矢靖天狼番部蕞爾蠢王師武必揚慰予西顧久嘉汝赤心良撻伐敉么冦撫循集衆長斯能成偉績用榦不庭方佇看銷兵氣敷天日月光孟冬上旬於瀛臺賜經略大學士傅恒及命往蜀西諸將士食並成是什大清聲教暨遐陬豈有來王稽蜀酋黷武開邊非我志安良禁暴藉卿謀行軍吉值初陽復賜食恩同湛露流轉瞬明年擒娑虜還教凱宴侑封侯十月十三日雪得詩二首時命大學士傅恒經略金川月之十日召經略及諸軍士於瀛臺賜食天氣晴和恩流湛露朕意於數日間若得瑞雪足為明年破金川嘉兆今未逾三日得雪既用占嵗兼惬軍祥樂孰如之因並書以賜同雲未肯放冬晴凍雨均霑繼瑞霙著地消融無定態隨風飄舞可憐生鴛棲有玉皆垂珮雞樹非春率鬬榮卜麥慰餘饒韻事竹爐文火煮三清知時好雪値冬初破蔡明年此兆諸不數舞隨曹植馬所欣瑞㸃晉公裾評將形色清無比目極鬖髿勢有餘却想臺懷駐輦處松崖積翠景相如前年幸五臺亦於孟冬遇雪戊辰十一月初九日雪得五言古詩七韻書賜經略大學士伊余有宿心對雪無不喜今歳已兩逢此復勝於彼恰在仲冬月偶駐南海子銀甸致更佳玉林花散蘤豈惟縱目欣為惬祈年美念我同心佐率彼諸軍士驅馳冒嚴寒縈懷曷能已經略大學士傅恒舟渡蜀江賦詩呈覽用其韻答之若濟常殷擬巨川平羗今復率師前行旌冬發真勤瘁露布春傳此佇延遙度已臨滴博壘底教稍遲蜀江船數千里外寕暌隔心在丹楓玉馬邊經略大學士忠勇公傅恒帥師進剿番酋忠誠奮發志期殄冦執奏再三朕揆勢度理以允降班師休兵息民為經國逺計彼匈奴未滅何以家為者乃票姚貳師輩武人鋭往立功之概大學士輔弼元臣抒誠贊化名耀旂常正不必與兜鍪閫帥争汗馬一日之績詩以示之三面姑開格蜀夷来調説鼎佇期之集思廣益卿誠踐勤逺勞民我不為武豈佳兵應戒彼績惟和衆孰同斯功成萬骨枯何益壯志無須效貳師己巳新正試筆書賜經略大學士傅恒履端首祚肇昌辰斂時五福錫庶民三百六旬中一日富貴貧賤皆欣春春雷送響飄瑞葉唐花底用催三疊青黄布令穆其舒有脚韶光熙以㨗㨗轉韶光實快哉花牋彩筆吟興催東風吹西觸物回迅共西川凱報来春正九日作一例韶光同不同倚楹朅爾向東風萬幾就理心無倦七字成吟興有窮邇日邊情縈逺夢當春㨗報賴元戎兩階干羽重華德緬想前徽遲侍中大學士傅恒經略西川效忠宣力誅渠魁破堅壘申明紀律大振軍威番酋窮蹙乞命經略大學士鋭意蕩平未允其請朕特宏解網之仁下詔班師召大學士還朝襄贊勞績茂著詩以賜之安邊底績本丹忠請命番酋勢已窮上将有心期利執大君無物不包䝉那須一月聞三㨗早覺千忻達兩宫晉國勤勞予厪念速歸黄閣贊元功敺鳥何庸盡覆巢好生天地德含包歌成宵雅八章句蓍得同人九四爻兵洗蓬婆春澹蕩首稽玁狁面顤䫜蜀民安撫勤籌畫心契元良泰陛交二月十四日閲經略大學士忠勇公傅恒奏報莎羅奔郎卡於月之五日詣轅納欵稽顙歸誠露布風馳歡聲載路喜而有作止戈為武信其然我澤如春經略宣共喜㨗音來玉闕何殊俘虜自金川番酋路左心傾服軍士行間氣倍鮮單騎汾陽休比擬都因忠赤格穹天經略大學士忠勇公傅恒奏凱金川率諸將士還朝錫宴豐澤園用昭飲至之典即席得長律一首書以賜之卡撒功成振旅歸昇平凱宴麗晴暉兩階干羽欽虞典六律宫商奏采薇湛露應教頒幕殿甘膏更慶遍春畿持盈保泰咨同德偃武修文凛勅幾蜀道難用李白詩韻我聞李白所云噫吁戲危乎髙哉蜀道之難難於上青天昔實謂信矣今乃知不然想其酒家眠起神来候狂歌落紙如雲烟一時遣興并寓意幾曽歴險親履巉巖巔我之所云則在錦城以西桃闗外納窪天赦相延連語言之所不通人跡之所罕到於是處也則有卭籠以居糈粑以食之金川夜郎自大侮隣部相與呌詉為攀援逍遙河上等遊盤使我師老棲荒巒告功不時烽未息宵衣旰食増愁歎予哀征夫命相釐使我戍卒及早還度晉越秦未彌月劒閣亦復衝霜攀拾級宵磴幽飲馬冰澌間此時頗有奏章到謂棧道險祇不過如塞上山蜀道非難豈真難於上青天太白聽此想應笑破顔番窟冰途寛不徑尺下臨千仞澗上倚凌雲壁以繩繫馬馬驚豗伏波砊礚殷其雷設非士卒同辛苦安能成功迅速歸来哉碉樓失其崔嵬巴郎刮耳夜戸開昔聞格豚魚今見服狼豺休運儲胥安避虎蛇孳爾雞豚藝爾桑麻却履劒閣如平地凱歌士卒咸歸家蜀道非難豈眞難於上青天迴思籌邊去歳不禁西望猶咨嗟御製平定金川告成太學碑文天畀我皇清握乾符俯坤軸函括萬邦悉主悉臣五后纘承創守佑啓亦唯是二三藎臣布徳宣力予曰有先後予曰有禦侮用造我丕丕基罔有蘖芽罔不煦嫗長養游於大當粤有金川莎羅奔者居西蜀桃闗以外界綽斯甲小金川之間向曽從征得受符檄與諸土司齒顧恃其險逺夜郎自大搆釁隣番各土司申訴封疆吏吏曰蔓之不圖豈其視為甌脫乃請兵籌餉期掃其穴而司其事者或怯縮以老師或􅘀狡以蓄志軍無適從事用弗集予心􅍀然念邊徼之不寧或致增防置戍重勞吾民大學士忠勇公傅恒義同休戚毅然請肩斯任乃命以經略印益厚集諸路軍芻粟相繼閭閻不驚卜吉於戊辰十一月之三日禡牙以指所征朕親御武帳賜經略酒以行天日和昶陽氣宣復都人士聽睹聳躍㒺不忭喜謂露布之旦暮至也乃歴燕晉驅秦隴越劒閣絶川江凌桃闗之巇經天射之峻又日討軍實而教誡拊循之均其渇飲飢食同其曉征夜眠至於密贊機務親草奏章則又經略獨勤其勞而諸武臣有所不知有弗能共者恩威既明士用益勵度番落如戶庭過部伍於衽席奸酋授首軍聲大振復以巨礮擊其碉堅碉以摧将俟諸軍之集搗其中堅而番首騤瞿駾喙稽酋請降經略臣以彼罪重惡極窮而乞生久或渝且偝焉慮不允所請朕惟天地之德在好生彼蟻潰而鼠駭者毋寧赦而宥之且求降而盡殱之不可謂武矧不足以汚我斧也於是經略宣朕明㫖登壇受降己已二月之望金川平定㨗音至京是役也罙入數千里奏凱未七旬而振旅之師多有返自中途未究其用者昔之成功巴蜀如建武之定公孫江陵之降李勢皆在版圖之内無足比數廷臣舉皇祖朔漠皇考青海成例請勒碑成均以示來許夫秉丹誠而運籌決勝永靖荒徼者經略大學士之功也商可否於帷幄衝矢石於行陣者參贊大臣及諸将士力也朕何有焉唯是體乾元之徳凛佳兵之戒保大定功安民和衆庶幾可以垂則乎乃系之以詞曰維天生人類聚羣分凡兹林林孰非我民有羈而縻有誨而諄豈伊異視逺近殊倫守在四夷稽古名言無已用之寓義於仁蠢彼金夷恃其險阻蠶食豨張謂莫我拒不靖不庭侵厥隣聚駭奔呌呶以干大咎匪棘匪紓玁狁之故我張我伐玁狁之故我師既集賊亦相持匪敢相持懼誅自支兩易寒暑敉功稍稽賊益以狂怒臂當車罪臣既誅以殉我師朕咨於恒汝往視之朕咨于恒惟汝同徳惟我庶士亦久于役将兹旗兵羽林神策其勇熊羆其心金石何敵弗摧何攻弗克濟以汝忠奏㨗頃刻恒拜稽首臣敢弗蘉既禡既宜師出于京師出于京時惟一陽未逾五旬乃壓其疆前旌獵獵有節煌煌羣番迺驚謂自天降惟彼攸恃曰良爾吉以偵以諜如鬼如蜮其恃爰誅其類股慄紀律是明戎兵是詰鑄礮攻碉其守以失惟是懼誅潛弗敢出其潛弗出乃旦夕延将齊我軍披其中堅大鞣大膊期目之前彼乃窮蹙乞降悚䖍惟命是從六事永遵除道築壇肉袒羊牽赳赳鍾琪乃度之愬聿抵賊巢開誠以諭擕其二酋軍門親赴悔罪歸誠車塵馬足順斯撫之昭我王度昔也雷霆今也雨露七縱諸葛單騎汾陽曰我相臣於前有光晉爵錫服黼黻龍章速歸黄閣左右贊襄休養生息惠鮮蜀邦我武既揚無疆惟慶平定金川方略卷二十七
